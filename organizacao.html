<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Organização</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: #e2e8f0;
  margin: 0;
}

/* NAV */
nav {
  background: #020617;
  padding: 10px;
  text-align: center;
}

nav a {
  color: #38bdf8;
  margin: 0 8px;
  text-decoration: none;
}

/* CENTRALIZAÇÃO */
section {
  display: flex;
  justify-content: center;
  padding: 30px 10px;
}

/* CARD COMPACTO */
.card {
  background: #020617;
  padding: 15px;
  border-radius: 10px;
  width: 100%;
  max-width: 500px;
}

/* ÁRVORE */
ul {
  list-style: none;
  padding-left: 15px;
}

li {
  margin: 4px 0;
}

/* ITEM */
.item {
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: grab;
  font-size: 14px;
}

.item span {
  flex: 1;
}

/* BOTÕES */
button {
  background: #1e293b;
  border: none;
  color: #e2e8f0;
  padding: 3px 6px;
  border-radius: 5px;
  cursor: pointer;
  font-size: 12px;
}

/* INPUT */
input {
  padding: 5px;
  border-radius: 5px;
  border: none;
  width: 65%;
  margin-bottom: 10px;
}

/* DRAG */
.dragging {
  opacity: 0.4;
}

/* TOGGLE */
.toggle {
  cursor: pointer;
  width: 15px;
  display: inline-block;
}
</style>
</head>

<body>

<nav>
<a href="#">Home</a>
<a href="#">Métodos</a>
<a href="#">Organização</a>
<a href="#">Ferramentas</a>
<a href="#">Sobre</a>
<a href="#">Contato</a>
</nav>

<section>

<div class="card">
  <h3>🌐 Estrutura de Hosts</h3>

  <input type="text" id="novoItem" placeholder="Novo item..." />
  <button onclick="adicionarItem()">Adicionar</button>

  <ul id="arvore"></ul>
</div>

</section>

<script>
let estrutura = JSON.parse(localStorage.getItem("estruturaZabbix")) || [
  {
    nome: "Core",
    aberto: true,
    filhos: [
      {
        nome: "Vendors",
        aberto: true,
        filhos: [
          { nome: "Juniper", filhos: [] },
          { nome: "Huawei", filhos: [] }
        ]
      }
    ]
  },
  {
    nome: "Distribution",
    aberto: true,
    filhos: [
      {
        nome: "Vendors",
        aberto: true,
        filhos: [
          { nome: "Juniper", filhos: [] },
          { nome: "Huawei", filhos: [] },
          { nome: "ZTE", filhos: [] }
        ]
      }
    ]
  }
];

let selecionado = null;
let dragItem = null;

function salvar() {
  localStorage.setItem("estruturaZabbix", JSON.stringify(estrutura));
}

function getIcon(nome) {
  nome = nome.toLowerCase();

  if (nome.includes("huawei")) return "🔴";
  if (nome.includes("juniper")) return "🔵";
  if (nome.includes("zte")) return "🟢";
  if (nome.includes("vendors")) return "📦";
  if (nome.includes("core")) return "🧠";
  if (nome.includes("distribution")) return "🌐";

  return "📁";
}

function render() {
  const ul = document.getElementById("arvore");
  ul.innerHTML = "";
  estrutura.forEach(item => ul.appendChild(criar(item)));
}

function criar(item) {
  const li = document.createElement("li");
  li.draggable = true;

  li.addEventListener("dragstart", () => {
    dragItem = item;
    li.classList.add("dragging");
  });

  li.addEventListener("dragend", () => {
    li.classList.remove("dragging");
  });

  li.addEventListener("dragover", (e) => e.preventDefault());

  li.addEventListener("drop", () => {
    if (dragItem !== item) {
      remover(estrutura, dragItem);
      item.filhos.push(dragItem);
      salvar();
      render();
    }
  });

  const div = document.createElement("div");
  div.className = "item";

  // TOGGLE
  const toggle = document.createElement("span");
  toggle.className = "toggle";

  if (item.filhos && item.filhos.length) {
    toggle.textContent = item.aberto ? "▼" : "▶";
    toggle.onclick = () => {
      item.aberto = !item.aberto;
      salvar();
      render();
    };
  } else {
    toggle.textContent = "";
  }

  const icon = document.createElement("span");
  icon.textContent = getIcon(item.nome);

  const span = document.createElement("span");
  span.textContent = item.nome;

  span.onclick = () => {
    selecionado = item;
    document.querySelectorAll(".item span").forEach(s => s.style.fontWeight = "normal");
    span.style.fontWeight = "bold";
  };

  const btn = document.createElement("button");
  btn.textContent = "❌";
  btn.onclick = () => {
    remover(estrutura, item);
    salvar();
    render();
  };

  div.appendChild(toggle);
  div.appendChild(icon);
  div.appendChild(span);
  div.appendChild(btn);

  li.appendChild(div);

  if (item.filhos && item.filhos.length && item.aberto) {
    const ul = document.createElement("ul");
    item.filhos.forEach(f => ul.appendChild(criar(f)));
    li.appendChild(ul);
  }

  return li;
}

function adicionarItem() {
  const input = document.getElementById("novoItem");
  const nome = input.value.trim();

  if (!nome) return;

  const novo = { nome, aberto: true, filhos: [] };

  if (selecionado) {
    selecionado.filhos.push(novo);
  } else {
    estrutura.push(novo);
  }

  input.value = "";
  salvar();
  render();
}

function remover(lista, item) {
  const index = lista.indexOf(item);
  if (index !== -1) {
    lista.splice(index, 1);
    return true;
  }

  for (let i of lista) {
    if (remover(i.filhos, item)) return true;
  }

  return false;
}

render();
</script>

</body>
</html>
