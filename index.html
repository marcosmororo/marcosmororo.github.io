<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-3">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">
  <title>Marcos Renan</title>
  <link rel="stylesheet" href="css/style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root {
      --primary: #38bdf8;
      --bg-dark: #0f172a;
      --bg-light: #f1f5f9;
      --card-dark: #020617;
      --card-light: #ffffff;
    }

    * {
      transition: background 0.3s, color 0.3s;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: var(--bg-dark);
      color: white;
    }

    body.light {
      background: var(--bg-light);
      color: #111;
    }

    /* NAV */
    nav {
      position: sticky;
      top: 0;
      background: rgba(2, 6, 23, 0.9);
      backdrop-filter: blur(10px);
      padding: 15px;
      text-align: center;
      z-index: 1000;
    }

    body.light nav {
      background: rgba(255, 255, 255, 0.9);
    }

    nav a {
      color: white;
      margin: 0 12px;
      text-decoration: none;
      font-weight: 600;
      position: relative;
    }

    body.light nav a {
      color: #111;
    }

    nav a::after {
      content: "";
      position: absolute;
      width: 0;
      height: 2px;
      background: var(--primary);
      left: 0;
      bottom: -4px;
      transition: 0.3s;
    }

    nav a:hover::after {
      width: 100%;
    }

    /* HEADER */
    header {
      text-align: center;
      padding: 80px 20px;
    }

    .foto {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      border: 4px solid var(--primary);
      object-fit: cover; /* 🔥 corrigido */
      transition: 0.3s;
    }

    .foto:hover {
      transform: scale(1.08);
    }

    h1 {
      margin-top: 15px;
      font-size: 2rem;
    }

    .subtitle {
      opacity: 0.7;
      margin-top: 5px;
    }

    /* BOTÃO */
    .theme-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      background: var(--primary);
      border: none;
      color: white;
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      z-index: 2000;
    }

    /* SOCIAL */
    .social {
      margin-top: 25px;
    }

    .social a {
      font-size: 24px;
      margin: 0 10px;
      color: inherit;
      transition: 0.3s;
    }

    .social a:hover {
      color: var(--primary);
      transform: translateY(-3px);
    }

    /* CARD */
    .card {
      max-width: 800px;
      margin: 30px auto;
      padding: 25px;
      border-radius: 15px;
      background: var(--card-dark);
      text-align: center;
      box-shadow: 0 0 20px rgba(56,189,248,0.1);
      color: white;
    }

    body.light .card {
      background: var(--card-light);
      color: #111;
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 20px;
      opacity: 0.7;
    }

    /* ANIMAÇÃO */
    .fade {
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 1s forwards;
    }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

  </style>
</head>

<body>

  <button class="theme-btn" onclick="toggleTheme()">🌙</button>

<nav>
<a href="index.html">Home</a>
<a href="metodos.html">Métodos</a>
<a href="organizacao.html">Organização</a>
<a href="ferramentas.html">Ferramentas</a>
<a href="sobre.html">Sobre</a>
<a href="contato.html">Contato</a>
</nav>

  <header>
    <img src="renan.jpeg" class="foto fade" alt="Foto de Marcos Renan">
    <h1 class="fade">Marcos Renan</h1>
    <p class="subtitle fade">Pai • Tecnologia • Evolução constante 🚀</p>

    <div class="social fade">
      <a href="mailto:marcosrenan@outlook.com"><i class="fas fa-envelope"></i></a>
      <a href="https://instagram.com/marcosrm_" target="_blank"><i class="fab fa-instagram"></i></a>
      <a href="https://linkedin.com/in/marcosrenan" target="_blank"><i class="fab fa-linkedin"></i></a>
    </div>
  </header>

  <div class="card fade">
    <h2>👋 Bem-vindo!</h2>
    <p>
      Este é meu espaço pessoal onde compartilho conhecimento sobre estudos,
      organização e ferramentas que me ajudam a evoluir todos os dias.
    </p>
  </div>

  <footer>
    <p>Buscando o meu melhor a cada dia 💡</p>
  </footer>

  <script>
    function toggleTheme() {
      document.body.classList.toggle('light');
      const btn = document.querySelector('.theme-btn');
      btn.textContent = document.body.classList.contains('light') ? '🌙' : '☀️';
    }
  </script>
  
<script src="js/script.js"></script>
</body>

</html>
