<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zabbix NOC - Dashboard Hierárquico</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Variáveis de Tema - Profissionalismo e Contraste */
        :root {
            /* Light Theme */
            --bg-body: #f1f5f9;
            --bg-card: #ffffff;
            --bg-tag: #e2e8f0;
            --border: #cbd5e1;
            --text-main: #0f172a;
            --text-dim: #64748b;
            
            /* Sotaques de Camada */
            --core: #dc2626;
            --dist: #2563eb;
            --acesso: #7c3aed;
            --infra: #d97706;
            --generic: #0891b2;
        }

        [data-theme="dark"] {
            /* Dark Theme (Balanceado para NOC) */
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --bg-tag: #334155;
            --border: #475569;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            
            --core: #ef4444;
            --dist: #3b82f6;
            --acesso: #8b5cf6;
            --infra: #f59e0b;
            --generic: #06b6d4;
        }

        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background-color: var(--bg-body); 
            color: var(--text-main); 
            margin: 0; 
            padding: 20px 40px;
            transition: background 0.3s ease;
        }

        /* Header e Botão de Alternância */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--border);
            margin-bottom: 30px;
        }

        .theme-switch-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .theme-switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }

        .theme-switch input { display: none; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #cbd5e1;
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px; width: 16px;
            left: 4px; bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider { background-color: var(--dist); }
        input:checked + .slider:before { transform: translateX(26px); }

        /* Estrutura de Camadas */
        .layer-section { margin-bottom: 50px; }

        .layer-title { 
            font-size: 1.3rem; 
            font-weight: 800; 
            text-transform: uppercase; 
            margin-bottom: 20px; 
            display: flex; 
            align-items: center; 
            gap: 10px;
        }

        .c-core { color: var(--core); }
        .c-dist { color: var(--dist); }
        .c-acesso { color: var(--acesso); }
        .c-infra { color: var(--infra); }
        .c-generic { color: var(--generic); }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); 
            gap: 20px; 
        }

        .card { 
            background: var(--bg-card); 
            border-radius: 8px; 
            padding: 16px; 
            border: 1px solid var(--border);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            position: relative;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover { 
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        /* Indicador Lateral da Camada */
        .card::after {
            content: '';
            position: absolute;
            left: 0; top: 15%; height: 70%; width: 4px;
            border-radius: 0 4px 4px 0;
        }
        .card-core::after { background: var(--core); }
        .card-dist::after { background: var(--dist); }
        .card-acesso::after { background: var(--acesso); }
        .card-infra::after { background: var(--infra); }
        .card-generic::after { background: var(--generic); }

        .card-header { 
            font-size: 1rem; 
            font-weight: 700; 
            margin-bottom: 12px; 
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }

        .category { margin-bottom: 12px; }
        
        .category-label { 
            display: block; 
            font-size: 0.65rem; 
            font-weight: 700; 
            color: var(--text-dim); 
            text-transform: uppercase; 
            margin-bottom: 6px; 
            letter-spacing: 0.5px;
        }

        .tag-list { display: flex; flex-wrap: wrap; gap: 4px; }
        
        .tag { 
            background: var(--bg-tag); 
            color: var(--text-main); 
            padding: 2px 8px; 
            border-radius: 4px; 
            font-size: 0.75rem; 
            border: 1px solid transparent;
        }

        .tag-dep { color: #f43f5e; border-color: rgba(244, 63, 94, 0.2); }
        .tag-warn { background: #fef3c7; color: #92400e; font-weight: bold; }
        [data-theme="dark"] .tag-warn { background: #78350f; color: #fde68a; }

        .placeholder-olt {
            border: 2px dashed var(--border);
            color: var(--text-dim);
            display: flex; align-items: center; justify-content: center;
            min-height: 100px; border-radius: 8px; font-weight: 600;
        }
    </style>
</head>
<body>

<div class="top-bar">
    <div>
        <h1 style="margin:0; font-size: 1.6rem;">NOC HIERARCHY</h1>
        <small style="color: var(--text-dim)">Zabbix Template Documentation v3.0</small>
    </div>
    <div class="theme-switch-wrapper">
        <i class="fas fa-sun"></i>
        <label class="theme-switch" for="checkbox">
            <input type="checkbox" id="checkbox" />
            <div class="slider"></div>
        </label>
        <i class="fas fa-moon"></i>
    </div>
</div>

<div id="app"></div>

<script>
const networkData = [
    {
        layer: "Core",
        icon: "fa-microchip",
        class: "core",
        templates: [
            {
                name: "Juniper MX / QFX by SNMP",
                info: ["Hardware Model", "Serial Number"],
                perf: ["CPU", "Memória", "Assinantes PPPoE"],
                net: ["Bits In/Out", "Admin/Oper", "Erros", "Descartes", "Tipo", "Velocidade"],
                opt: ["Lanes (Bias, Tx/Rx, Temp, Voltagem)"],
                hw: ["Status FAN", "Status PSU", "Temperatura"],
                deps: ["Module ICMP Ping Checker", "Modulo SNMP Checker"]
            }
        ]
    },
    {
        layer: "Distribution",
        icon: "fa-project-diagram",
        class: "dist",
        templates: [
            {
                name: "Huawei VRP Switch",
                info: ["Hardware Model", "SO Version"],
                elec: ["Potência", "PW1/PW2 State", "Tipo/Presença Fonte"],
                net: ["Bits In/Out", "Admin/Oper", "Erros/Descartes", "Tipo", "Velocidade"],
                opt: ["Vendor", "Pn", "Tx/Rx", "Temp"],
                sys: ["Uptime", "Status FAN"]
            },
            {
                name: "Raisecom Switch",
                info: ["Hardware Ver", "Software Ver"],
                perf: ["Memória (Total/Disp/%)", "CPU"],
                hw: ["Voltagem", "Status/Speed FAN", "Temp Equipamento"],
                net: ["Erros CRC"],
                opt: ["Lanes (Bias, Tx/Rx, Temp)"],
                deps: ["FB-Interfaces", "ICMP Ping", "SNMP Checker", "Generic SNMP"]
            },
            {
                name: "ZTE Switch",
                opt: ["FB-Ótica ZTE (Status, Temp, TX/RX)"],
                deps: ["Network Generic Device", "Template SNMP Location", "Interface Discovery v2.0"]
            }
        ]
    },
    {
        layer: "Acesso",
        icon: "fa-users",
        class: "acesso",
        templates: [
            {
                name: "DmOS DM4370",
                info: ["Serial Number"],
                deps: ["DmOS Contact/Desc/Uptime", "ICMP Ping", "Interface Discovery", "DmOS CPU/FAN/Mem/Temp"]
            },
            {
                name: "DATACOM - v2",
                info: ["Model", "Operação", "Serial", "Portas", "Firmware"],
                perf: ["CPU", "Memória"],
                hw: ["Power Status", "Temp", "Alarm Status", "FAN Status"],
                net: ["Admin Status", "In/Out", "Erros/Descartes"],
                opt: ["Lanes (Bias, Tx/Rx, Temp, Voltagem)"],
                deps: ["Module Hardware/Software Information"]
            },
            {
                name: "Mikrotik - RSW",
                deps: ["ICMP Ping", "Module Checker", "Health Voltage", "Interface Discovery", "SNMP Checker"]
            },
            { name: "ÁREA PARA OLTs", isPlaceholder: true }
        ]
    },
    {
        layer: "Retificadores",
        icon: "fa-bolt",
        class: "infra",
        templates: [
            {
                name: "Delta Retificador",
                bat: ["VDC System", "Battery Current", "Battery Temp", "ChargeState"],
                elec: ["Load Current", "System Power", "Current Limit"],
                hw: ["Rectifier Current", "UR Failure", "URs Totais/Oper"],
                time: ["Autonomia", "Restante", "Uptime"],
                info: ["Nomenclatura", "MAC", "Versão", "Data/Hora"],
                deps: ["Module ICMP Ping", "Module Autonomy time"]
            },
            {
                name: "JFA 40A-48V",
                bat: ["Autonomia", "Corrente Saída/Carga", "Nível Carga", "Testado há"],
                info: ["Modelo", "Modo Operação", "Device Name"],
                snmp: ["Contato", "Descrição", "Disponibilidade"],
                sys: ["Fonte Alimentação", "Uptime Modo", "Teste Autonomia"],
                elec: ["Temp Interna", "Tensão Saída/VCA/Carga"]
            },
            {
                name: "XPS SRWi / SRX",
                bat: ["Status Carga/Desc", "Amp Saída", "Voltagem", "Autonomia"],
                hw: ["Voltagem Retif.", "UR Amperagem", "Consumo Saída"],
                warn: ["FALHA AC", "FALHA UR", "FUSÍVEL ABERTO", "TEMP SENSOR"],
                deps: ["ICMP Jitter/Lat/Perda", "Module Autonomy", "Nome Sistema"]
            }
        ]
    },
    {
        layer: "Genericos",
        icon: "fa-layer-group",
        class: "generic",
        templates: [
            {
                name: "Module ICMP Ping",
                perf: ["Jitter", "Latência", "Perda", "Status"]
            },
            {
                name: "Module SNMP Checker",
                snmp: ["Contato", "Descrição", "Disponibilidade", "Object ID", "Device Name", "Traps fallback"],
                sys: ["Uptime Hardware", "Uptime Network"]
            },
            {
                name: "FB-Interfaces / Discovery v2.0",
                net: ["Bits In/Out", "Estado Admin/Oper", "Erros In/Out", "Descartes In/Out", "Tipo", "Velocidade Negociação"]
            }
        ]
    }
];

function render() {
    const app = document.getElementById('app');
    networkData.forEach(layer => {
        let layerHtml = `
            <div class="layer-section">
                <div class="layer-title c-${layer.class}">
                    <i class="fas ${layer.icon}"></i> ${layer.layer}
                </div>
                <div class="grid">
        `;

        layer.templates.forEach(tpl => {
            if (tpl.isPlaceholder) {
                layerHtml += `<div class="placeholder-olt">${tpl.name}</div>`;
                return;
            }

            layerHtml += `<div class="card card-${layer.class}">
                <div class="card-header">${tpl.name}</div>`;
            
            const mapping = {
                info: "Info", perf: "Performance", elec: "Energia", bat: "Bateria", 
                time: "Tempos", net: "Rede", opt: "Óptico", hw: "Hardware", 
                sys: "Sistema", snmp: "SNMP", warn: "Alarmes", deps: "Dependências"
            };

            Object.entries(mapping).forEach(([key, label]) => {
                if (tpl[key]) {
                    layerHtml += `
                        <div class="category">
                            <span class="category-label">${label}</span>
                            <div class="tag-list">
                                ${tpl[key].map(v => `<span class="tag ${key==='deps'?'tag-dep':''} ${key==='warn'?'tag-warn':''}">${v}</span>`).join('')}
                            </div>
                        </div>
                    `;
                }
            });
            layerHtml += `</div>`;
        });
        layerHtml += `</div></div>`;
        app.innerHTML += layerHtml;
    });
}

// Controle de Tema
const toggleSwitch = document.querySelector('#checkbox');
const currentTheme = localStorage.getItem('theme');

if (currentTheme) {
    document.documentElement.setAttribute('data-theme', currentTheme);
    if (currentTheme === 'dark') toggleSwitch.checked = true;
}

toggleSwitch.addEventListener('change', (e) => {
    if (e.target.checked) {
        document.documentElement.setAttribute('data-theme', 'dark');
        localStorage.setItem('theme', 'dark');
    } else {
        document.documentElement.setAttribute('data-theme', 'light');
        localStorage.setItem('theme', 'light');
    }
});

render();
</script>
</body>
</html>
