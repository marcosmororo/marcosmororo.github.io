<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de Templates Zabbix - NOC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #f8fafc;
            --text: #1e293b;
            --core: #ef4444;
            --dist: #3b82f6;
            --acesso: #10b981;
            --infra: #8b5cf6;
            --card-bg: #ffffff;
        }

        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 40px; margin: 0; }
        
        .header { text-align: center; margin-bottom: 50px; }
        .header h1 { font-size: 2rem; color: #0f172a; }

        .layer-container { margin-bottom: 60px; }
        
        /* Cabeçalho da Camada */
        .layer-header { 
            display: flex; align-items: center; gap: 15px;
            font-size: 1.5rem; font-weight: 800; text-transform: uppercase;
            margin-bottom: 25px; padding-bottom: 10px; border-bottom: 3px solid;
        }

        /* Cores das Camadas */
        .c-core { color: var(--core); border-color: var(--core); }
        .c-distribution { color: var(--dist); border-color: var(--dist); }
        .c-acesso { color: var(--acesso); border-color: var(--acesso); }
        .c-infra { color: var(--infra); border-color: var(--infra); }

        /* Grid de Cards */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 25px; }

        .card { 
            background: var(--card-bg); border-radius: 12px; padding: 20px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s; border: 1px solid #e2e8f0;
        }
        .card:hover { transform: translateY(-5px); }

        .card-title { font-size: 1.25rem; font-weight: 700; margin-bottom: 15px; display: flex; justify-content: space-between; }
        
        .category { margin-top: 15px; }
        .category-label { 
            font-size: 0.7rem; font-weight: 800; text-transform: uppercase; 
            color: #64748b; letter-spacing: 0.05em; display: block; margin-bottom: 8px;
        }

        /* Lista de Itens/Métricas */
        .items-flex { display: flex; flex-wrap: wrap; gap: 6px; }
        .item { 
            background: #f1f5f9; padding: 4px 10px; border-radius: 6px; 
            font-size: 0.85rem; border: 1px solid #e2e8f0; font-weight: 500;
        }

        /* Dependências (Destaque) */
        .dep { background: #fff7ed; color: #9a3412; border-color: #ffedd5; }
        
        /* Alertas e Status (Especial para Infra) */
        .status-item { border-left: 3px solid var(--infra); background: #faf5ff; }

    </style>
</head>
<body>

    <div class="header">
        <h1><i class="fas fa-network-wired"></i> Hierarquia de Monitoramento Zabbix</h1>
    </div>

    <div id="main-content"></div>

    <script>
        // TODA A SUA ÁRVORE AQUI
        const zabbixData = [
            {
                layer: "Core",
                icon: "fa-microchip",
                class: "c-core",
                templates: [
                    {
                        name: "Juniper MX / QFX",
                        info: ["Model Name", "Serial Number"],
                        perf: ["CPU", "Memória", "Assinantes PPPoE"],
                        net: ["Bits In/Out", "Admin/Oper", "Erros/Descartes", "Velocidade"],
                        opt: ["Bias", "Tx/Rx", "Temp", "Voltagem"],
                        hw: ["FAN", "PSU", "Temperatura"],
                        deps: ["Module ICMP Ping", "Module SNMP Checker"]
                    }
                ]
            },
            {
                layer: "Distribution",
                icon: "fa-project-diagram",
                class: "c-distribution",
                templates: [
                    {
                        name: "Huawei VRP Switch",
                        info: ["Model Name", "VRP Version/Patch"],
                        elec: ["Potência", "PW1/PW2 State", "Tipo/Presença"],
                        net: ["Bits In/Out", "Admin/Oper", "Erros/Descartes"],
                        opt: ["Vendor", "PN", "Tx/Rx", "Temp"],
                        sys: ["Uptime", "FAN Status"]
                    },
                    {
                        name: "Raisecom Switch",
                        info: ["HW Version", "SW Version"],
                        perf: ["Memória %", "CPU %"],
                        hw: ["Voltagem", "FAN Speed", "Temp"],
                        net: ["Erros CRC"],
                        opt: ["Bias", "Tx/Rx", "Temp"],
                        deps: ["FB-Interfaces", "ICMP Ping", "SNMP Checker"]
                    },
                    {
                        name: "ZTE Switch",
                        opt: ["Status", "Temp", "TX/RX"],
                        deps: ["Generic Device", "SNMP Location", "Interface Discovery v2.0"]
                    }
                ]
            },
            {
                layer: "Acesso",
                icon: "fa-users",
                class: "c-acesso",
                templates: [
                    {
                        name: "DmOS DM4370",
                        info: ["Serial Number"],
                        deps: ["DmOS System", "ICMP Ping", "Interface Discovery v1.0", "DmOS Hardware (CPU/FAN/Mem/Temp)"]
                    },
                    {
                        name: "DATACOM - v2",
                        info: ["Model", "Serial", "Modo Operação", "Portas", "Firmware"],
                        perf: ["CPU", "Memória"],
                        hw: ["Power Status", "Temp", "Alarm Status", "FAN Status"],
                        net: ["Admin Status", "In/Out", "Erros/Descartes"],
                        opt: ["Bias", "Tx/Rx", "Temp", "Voltagem"],
                        deps: ["Hardware/Software Information"]
                    },
                    {
                        name: "Mikrotik - RSW",
                        deps: ["ICMP Ping", "Module Checker", "Health Voltage", "Interface Discovery", "SNMP Checker"]
                    }
                ]
            },
            {
                layer: "Infraestrutura (Retificadores)",
                icon: "fa-bolt",
                class: "c-infra",
                templates: [
                    {
                        name: "Delta Retificador",
                        bat: ["VDC", "Battery Current", "Temp", "ChargeState"],
                        elec: ["Load Current", "System Power", "Limit"],
                        hw: ["Rectifier Current", "UR Failures", "Total/Operacionais"],
                        info: ["Nomenclatura", "MAC", "Version", "Data/Hora", "Autonomy Time"],
                        deps: ["ICMP Ping"]
                    },
                    {
                        name: "JFA 40A-48V",
                        bat: ["Autonomia", "Corrente Saída/Carga", "Nível Carga"],
                        info: ["Modelo", "Modo Operação", "Device Name"],
                        elec: ["Temp Interna", "Tensão Rede VCA", "Tensão Saída"],
                        deps: ["SNMP Availability", "Uptime"]
                    },
                    {
                        name: "XPS SRWi / SRX",
                        bat: ["Carga/Descarga", "Amperagem Saída", "Voltagem", "Autonomia"],
                        hw: ["UR Amperagem", "Consumo Saída"],
                        warn: ["Falha AC", "Falha UR", "Fusível Aberto", "Temp Sensor"],
                        deps: ["ICMP (Jitter/Loss)", "Autonomy Time"]
                    }
                ]
            }
        ];

        function renderDashboard() {
            const container = document.getElementById('main-content');
            
            zabbixData.forEach(layer => {
                let layerHtml = `
                    <section class="layer-container">
                        <div class="layer-header ${layer.class}">
                            <i class="fas ${layer.icon}"></i> ${layer.layer}
                        </div>
                        <div class="grid">
                `;

                layer.templates.forEach(tpl => {
                    layerHtml += `
                        <div class="card">
                            <div class="card-title">${tpl.name} <i class="fas fa-microchip" style="opacity:0.2"></i></div>
                            
                            ${tpl.info ? `<div class="category"><span class="category-label">Informações</span><div class="items-flex">${tpl.info.map(i => `<span class="item">${i}</span>`).join('')}</div></div>` : ''}
                            ${tpl.perf ? `<div class="category"><span class="category-label">Performance</span><div class="items-flex">${tpl.perf.map(i => `<span class="item">${i}</span>`).join('')}</div></div>` : ''}
                            ${tpl.elec ? `<div class="category"><span class="category-label">Elétrico / Energia</span><div class="items-flex">${tpl.elec.map(i => `<span class="item">${i}</span>`).join('')}</div></div>` : ''}
                            ${tpl.bat ? `<div class="category"><span class="category-label">Bateria / Autonomia</span><div class="items-flex">${tpl.bat.map(i => `<span class="item">${i}</span>`).join('')}</div></div>` : ''}
                            ${tpl.net ? `<div class="category"><span class="category-label">Interfaces / Rede</span><div class="items-flex">${tpl.net.map(i => `<span class="item">${i}</span>`).join('')}</div></div>` : ''}
                            ${tpl.opt ? `<div class="category"><span class="category-label">Óptico (DMI)</span><div class="items-flex">${tpl.opt.map(i => `<span class="item">${i}</span>`).join('')}</div></div>` : ''}
                            ${tpl.hw ? `<div class="category"><span class="category-label">Hardware / FAN</span><div class="items-flex">${tpl.hw.map(i => `<span class="item">${i}</span>`).join('')}</div></div>` : ''}
                            ${tpl.warn ? `<div class="category"><span class="category-label">Alarmes</span><div class="items-flex">${tpl.warn.map(i => `<span class="item status-item">${i}</span>`).join('')}</div></div>` : ''}
                            ${tpl.deps ? `<div class="category"><span class="category-label">Dependências</span><div class="items-flex">${tpl.deps.map(i => `<span class="item dep">${i}</span>`).join('')}</div></div>` : ''}
                        </div>
                    `;
                });

                layerHtml += `</div></section>`;
                container.innerHTML += layerHtml;
            });
        }

        renderDashboard();
    </script>
</body>
</html>
