<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zabbix NOC - Dashboard Completo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-body: #f1f5f9;
            --bg-card: #ffffff;
            --bg-tag: #e2e8f0;
            --border: #cbd5e1;
            --text-main: #0f172a;
            --text-dim: #64748b;
            --core: #dc2626;
            --dist: #2563eb;
            --acesso: #7c3aed;
            --infra: #d97706;
            --generic: #0891b2;
        }

        [data-theme="dark"] {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --bg-tag: #334155;
            --border: #475569;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background-color: var(--bg-body); 
            color: var(--text-main); 
            margin: 0; 
            padding: 20px 40px;
            transition: all 0.3s ease;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--border);
            margin-bottom: 30px;
        }

        .theme-switch {
            position: relative; display: inline-block; width: 50px; height: 24px;
        }
        .theme-switch input { display: none; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #cbd5e1; transition: .4s; border-radius: 34px;
        }
        .slider:before {
            position: absolute; content: ""; height: 16px; width: 16px; left: 4px; bottom: 4px;
            background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--dist); }
        input:checked + .slider:before { transform: translateX(26px); }

        .layer-header {
            font-size: 1.2rem; font-weight: 800; text-transform: uppercase;
            margin: 40px 0 20px 0; display: flex; align-items: center; gap: 10px;
        }

        .grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 15px; 
        }

        .card { 
            background: var(--bg-card); border-radius: 8px; padding: 15px; 
            border: 1px solid var(--border); position: relative;
            transition: transform 0.2s;
        }
        .card:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }

        .card-header { font-weight: 700; border-bottom: 1px solid var(--border); margin-bottom: 10px; padding-bottom: 5px; font-size: 0.9rem; }
        .category-label { font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; font-weight: bold; display: block; margin-top: 8px; }
        .tag-list { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 5px; }
        .tag { background: var(--bg-tag); padding: 2px 6px; border-radius: 4px; font-size: 0.65rem; color: var(--text-main); }
        .tag-dep { border: 1px solid var(--acesso); color: var(--acesso); background: transparent; }

        /* Estilo da Árvore de Resumo */
        .summary-box {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 8px; padding: 20px; margin-top: 60px;
        }
        .tree { list-style: none; padding-left: 10px; font-family: 'Fira Code', monospace; font-size: 0.85rem; }
        .tree ul { list-style: none; padding-left: 20px; border-left: 1px solid var(--border); }
        .tree li { margin: 4px 0; }
        .tree .layer-n { font-weight: bold; color: var(--dist); }
        .tree .item-n { color: var(--text-main); }
        .tree .metric-n { color: var(--text-dim); }
    </style>
</head>
<body>

<div class="top-bar">
    <div>
        <h1 style="margin:0; font-size: 1.4rem;"><i class="fas fa-network-wired"></i> ZABBIX HIERARCHY v4.0</h1>
        <small style="color: var(--text-dim)">NOC Infrastructure Monitoring Map</small>
    </div>
    <div style="display:flex; align-items:center; gap:10px;">
        <i class="fas fa-sun"></i>
        <label class="theme-switch">
            <input type="checkbox" id="theme-toggle">
            <span class="slider"></span>
        </label>
        <i class="fas fa-moon"></i>
    </div>
</div>

<div id="main-content"></div>

<div class="summary-box">
    <h3 style="margin-top:0"><i class="fas fa-stream"></i> RESUMO ESTRUTURAL COMPLETO</h3>
    <div id="tree-view" class="tree"></div>
</div>

<script>
const fullData = [
    {
        layer: "Core",
        icon: "fa-microchip",
        color: "var(--core)",
        templates: [
            { name: "Juniper MX/QFX by SNMP", metrics: ["Hardware Model/Serial", "CPU/Memória", "Assinantes PPPoE", "Interfaces (Bits/Erro/Tipo)", "Óptico (Lanes/DMI)", "FAN/Fonte/Temp"], deps: ["ICMP Ping", "SNMP Checker"] }
        ]
    },
    {
        layer: "Distribution",
        icon: "fa-project-diagram",
        color: "var(--dist)",
        templates: [
            { name: "Huawei VRP Switch", metrics: ["Model/SO", "Energia (PW1/PW2)", "Interfaces", "Óptico (Vendor/PN)", "Uptime/FAN"] },
            { name: "Raisecom Switch", metrics: ["HW/SW Ver", "Mem/CPU", "Voltagem/FAN/Temp", "Erros CRC", "Óptico Lanes"], deps: ["FB-Interfaces", "ICMP", "SNMP Checker"] },
            { name: "ZTE Switch", metrics: ["Óptico (TX/RX, Temp, Status)"], deps: ["Generic Device", "SNMP Location", "Discovery v2.0"] }
        ]
    },
    {
        layer: "Acesso",
        icon: "fa-users",
        color: "var(--acesso)",
        templates: [
            { name: "DmOS DM4370", metrics: ["Serial Number"], deps: ["DmOS Info", "ICMP Ping", "Discovery v1.0", "DmOS Health"] },
            { name: "DATACOM - v2", metrics: ["Model/Serial/Firmware", "CPU/Mem", "Energia/Temp/Alarme", "Interfaces", "Óptico Lanes"], deps: ["Hardware/Software Info"] },
            { name: "Mikrotik - RSW", metrics: ["Health Check Voltage"], deps: ["ICMP", "Module Checker", "Interface Discovery", "SNMP Checker"] }
        ]
    },
    {
        layer: "Retificadores",
        icon: "fa-bolt",
        color: "var(--infra)",
        templates: [
            { name: "Delta Retificador", metrics: ["Bateria (V, A, T)", "dcLoad/Power", "UR Failure/Total", "Autonomia/Uptime"], deps: ["ICMP", "Autonomy Time"] },
            { name: "JFA 40A-48V", metrics: ["Autonomia/Nível Carga", "Modelo/Modo", "Tensão Saída/VCA", "Temp Interna"] },
            { name: "XPS SRWi USCC400", metrics: ["Status Bateria", "Amp/Voltagem Saída", "Alarme AC/UR/Fusível"], deps: ["ICMP Jitter/Lat", "Autonomy Time"] },
            { name: "XPS SRX USCC Lite", metrics: ["Voltagem/Carga/Autonomia", "Alarme Urgente/Tensão Alta", "Consumo Saída"], deps: ["ICMP", "Autonomy Time"] },
            { name: "XPS SRX40/60A USCC", metrics: ["VBat/TBat/Corrente", "Consumidor VCC/ICons", "Alarme Retificador"], deps: ["Autonomy Time"] },
            { name: "ZTE ZXDU68 200A", metrics: ["Corrente Bateria/Carga", "Potência/Temp", "Autonomia/URs Operação"], deps: ["Autonomy Time"] },
            { name: "ZTE RE783 200A", metrics: ["Potência/Tensão", "Uptime HW/NW", "Disponibilidade SNMP"], deps: ["ICMP Ping", "Autonomy Time"] }
        ]
    },
    {
        layer: "Genericos",
        icon: "fa-layer-group",
        color: "var(--generic)",
        templates: [
            { name: "Module ICMP Ping", metrics: ["Jitter", "Latência", "Perda", "Status"] },
            { name: "Module SNMP Checker", metrics: ["Contato/Desc", "OID/Traps", "Uptime"] },
            { name: "FB - Interfaces", metrics: ["Bits", "Estado Admin/Oper", "Erros/Descartes", "Velocidade"] }
        ]
    }
];

function render() {
    const container = document.getElementById('main-content');
    const treeView = document.getElementById('tree-view');
    let html = '';
    let treeHtml = '<ul>';

    fullData.forEach(l => {
        html += `<div class="layer-header" style="color:${l.color}"><i class="fas ${l.icon}"></i> ${l.layer}</div><div class="grid">`;
        treeHtml += `<li><span class="layer-n">+-- ${l.layer}</span><ul>`;

        l.templates.forEach(t => {
            html += `
                <div class="card" style="border-top: 3px solid ${l.color}">
                    <div class="card-header">${t.name}</div>
                    <span class="category-label">Métricas</span>
                    <div class="tag-list">${t.metrics.map(m => `<span class="tag">${m}</span>`).join('')}</div>
                    ${t.deps ? `<span class="category-label">Dependências</span><div class="tag-list">${t.deps.map(d => `<span class="tag tag-dep">${d}</span>`).join('')}</div>` : ''}
                </div>`;
            
            treeHtml += `<li><span class="item-n">| +-- ${t.name}</span><br><span class="metric-n">| | +-- ${t.metrics.join(', ')}</span></li>`;
        });
        html += `</div>`;
        treeHtml += `</ul></li>`;
    });

    treeHtml += '</ul>';
    container.innerHTML = html;
    treeView.innerHTML = treeHtml;
}

const toggle = document.getElementById('theme-toggle');
toggle.addEventListener('change', () => {
    document.documentElement.setAttribute('data-theme', toggle.checked ? 'dark' : 'light');
});

render();
</script>
</body>
</html>
