<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOC Documentation | Zabbix Hierarchy v6.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a; --surface: #1e293b; --border: #334155;
            --text: #f1f5f9; --text-dim: #94a3b8; --primary: #38bdf8;
            --core: #ef4444; --dist: #3b82f6; --acesso: #8b5cf6;
            --infra: #f59e0b; --danger: #f43f5e;
        }
        [data-theme="light"] {
            --bg: #f8fafc; --surface: #ffffff; --border: #e2e8f0;
            --text: #1e293b; --text-dim: #64748b;
        }
        body { 
            font-family: 'Inter', sans-serif; background-color: var(--bg); 
            color: var(--text); margin: 0; padding: 40px; transition: 0.3s;
        }
        .top-nav {
            display: flex; justify-content: space-between; align-items: center;
            padding-bottom: 25px; border-bottom: 2px solid var(--border); margin-bottom: 40px;
        }
        .btn {
            padding: 12px 20px; border-radius: 8px; font-weight: 700; cursor: pointer;
            display: flex; align-items: center; gap: 10px; border: none;
            text-decoration: none; font-size: 0.85rem; transition: 0.2s;
        }
        .btn-download { background: var(--primary); color: #000; }
        .btn-download:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(56,189,248,0.4); }
        
        .layer-title {
            font-size: 1.4rem; font-weight: 900; text-transform: uppercase;
            margin: 50px 0 25px; display: flex; align-items: center; gap: 12px;
            letter-spacing: 1px;
        }
        .grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 25px; 
        }
        .card { 
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 16px; padding: 25px; position: relative;
            transition: 0.3s;
        }
        .card:hover { border-color: var(--primary); transform: translateY(-3px); }
        .card::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 5px;
            border-radius: 16px 16px 0 0;
        }
        .card-core::after { background: var(--core); }
        .card-dist::after { background: var(--dist); }
        .card-acesso::after { background: var(--acesso); }
        .card-infra::after { background: var(--infra); }

        .card h3 { margin: 0 0 15px 0; font-size: 1.1rem; display: flex; justify-content: space-between; }
        .card .info-badge { font-size: 0.6rem; background: var(--bg); padding: 2px 8px; border-radius: 10px; color: var(--primary); }
        
        .section-label { 
            font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; 
            font-weight: 800; margin: 15px 0 8px 0; display: block; border-left: 2px solid var(--primary); padding-left: 8px;
        }
        .tags { display: flex; flex-wrap: wrap; gap: 6px; }
        .tag { background: var(--bg); border: 1px solid var(--border); padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; }
        .trigger { border: 1px solid var(--danger); color: var(--danger); background: rgba(244,63,94,0.1); }
        .dep { border: 1px solid var(--text-dim); font-style: italic; }

        .summary-container {
            margin-top: 80px; padding: 40px; background: #000; border-radius: 16px;
            font-family: 'Fira Code', monospace; font-size: 0.85rem; color: #88c0d0;
            border: 1px solid var(--border); line-height: 1.6;
        }
    </style>
</head>
<body data-theme="dark">

<div class="top-nav">
    <div>
        <h1 style="margin:0; letter-spacing: -1px;">ZABBIX NOC <span style="color:var(--primary)">H-MAP</span></h1>
        <p style="color:var(--text-dim); margin: 5px 0 0;">Documentação Técnica de Templates e LLD</p>
    </div>
    <div class="actions">
        <a href="pages/OLTs.zip" class="btn btn-download" download>
            <i class="fas fa-file-zipper"></i> BAIXAR OLTs.ZIP
        </a>
        <button class="btn" style="background: var(--surface); color: var(--text);" onclick="document.body.setAttribute('data-theme', document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark')">
            <i class="fas fa-circle-half-stroke"></i>
        </button>
    </div>
</div>

<div id="main-content"></div>

<div class="summary-container">
    <h3 style="color:var(--primary); margin-top:0;"><i class="fas fa-code-branch"></i> RESUMO HIERÁRQUICO COMPLETO</h3>
    <pre id="tree-view"></pre>
</div>

<script>
const zabbixMap = [
    {
        layer: "Core",
        icon: "fa-microchip",
        class: "card-core",
        items: [
            { 
                name: "Juniper MX/QFX", 
                sections: [
                    { label: "Performance", items: ["CPU", "Memória", "Assinantes PPPoE"] },
                    { label: "Hardware", items: ["Hardware model/serial", "FAN Status", "PSU Status", "Temp"] },
                    { label: "Interfaces/Óptico", items: ["Bits In/Out", "Erro/Descarte", "Lanes (Bias/Tx/Rx/Temp/V)"] }
                ],
                deps: ["Module ICMP Ping", "Modulo SNMP Checker"]
            }
        ]
    },
    {
        layer: "Distribution",
        icon: "fa-route",
        class: "card-dist",
        items: [
            { 
                name: "Huawei VRP Switch", 
                sections: [
                    { label: "Sistema", items: ["Hardware model", "Firmware/Patch", "Uptime", "FAN"] },
                    { label: "Energia", items: ["Potência usada", "PW1/PW2", "Tipo Fonte"] }
                ]
            },
            { 
                name: "Raisecom Switch", 
                sections: [
                    { label: "Hardware", items: ["HW/SW Ver", "CPU/Mem", "Voltagem", "Temp"] },
                    { label: "Monitoramento", items: ["Erros CRC", "Lanes Ópticas"] }
                ],
                deps: ["FB-Interfaces", "ICMP Ping", "SNMP Checker"]
            }
        ]
    },
    {
        layer: "Acesso & OLTs",
        icon: "fa-network-wired",
        class: "card-acesso",
        items: [
            { 
                name: "OLT Nokia (ISAM)", 
                sections: [
                    { label: "Gerência", items: ["Fan Mode/Speed", "Temp Controladoras (NT-B)"] },
                    { label: "LLD: Placas (LT)", items: ["Status Hardware", "CPU/Mem por Slot"] },
                    { label: "LLD: PON (Censo)", items: ["Total Provisionado", "Total Online", "Total Offline"] },
                    { label: "Triggers", items: ["30% Mass Failure", "PON Down (Oper=Down/Admin=Up)"] }
                ]
            },
            { 
                name: "OLT ZTE C600", 
                sections: [
                    { label: "LLD: Cards", items: ["Temperaturas", "CPU", "Memória", "Health"] },
                    { label: "LLD: PON", items: ["Status Portas", "Métricas ONU (Sinal/Status)"] }
                ],
                deps: ["FB - Interfaces OLT ZTE"]
            },
            { 
                name: "OLT Fiberhome", 
                sections: [
                    { label: "Censo", items: ["Total ONUs", "Slots & Cards Status"] },
                    { label: "Performance", items: ["TX/Temp/Voltagem Óptico", "Trigger 2Gbps Uplink"] }
                ]
            },
            { 
                name: "OLT V-Sol", 
                sections: [
                    { label: "Monitoramento", items: ["Chassis Temp", "CPU/RAM %", "Traffic per PON"] },
                    { label: "Status", items: ["ONUs Online/Provisioned"] }
                ]
            }
        ]
    },
    {
        layer: "Retificadores",
        icon: "fa-bolt",
        class: "card-infra",
        items: [
            { 
                name: "Delta Retificador", 
                sections: [
                    { label: "Bateria", items: ["dcSystemVoltage", "Battery Temp", "Charge State"] },
                    { label: "Sistema", items: ["dcLoadCurrent", "UR Failure/Total", "Autonomia"] }
                ],
                deps: ["Module ICMP Ping"]
            }
        ]
    }
];

function render() {
    const container = document.getElementById('main-content');
    const tree = document.getElementById('tree-view');
    let html = '';
    let treeText = 'Zabbix_NOC_Root\n';

    zabbixMap.forEach(layer => {
        html += `<div class="layer-title"><i class="fas ${layer.icon}"></i> ${layer.layer}</div><div class="grid">`;
        treeText += `├── ${layer.layer}\n`;

        layer.items.forEach((item, idx) => {
            const isLast = idx === layer.items.length - 1;
            html += `
                <div class="card ${layer.class}">
                    <h3>${item.name} <span class="info-badge">SNMP v2c</span></h3>
                    ${item.sections.map(s => `
                        <span class="section-label">${s.label}</span>
                        <div class="tags">
                            ${s.items.map(i => `<span class="tag ${i.includes('Trigger') || i.includes('%') ? 'trigger' : ''}">${i}</span>`).join('')}
                        </div>
                    `).join('')}
                    ${item.deps ? `
                        <span class="section-label">Dependências</span>
                        <div class="tags">
                            ${item.deps.map(d => `<span class="tag dep">${d}</span>`).join('')}
                        </div>
                    ` : ''}
                </div>`;
            treeText += `│   ${isLast ? '└──' : '├──'} ${item.name}\n`;
        });
        html += `</div>`;
    });

    container.innerHTML = html;
    tree.textContent = treeText;
}

render();
</script>

</body>
</html>
