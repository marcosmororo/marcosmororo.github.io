<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zabbix NOC - Dashboard & Resumo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-body: #f1f5f9;
            --bg-card: #ffffff;
            --bg-tag: #e2e8f0;
            --border: #cbd5e1;
            --text-main: #0f172a;
            --text-dim: #64748b;
            --core: #dc2626;
            --dist: #2563eb;
            --acesso: #7c3aed;
            --infra: #d97706;
            --generic: #0891b2;
        }

        [data-theme="dark"] {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --bg-tag: #334155;
            --border: #475569;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-body); 
            color: var(--text-main); 
            margin: 0; 
            padding: 20px 40px;
            transition: background 0.3s ease;
        }

        /* Header & Toggle */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--border);
            margin-bottom: 30px;
        }

        .theme-switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }
        .theme-switch input { display: none; }
        .slider {
            position: absolute; cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #cbd5e1; transition: .4s; border-radius: 34px;
        }
        .slider:before {
            position: absolute; content: "";
            height: 16px; width: 16px; left: 4px; bottom: 4px;
            background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--dist); }
        input:checked + .slider:before { transform: translateX(26px); }

        /* Grid de Cards */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); 
            gap: 20px; 
            margin-bottom: 50px;
        }

        .card { 
            background: var(--bg-card); 
            border-radius: 8px; 
            padding: 16px; 
            border: 1px solid var(--border);
            position: relative;
        }

        .card-header { font-weight: 700; border-bottom: 1px solid var(--border); margin-bottom: 10px; padding-bottom: 5px; }
        .category-label { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; font-weight: bold; }
        .tag-list { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; }
        .tag { background: var(--bg-tag); padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; }

        /* SEÇÃO RESUMO RÁPIDO (ESTRUTURA DE ÁRVORE) */
        .summary-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 25px;
            margin-top: 40px;
        }

        .summary-title {
            font-size: 1.2rem;
            font-weight: 800;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--dist);
        }

        .tree { list-style: none; padding-left: 0; }
        .tree-node { margin-bottom: 10px; }
        .tree-layer { font-weight: 800; text-transform: uppercase; color: var(--text-main); margin-bottom: 5px; display: block; }
        .tree-sub { padding-left: 20px; border-left: 1px dashed var(--border); list-style: none; }
        .tree-item { margin: 5px 0; font-size: 0.9rem; }
        .tree-item strong { color: var(--text-dim); font-weight: 600; }
        .tree-metrics { color: var(--text-dim); font-size: 0.85rem; padding-left: 10px; }

        .divider { border: 0; border-top: 2px solid var(--border); margin: 40px 0; }

    </style>
</head>
<body>

<div class="top-bar">
    <div>
        <h1 style="margin:0; font-size: 1.5rem;">ZABBIX NOC DASHBOARD</h1>
        <small style="color: var(--text-dim)">Visualização Técnica de Ativos</small>
    </div>
    <div style="display:flex; align-items:center; gap:10px;">
        <i class="fas fa-sun"></i>
        <label class="theme-switch">
            <input type="checkbox" id="theme-toggle">
            <span class="slider"></span>
        </label>
        <i class="fas fa-moon"></i>
    </div>
</div>

<!-- Painel de Cards (Visual) -->
<div id="card-grid" class="grid"></div>

<hr class="divider">

<!-- Painel de Resumo (Estrutural) -->
<div class="summary-section">
    <div class="summary-title"><i class="fas fa-list-ul"></i> RESUMO ESTRUTURAL RÁPIDO</div>
    <div id="tree-summary"></div>
</div>

<script>
const data = [
    {
        layer: "Core",
        color: "var(--core)",
        items: [
            { name: "Juniper MX/QFX", metrics: "Model, Serial, CPU, Mem, PPPoE, Interfaces, Óptico, FAN/PSU" }
        ]
    },
    {
        layer: "Distribution",
        color: "var(--dist)",
        items: [
            { name: "Huawei VRP", metrics: "SO, Energia, Interfaces, Óptico, Uptime, FAN" },
            { name: "Raisecom", metrics: "HW/SW, Mem/CPU, Voltagem, FAN, Temp, CRC, Óptico" },
            { name: "ZTE", metrics: "Óptico (TX/RX, Temp, Status)" }
        ]
    },
    {
        layer: "Acesso",
        color: "var(--acesso)",
        items: [
            { name: "DmOS DM4370", metrics: "Serial, Uptime, CPU/FAN/Mem/Temp" },
            { name: "DATACOM - v2", metrics: "Model, Serial, Firmware, CPU/Mem, Energia, Temp, Interfaces, Óptico" },
            { name: "Mikrotik RSW", metrics: "Checker Ver/Firm, Voltage, Interface Discovery" }
        ]
    },
    {
        layer: "Retificadores",
        color: "var(--infra)",
        items: [
            { name: "Delta", metrics: "Bateria (VDC, Amp, Temp), Carga, UR Failure, Autonomia" },
            { name: "JFA 40A", metrics: "Autonomia, Corrente, Carga, Tensão VCA/Saída, Temp" },
            { name: "XPS SRWi/SRX", metrics: "Status Bateria, Amperagem, Falha AC/UR, Fusível, Temp" }
        ]
    }
];

function init() {
    const grid = document.getElementById('card-grid');
    const tree = document.getElementById('tree-summary');
    let gridHtml = '';
    let treeHtml = '<ul class="tree">';

    data.forEach(l => {
        // Build Tree
        treeHtml += `
            <li class="tree-node">
                <span class="tree-layer" style="color:${l.color}"><i class="fas fa-caret-right"></i> ${l.layer}</span>
                <ul class="tree-sub">
                    ${l.items.map(i => `
                        <li class="tree-item">
                            <strong>${i.name}:</strong> <span class="tree-metrics">${i.metrics}</span>
                        </li>
                    `).join('')}
                </ul>
            </li>`;

        // Build Cards
        l.items.forEach(i => {
            gridHtml += `
                <div class="card" style="border-left: 4px solid ${l.color}">
                    <div class="card-header">${i.name}</div>
                    <span class="category-label">Principais Métricas</span>
                    <div class="tag-list">
                        ${i.metrics.split(',').map(m => `<span class="tag">${m.trim()}</span>`).join('')}
                    </div>
                </div>`;
        });
    });

    treeHtml += '</ul>';
    grid.innerHTML = gridHtml;
    tree.innerHTML = treeHtml;
}

// Dark Mode Logic
const toggle = document.getElementById('theme-toggle');
toggle.addEventListener('change', () => {
    document.documentElement.setAttribute('data-theme', toggle.checked ? 'dark' : 'light');
});

init();
</script>
</body>
</html>
