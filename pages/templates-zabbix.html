<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zabbix NOC Hierarchy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent-core: #f43f5e;
            --accent-dist: #38bdf8;
            --accent-acesso: #10b981;
            --accent-infra: #fbbf24;
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text-primary); margin: 0; padding: 20px; }
        
        .container { max-width: 1400px; margin: auto; }
        .header { text-align: center; padding: 40px 0; border-bottom: 1px solid #334155; margin-bottom: 40px; }
        
        .layer-section { margin-bottom: 50px; }
        .layer-title { 
            font-size: 1.8rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px;
            margin-bottom: 25px; display: flex; align-items: center; gap: 15px;
        }

        /* Cores Temáticas */
        .layer-core { color: var(--accent-core); }
        .layer-dist { color: var(--accent-dist); }
        .layer-acesso { color: var(--accent-acesso); }
        .layer-infra { color: var(--accent-infra); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 20px; }

        .card { 
            background: var(--card-bg); border-radius: 12px; padding: 20px; 
            border: 1px solid #334155; position: relative; overflow: hidden;
            transition: all 0.3s ease;
        }
        .card:hover { border-color: #475569; transform: translateY(-3px); }
        .card::before { content: ""; position: absolute; top: 0; left: 0; width: 4px; height: 100%; }

        /* Cores laterais dos cards */
        .card-core::before { background: var(--accent-core); }
        .card-dist::before { background: var(--accent-dist); }
        .card-acesso::before { background: var(--accent-acesso); }
        .card-infra::before { background: var(--accent-infra); }

        .card-header { font-size: 1.3rem; font-weight: 700; margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between; }
        
        .metric-group { margin-bottom: 15px; }
        .group-label { 
            display: block; font-size: 0.75rem; font-weight: 700; color: var(--text-secondary); 
            text-transform: uppercase; margin-bottom: 8px; border-bottom: 1px solid #334155;
        }

        .tag-list { display: flex; flex-wrap: wrap; gap: 6px; }
        .tag { 
            background: #334155; color: #e2e8f0; padding: 4px 10px; 
            border-radius: 4px; font-size: 0.8rem; font-weight: 500;
        }

        .tag-dep { background: rgba(244, 63, 94, 0.1); color: #fb7185; border: 1px solid rgba(244, 63, 94, 0.2); }
        .tag-special { background: rgba(56, 189, 248, 0.1); color: #7dd3fc; border: 1px solid rgba(56, 189, 248, 0.2); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>NOC DASHBOARD | ESTRUTURA ZABBIX</h1>
        <p style="color: var(--text-secondary)">Mapeamento completo de métricas por camada de rede</p>
    </div>

    <div id="content-root"></div>
</div>

<script>
const data = [
    {
        layer: "Core",
        icon: "fa-microchip",
        class: "core",
        templates: [
            {
                name: "Juniper MX / QFX Router & Switch",
                info: ["Hardware Model", "Serial Number"],
                perf: ["CPU %", "Memória %", "Assinantes PPPoE (Total)"],
                net: ["Bits In/Out", "Admin/Oper Status", "Erros", "Descartes", "Interface Type", "Velocidade"],
                opt: ["Lanes (Bias, Tx/Rx, Temperatura, Voltagem)"],
                hw: ["FAN Status", "PSU Status", "Temperatura"],
                deps: ["Module ICMP Ping Checker", "Modulo SNMP Checker"]
            }
        ]
    },
    {
        layer: "Distribution",
        icon: "fa-project-diagram",
        class: "dist",
        templates: [
            {
                name: "Huawei VRP Switch",
                info: ["Model Name", "Versão Firmware/Patch VRP"],
                elec: ["Potência Usada", "Estado Fonte (PW1/PW2)", "Tipo Fonte", "Presença Fonte"],
                net: ["Bits In/Out", "Admin/Oper Status", "Erros", "Descartes", "Tipo", "Velocidade"],
                opt: ["Single/Multi Lanes (Vendor, Pn, Tx/Rx, Temperatura)"],
                sys: ["Uptime do Sistema", "Status FAN"]
            },
            {
                name: "Raisecom Switch",
                info: ["Versão Hardware", "Versão Software"],
                perf: ["Memória (Total, Disponível, %)", "Utilização CPU %"],
                hw: ["Voltagem", "FAN Status/Speed", "Temperatura Equipamento"],
                net: ["Erros CRC"],
                opt: ["Lanes (Bias, Tx/Rx, Temperatura)"],
                deps: ["FB - Interfaces", "ICMP Ping", "SNMP Checker", "Generic by SNMP"]
            },
            {
                name: "ZTE Switch",
                opt: ["FB - Interface Ótica ZTE (Status, Temp, TX/RX)"],
                deps: ["Network Generic Device", "Template SNMP Location", "Module Interface Discovery v2.0"]
            }
        ]
    },
    {
        layer: "Acesso",
        icon: "fa-users",
        class: "acesso",
        templates: [
            {
                name: "DmOS DM4370",
                info: ["Serial Number"],
                deps: ["DmOS (Contact, Desc, Name, Uptime)", "ICMP Ping", "Interface Discovery v1.0", "DmOS (CPU, FAN, Memory, Temperatura)"]
            },
            {
                name: "Datacom - v2",
                info: ["Model Name", "Produto", "Modo Operação", "Serial", "Nº de Portas", "Bootloader/Firmware"],
                perf: ["Uso de CPU", "Uso de Memória"],
                hw: ["Status Energia", "Temperatura", "Alarm Status", "FAN Status"],
                net: ["Admin Status", "In/Out", "Erros", "Descartes", "Status Interface"],
                opt: ["Lanes (Bias, Tx/Rx, Temperatura, Voltagem)"],
                deps: ["Module Hardware/Software Information"]
            },
            {
                name: "Mikrotik - RSW",
                deps: ["ICMP Ping", "Module Checker (Ver/Firm)", "Health Check Voltage", "Interface Discovery", "SNMP Checker"]
            }
        ]
    },
    {
        layer: "Retificadores",
        icon: "fa-bolt",
        class: "infra",
        templates: [
            {
                name: "Delta Retificador",
                bat: ["dcSystemVoltage (Status AC)", "dcBatteryCurrent", "dcBattery Temperature", "doChargeState"],
                elec: ["dcLoadCurrent", "dcSystemPower (W)", "dcCurrentLimit"],
                hw: ["dcRectifierCurrent", "dcNumberRectifiers Failure", "URs Totais/Operacionais"],
                time: ["Tempo Autonomia", "Duração Restante Bateria", "Uptime", "Tempo Transcorrido"],
                info: ["Nomenclatura", "MAC", "Versão Retificador", "Hora/Data"],
                deps: ["Module ICMP Ping Checker", "Module Autonomy Time"]
            },
            {
                name: "JFA 40A-48V",
                bat: ["Autonomia Bateria", "Corrente (Saída/Carregador)", "Nível de Carga"],
                info: ["Modelo", "Modo Operação", "Nome Dispositivo", "Testado há"],
                snmp: ["Contato", "Descrição", "Disponibilidade"],
                sys: ["Fonte Alimentação", "Uptime Modo Operação", "Teste Autonomia"],
                elec: ["Temperatura Interna", "Tensão (Saída/Rede VCA/Carregador)"]
            },
            {
                name: "XPS SRWi / SRX",
                bat: ["Status (Carga, Descarga, Desc)", "Amperagem Saída", "Voltagem", "Tempo Autonomia"],
                hw: ["Voltagem Retificador", "UR Amperagem", "Consumo Saída Amperagem"],
                warn: ["Falha de AC", "Falha em UR", "Fusível Aberto", "Temperatura Sensor"],
                deps: ["ICMP (Jitter, Latência, Perda)", "Module Autonomy Time", "Nome do Sistema"]
            }
        ]
    }
];

function render() {
    const root = document.getElementById('content-root');
    data.forEach(layer => {
        let html = `
            <div class="layer-section">
                <div class="layer-title layer-${layer.class}">
                    <i class="fas ${layer.icon}"></i> ${layer.layer}
                </div>
                <div class="grid">
        `;

        layer.templates.forEach(tpl => {
            html += `<div class="card card-${layer.class}">
                <div class="card-header">${tpl.name}</div>`;
            
            // Mapeamento Automático de Seções
            const sections = {
                info: "Identificação & Info",
                perf: "Performance",
                elec: "Elétrico & Energia",
                bat: "Bateria",
                time: "Tempos & Autonomia",
                net: "Interfaces & Rede",
                opt: "Óptico / DMI",
                hw: "Hardware & FAN",
                sys: "Status de Sistema",
                snmp: "SNMP & Contato",
                warn: "Alarmes Ativos",
                deps: "Dependências de Template"
            };

            for (const [key, label] of Object.entries(sections)) {
                if (tpl[key]) {
                    html += `
                        <div class="metric-group">
                            <span class="group-label">${label}</span>
                            <div class="tag-list">
                                ${tpl[key].map(val => `<span class="tag ${key === 'deps' ? 'tag-dep' : ''} ${key === 'warn' ? 'tag-special' : ''}">${val}</span>`).join('')}
                            </div>
                        </div>
                    `;
                }
            }
            html += `</div>`;
        });
        html += `</div></div>`;
        root.innerHTML += html;
    });
}
render();
</script>
</body>
</html>
