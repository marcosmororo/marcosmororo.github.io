<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zabbix NOC | Documentation</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --border: #334155;
            --text: #f1f5f9;
            --text-dim: #94a3b8;
            --primary: #38bdf8;
            --core: #ef4444;
            --dist: #3b82f6;
            --acesso: #8b5cf6;
            --infra: #f59e0b;
        }

        [data-theme="light"] {
            --bg: #f8fafc;
            --surface: #ffffff;
            --border: #e2e8f0;
            --text: #1e293b;
            --text-dim: #64748b;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            margin: 0; padding: 30px; 
            transition: 0.3s ease;
        }

        /* Toolbar Superior */
        .top-nav {
            display: flex; justify-content: space-between; align-items: center;
            padding-bottom: 20px; border-bottom: 1px solid var(--border);
            margin-bottom: 30px;
        }

        .actions { display: flex; gap: 15px; align-items: center; }

        .btn {
            padding: 10px 18px; border-radius: 8px; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; gap: 8px; border: 1px solid var(--border);
            text-decoration: none; font-size: 0.85rem; transition: 0.2s;
        }

        .btn-download { background: var(--primary); color: #000; border: none; }
        .btn-download:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-theme { background: var(--surface); color: var(--text); }

        /* Categorias e Cards */
        .layer-title {
            font-size: 1.2rem; font-weight: 800; text-transform: uppercase;
            margin: 40px 0 20px; display: flex; align-items: center; gap: 10px;
        }

        .grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); 
            gap: 20px; 
        }

        .card { 
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 12px; padding: 20px; position: relative;
        }
        
        .card::before {
            content: ''; position: absolute; left: 0; top: 20px; bottom: 20px;
            width: 4px; border-radius: 0 4px 4px 0;
        }

        .card-core::before { background: var(--core); }
        .card-dist::before { background: var(--dist); }
        .card-acesso::before { background: var(--acesso); }
        .card-infra::before { background: var(--infra); }

        .card h3 { margin: 0 0 15px 10px; font-size: 1rem; }
        .label { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; font-weight: 700; margin: 10px 0 5px 10px; display: block; }
        
        .tags { display: flex; flex-wrap: wrap; gap: 5px; padding-left: 10px; }
        .tag { background: var(--bg); border: 1px solid var(--border); padding: 3px 8px; border-radius: 4px; font-size: 0.7rem; }
        .tag-dep { color: var(--primary); border-color: var(--primary); }

        /* Tree Summary */
        .summary-container {
            margin-top: 60px; padding: 30px; background: var(--surface);
            border-radius: 12px; border: 1px solid var(--border);
            font-family: 'Fira Code', monospace; font-size: 0.85rem;
        }
    </style>
</head>
<body data-theme="dark">

<div class="top-nav">
    <div>
        <h1 style="margin:0; font-size: 1.5rem;">ZABBIX MONITORING MAP</h1>
        <small style="color: var(--text-dim)">Infraestrutura e Templates</small>
    </div>
    <div class="actions">
        <a href="/pages/OLTs.zip" class="btn btn-download" download>
            <i class="fas fa-file-archive"></i> BAIXAR DOCS OLTS.ZIP
        </a>
        <button class="btn btn-theme" onclick="toggleTheme()">
            <i class="fas fa-adjust"></i> TEMA
        </button>
    </div>
</div>

<div id="content"></div>

<div class="summary-container">
    <h3 style="margin-top:0"><i class="fas fa-sitemap"></i> ESTRUTURA COMPLETA (RESUMO)</h3>
    <pre id="tree-view"></pre>
</div>

<script>
const data = [
    {
        layer: "Core",
        class: "card-core",
        icon: "fa-server",
        items: [
            { name: "Juniper MX/QFX Router", metrics: "Model, Serial, CPU, Mem, PPPoE, Interfaces, Óptico, FAN, PSU", deps: "ICMP Ping, SNMP Checker" }
        ]
    },
    {
        layer: "Distribution",
        class: "card-dist",
        icon: "fa-project-diagram",
        items: [
            { name: "Huawei VRP Switch", metrics: "Model, SO, Energia, Interfaces, Óptico PN, Uptime, FAN" },
            { name: "Raisecom Switch", metrics: "HW/SW Ver, Mem/CPU, Voltagem, Temp, Erros CRC, Óptico", deps: "FB-Interfaces, ICMP, SNMP" },
            { name: "ZTE Switch", metrics: "Status Óptico, Temp, TX/RX Power", deps: "Generic Device, SNMP Location" }
        ]
    },
    {
        layer: "Acesso & OLTs",
        class: "card-acesso",
        icon: "fa-network-wired",
        items: [
            { name: "DmOS DM4370", metrics: "Serial Number, CPU, FAN, Mem, Temp", deps: "DmOS Info, ICMP Ping, Discovery v1.0" },
            { name: "DATACOM - v2", metrics: "Model, Serial, Firmware, CPU, Energia, Temp, Interfaces, Óptico", deps: "Hardware/Software Info" },
            { name: "Mikrotik - RSW", metrics: "Health Check Voltage", deps: "ICMP, Checker, Interface Discovery, SNMP" },
            { name: "OLT Nokia (ISAM)", metrics: "ONT Info, CPU/Temp, Traffic per Port, Service Profiles", deps: "SNMP v2c, Custom MIBs" },
            { name: "OLT Datacom (DmOS)", metrics: "ONU Status, Optical Power, VLAN Info, Up/Downstream", deps: "DmOS Core, ICMP" },
            { name: "OLT Fiberhome", metrics: "ONU Discovery, Card Status, Uplink Traffic, Temp", deps: "Generic SNMP" }
        ]
    },
    {
        layer: "Retificadores",
        class: "card-infra",
        icon: "fa-bolt",
        items: [
            { name: "Delta / JFA", metrics: "VDC, Battery Current, Autonomia, Carga, Temp, UR Failure", deps: "ICMP, Autonomy Time" },
            { name: "XPS SRWi/SRX", metrics: "Status Carga, Fusível, Alarme AC, Consumo Saída", deps: "ICMP, Autonomy Time" },
            { name: "ZTE ZXDU68", metrics: "Corrente Carga, Potência, URs Operação, Uptime", deps: "Module Autonomy" }
        ]
    },
    {
        layer: "Genericos",
        class: "",
        icon: "fa-layer-group",
        items: [
            { name: "Module ICMP / SNMP", metrics: "Jitter, Latency, Loss, Availability, Traps, OID" },
            { name: "FB - Interfaces", metrics: "Bits In/Out, Admin/Oper, Errors, Speed" }
        ]
    }
];

function render() {
    const content = document.getElementById('content');
    const tree = document.getElementById('tree-view');
    let html = '';
    let treeText = 'Zabbix_Project/\n';

    data.forEach(l => {
        html += `<div class="layer-title"><i class="fas ${l.icon}"></i> ${l.layer}</div><div class="grid">`;
        treeText += `├── ${l.layer}\n`;

        l.items.forEach((i, idx) => {
            const isLast = idx === l.items.length - 1;
            html += `
                <div class="card ${l.class}">
                    <h3>${i.name}</h3>
                    <span class="label">Métricas</span>
                    <div class="tags">${i.metrics.split(',').map(m => `<span class="tag">${m.trim()}</span>`).join('')}</div>
                    ${i.deps ? `<span class="label">Dependências</span><div class="tags">${i.deps.split(',').map(d => `<span class="tag tag-dep">${d.trim()}</span>`).join('')}</div>` : ''}
                </div>`;
            treeText += `│   ${isLast ? '└──' : '├──'} ${i.name}\n`;
        });
        html += `</div>`;
    });

    content.innerHTML = html;
    tree.textContent = treeText;
}

function toggleTheme() {
    const body = document.body;
    body.setAttribute('data-theme', body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
}

render();
</script>

</body>
</html>
