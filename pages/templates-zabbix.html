<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zabbix NOC - Dark Hierarchy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            /* Cores Dark Mode */
            --bg-body: #050505;
            --bg-card: #121214;
            --bg-tag: #1c1c21;
            --border: #29292e;
            --text-main: #e1e1e6;
            --text-dim: #a8a8b3;
            
            /* Sotaques de Camada */
            --core: #f75a68;
            --dist: #00b37e;
            --acesso: #8257e5;
            --infra: #eba417;
            --generic: #20b2aa;
        }

        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            background-color: var(--bg-body); 
            color: var(--text-main); 
            margin: 0; 
            padding: 30px; 
        }

        .header { 
            text-align: center; 
            padding-bottom: 40px; 
            border-bottom: 1px solid var(--border);
            margin-bottom: 40px;
        }

        .layer-section { margin-bottom: 60px; }

        .layer-title { 
            font-size: 1.5rem; 
            font-weight: 800; 
            text-transform: uppercase; 
            letter-spacing: 1.5px;
            margin-bottom: 25px; 
            display: flex; 
            align-items: center; 
            gap: 12px;
        }

        /* Cores das Camadas */
        .c-core { color: var(--core); }
        .c-dist { color: var(--dist); }
        .c-acesso { color: var(--acesso); }
        .c-infra { color: var(--infra); }
        .c-generic { color: var(--generic); }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); 
            gap: 20px; 
        }

        .card { 
            background: var(--bg-card); 
            border: 1px solid var(--border); 
            border-radius: 8px; 
            padding: 20px; 
            transition: transform 0.2s, border-color 0.2s;
        }
        
        .card:hover { 
            transform: translateY(-5px); 
            border-color: #323238;
        }

        .card-header { 
            font-size: 1.1rem; 
            font-weight: 700; 
            margin-bottom: 18px; 
            display: flex; 
            justify-content: space-between;
            color: #fff;
        }

        .category { margin-bottom: 15px; }
        
        .category-label { 
            display: block; 
            font-size: 0.65rem; 
            font-weight: 800; 
            color: var(--text-dim); 
            text-transform: uppercase; 
            margin-bottom: 8px; 
            letter-spacing: 0.8px;
        }

        .tag-list { display: flex; flex-wrap: wrap; gap: 6px; }
        
        .tag { 
            background: var(--bg-tag); 
            color: #c4c4cc; 
            padding: 4px 10px; 
            border-radius: 4px; 
            font-size: 0.78rem; 
            border: 1px solid transparent;
        }

        /* Destaques especiais */
        .tag-dep { border-color: rgba(130, 87, 229, 0.3); color: #996dff; }
        .tag-warn { border-color: rgba(235, 164, 23, 0.3); color: #ffcd66; }

        .placeholder-olt {
            border: 2px dashed var(--border);
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 120px;
            color: #323238;
            font-weight: 600;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="header">
    <h1><i class="fas fa-network-wired"></i> ESTRUTURA ZABBIX NOC</h1>
    <p style="color: var(--text-dim)">Mapeamento Hierárquico de Templates e Métricas</p>
</div>

<div id="dashboard"></div>

<script>
const data = [
    {
        layer: "Core",
        icon: "fa-microchip",
        class: "c-core",
        templates: [
            {
                name: "Juniper MX Router & QFX Switch",
                info: ["Hardware Model", "Serial Number"],
                perf: ["CPU %", "Memória %", "Total Assinantes PPPoE"],
                net: ["Bits In/Out", "Admin/Oper", "Erros", "Descartes", "Tipo", "Velocidade"],
                opt: ["Lanes (Bias, Tx/Rx, Temp, Voltagem)"],
                hw: ["Status FAN", "Status Fonte", "Temperatura"],
                deps: ["Module ICMP Ping Checker", "Modulo SNMP Checker"]
            }
        ]
    },
    {
        layer: "Distribution",
        icon: "fa-project-diagram",
        class: "c-dist",
        templates: [
            {
                name: "Huawei VRP Switch",
                info: ["Model Name", "Versão Firmware/Patch VRP"],
                elec: ["Potência Usada", "Estado PW1/PW2", "Tipo Fonte", "Presença Fonte"],
                net: ["Bits In/Out", "Admin/Oper", "Erros/Descartes", "Tipo", "Velocidade"],
                opt: ["Vendor", "Pn", "Tx/Rx", "Temperatura"],
                sys: ["Uptime", "Status FAN"]
            },
            {
                name: "Raisecom Switch",
                info: ["Versão HW", "Versão SW"],
                perf: ["Memória (Total/Disp/%)", "Utilização CPU"],
                hw: ["Voltagem", "FAN Status/Speed", "Temp Equipamento"],
                net: ["Erros CRC"],
                opt: ["Lanes (Bias, Tx/Rx, Temp)"],
                deps: ["FB-Interfaces", "ICMP Ping", "SNMP Checker", "Generic by SNMP"]
            },
            {
                name: "ZTE Switch",
                opt: ["FB-Interface Ótica ZTE (Status, Temp, TX/RX)"],
                deps: ["Network Generic Device", "Template SNMP Location", "Module Interface Discovery v2.0"]
            }
        ]
    },
    {
        layer: "Acesso",
        icon: "fa-users",
        class: "c-acesso",
        templates: [
            {
                name: "DmOS DM4370",
                info: ["Serial Number"],
                deps: ["DmOS (Contact/Desc/Name/Uptime)", "ICMP Ping", "Discovery v1.0", "DmOS (CPU/FAN/Mem/Temp)"]
            },
            {
                name: "DATACOM - v2",
                info: ["Model Name", "Produto", "Modo Operação", "Serial", "Nº Portas", "Bootloader/Firmware"],
                perf: ["Uso CPU", "Uso Memória"],
                hw: ["Power Status", "Temperatura", "Alarm Status", "FAN Status"],
                net: ["Admin Status", "In/Out", "Erros/Descartes", "Status Interface"],
                opt: ["Lanes (Bias, Tx/Rx, Temp, Voltagem)"],
                deps: ["Hardware and Software Info"]
            },
            {
                name: "Mikrotik - RSW",
                deps: ["ICMP Ping", "Module Checker", "Health Check Voltage", "Interface Discovery", "SNMP Checker"]
            },
            {
                name: "OLTs (RESERVADO)",
                isPlaceholder: true
            }
        ]
    },
    {
        layer: "Retificadores",
        icon: "fa-bolt",
        class: "c-infra",
        templates: [
            {
                name: "Delta Retificador",
                bat: ["VDC System (Status AC)", "dcBatteryCurrent", "dcBattery Temp", "doChargeState"],
                elec: ["dcLoadCurrent", "dcSystemPower", "dcCurrentLimit"],
                hw: ["dcRectifierCurrent", "UR Failure", "Nº URs (Total/Oper)"],
                time: ["Autonomia", "Duração Restante", "Uptime", "Tempo Transcorrido"],
                info: ["Nomenclatura", "MAC", "Versão", "Hora/Data"],
                deps: ["Module ICMP Ping", "Module Autonomy time"]
            },
            {
                name: "JFA 40A-48V",
                bat: ["Autonomia", "Corrente (Saída/Carga)", "Nível Carga", "Testado há"],
                info: ["Modelo", "Modo Operação", "Nome Device"],
                snmp: ["Contato", "Descrição", "Disponibilidade"],
                sys: ["Fonte Alimentação", "Uptime Modo", "Teste Autonomia"],
                elec: ["Temp Interna", "Tensão (Saída/VCA/Carga)"]
            },
            {
                name: "XPS SRWi / SRX",
                bat: ["Status (Carga/Desc)", "Amperagem Saída", "Voltagem", "Autonomia"],
                hw: ["Voltagem Retif.", "UR Amperagem", "Consumo Saída"],
                warn: ["Falha AC", "Falha UR", "Fusível Aberto", "Temp Sensor"],
                deps: ["ICMP (Jitter/Lat/Perda)", "Module Autonomy time", "Nome Sistema"]
            }
        ]
    },
    {
        layer: "Genericos",
        icon: "fa-box-open",
        class: "c-generic",
        templates: [
            {
                name: "Module ICMP Ping Checker",
                perf: ["Jitter", "Latência", "Perda", "Status"]
            },
            {
                name: "Module SNMP Checker / Generic",
                snmp: ["Contato", "Descrição", "Disponibilidade", "Object ID", "Device Name", "Traps (fallback)"],
                sys: ["Uptime Hardware", "Uptime Network"]
            },
            {
                name: "FB - Interfaces / Module Discovery v2.0",
                net: ["Bits In/Out", "Estado Admin/Oper", "Erros In/Out", "Descartes In/Out", "Tipo Interface", "Velocidade Negociação"]
            }
        ]
    }
];

function render() {
    const dashboard = document.getElementById('dashboard');
    data.forEach(layer => {
        let html = `
            <div class="layer-section">
                <div class="layer-title ${layer.class}">
                    <i class="fas ${layer.icon}"></i> ${layer.layer}
                </div>
                <div class="grid">
        `;

        layer.templates.forEach(tpl => {
            if (tpl.isPlaceholder) {
                html += `<div class="card placeholder-olt">Espaço para OLTs</div>`;
                return;
            }

            html += `<div class="card"><div class="card-header">${tpl.name}</div>`;
            
            const mapping = {
                info: "Informações",
                perf: "Performance",
                elec: "Energia / Elétrico",
                bat: "Bateria / Autonomia",
                time: "Tempos de Operação",
                net: "Rede / Interfaces",
                opt: "DMI / Óptico",
                hw: "Hardware & FAN",
                sys: "Status do Sistema",
                snmp: "SNMP & Contato",
                warn: "Alarmes Ativos",
                deps: "Dependências"
            };

            for (const [key, label] of Object.entries(mapping)) {
                if (tpl[key]) {
                    html += `
                        <div class="category">
                            <span class="category-label">${label}</span>
                            <div class="tag-list">
                                ${tpl[key].map(v => `<span class="tag ${key==='deps'?'tag-dep':''} ${key==='warn'?'tag-warn':''}">${v}</span>`).join('')}
                            </div>
                        </div>
                    `;
                }
            }
            html += `</div>`;
        });
        html += `</div></div>`;
        dashboard.innerHTML += html;
    });
}
render();
</script>
</body>
</html>
