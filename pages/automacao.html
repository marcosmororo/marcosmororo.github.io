<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sistema NOC - Avisos</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: #0f172a;
}

/* LAYOUT */
.container {
    display: grid;
    grid-template-columns: 350px 1fr;
    height: 100vh;
}

/* FORM */
.form {
    background: #0b1a33;
    padding: 20px;
    color: #fff;
    overflow-y: auto;
}

label {
    font-size: 13px;
    margin-top: 10px;
    display: block;
}

input, select {
    width: 100%;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #2a3b5c;
    background: #091426;
    color: #fff;
    margin-top: 5px;
}

/* PREVIEW */
.preview {
    background: #e5e7eb;
    padding: 30px;
}

/* CARD A4 */
.card {
    width: 500px;
    min-height: 700px;
    margin: auto;
    background: #fff;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 15px 40px rgba(0,0,0,0.25);
}

/* HEADER */
.header {
    text-align: center;
    padding: 20px;
    background: #fff;
}

.header img {
    max-width: 140px;
    object-fit: contain;
}

/* TITLES */
.title {
    text-align: center;
    padding: 14px;
    color: #fff;
    font-weight: bold;
}

.subtitle {
    text-align: center;
    padding: 8px;
    color: #fff;
    font-size: 13px;
}

/* TABLE */
table {
    width: 100%;
    border-collapse: collapse;
}

td {
    padding: 12px;
    border-bottom: 1px solid #ddd;
}

.label {
    background: #f3f4f6;
    font-weight: bold;
    width: 40%;
}

/* FOOTER */
.footer {
    padding: 15px;
    font-size: 12px;
    text-align: center;
    color: #555;
}

/* BUTTONS */
button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.png { background: #2563eb; color: #fff; }
.pdf { background: #16a34a; color: #fff; }
</style>
</head>

<body>

<div class="container">

<!-- FORM -->
<div class="form">

<h2>📡 Sistema de Avisos</h2>

<label>Tipo</label>
<select id="tipo">
<option value="programado">Programado</option>
<option value="emergencial">Emergencial</option>
</select>

<label>Data</label>
<input type="date" id="data">

<label>Hora Início</label>
<input type="time" id="inicio">

<label>Hora Fim</label>
<input type="time" id="fim">

<label>Local</label>
<input id="local">

<label>Descrição</label>
<input id="descricao">

<label>Impacto</label>
<input id="impacto">

<label>Setor</label>
<input id="setor">

<label>Protocolo</label>
<input id="protocolo" readonly>

<button class="png" onclick="gerarPNG()">Gerar PNG</button>
<button class="pdf" onclick="gerarPDF()">Gerar PDF</button>

</div>

<!-- PREVIEW -->
<div class="preview">

<div id="card" class="card">

<div class="header">
 <img src="../assets/img/online.png">
</div>

<div id="titulo" class="title">INFORME DE ATIVIDADE PROGRAMADA</div>
<div id="subtitulo" class="subtitle">ATIVIDADE PROGRAMADA</div>

<table>
<tr><td class="label">Data</td><td id="p_data"></td></tr>
<tr><td class="label">Período</td><td id="p_periodo"></td></tr>
<tr><td class="label">Local</td><td id="p_local"></td></tr>
<tr><td class="label">Descrição</td><td id="p_descricao"></td></tr>
<tr><td class="label">Impacto</td><td id="p_impacto"></td></tr>
<tr><td class="label">Setor</td><td id="p_setor"></td></tr>
<tr><td class="label">Protocolo</td><td id="p_protocolo"></td></tr>
</table>

<div class="footer">
Este aviso foi gerado automaticamente pelo sistema NOC.
</div>

</div>

</div>

</div>

<script>
const campos = ["tipo","data","inicio","fim","local","descricao","impacto","setor"];

campos.forEach(id => {
    document.getElementById(id).addEventListener("input", atualizar);
});

/* GERAR PROTOCOLO AUTOMÁTICO */
function gerarProtocolo() {
    const now = new Date();
    return `${now.getFullYear()}${now.getMonth()+1}${now.getDate()}-${now.getHours()}${now.getMinutes()}`;
}
document.getElementById("protocolo").value = gerarProtocolo();

function atualizar() {
    const tipo = document.getElementById("tipo").value;

    const cor = tipo === "emergencial" ? "#dc2626" : "#0f172a";
    const subtitulo = tipo === "emergencial"
        ? "ATIVIDADE EMERGENCIAL"
        : "ATIVIDADE PROGRAMADA";

    document.getElementById("titulo").style.background = cor;
    document.getElementById("subtitulo").style.background = cor;
    document.getElementById("subtitulo").innerText = subtitulo;

    const data = document.getElementById("data").value;
    const inicio = document.getElementById("inicio").value;
    const fim = document.getElementById("fim").value;

    document.getElementById("p_data").innerText = data ? formatarData(data) : "";
    document.getElementById("p_periodo").innerText = `${inicio} às ${fim}`;

    document.getElementById("p_local").innerText = local.value;
    document.getElementById("p_descricao").innerText = descricao.value;
    document.getElementById("p_impacto").innerText = impacto.value;
    document.getElementById("p_setor").innerText = setor.value;
    document.getElementById("p_protocolo").innerText = protocolo.value;
}

function formatarData(dataISO) {
    const [ano, mes, dia] = dataISO.split("-");
    return `${dia}/${mes}/${ano}`;
}

/* EXPORT */
async function gerarPNG() {
    const canvas = await html2canvas(document.getElementById("card"));
    const link = document.createElement('a');
    link.download = 'aviso.png';
    link.href = canvas.toDataURL();
    link.click();
}

async function gerarPDF() {
    const { jsPDF } = window.jspdf;
    const canvas = await html2canvas(document.getElementById("card"));
    const img = canvas.toDataURL("image/png");

    const pdf = new jsPDF("p","mm","a4");
    pdf.addImage(img, 'PNG', 10, 10, 190, 0);
    pdf.save("aviso.pdf");
}
</script>

</body>
</html>
