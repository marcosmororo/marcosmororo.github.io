<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NOC Avisos</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: #0f172a;
}

/* LAYOUT */
.container {
    display: grid;
    grid-template-columns: 350px 1fr;
    height: 100vh;
}

/* FORM */
.form {
    background: #111827;
    padding: 20px;
    color: #fff;
    border-right: 1px solid #1f2937;
}

label {
    font-size: 12px;
    margin-top: 10px;
    display: block;
    color: #cbd5f5;
}

input, select {
    width: 100%;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #374151;
    background: #020617;
    color: #fff;
    margin-top: 5px;
}

/* PREVIEW */
.preview {
    background: #e5e7eb;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* CARD */
.card {
    width: 600px;
    background: #fff;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

/* HEADER */
.header {
    text-align: center;
    padding: 20px;
}

.header img {
    max-width: 150px;
}

/* TITLES */
.title {
    text-align: center;
    padding: 12px;
    color: #fff;
    font-weight: bold;
    background: #1e3a8a;
}

.subtitle {
    text-align: center;
    padding: 8px;
    color: #fff;
    background: #2563eb;
    font-size: 13px;
}

/* TABLE */
table {
    width: 100%;
    border-collapse: collapse;
}

td {
    padding: 12px;
    border-bottom: 1px solid #ddd;
}

.label {
    background: #f1f5f9;
    font-weight: bold;
    width: 40%;
}

/* BUTTONS */
button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.png { background: #2563eb; color: #fff; }
.pdf { background: #16a34a; color: #fff; }
</style>
</head>

<body>

<div class="container">

<!-- FORM -->
<div class="form">

<h3>📡 Aviso NOC</h3>

<label>Tipo</label>
<select id="tipo">
<option value="normal">Programado</option>
<option value="critico">Emergencial</option>
</select>

<label>Data</label>
<input type="date" id="data">

<label>Hora Início</label>
<input type="time" id="inicio">

<label>Hora Fim</label>
<input type="time" id="fim">

<label>Local</label>
<input id="local">

<label>Descrição</label>
<input id="descricao">

<label>Impacto</label>
<input id="impacto">

<label>Setor</label>
<input id="setor">

<label>Protocolo</label>
<input id="protocolo" readonly>

<button class="png" onclick="gerarPNG()">Gerar PNG</button>
<button class="pdf" onclick="gerarPDF()">Gerar PDF</button>

</div>

<!-- PREVIEW -->
<div class="preview">

<div id="card" class="card">

<div class="header">
<img src="../assets/img/online.png">
</div>

<div id="titulo" class="title">INFORME DE ATIVIDADE PROGRAMADA</div>
<div id="subtitulo" class="subtitle">ATIVIDADE PROGRAMADA</div>

<table>
<tr><td class="label">Data</td><td id="p_data"></td></tr>
<tr><td class="label">Período</td><td id="p_periodo"></td></tr>
<tr><td class="label">Local</td><td id="p_local"></td></tr>
<tr><td class="label">Descrição</td><td id="p_descricao"></td></tr>
<tr><td class="label">Impacto</td><td id="p_impacto"></td></tr>
<tr><td class="label">Setor</td><td id="p_setor"></td></tr>
<tr><td class="label">Protocolo</td><td id="p_protocolo"></td></tr>
</table>

</div>

</div>

</div>

<script>
/* PROTOCOLO */
function gerarProtocolo() {
    const d = new Date();
    return `${d.getFullYear()}${d.getMonth()+1}${d.getDate()}-${d.getHours()}${d.getMinutes()}`;
}
document.getElementById("protocolo").value = gerarProtocolo();

/* UPDATE */
const campos = ["tipo","data","inicio","fim","local","descricao","impacto","setor"];
campos.forEach(id => document.getElementById(id).addEventListener("input", atualizar));

function atualizar() {
    const tipo = document.getElementById("tipo").value;
    const cor = tipo === "critico" ? "#dc2626" : "#1e3a8a";

    document.getElementById("titulo").style.background = cor;
    document.getElementById("subtitulo").style.background = cor;

    const data = document.getElementById("data").value;
    const inicio = document.getElementById("inicio").value;
    const fim = document.getElementById("fim").value;

    document.getElementById("p_data").innerText = formatarData(data);
    document.getElementById("p_periodo").innerText = `${inicio} às ${fim}`;

    document.getElementById("p_local").innerText = document.getElementById("local").value;
    document.getElementById("p_descricao").innerText = document.getElementById("descricao").value;
    document.getElementById("p_impacto").innerText = document.getElementById("impacto").value;
    document.getElementById("p_setor").innerText = document.getElementById("setor").value;
    document.getElementById("p_protocolo").innerText = document.getElementById("protocolo").value;
}

function formatarData(d){
    if(!d) return "";
    const [a,m,dia] = d.split("-");
    return `${dia}/${m}/${a}`;
}

/* EXPORT HD */
async function gerarPNG() {
    const canvas = await html2canvas(document.getElementById("card"), { scale: 3 });
    const link = document.createElement("a");
    link.download = "aviso.png";
    link.href = canvas.toDataURL();
    link.click();
}

async function gerarPDF() {
    const { jsPDF } = window.jspdf;
    const canvas = await html2canvas(document.getElementById("card"), { scale: 3 });

    const img = canvas.toDataURL("image/png");

    const pdf = new jsPDF("p","mm","a4");
    const largura = 190;
    const altura = (canvas.height * largura) / canvas.width;

    pdf.addImage(img, "PNG", 10, 10, largura, altura);
    pdf.save("aviso.pdf");
}
</script>

</body>
</html>
