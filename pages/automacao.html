<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NOC - Aviso Programado</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0f172a;
    color: #fff;
}

.container {
    display: grid;
    grid-template-columns: 400px 1fr;
    height: 100vh;
}

/* FORM */
.form {
    background: #0b1a33;
    padding: 25px;
    overflow-y: auto;
}

.form h2 {
    margin-bottom: 20px;
}

.input-group {
    margin-bottom: 15px;
}

label {
    font-size: 13px;
    display: block;
    margin-bottom: 5px;
    opacity: 0.8;
}

input {
    width: 100%;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #2a3b5c;
    background: #091426;
    color: #fff;
    outline: none;
}

input::placeholder {
    color: #aaa;
}

/* PREVIEW */
.preview {
    background: #e5e7eb;
    padding: 40px;
    overflow-y: auto;
}

.card {
    background: #fff;
    color: #000;
    max-width: 600px;
    margin: auto;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

.header {
    text-align: center;
    padding: 20px;
}

.header img {
    max-width: 120px;
}

.title {
    background: #0f172a;
    color: #fff;
    text-align: center;
    padding: 12px;
    font-weight: bold;
}

.subtitle {
    background: #1d4ed8;
    color: #fff;
    text-align: center;
    padding: 8px;
    font-size: 13px;
}

.table {
    width: 100%;
    border-collapse: collapse;
}

.table td {
    padding: 12px;
    border-bottom: 1px solid #ddd;
}

.label {
    font-weight: bold;
    background: #f3f4f6;
    width: 40%;
}

.footer {
    padding: 15px;
    font-size: 12px;
    text-align: center;
    color: #555;
}

/* BUTTONS */
.actions {
    margin-top: 20px;
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    margin-top: 10px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
}

.png {
    background: #2563eb;
    color: #fff;
}

.pdf {
    background: #16a34a;
    color: #fff;
}
</style>
</head>

<body>

<div class="container">

<!-- FORM -->
<div class="form">

<h2>📋 Preencher Aviso</h2>

<div class="input-group">
<label>Data (DDMMYYYY)</label>
<input id="data" maxlength="8" oninput="formatarData(this)">
</div>

<div class="input-group">
<label>Hora Início (HHMM)</label>
<input id="inicio" maxlength="4" oninput="formatarHora(this)">
</div>

<div class="input-group">
<label>Hora Fim (HHMM)</label>
<input id="fim" maxlength="4" oninput="formatarHora(this)">
</div>

<div class="input-group">
<label>Local</label>
<input id="local">
</div>

<div class="input-group">
<label>Descrição</label>
<input id="descricao">
</div>

<div class="input-group">
<label>Impacto</label>
<input id="impacto">
</div>

<div class="input-group">
<label>Setor</label>
<input id="setor">
</div>

<div class="input-group">
<label>Protocolo (somente números)</label>
<input id="protocolo" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
</div>

<div class="actions">
<button class="png" onclick="gerarPNG()">📸 Gerar PNG</button>
<button class="pdf" onclick="gerarPDF()">📄 Gerar PDF</button>
</div>

</div>

<!-- PREVIEW -->
<div class="preview">

<div id="card" class="card">

<div class="header">
<img src="online.png">
</div>

<div class="title">INFORME DE ATIVIDADE PROGRAMADA</div>
<div class="subtitle">ATIVIDADE PROGRAMADA CONFORME AS INFORMAÇÕES ABAIXO</div>

<table class="table">
<tr><td class="label">Data</td><td id="p_data"></td></tr>
<tr><td class="label">Período</td><td id="p_periodo"></td></tr>
<tr><td class="label">Local</td><td id="p_local"></td></tr>
<tr><td class="label">Descrição</td><td id="p_descricao"></td></tr>
<tr><td class="label">Impacto</td><td id="p_impacto"></td></tr>
<tr><td class="label">Setor</td><td id="p_setor"></td></tr>
<tr><td class="label">Protocolo</td><td id="p_protocolo"></td></tr>
</table>

<div class="footer">
Este aviso refere-se a uma atividade programada.
</div>

</div>

</div>

</div>

<script>
function formatarData(el) {
    el.value = el.value.replace(/\D/g,'');
    if(el.value.length >= 5)
        el.value = el.value.replace(/(\d{2})(\d{2})(\d+)/, '$1/$2/$3');
    else if(el.value.length >= 3)
        el.value = el.value.replace(/(\d{2})(\d+)/, '$1/$2');
    atualizar();
}

function formatarHora(el) {
    el.value = el.value.replace(/\D/g,'');
    if(el.value.length >= 3)
        el.value = el.value.replace(/(\d{2})(\d+)/, '$1:$2');
    atualizar();
}

function atualizar() {
    document.getElementById("p_data").innerText = document.getElementById("data").value;
    document.getElementById("p_periodo").innerText =
        document.getElementById("inicio").value + " às " + document.getElementById("fim").value;

    document.getElementById("p_local").innerText = local.value;
    document.getElementById("p_descricao").innerText = descricao.value;
    document.getElementById("p_impacto").innerText = impacto.value;
    document.getElementById("p_setor").innerText = setor.value;
    document.getElementById("p_protocolo").innerText = protocolo.value;
}

async function gerarPNG() {
    const canvas = await html2canvas(document.getElementById("card"));
    const link = document.createElement('a');
    link.download = 'aviso.png';
    link.href = canvas.toDataURL();
    link.click();
}

async function gerarPDF() {
    const { jsPDF } = window.jspdf;
    const canvas = await html2canvas(document.getElementById("card"));
    const img = canvas.toDataURL("image/png");

    const pdf = new jsPDF();
    pdf.addImage(img, 'PNG', 10, 10, 190, 0);
    pdf.save("aviso.pdf");
}
</script>

</body>
</html>
