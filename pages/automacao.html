<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NOC Avisos Pro</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: #020617;
    color: #fff;
}

.container {
    display: grid;
    grid-template-columns: 340px 1fr;
    height: 100vh;
}

/* FORM DARK */
.form {
    background: #020617;
    padding: 20px;
    border-right: 1px solid #1e293b;
}

label {
    font-size: 12px;
    margin-top: 10px;
    display: block;
    color: #94a3b8;
}

input, select {
    width: 100%;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #1e293b;
    background: #020617;
    color: #fff;
    margin-top: 5px;
}

/* PREVIEW */
.preview {
    background: #020617;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* CARD OTIMIZADO */
.card {
    width: 650px;
    background: #fff;
    border-radius: 12px;
    overflow: hidden;
}

/* HEADER */
.header {
    text-align: center;
    padding: 20px;
}

.header img {
    max-width: 160px;
}

/* TITLES */
.title {
    text-align: center;
    padding: 14px;
    color: #fff;
    font-weight: bold;
}

.subtitle {
    text-align: center;
    padding: 8px;
    color: #fff;
    font-size: 13px;
}

/* TABLE */
table {
    width: 100%;
    border-collapse: collapse;
}

td {
    padding: 14px;
    border-bottom: 1px solid #ddd;
    font-size: 14px;
}

.label {
    background: #f1f5f9;
    font-weight: bold;
    width: 40%;
}

/* BUTTONS */
button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.png { background: #2563eb; color: #fff; }
.pdf { background: #16a34a; color: #fff; }
</style>
</head>

<body>

<div class="container">

<!-- FORM -->
<div class="form">

<h3>📡 Aviso NOC</h3>

<label>Tipo</label>
<select id="tipo">
<option value="normal">Programado</option>
<option value="critico">Emergencial</option>
</select>

<label>Data</label>
<input type="date" id="data">

<label>Hora Início</label>
<input type="time" id="inicio">

<label>Hora Fim</label>
<input type="time" id="fim">

<label>Local</label>
<input id="local">

<label>Descrição</label>
<input id="descricao">

<label>Impacto</label>
<input id="impacto">

<label>Setor</label>
<input id="setor">

<label>Protocolo</label>
<input id="protocolo" readonly>

<button class="png" onclick="gerarPNG()">PNG Alta Qualidade</button>
<button class="pdf" onclick="gerarPDF()">PDF Profissional</button>

</div>

<!-- PREVIEW -->
<div class="preview">

<div id="card" class="card">

<div class="header">
<img src="online.png">
</div>

<div id="titulo" class="title">INFORME DE ATIVIDADE PROGRAMADA</div>
<div id="subtitulo" class="subtitle">ATIVIDADE PROGRAMADA</div>

<table>
<tr><td class="label">Data</td><td id="p_data"></td></tr>
<tr><td class="label">Período</td><td id="p_periodo"></td></tr>
<tr><td class="label">Local</td><td id="p_local"></td></tr>
<tr><td class="label">Descrição</td><td id="p_descricao"></td></tr>
<tr><td class="label">Impacto</td><td id="p_impacto"></td></tr>
<tr><td class="label">Setor</td><td id="p_setor"></td></tr>
<tr><td class="label">Protocolo</td><td id="p_protocolo"></td></tr>
</table>

</div>

</div>

</div>

<script>
/* AUTO PROTOCOLO */
function gerarProtocolo() {
    const d = new Date();
    return `${d.getFullYear()}${(d.getMonth()+1)}${d.getDate()}-${d.getHours()}${d.getMinutes()}`;
}
document.getElementById("protocolo").value = gerarProtocolo();

/* UPDATE */
const campos = ["tipo","data","inicio","fim","local","descricao","impacto","setor"];
campos.forEach(id => document.getElementById(id).addEventListener("input", atualizar));

function atualizar() {
    const tipo = tipoInput().value;

    const cor = tipo === "critico" ? "#dc2626" : "#0f172a";

    document.getElementById("titulo").style.background = cor;
    document.getElementById("subtitulo").style.background = cor;

    document.getElementById("p_data").innerText = formatarData(data.value);
    document.getElementById("p_periodo").innerText = `${inicio.value} às ${fim.value}`;
    document.getElementById("p_local").innerText = local.value;
    document.getElementById("p_descricao").innerText = descricao.value;
    document.getElementById("p_impacto").innerText = impacto.value;
    document.getElementById("p_setor").innerText = setor.value;
    document.getElementById("p_protocolo").innerText = protocolo.value;
}

function tipoInput(){ return document.getElementById("tipo"); }

function formatarData(d){
    if(!d) return "";
    const [a,m,dia] = d.split("-");
    return `${dia}/${m}/${a}`;
}

/* EXPORT ALTA QUALIDADE */
async function gerarPNG() {
    const canvas = await html2canvas(document.getElementById("card"), { scale: 3 });
    const link = document.createElement("a");
    link.download = "aviso.png";
    link.href = canvas.toDataURL();
    link.click();
}

async function gerarPDF() {
    const { jsPDF } = window.jspdf;
    const canvas = await html2canvas(document.getElementById("card"), { scale: 3 });

    const img = canvas.toDataURL("image/png");

    const pdf = new jsPDF("p","mm","a4");
    const largura = 190;
    const altura = (canvas.height * largura) / canvas.width;

    pdf.addImage(img, "PNG", 10, 10, largura, altura);
    pdf.save("aviso.pdf");
}
</script>

</body>
</html>
