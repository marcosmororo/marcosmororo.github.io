<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NOC - Aviso Programado</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0f172a;
}

.container {
    display: grid;
    grid-template-columns: 380px 1fr;
    height: 100vh;
}

/* FORM */
.form {
    background: #0b1a33;
    padding: 25px;
    color: #fff;
    overflow-y: auto;
}

label {
    font-size: 13px;
    margin-top: 10px;
    display: block;
}

input {
    width: 100%;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #2a3b5c;
    background: #091426;
    color: #fff;
    margin-top: 5px;
}

/* PREVIEW */
.preview {
    background: #e5e7eb;
    padding: 40px;
}

.card {
    background: #fff;
    max-width: 600px;
    margin: auto;
    border-radius: 10px;
    overflow: hidden;
}

.header {
    text-align: center;
    padding: 20px;
}

.header img {
    max-width: 120px;
}

.title {
    background: #0f172a;
    color: #fff;
    text-align: center;
    padding: 12px;
    font-weight: bold;
}

.subtitle {
    background: #1d4ed8;
    color: #fff;
    text-align: center;
    padding: 8px;
}

table {
    width: 100%;
    border-collapse: collapse;
}

td {
    padding: 12px;
    border-bottom: 1px solid #ddd;
}

.label {
    font-weight: bold;
    background: #f3f4f6;
}

.actions {
    margin-top: 20px;
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    margin-top: 10px;
    border-radius: 6px;
    cursor: pointer;
}

.png { background: #2563eb; color: #fff; }
.pdf { background: #16a34a; color: #fff; }
</style>
</head>

<body>

<div class="container">

<!-- FORM -->
<div class="form">

<h2>📋 Aviso</h2>

<label>Data</label>
<input type="date" id="data">

<label>Hora Início</label>
<input type="time" id="inicio">

<label>Hora Fim</label>
<input type="time" id="fim">

<label>Local</label>
<input id="local">

<label>Descrição</label>
<input id="descricao">

<label>Impacto</label>
<input id="impacto">

<label>Setor</label>
<input id="setor">

<label>Protocolo</label>
<input id="protocolo" oninput="this.value=this.value.replace(/[^0-9]/g,'')">

<div class="actions">
<button class="png" onclick="gerarPNG()">Gerar PNG</button>
<button class="pdf" onclick="gerarPDF()">Gerar PDF</button>
</div>

</div>

<!-- PREVIEW -->
<div class="preview">

<div id="card" class="card">

<div class="header">
<img src="../assets/img/online.png">
</div>

<div class="title">INFORME DE ATIVIDADE PROGRAMADA</div>
<div class="subtitle">ATIVIDADE PROGRAMADA CONFORME AS INFORMAÇÕES ABAIXO</div>

<table>
<tr><td class="label">Data</td><td id="p_data"></td></tr>
<tr><td class="label">Período</td><td id="p_periodo"></td></tr>
<tr><td class="label">Local</td><td id="p_local"></td></tr>
<tr><td class="label">Descrição</td><td id="p_descricao"></td></tr>
<tr><td class="label">Impacto</td><td id="p_impacto"></td></tr>
<tr><td class="label">Setor</td><td id="p_setor"></td></tr>
<tr><td class="label">Protocolo</td><td id="p_protocolo"></td></tr>
</table>

</div>

</div>

</div>

<script>
const campos = ["data","inicio","fim","local","descricao","impacto","setor","protocolo"];

campos.forEach(id => {
    document.getElementById(id).addEventListener("input", atualizar);
});

function atualizar() {
    const data = document.getElementById("data").value;
    const inicio = document.getElementById("inicio").value;
    const fim = document.getElementById("fim").value;

    document.getElementById("p_data").innerText = data ? formatarData(data) : "";
    document.getElementById("p_periodo").innerText = (inicio && fim) ? `${inicio} às ${fim}` : "";

    document.getElementById("p_local").innerText = document.getElementById("local").value;
    document.getElementById("p_descricao").innerText = document.getElementById("descricao").value;
    document.getElementById("p_impacto").innerText = document.getElementById("impacto").value;
    document.getElementById("p_setor").innerText = document.getElementById("setor").value;
    document.getElementById("p_protocolo").innerText = document.getElementById("protocolo").value;
}

function formatarData(dataISO) {
    const [ano, mes, dia] = dataISO.split("-");
    return `${dia}/${mes}/${ano}`;
}

async function gerarPNG() {
    const canvas = await html2canvas(document.getElementById("card"));
    const link = document.createElement('a');
    link.download = 'aviso.png';
    link.href = canvas.toDataURL();
    link.click();
}

async function gerarPDF() {
    const { jsPDF } = window.jspdf;
    const canvas = await html2canvas(document.getElementById("card"));
    const img = canvas.toDataURL("image/png");

    const pdf = new jsPDF();
    pdf.addImage(img, 'PNG', 10, 10, 190, 0);
    pdf.save("aviso.pdf");
}
</script>

</body>
</html>
