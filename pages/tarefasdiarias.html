<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Produtividade - Marcos Renan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d1117; --card: #161b22; --border: #30363d;
            --primary: #58a6ff; --ok: #238636; --danger: #f85149;
            --warning: #d29922; --text: #c9d1d9; --text-dim: #8b949e;
            --pomodoro: #eb5757;
            --trabalho: #58a6ff; --estudo: #a371f7; --pessoal: #3fb950; --saude: #f85149; --reuniao: #f2cc60;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; line-height: 1.6; }
        .container { max-width: 1200px; margin: auto; }

        /* Header */
        .header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 25px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        .header h1 { margin: 0; font-weight: 800; letter-spacing: -1px; font-size: 1.8rem; }
        #clock-container { text-align: right; }
        #clock { font-family: 'JetBrains Mono'; color: var(--primary); font-size: 1.5rem; display: block; }
        #date-display { font-size: 0.85rem; color: var(--text-dim); }

        /* Dashboard Stats */
        .dashboard-row { display: grid; grid-template-columns: 1fr 300px; gap: 20px; margin-bottom: 30px; }
        @media (max-width: 900px) { .dashboard-row { grid-template-columns: 1fr; } }

        .stats-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; display: flex; align-items: center; gap: 25px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        .progress-circle-container { flex: 1; }
        .progress-info { display: flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 8px; font-weight: 600; }
        .progress-bar-bg { background: #010409; height: 12px; border-radius: 10px; overflow: hidden; border: 1px solid var(--border); }
        #progress-fill { background: linear-gradient(90deg, var(--primary), var(--ok)); width: 0%; height: 100%; transition: 1s ease-in-out; }

        .mini-stats { display: flex; gap: 15px; margin-top: 15px; }
        .mini-badge { background: #010409; padding: 5px 12px; border-radius: 6px; font-size: 0.75rem; border: 1px solid var(--border); }

        /* Pomodoro */
        .pomodoro-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; border-left: 5px solid var(--pomodoro); text-align: center; }
        .pomo-timer { font-family: 'JetBrains Mono'; font-size: 2.2rem; font-weight: bold; color: var(--pomodoro); margin: 5px 0; }
        .pomo-controls button { background: #010409; border: 1px solid var(--pomodoro); color: var(--pomodoro); padding: 6px 15px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; font-weight: bold; transition: 0.3s; }
        .pomo-controls button:hover { background: var(--pomodoro); color: white; }

        /* Main Grid */
        .main-grid { display: grid; grid-template-columns: 1fr 380px; gap: 30px; }
        @media (max-width: 900px) { .main-grid { grid-template-columns: 1fr; } }

        /* Forms */
        .form-container { background: var(--card); border: 1px solid var(--border); padding: 25px; border-radius: 12px; position: sticky; top: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
        .input-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        label { font-size: 0.7rem; font-weight: bold; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
        input, select { background: #010409; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 8px; outline: none; transition: 0.2s; font-size: 0.9rem; }
        input:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(88, 166, 255, 0.1); }
        .btn-add { width: 100%; background: var(--primary); color: #0d1117; border: none; padding: 14px; border-radius: 8px; font-weight: 800; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-add:hover { filter: brightness(1.1); transform: translateY(-2px); }

        /* Hidden Fields */
        #meeting-fields { display: none; background: rgba(242, 204, 96, 0.05); padding: 10px; border-radius: 8px; margin-bottom: 15px; border: 1px dashed var(--reuniao); }

        /* Tasks */
        .section-title { font-size: 0.8rem; color: var(--text-dim); margin-bottom: 20px; display: flex; align-items: center; gap: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .section-title::after { content: ""; flex: 1; height: 1px; background: var(--border); }
        
        .task-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 18px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; position: relative; transition: 0.2s; }
        .task-card:hover { border-color: var(--text-dim); }
        .task-category-tag { position: absolute; left: 0; top: 0; bottom: 0; width: 5px; }
        
        .task-info h3 { margin: 0 0 8px 0; font-size: 1.1rem; }
        .task-meta { font-size: 0.75rem; color: var(--text-dim); display: flex; gap: 15px; align-items: center; }
        .tag { font-size: 0.65rem; padding: 3px 10px; border-radius: 20px; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; display: inline-block; }

        .meeting-date-badge { color: var(--reuniao); font-weight: bold; border: 1px solid var(--reuniao); padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; }

        .timer-badge { font-family: 'JetBrains Mono'; background: #010409; padding: 4px 8px; border-radius: 4px; color: var(--primary); border: 1px solid #21262d; }
        .btn-check { background: var(--ok); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; width: 45px; height: 45px; transition: 0.3s; }
        .btn-check:hover { background: #2ea043; }
        .btn-delete { background: transparent; color: var(--danger); border: 1px solid var(--danger); padding: 8px 12px; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .btn-delete:hover { background: var(--danger); color: white; }
        
        .history-item { opacity: 0.8; border-left: 2px solid var(--border); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>PROD<span style="color: var(--primary);">FLOW</span> <span style="font-weight: 300; font-size: 1rem; color: var(--text-dim);">| Marcos Renan</span></h1>
        <div id="clock-container">
            <span id="clock">00:00:00</span>
            <span id="date-display">...</span>
        </div>
    </div>

    <!-- Stats & Pomodoro -->
    <div class="dashboard-row">
        <div class="stats-card">
            <div class="progress-circle-container">
                <div class="progress-info">
                    <span><i class="fa-solid fa-bullseye"></i> Meta Diária</span>
                    <span id="progress-percent">0%</span>
                </div>
                <div class="progress-bar-bg">
                    <div id="progress-fill"></div>
                </div>
                <div class="mini-stats">
                    <span class="mini-badge" id="stat-pending">Pendentes: 0</span>
                    <span class="mini-badge" id="stat-done">Concluídas: 0</span>
                </div>
            </div>
            <div style="border-left: 1px solid var(--border); padding-left: 25px; min-width: 150px;">
                <div style="font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase;">Foco Acumulado</div>
                <div id="total-focus-time" style="font-family: 'JetBrains Mono'; font-size: 1.4rem; color: var(--primary); font-weight: bold;">00:00:00</div>
            </div>
        </div>

        <div class="pomodoro-card">
            <div class="pomo-timer" id="pomo-display">25:00</div>
            <div class="pomo-controls">
                <button onclick="togglePomodoro()" id="pomo-btn"><i class="fa-solid fa-play"></i> START</button>
                <button onclick="resetPomodoro()"><i class="fa-solid fa-rotate-right"></i></button>
            </div>
        </div>
    </div>

    <div class="main-grid">
        <div class="left-col">
            <div class="section-title">Atividades em Foco</div>
            <div id="active-tasks"></div>

            <div class="section-title" style="margin-top: 40px;">Logs de Hoje</div>
            <div id="completed-tasks"></div>
        </div>

        <!-- Cadastro -->
        <div class="right-col">
            <div class="form-container">
                <div class="section-title">Cadastrar Tarefa</div>
                
                <div class="input-group">
                    <label>Título da Atividade</label>
                    <input type="text" id="task-title" placeholder="Ex: Daily Meeting">
                </div>

                <div class="input-group">
                    <label>Categoria</label>
                    <select id="task-category" onchange="toggleMeetingFields()">
                        <option value="Trabalho">Trabalho</option>
                        <option value="Reuniao">Reunião / Evento</option>
                        <option value="Estudo">Estudo</option>
                        <option value="Pessoal">Pessoal</option>
                        <option value="Saúde">Saúde</option>
                    </select>
                </div>

                <!-- Campos específicos para Reunião -->
                <div id="meeting-fields">
                    <div class="input-group">
                        <label>Data e Hora da Reunião</label>
                        <input type="datetime-local" id="meeting-time">
                    </div>
                </div>

                <div class="input-group">
                    <label>Referência (URL)</label>
                    <input type="text" id="task-link" placeholder="Link da reunião ou documento">
                </div>

                <button class="btn-add" onclick="createTask()">INICIAR AGORA</button>
            </div>
        </div>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('proflow_v4')) || { ativas: [], concluidas: [] };
    let pomoTime = 25 * 60;
    let pomoInterval = null;
    let isPaused = true;

    function save() {
        localStorage.setItem('proflow_v4', JSON.stringify(db));
        render();
    }

    function toggleMeetingFields() {
        const cat = document.getElementById('task-category').value;
        const fields = document.getElementById('meeting-fields');
        fields.style.display = (cat === 'Reuniao') ? 'block' : 'none';
    }

    function createTask() {
        const title = document.getElementById('task-title').value;
        const category = document.getElementById('task-category').value;
        const link = document.getElementById('task-link').value;
        const mTime = document.getElementById('meeting-time').value;
        
        if(!title) return alert("Dê um nome para a tarefa!");

        const agora = new Date();
        const novaTarefa = {
            id: Date.now(),
            titulo: title,
            categoria: category,
            link: link,
            meetingTime: category === 'Reuniao' ? mTime : null,
            inicioRaw: agora.getTime(),
            inicio: agora.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'}),
            duracaoSegundos: 0
        };

        db.ativas.push(novaTarefa);
        resetForm();
        save();
    }

    function resetForm() {
        document.getElementById('task-title').value = '';
        document.getElementById('task-link').value = '';
        document.getElementById('meeting-time').value = '';
        document.getElementById('task-category').value = 'Trabalho';
        toggleMeetingFields();
    }

    function finishTask(id) {
        const index = db.ativas.findIndex(t => t.id === id);
        const tarefa = db.ativas.splice(index, 1)[0];
        const agora = new Date();
        tarefa.fim = agora.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
        tarefa.duracaoSegundos = Math.floor((agora.getTime() - tarefa.inicioRaw) / 1000);
        db.concluidas.unshift(tarefa);
        save();
    }

    function deleteTask(id, lista) {
        if(confirm("Deseja apagar este registro?")) {
            db[lista] = db[lista].filter(t => t.id !== id);
            save();
        }
    }

    // Pomodoro Logic
    function togglePomodoro() {
        const btn = document.getElementById('pomo-btn');
        if(isPaused) {
            isPaused = false;
            btn.innerHTML = '<i class="fa-solid fa-pause"></i> PAUSE';
            pomoInterval = setInterval(() => {
                pomoTime--;
                updatePomoDisplay();
                if(pomoTime <= 0) {
                    clearInterval(pomoInterval);
                    new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg').play();
                    alert("Pomodoro Finalizado! Descanse um pouco.");
                    resetPomodoro();
                }
            }, 1000);
        } else {
            isPaused = true;
            btn.innerHTML = '<i class="fa-solid fa-play"></i> START';
            clearInterval(pomoInterval);
        }
    }

    function resetPomodoro() {
        clearInterval(pomoInterval);
        isPaused = true;
        pomoTime = 25 * 60;
        document.getElementById('pomo-btn').innerHTML = '<i class="fa-solid fa-play"></i> START';
        updatePomoDisplay();
    }

    function updatePomoDisplay() {
        const m = Math.floor(pomoTime / 60).toString().padStart(2, '0');
        const s = (pomoTime % 60).toString().padStart(2, '0');
        document.getElementById('pomo-display').innerText = `${m}:${s}`;
    }

    function updateDashboard() {
        const total = db.ativas.length + db.concluidas.length;
        const percent = total === 0 ? 0 : Math.round((db.concluidas.length / total) * 100);
        
        document.getElementById('progress-percent').innerText = percent + '%';
        document.getElementById('progress-fill').style.width = percent + '%';
        document.getElementById('stat-pending').innerText = `Pendentes: ${db.ativas.length}`;
        document.getElementById('stat-done').innerText = `Concluídas: ${db.concluidas.length}`;

        let totalSegundos = db.concluidas.reduce((acc, t) => acc + (t.duracaoSegundos || 0), 0);
        const h = Math.floor(totalSegundos / 3600).toString().padStart(2, '0');
        const m = Math.floor((totalSegundos % 3600) / 60).toString().padStart(2, '0');
        const s = (totalSegundos % 60).toString().padStart(2, '0');
        document.getElementById('total-focus-time').innerText = `${h}:${m}:${s}`;
    }

    function render() {
        const activeContainer = document.getElementById('active-tasks');
        const completedContainer = document.getElementById('completed-tasks');
        
        activeContainer.innerHTML = '';
        completedContainer.innerHTML = '';

        db.ativas.forEach(t => {
            const catColor = `var(--${t.categoria.toLowerCase()})`;
            let meetingHtml = t.meetingTime ? `<span class="meeting-date-badge"><i class="fa-regular fa-calendar-days"></i> ${t.meetingTime.replace('T', ' ')}</span>` : '';
            
            activeContainer.innerHTML += `
                <div class="task-card">
                    <div class="task-category-tag" style="background: ${catColor}"></div>
                    <div class="task-info">
                        <span class="tag" style="background: ${catColor}22; color: ${catColor}">${t.categoria === 'Reuniao' ? 'Reunião' : t.categoria}</span>
                        <h3>${t.titulo}</h3>
                        <div class="task-meta">
                            ${meetingHtml}
                            <span><i class="fa-regular fa-clock"></i> ${t.inicio}</span>
                            <span class="timer-badge" id="timer-${t.id}">00:00:00</span>
                        </div>
                    </div>
                    <button class="btn-check" onclick="finishTask(${t.id})"><i class="fa-solid fa-check"></i></button>
                </div>
            `;
        });

        db.concluidas.forEach(t => {
            const catColor = `var(--${t.categoria.toLowerCase()})`;
            completedContainer.innerHTML += `
                <div class="task-card history-item">
                    <div class="task-category-tag" style="background: ${catColor}; opacity: 0.5"></div>
                    <div class="task-info">
                        <span class="tag" style="background: #30363d; color: var(--text-dim)">${t.categoria}</span>
                        <h3 style="font-size: 0.95rem">${t.titulo}</h3>
                        <div class="task-meta">
                            <span>Início: ${t.inicio} | Fim: ${t.fim}</span>
                        </div>
                    </div>
                    <button class="btn-delete" onclick="deleteTask(${t.id}, 'concluidas')"><i class="fa-solid fa-trash"></i></button>
                </div>
            `;
        });
        updateDashboard();
    }

    // Loop Clock e Timers
    setInterval(() => {
        const agora = new Date();
        document.getElementById('clock').innerText = agora.toLocaleTimeString('pt-BR');
        document.getElementById('date-display').innerText = agora.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' });
        
        db.ativas.forEach(t => {
            const el = document.getElementById(`timer-${t.id}`);
            if(el) {
                const diff = Math.floor((Date.now() - t.inicioRaw) / 1000);
                const h = Math.floor(diff / 3600).toString().padStart(2, '0');
                const m = Math.floor((diff % 3600) / 60).toString().padStart(2, '0');
                const s = (diff % 60).toString().padStart(2, '0');
                el.innerText = `${h}:${m}:${s}`;
            }
        });
    }, 1000);

    render();
</script>
</body>
</html>
