<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Produtividade - Marcos Renan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d1117; --card: #161b22; --border: #30363d;
            --primary: #58a6ff; --ok: #238636; --danger: #f85149;
            --warning: #d29922; --text: #c9d1d9; --text-dim: #8b949e;
            --pomodoro: #eb5757;
            --trabalho: #58a6ff; --estudo: #a371f7; --pessoal: #3fb950; --saude: #f85149;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; line-height: 1.6; }
        .container { max-width: 1100px; margin: auto; }

        /* Header */
        .header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 25px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        .header h1 { margin: 0; font-weight: 800; letter-spacing: -1px; }
        #clock-container { text-align: right; }
        #clock { font-family: 'JetBrains Mono'; color: var(--primary); font-size: 1.5rem; display: block; }
        #date-display { font-size: 0.85rem; color: var(--text-dim); }

        /* Dashboard Stats */
        .dashboard-row { display: grid; grid-template-columns: 1fr 300px; gap: 20px; margin-bottom: 30px; }
        @media (max-width: 850px) { .dashboard-row { grid-template-columns: 1fr; } }

        .stats-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; display: flex; align-items: center; gap: 25px; }
        .progress-circle-container { flex: 1; }
        .progress-info { display: flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 8px; font-weight: 600; }
        .progress-bar-bg { background: #010409; height: 10px; border-radius: 10px; overflow: hidden; border: 1px solid var(--border); }
        #progress-fill { background: linear-gradient(90deg, var(--primary), var(--ok)); width: 0%; height: 100%; transition: 1s cubic-bezier(0.17, 0.67, 0.83, 0.67); }

        /* Pomodoro */
        .pomodoro-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; border-left: 5px solid var(--pomodoro); text-align: center; }
        .pomo-timer { font-family: 'JetBrains Mono'; font-size: 2rem; font-weight: bold; color: var(--pomodoro); margin: 5px 0; }
        .pomo-controls { display: flex; justify-content: center; gap: 10px; }
        .pomo-controls button { background: #010409; border: 1px solid var(--pomodoro); color: var(--pomodoro); padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; font-weight: bold; }
        .pomo-controls button:hover { background: var(--pomodoro); color: white; }

        /* Main Grid */
        .main-grid { display: grid; grid-template-columns: 1fr 350px; gap: 30px; }
        @media (max-width: 850px) { .main-grid { grid-template-columns: 1fr; } }

        /* Forms */
        .form-container { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 12px; position: sticky; top: 20px; }
        .input-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        label { font-size: 0.7rem; font-weight: bold; color: var(--text-dim); text-transform: uppercase; }
        input, select { background: #010409; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 8px; outline: none; }
        input:focus { border-color: var(--primary); }
        .btn-add { width: 100%; background: var(--primary); color: #0d1117; border: none; padding: 14px; border-radius: 8px; font-weight: 800; cursor: pointer; }

        /* Tasks */
        .section-title { font-size: 0.8rem; color: var(--text-dim); margin-bottom: 15px; display: flex; align-items: center; gap: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .section-title::after { content: ""; flex: 1; height: 1px; background: var(--border); }
        
        .task-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 18px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; position: relative; overflow: hidden; }
        .task-category-tag { position: absolute; left: 0; top: 0; bottom: 0; width: 4px; }
        
        .task-info h3 { margin: 0 0 8px 0; font-size: 1.1rem; }
        .task-meta { font-size: 0.75rem; color: var(--text-dim); display: flex; gap: 15px; }
        .tag { font-size: 0.65rem; padding: 2px 8px; border-radius: 4px; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; display: inline-block; }

        .timer-badge { font-family: 'JetBrains Mono'; background: #010409; padding: 4px 8px; border-radius: 4px; color: var(--primary); border: 1px solid #21262d; }
        .btn-check { background: var(--ok); color: white; border: none; padding: 10px 18px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-delete { background: transparent; color: var(--danger); border: 1px solid var(--danger); padding: 8px 12px; border-radius: 8px; cursor: pointer; }
        
        .history-item { opacity: 0.7; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>ProFlow <span style="font-weight: 300; color: var(--text-dim);">V2.0</span></h1>
        <div id="clock-container">
            <span id="clock">00:00:00</span>
            <span id="date-display">...</span>
        </div>
    </div>

    <!-- Stats & Pomodoro Row -->
    <div class="dashboard-row">
        <div class="stats-card">
            <div class="progress-circle-container">
                <div class="progress-info">
                    <span><i class="fa-solid fa-chart-line"></i> Progresso Diário</span>
                    <span id="progress-percent">0%</span>
                </div>
                <div class="progress-bar-bg">
                    <div id="progress-fill"></div>
                </div>
            </div>
            <div style="border-left: 1px solid var(--border); padding-left: 20px;">
                <div style="font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase;">Total Focado Hoje</div>
                <div id="total-focus-time" style="font-family: 'JetBrains Mono'; font-size: 1.4rem; color: var(--primary); font-weight: bold;">00:00:00</div>
            </div>
        </div>

        <div class="pomodoro-card">
            <div style="font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px;">Timer Pomodoro</div>
            <div class="pomo-timer" id="pomo-display">25:00</div>
            <div class="pomo-controls">
                <button onclick="togglePomodoro()" id="pomo-btn">START</button>
                <button onclick="resetPomodoro()"><i class="fa-solid fa-rotate-right"></i></button>
            </div>
        </div>
    </div>

    <div class="main-grid">
        <!-- Listas -->
        <div class="left-col">
            <div class="section-title">Em Andamento</div>
            <div id="active-tasks"></div>

            <div class="section-title" style="margin-top: 40px;">Concluídas Hoje</div>
            <div id="completed-tasks"></div>
        </div>

        <!-- Cadastro -->
        <div class="right-col">
            <div class="form-container">
                <div class="section-title">Nova Atividade</div>
                <div class="input-group">
                    <label>O que será feito?</label>
                    <input type="text" id="task-title" placeholder="Ex: Analisar KPIs">
                </div>
                <div class="input-group">
                    <label>Categoria</label>
                    <select id="task-category">
                        <option value="Trabalho">Trabalho</option>
                        <option value="Estudo">Estudo</option>
                        <option value="Pessoal">Pessoal</option>
                        <option value="Saúde">Saúde</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Link / Ref</label>
                    <input type="text" id="task-link" placeholder="https://...">
                </div>
                <button class="btn-add" onclick="createTask()">INICIAR TAREFA</button>
            </div>
        </div>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('proflow_v3')) || { ativas: [], concluidas: [] };
    
    // Pomodoro Vars
    let pomoTime = 25 * 60;
    let pomoInterval = null;
    let isPaused = true;

    function save() {
        localStorage.setItem('proflow_v3', JSON.stringify(db));
        render();
    }

    function createTask() {
        const title = document.getElementById('task-title').value;
        const category = document.getElementById('task-category').value;
        const link = document.getElementById('task-link').value;
        
        if(!title) return alert("Defina o nome da tarefa!");

        const agora = new Date();
        const novaTarefa = {
            id: Date.now(),
            titulo: title,
            categoria: category,
            link: link,
            dataStr: agora.toLocaleDateString('pt-BR'),
            inicio: agora.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'}),
            inicioRaw: agora.getTime(),
            duracaoSegundos: 0
        };

        db.ativas.push(novaTarefa);
        document.getElementById('task-title').value = '';
        save();
    }

    function finishTask(id) {
        const index = db.ativas.findIndex(t => t.id === id);
        const tarefa = db.ativas.splice(index, 1)[0];
        const agora = new Date();
        tarefa.fim = agora.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
        tarefa.duracaoSegundos = Math.floor((agora.getTime() - tarefa.inicioRaw) / 1000);
        db.concluidas.unshift(tarefa);
        save();
    }

    function deleteTask(id, lista) {
        if(confirm("Excluir registro?")) {
            db[lista] = db[lista].filter(t => t.id !== id);
            save();
        }
    }

    // Pomodoro
    function togglePomodoro() {
        const btn = document.getElementById('pomo-btn');
        if(isPaused) {
            isPaused = false;
            btn.innerText = "PAUSE";
            pomoInterval = setInterval(() => {
                pomoTime--;
                updatePomoDisplay();
                if(pomoTime <= 0) {
                    clearInterval(pomoInterval);
                    new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg').play();
                    resetPomodoro();
                }
            }, 1000);
        } else {
            isPaused = true;
            btn.innerText = "START";
            clearInterval(pomoInterval);
        }
    }

    function resetPomodoro() {
        clearInterval(pomoInterval);
        isPaused = true;
        pomoTime = 25 * 60;
        document.getElementById('pomo-btn').innerText = "START";
        updatePomoDisplay();
    }

    function updatePomoDisplay() {
        const m = Math.floor(pomoTime / 60).toString().padStart(2, '0');
        const s = (pomoTime % 60).toString().padStart(2, '0');
        document.getElementById('pomo-display').innerText = `${m}:${s}`;
    }

    // Cálculos de Status
    function updateDashboard() {
        const total = db.ativas.length + db.concluidas.length;
        const percent = total === 0 ? 0 : Math.round((db.concluidas.length / total) * 100);
        document.getElementById('progress-percent').innerText = percent + '%';
        document.getElementById('progress-fill').style.width = percent + '%';

        let totalSegundos = db.concluidas.reduce((acc, t) => acc + (t.duracaoSegundos || 0), 0);
        const h = Math.floor(totalSegundos / 3600).toString().padStart(2, '0');
        const m = Math.floor((totalSegundos % 3600) / 60).toString().padStart(2, '0');
        const s = (totalSegundos % 60).toString().padStart(2, '0');
        document.getElementById('total-focus-time').innerText = `${h}:${m}:${s}`;
    }

    function render() {
        const activeContainer = document.getElementById('active-tasks');
        const completedContainer = document.getElementById('completed-tasks');
        
        activeContainer.innerHTML = '';
        completedContainer.innerHTML = '';

        db.ativas.forEach(t => {
            const catColor = `var(--${t.categoria.toLowerCase()})`;
            activeContainer.innerHTML += `
                <div class="task-card">
                    <div class="task-category-tag" style="background: ${catColor}"></div>
                    <div class="task-info">
                        <span class="tag" style="background: ${catColor}22; color: ${catColor}">${t.categoria}</span>
                        <h3>${t.titulo}</h3>
                        <div class="task-meta">
                            <span><i class="fa-regular fa-clock"></i> ${t.inicio}</span>
                            <span class="timer-badge" id="timer-${t.id}">00:00:00</span>
                        </div>
                    </div>
                    <button class="btn-check" onclick="finishTask(${t.id})"><i class="fa-solid fa-check"></i></button>
                </div>
            `;
        });

        db.concluidas.forEach(t => {
            const catColor = `var(--${t.categoria.toLowerCase()})`;
            completedContainer.innerHTML += `
                <div class="task-card history-item">
                    <div class="task-category-tag" style="background: ${catColor}; opacity: 0.5"></div>
                    <div class="task-info">
                        <span class="tag" style="background: #30363d; color: var(--text-dim)">${t.categoria}</span>
                        <h3 style="font-size: 0.95rem">${t.titulo}</h3>
                        <div class="task-meta">
                            <span>${t.inicio} às ${t.fim}</span>
                        </div>
                    </div>
                    <button class="btn-delete" onclick="deleteTask(${t.id}, 'concluidas')"><i class="fa-solid fa-trash"></i></button>
                </div>
            `;
        });
        updateDashboard();
    }

    // Loop Clock e Ativas
    setInterval(() => {
        const agora = new Date();
        document.getElementById('clock').innerText = agora.toLocaleTimeString('pt-BR');
        document.getElementById('date-display').innerText = agora.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'short' });
        
        db.ativas.forEach(t => {
            const el = document.getElementById(`timer-${t.id}`);
            if(el) {
                const diff = Math.floor((Date.now() - t.inicioRaw) / 1000);
                const h = Math.floor(diff / 3600).toString().padStart(2, '0');
                const m = Math.floor((diff % 3600) / 60).toString().padStart(2, '0');
                const s = (diff % 60).toString().padStart(2, '0');
                el.innerText = `${h}:${m}:${s}`;
            }
        });
    }, 1000);

    render();
</script>
</body>
</html>
