<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MEU WORKFLOW DIÁRIO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0b0e14; --card: #161b22; --header: #21262d;
            --primary: #58a6ff; --ok: #3fb950; --warn: #d29922; --danger: #f85149;
            --text-main: #c9d1d9; --text-dim: #8b949e; --input-bg: #0d1117;
        }

        body.light-mode {
            --bg: #f6f8fa; --card: #ffffff; --header: #d0d7de;
            --primary: #0969da; --ok: #1a7f37; --warn: #9a6700; --danger: #cf222e;
            --text-main: #24292f; --text-dim: #57606a; --input-bg: #ffffff;
        }

        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-main); margin: 0; padding: 15px; transition: 0.3s; }
        .container { max-width: 1200px; margin: auto; }

        .page-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px; background: var(--card); border-radius: 12px;
            border: 1px solid var(--header); margin-bottom: 20px;
        }

        .admin-panel { background: var(--card); border: 1px solid var(--header); border-radius: 16px; padding: 20px; margin-bottom: 20px; }
        .form-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
        @media (min-width: 768px) { .form-grid { grid-template-columns: 2fr 2fr 1fr; } }

        .form-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 0.7rem; color: var(--primary); font-weight: 800; text-transform: uppercase; }
        input, select { background: var(--input-bg); border: 1px solid var(--header); color: var(--text-main); padding: 12px; border-radius: 8px; outline: none; }

        .btn-add { 
            background: var(--primary); color: #fff; border: none; border-radius: 8px; 
            cursor: pointer; font-weight: 800; padding: 12px; margin-top: 15px; width: 100%; transition: 0.2s;
        }
        .btn-add:hover { opacity: 0.8; }

        .grid-cards { display: grid; grid-template-columns: 1fr; gap: 15px; }
        @media (min-width: 768px) { .grid-cards { grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); } }

        .card { 
            background: var(--card); border: 1px solid var(--header); border-radius: 14px; 
            padding: 18px; border-left: 6px solid var(--primary); position: relative;
            transition: transform 0.2s;
        }
        .card:hover { transform: translateY(-3px); }
        .card.warn { border-left-color: var(--warn); }
        .card.danger { border-left-color: var(--danger); }

        .timer-box { background: var(--input-bg); border-radius: 8px; padding: 10px; margin: 12px 0; border: 1px solid var(--header); text-align: center; }
        .timer-val { font-family: 'JetBrains Mono'; font-size: 1.2rem; color: var(--primary); }

        .link-chip {
            display: inline-flex; align-items: center; gap: 8px; background: rgba(88, 166, 255, 0.1);
            color: var(--primary); padding: 6px 12px; border-radius: 20px; text-decoration: none;
            font-size: 0.8rem; font-weight: 600; margin-top: 10px; border: 1px solid var(--primary);
        }

        .btn-done { background: var(--ok); color: white; border: none; padding: 10px; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 10px; }
        
        .hidden { display: none; }
        #page-clock { font-family: 'JetBrains Mono'; font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <div class="page-header">
        <div><h2 style="margin:0"><i class="fa-solid fa-list-check"></i> MEU DIA</h2></div>
        <div id="page-clock">00:00:00</div>
        <button onclick="document.body.classList.toggle('light-mode')" style="background:none; border:none; color:var(--text-dim); cursor:pointer"><i class="fa-solid fa-circle-half-stroke"></i></button>
    </div>

    <div class="admin-panel">
        <div class="form-grid">
            <div class="form-group">
                <label>Atividade / Projeto</label>
                <input id="task-title" placeholder="Ex: Relatório Mensal">
            </div>
            <div class="form-group">
                <label>Link Útil (Planilha, Docs, URL)</label>
                <input id="task-link" placeholder="https://...">
            </div>
            <div class="form-group">
                <label>Prioridade</label>
                <select id="task-priority">
                    <option value="normal">Normal</option>
                    <option value="urgente">Urgente</option>
                </select>
            </div>
        </div>
        <button class="btn-add" onclick="addTask()">COMEÇAR TAREFA</button>
    </div>

    <div id="task-list" class="grid-cards"></div>
</div>

<script>
    let tasks = JSON.parse(localStorage.getItem('my_tasks')) || {};

    function saveTasks() {
        localStorage.setItem('my_tasks', JSON.stringify(tasks));
    }

    function addTask() {
        const title = document.getElementById('task-title').value;
        const link = document.getElementById('task-link').value;
        const priority = document.getElementById('task-priority').value;

        if (!title) return alert("Dê um nome à atividade!");

        const id = 'task_' + Date.now();
        tasks[id] = {
            title: title,
            link: link,
            priority: priority,
            start: Date.now()
        };

        document.getElementById('task-title').value = "";
        document.getElementById('task-link').value = "";
        saveTasks();
        renderTasks();
    }

    function removeTask(id) {
        delete tasks[id];
        saveTasks();
        renderTasks();
    }

    function formatTime(ms) {
        const h = Math.floor(ms/3600000), m = Math.floor((ms%3600000)/60000), s = Math.floor((ms%60000)/1000);
        return `${h}h ${m}m ${s}s`;
    }

    function renderTasks() {
        const container = document.getElementById('task-list');
        container.innerHTML = "";

        Object.keys(tasks).forEach(id => {
            const task = tasks[id];
            const div = document.createElement('div');
            div.className = `card`;
            div.id = id;

            div.innerHTML = `
                <div style="font-weight:800; font-size:1.1rem;">${task.title}</div>
                <div class="timer-box">
                    <span class="timer-val" id="timer-${id}">0h 0m 0s</span>
                </div>
                ${task.link ? `<a href="${task.link}" target="_blank" class="link-chip"><i class="fa-solid fa-link"></i> Abrir Documento</a>` : ''}
                <button class="btn-done" onclick="removeTask('${id}')">CONCLUÍDO</button>
            `;
            container.prepend(div);
        });
    }

    // Atualização em tempo real
    setInterval(() => {
        document.getElementById('page-clock').innerText = new Date().toLocaleTimeString('pt-BR');
        
        const now = Date.now();
        Object.keys(tasks).forEach(id => {
            const timerEl = document.getElementById(`timer-${id}`);
            const cardEl = document.getElementById(id);
            if (timerEl) {
                const diff = now - tasks[id].start;
                timerEl.innerText = formatTime(diff);

                // Lógica de cores baseada no tempo (opcional)
                const hours = diff / 3600000;
                if (hours >= 4) cardEl.classList.add('danger');
                else if (hours >= 2) cardEl.classList.add('warn');
            }
        });
    }, 1000);

    renderTasks();
</script>

</body>
</html>
