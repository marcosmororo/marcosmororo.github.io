<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProdFlow Enterprise | Marcos Renan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --card-hover: #1c2128;
            --border: #30363d;
            --primary: #58a6ff;
            --primary-muted: rgba(88, 166, 255, 0.15);
            --success: #238636;
            --danger: #f85149;
            --warning: #d29922;
            --text-main: #e6edf3;
            --text-secondary: #8b949e;
            --font-mono: 'JetBrains Mono', monospace;
            
            /* Cores de Categoria - Padronizadas */
            --tag-trabalho: #58a6ff;
            --tag-reuniao: #d29922;
            --tag-estudo: #a371f7;
            --tag-pessoal: #3fb950;
        }

        * { box-sizing: border-box; }
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
            background-color: var(--bg); 
            color: var(--text-main); 
            margin: 0; 
            padding: 24px;
            -webkit-font-smoothing: antialiased;
        }

        .container { max-width: 1280px; margin: 0 auto; }

        /* HEADER PROFISSIONAL */
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 32px;
        }

        .brand h1 { margin: 0; font-size: 1.5rem; font-weight: 700; letter-spacing: -0.5px; }
        .brand span { color: var(--primary); }
        .user-info { text-align: right; }
        #digital-clock { font-family: var(--font-mono); font-size: 1.4rem; font-weight: 500; color: var(--primary); }
        #current-date { display: block; font-size: 0.85rem; color: var(--text-secondary); margin-top: 4px; }

        /* DASHBOARD GRID */
        .stats-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 24px;
            margin-bottom: 32px;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
        }

        .progress-section { display: flex; align-items: center; gap: 32px; }
        .progress-data { flex: 1; }
        .progress-header { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 0.85rem; font-weight: 600; }
        
        .progress-track { background: #010409; height: 8px; border-radius: 4px; overflow: hidden; border: 1px solid var(--border); }
        #progress-bar { background: var(--primary); height: 100%; width: 0%; transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); }

        /* POMODORO MINIMALISTA */
        .pomo-container { text-align: center; border-left: 4px solid var(--danger); }
        .pomo-time { font-family: var(--font-mono); font-size: 2rem; font-weight: 700; margin-bottom: 12px; }
        .pomo-actions { display: flex; gap: 8px; justify-content: center; }
        .btn-pomo { 
            background: #21262d; border: 1px solid var(--border); color: var(--text-main);
            padding: 6px 16px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; font-weight: 600;
        }
        .btn-pomo:hover { background: #30363d; }
        .btn-pomo.active { border-color: var(--danger); color: var(--danger); }

        /* MAIN CONTENT */
        .content-grid { display: grid; grid-template-columns: 1fr 360px; gap: 32px; }

        /* TASK CARDS */
        .task-list-header { 
            font-size: 0.75rem; color: var(--text-secondary); font-weight: 700; 
            text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; 
            display: flex; align-items: center; gap: 8px;
        }
        .task-list-header::after { content: ""; flex: 1; height: 1px; background: var(--border); }

        .task-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px 20px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s ease;
        }
        .task-card:hover { border-color: var(--text-secondary); background: var(--card-hover); }

        .task-main { display: flex; flex-direction: column; gap: 8px; flex: 1; }
        .task-title { margin: 0; font-size: 1rem; font-weight: 600; color: var(--text-main); }
        
        .task-meta { display: flex; gap: 16px; align-items: center; font-size: 0.8rem; color: var(--text-secondary); }
        .badge { padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; }
        
        /* LINK DE REUNIÃO DESTAQUE */
        .meeting-link-btn {
            background: var(--primary-muted);
            color: var(--primary);
            text-decoration: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.75rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border: 1px solid transparent;
            transition: 0.2s;
        }
        .meeting-link-btn:hover { background: var(--primary); color: #0d1117; border-color: var(--primary); }

        .time-counter { font-family: var(--font-mono); color: var(--primary); font-weight: 600; background: #010409; padding: 2px 6px; border-radius: 4px; border: 1px solid var(--border); }

        .btn-complete {
            background: var(--success); color: white; border: none; width: 40px; height: 40px;
            border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center;
            margin-left: 20px; transition: 0.2s;
        }
        .btn-complete:hover { filter: brightness(1.2); transform: scale(1.05); }

        /* FORMULÁRIO LATERAL */
        .sidebar-form { position: sticky; top: 24px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 0.75rem; font-weight: 600; color: var(--text-secondary); margin-bottom: 8px; text-transform: uppercase; }
        
        input, select {
            width: 100%; background: #010409; border: 1px solid var(--border);
            color: white; padding: 10px 12px; border-radius: 6px; font-size: 0.9rem;
            outline: none; transition: border-color 0.2s;
        }
        input:focus, select:focus { border-color: var(--primary); }

        .btn-submit {
            width: 100%; background: var(--primary); color: #0d1117; border: none;
            padding: 12px; border-radius: 6px; font-weight: 700; cursor: pointer;
            margin-top: 8px; transition: 0.2s;
        }
        .btn-submit:hover { filter: brightness(1.1); }

        #meeting-details { display: none; padding: 12px; background: rgba(210, 153, 34, 0.05); border: 1px dashed var(--warning); border-radius: 6px; margin-bottom: 16px; }

        .history-card { opacity: 0.6; padding: 12px 20px; }
        .btn-clear { background: transparent; border: 1px solid var(--danger); color: var(--danger); padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; cursor: pointer; }
        .btn-clear:hover { background: var(--danger); color: white; }

        @media (max-width: 900px) {
            .stats-grid, .content-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <header class="app-header">
        <div class="brand">
            <h1>PROD<span>FLOW</span> ENTERPRISE</h1>
        </div>
        <div class="user-info">
            <div id="digital-clock">00:00:00</div>
            <div id="current-date">Carregando data...</div>
        </div>
    </header>

    <div class="stats-grid">
        <div class="card progress-section">
            <div class="progress-data">
                <div class="progress-header">
                    <span>PRODUTIVIDADE DO DIA</span>
                    <span id="progress-text">0%</span>
                </div>
                <div class="progress-track">
                    <div id="progress-bar"></div>
                </div>
                <div style="display: flex; gap: 16px; margin-top: 12px; font-size: 0.75rem; color: var(--text-secondary);">
                    <span id="count-active">Ativas: 0</span>
                    <span id="count-done">Concluídas: 0</span>
                </div>
            </div>
            <div style="text-align: right; border-left: 1px solid var(--border); padding-left: 24px;">
                <div style="font-size: 0.7rem; font-weight: 600; color: var(--text-secondary);">TEMPO TOTAL FOCADO</div>
                <div id="total-time-display" style="font-family: var(--font-mono); font-size: 1.25rem; color: var(--primary);">00h 00m</div>
            </div>
        </div>

        <div class="card pomo-container">
            <div class="pomo-time" id="pomo-display">25:00</div>
            <div class="pomo-actions">
                <button class="btn-pomo" id="pomo-start-btn" onclick="togglePomodoro()">INICIAR</button>
                <button class="btn-pomo" onclick="resetPomodoro()">RESET</button>
            </div>
        </div>
    </div>

    <div class="content-grid">
        <main>
            <div class="task-list-header">Tarefas em Execução</div>
            <div id="active-tasks-container"></div>

            <div class="task-list-header" style="margin-top: 40px;">Logs de Atividades Concluídas</div>
            <div id="history-tasks-container"></div>
        </main>

        <aside class="sidebar-form">
            <div class="card">
                <div class="task-list-header">Nova Atividade</div>
                
                <div class="form-group">
                    <label>Título da tarefa</label>
                    <input type="text" id="input-title" placeholder="Descreva a atividade...">
                </div>

                <div class="form-group">
                    <label>Categoria</label>
                    <select id="input-category" onchange="handleCategoryChange()">
                        <option value="Trabalho">Trabalho</option>
                        <option value="Reuniao">Reunião / Call</option>
                        <option value="Estudo">Estudo</option>
                        <option value="Pessoal">Pessoal</option>
                    </select>
                </div>

                <div id="meeting-details">
                    <div class="form-group">
                        <label>Agendamento (Data/Hora)</label>
                        <input type="datetime-local" id="input-datetime">
                    </div>
                </div>

                <div class="form-group">
                    <label>Link de referência / Reunião</label>
                    <input type="text" id="input-link" placeholder="https://exemplo.com">
                </div>

                <button class="btn-submit" onclick="addTask()">ADICIONAR À LISTA</button>
            </div>
        </aside>
    </div>
</div>

<script>
    let state = JSON.parse(localStorage.getItem('prodflow_enterprise_v1')) || { active: [], history: [] };
    let pomoSeconds = 1500;
    let pomoRunning = false;
    let pomoInterval;

    // --- Core Functions ---
    function saveState() {
        localStorage.setItem('prodflow_enterprise_v1', JSON.stringify(state));
        render();
    }

    function handleCategoryChange() {
        const cat = document.getElementById('input-category').value;
        document.getElementById('meeting-details').style.display = (cat === 'Reuniao') ? 'block' : 'none';
    }

    function addTask() {
        const title = document.getElementById('input-title').value;
        const category = document.getElementById('input-category').value;
        const link = document.getElementById('input-link').value;
        const schedule = document.getElementById('input-datetime').value;

        if (!title) { alert("O título é obrigatório."); return; }

        const newTask = {
            id: Date.now(),
            title,
            category,
            link: formatLink(link),
            schedule,
            startAt: Date.now(),
            startTimeStr: new Date().toLocaleTimeString('pt-BR', {hour: '2-digit', minute: '2-digit'}),
            duration: 0
        };

        state.active.push(newTask);
        clearForm();
        saveState();
    }

    function formatLink(url) {
        if (!url) return '';
        return url.startsWith('http') ? url : `https://${url}`;
    }

    function clearForm() {
        document.getElementById('input-title').value = '';
        document.getElementById('input-link').value = '';
        document.getElementById('input-datetime').value = '';
        document.getElementById('input-category').value = 'Trabalho';
        handleCategoryChange();
    }

    function completeTask(id) {
        const index = state.active.findIndex(t => t.id === id);
        if (index === -1) return;

        const task = state.active.splice(index, 1)[0];
        const now = Date.now();
        task.endAtStr = new Date().toLocaleTimeString('pt-BR', {hour: '2-digit', minute: '2-digit'});
        task.duration = Math.floor((now - task.startAt) / 1000);
        
        state.history.unshift(task);
        saveState();
    }

    function deleteTask(id) {
        state.history = state.history.filter(t => t.id !== id);
        saveState();
    }

    // --- Pomodoro ---
    function togglePomodoro() {
        const btn = document.getElementById('pomo-start-btn');
        if (!pomoRunning) {
            pomoRunning = true;
            btn.innerText = "PAUSAR";
            btn.classList.add('active');
            pomoInterval = setInterval(() => {
                pomoSeconds--;
                updatePomoUI();
                if (pomoSeconds <= 0) {
                    clearInterval(pomoInterval);
                    alert("Sessão de foco concluída!");
                    resetPomodoro();
                }
            }, 1000);
        } else {
            pomoRunning = false;
            btn.innerText = "RETOMAR";
            btn.classList.remove('active');
            clearInterval(pomoInterval);
        }
    }

    function resetPomodoro() {
        clearInterval(pomoInterval);
        pomoRunning = false;
        pomoSeconds = 1500;
        document.getElementById('pomo-start-btn').innerText = "INICIAR";
        document.getElementById('pomo-start-btn').classList.remove('active');
        updatePomoUI();
    }

    function updatePomoUI() {
        const m = Math.floor(pomoSeconds / 60).toString().padStart(2, '0');
        const s = (pomoSeconds % 60).toString().padStart(2, '0');
        document.getElementById('pomo-display').innerText = `${m}:${s}`;
    }

    // --- UI Rendering ---
    function render() {
        const activeList = document.getElementById('active-tasks-container');
        const historyList = document.getElementById('history-tasks-container');
        
        activeList.innerHTML = '';
        historyList.innerHTML = '';

        state.active.forEach(task => {
            const catClass = task.category.toLowerCase();
            const hasMeeting = task.schedule ? `<span style="color:var(--warning); font-weight:600;"><i class="fa-regular fa-calendar"></i> ${new Date(task.schedule).toLocaleString('pt-BR', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'})}</span>` : '';
            const linkDisplay = task.link ? `<a href="${task.link}" target="_blank" class="meeting-link-btn"><i class="fa-solid fa-arrow-up-right-from-square"></i> ACESSAR LINK</a>` : '';

            activeList.innerHTML += `
                <div class="task-card">
                    <div class="task-main">
                        <div style="display:flex; align-items:center; gap:10px;">
                            <span class="badge" style="background: var(--primary-muted); color: var(--tag-${catClass})">${task.category}</span>
                            <h3 class="task-title">${task.title}</h3>
                        </div>
                        <div class="task-meta">
                            ${hasMeeting}
                            ${linkDisplay}
                            <span><i class="fa-regular fa-clock"></i> Início: ${task.startTimeStr}</span>
                            <span class="time-counter" id="counter-${task.id}">00:00:00</span>
                        </div>
                    </div>
                    <button class="btn-complete" onclick="completeTask(${task.id})"><i class="fa-solid fa-check"></i></button>
                </div>
            `;
        });

        state.history.forEach(task => {
            historyList.innerHTML += `
                <div class="task-card history-card">
                    <div class="task-main">
                        <h3 class="task-title" style="font-size: 0.9rem;">${task.title}</h3>
                        <div class="task-meta">
                            <span>Fim: ${task.endAtStr}</span>
                            <span>Duração: ${Math.floor(task.duration/60)} min</span>
                        </div>
                    </div>
                    <button class="btn-clear" onclick="deleteTask(${task.id})"><i class="fa-solid fa-trash"></i></button>
                </div>
            `;
        });

        updateStats();
    }

    function updateStats() {
        const total = state.active.length + state.history.length;
        const done = state.history.length;
        const percent = total === 0 ? 0 : Math.round((done / total) * 100);
        
        document.getElementById('progress-bar').style.width = percent + '%';
        document.getElementById('progress-text').innerText = percent + '%';
        document.getElementById('count-active').innerText = `Ativas: ${state.active.length}`;
        document.getElementById('count-done').innerText = `Concluídas: ${state.history.length}`;

        const totalSec = state.history.reduce((acc, t) => acc + t.duration, 0);
        const h = Math.floor(totalSec / 3600);
        const m = Math.floor((totalSec % 3600) / 60);
        document.getElementById('total-time-display').innerText = `${h}h ${m}m`;
    }

    // --- Timers de Sistema ---
    setInterval(() => {
        const now = new Date();
        document.getElementById('digital-clock').innerText = now.toLocaleTimeString('pt-BR');
        document.getElementById('current-date').innerText = now.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' });

        state.active.forEach(task => {
            const el = document.getElementById(`counter-${task.id}`);
            if (el) {
                const diff = Math.floor((Date.now() - task.startAt) / 1000);
                const h = Math.floor(diff / 3600).toString().padStart(2, '0');
                const m = Math.floor((diff % 3600) / 60).toString().padStart(2, '0');
                const s = (diff % 60).toString().padStart(2, '0');
                el.innerText = `${h}:${m}:${s}`;
            }
        });
    }, 1000);

    render();
</script>
</body>
</html>
