<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProdFlow Elite | Workspace</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d1117; --card: #161b22; --card-hover: #1c2128; --border: #30363d;
            --primary: #58a6ff; --success: #238636; --danger: #f85149; --warning: #d29922;
            --text-main: #e6edf3; --text-secondary: #8b949e;
            --p-high: #ff7b72; --p-medium: #d29922; --p-low: #3fb950;
        }

        * { box-sizing: border-box; transition: background 0.2s, border 0.2s; }
        body { 
            font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text-main); 
            margin: 0; padding: 24px; display: flex; justify-content: center;
        }

        .container { width: 100%; max-width: 1300px; }

        /* HEADER */
        .app-header {
            display: flex; justify-content: space-between; align-items: center;
            padding-bottom: 20px; border-bottom: 1px solid var(--border); margin-bottom: 30px;
        }
        .brand h1 { margin: 0; font-size: 1.4rem; font-weight: 700; letter-spacing: -1px; }
        .brand span { color: var(--primary); }
        .clock-box { text-align: right; }
        #digital-clock { font-family: 'JetBrains Mono'; font-size: 1.5rem; color: var(--primary); }
        #current-date { font-size: 0.8rem; color: var(--text-secondary); }

        /* DASHBOARD */
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 10px; position: relative; overflow: hidden; }
        .stat-label { font-size: 0.7rem; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 10px; display: block; }
        .stat-value { font-size: 1.6rem; font-weight: 700; font-family: 'JetBrains Mono'; }
        .progress-mini { height: 4px; background: #010409; margin-top: 15px; border-radius: 2px; }
        #progress-bar { height: 100%; background: var(--primary); width: 0%; transition: width 1s; }

        /* MAIN LAYOUT */
        .main-layout { display: grid; grid-template-columns: 1fr 380px; gap: 30px; }

        /* FORM */
        .panel { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 24px; position: sticky; top: 20px; }
        .panel-title { font-size: 0.8rem; font-weight: 700; margin-bottom: 20px; color: var(--text-secondary); border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        
        .field { margin-bottom: 16px; }
        .field label { display: block; font-size: 0.75rem; margin-bottom: 6px; font-weight: 600; color: var(--text-secondary); }
        input, select { 
            width: 100%; background: #010409; border: 1px solid var(--border); color: #fff; 
            padding: 10px; border-radius: 6px; outline: none; 
        }
        input:focus { border-color: var(--primary); }

        .btn-primary { 
            width: 100%; background: var(--primary); color: #0d1117; border: none; 
            padding: 12px; border-radius: 6px; font-weight: 700; cursor: pointer; margin-top: 10px;
        }
        .btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); }

        /* TASK CARDS */
        .task-card { 
            background: var(--card); border: 1px solid var(--border); border-radius: 8px; 
            padding: 16px; margin-bottom: 12px; display: flex; align-items: center; 
            position: relative; animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        
        .priority-indicator { width: 4px; height: 40px; border-radius: 4px; margin-right: 16px; }
        .task-info { flex: 1; }
        .task-header { display: flex; align-items: center; gap: 10px; margin-bottom: 5px; }
        .task-title { margin: 0; font-size: 1rem; font-weight: 600; }
        .p-badge { font-size: 0.6rem; padding: 2px 6px; border-radius: 4px; font-weight: 800; text-transform: uppercase; }

        .task-footer { display: flex; gap: 15px; font-size: 0.75rem; color: var(--text-secondary); align-items: center; }
        .link-action { 
            color: var(--primary); text-decoration: none; font-weight: 700; 
            display: flex; align-items: center; gap: 4px; background: rgba(88,166,255,0.1);
            padding: 4px 8px; border-radius: 4px;
        }
        .link-action:hover { background: var(--primary); color: #0d1117; }

        .btn-check { 
            background: var(--success); color: white; border: none; width: 36px; height: 36px; 
            border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        
        /* ALERTA REUNIAO */
        .pulse-alert { animation: pulse 2s infinite; border-color: var(--warning) !important; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(210, 153, 34, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(210, 153, 34, 0); } 100% { box-shadow: 0 0 0 0 rgba(210, 153, 34, 0); } }

        @media (max-width: 1000px) { .main-layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <header class="app-header">
        <div class="brand"><h1>PROD<span>FLOW</span> ELITE</h1></div>
        <div class="clock-box">
            <div id="digital-clock">00:00:00</div>
            <div id="current-date">...</div>
        </div>
    </header>

    <div class="dashboard">
        <div class="stat-card">
            <span class="stat-label">Conclusão Geral</span>
            <div class="stat-value" id="stat-percent">0%</div>
            <div class="progress-mini"><div id="progress-bar"></div></div>
        </div>
        <div class="stat-card">
            <span class="stat-label">Tempo em Foco (Hoje)</span>
            <div class="stat-value" id="stat-time">00h 00m</div>
        </div>
        <div class="stat-card">
            <span class="stat-label">Tarefas Ativas</span>
            <div class="stat-value" id="stat-active">0</div>
        </div>
    </div>

    <div class="main-layout">
        <div class="content">
            <div class="panel-title">Fila de Trabalho</div>
            <div id="active-list"></div>

            <div class="panel-title" style="margin-top: 40px;">Concluído</div>
            <div id="history-list" style="opacity: 0.5;"></div>
        </div>

        <aside>
            <div class="panel">
                <div class="panel-title">Nova Atividade</div>
                <div class="field">
                    <label>O que será feito?</label>
                    <input type="text" id="in-title" placeholder="Ex: Relatório Mensal">
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div class="field">
                        <label>Categoria</label>
                        <select id="in-cat" onchange="toggleMeeting()">
                            <option value="Trabalho">Trabalho</option>
                            <option value="Reuniao">Reunião</option>
                            <option value="Estudo">Estudo</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>Prioridade</label>
                        <select id="in-prior">
                            <option value="baixa">Baixa</option>
                            <option value="media">Média</option>
                            <option value="alta">Alta</option>
                        </select>
                    </div>
                </div>
                <div id="meeting-box" style="display:none;" class="field">
                    <label>Horário da Call</label>
                    <input type="datetime-local" id="in-time">
                </div>
                <div class="field">
                    <label>Link / Referência</label>
                    <input type="text" id="in-link" placeholder="https://...">
                </div>
                <button class="btn-primary" onclick="addTask()">ADICIONAR À LISTA</button>
            </div>
        </aside>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('proflow_elite_v2')) || { active: [], history: [] };

    function save() { 
        localStorage.setItem('proflow_elite_v2', JSON.stringify(db)); 
        render(); 
    }

    function toggleMeeting() {
        document.getElementById('meeting-box').style.display = (document.getElementById('in-cat').value === 'Reuniao') ? 'block' : 'none';
    }

    function addTask() {
        const title = document.getElementById('in-title').value;
        if(!title) return;

        const task = {
            id: Date.now(),
            title,
            cat: document.getElementById('in-cat').value,
            priority: document.getElementById('in-prior').value,
            link: formatUrl(document.getElementById('in-link').value),
            time: document.getElementById('in-time').value,
            startAt: Date.now(),
            timer: "00:00:00"
        };

        db.active.push(task);
        resetForm();
        save();
    }

    function formatUrl(url) {
        if(!url) return '';
        return url.startsWith('http') ? url : `https://${url}`;
    }

    function resetForm() {
        document.getElementById('in-title').value = '';
        document.getElementById('in-link').value = '';
        document.getElementById('in-time').value = '';
        toggleMeeting();
    }

    function finishTask(id) {
        const i = db.active.findIndex(t => t.id === id);
        const task = db.active.splice(i, 1)[0];
        task.duration = Math.floor((Date.now() - task.startAt) / 1000);
        db.history.unshift(task);
        save();
    }

    function deleteTask(id) {
        db.history = db.history.filter(t => t.id !== id);
        save();
    }

    function render() {
        const container = document.getElementById('active-list');
        const historyContainer = document.getElementById('history-list');
        container.innerHTML = '';
        historyContainer.innerHTML = '';

        db.active.forEach(t => {
            const pColor = t.priority === 'alta' ? 'var(--p-high)' : t.priority === 'media' ? 'var(--p-medium)' : 'var(--p-low)';
            const isNear = t.time && (new Date(t.time) - new Date() < 300000 && new Date(t.time) - new Date() > 0);
            
            container.innerHTML += `
                <div class="task-card ${isNear ? 'pulse-alert' : ''}">
                    <div class="priority-indicator" style="background:${pColor}"></div>
                    <div class="task-info">
                        <div class="task-header">
                            <h3 class="task-title">${t.title}</h3>
                            <span class="p-badge" style="border: 1px solid ${pColor}; color: ${pColor}">${t.priority}</span>
                        </div>
                        <div class="task-footer">
                            <span><i class="fa-regular fa-folder"></i> ${t.cat}</span>
                            ${t.time ? `<span style="color:var(--warning)"><i class="fa-regular fa-clock"></i> ${new Date(t.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>` : ''}
                            <span id="timer-${t.id}" style="font-family: 'JetBrains Mono'; color: var(--primary)">${t.timer}</span>
                            ${t.link ? `<a href="${t.link}" target="_blank" class="link-action"><i class="fa-solid fa-link"></i> LINK</a>` : ''}
                        </div>
                    </div>
                    <button class="btn-check" onclick="finishTask(${t.id})"><i class="fa-solid fa-check"></i></button>
                </div>
            `;
        });

        db.history.slice(0, 5).forEach(t => {
            historyContainer.innerHTML += `
                <div class="task-card" style="padding: 10px 16px;">
                    <div class="task-info">
                        <span style="font-size:0.9rem">${t.title}</span>
                        <div style="font-size:0.7rem; color:var(--text-secondary)">Duração: ${Math.floor(t.duration/60)} min</div>
                    </div>
                    <button onclick="deleteTask(${t.id})" style="background:none; border:none; color:var(--danger); cursor:pointer;"><i class="fa-solid fa-trash"></i></button>
                </div>
            `;
        });

        updateStats();
    }

    function updateStats() {
        const total = db.active.length + db.history.length;
        const perc = total === 0 ? 0 : Math.round((db.history.length / total) * 100);
        document.getElementById('progress-bar').style.width = perc + '%';
        document.getElementById('stat-percent').innerText = perc + '%';
        document.getElementById('stat-active').innerText = db.active.length;

        const sec = db.history.reduce((a, b) => a + b.duration, 0);
        document.getElementById('stat-time').innerText = `${Math.floor(sec/3600)}h ${Math.floor((sec%3600)/60)}m`;
    }

    setInterval(() => {
        const now = new Date();
        document.getElementById('digital-clock').innerText = now.toLocaleTimeString('pt-BR');
        document.getElementById('current-date').innerText = now.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' });

        db.active.forEach(t => {
            const diff = Math.floor((Date.now() - t.startAt) / 1000);
            const h = Math.floor(diff/3600).toString().padStart(2, '0');
            const m = Math.floor((diff%3600)/60).toString().padStart(2, '0');
            const s = (diff%60).toString().padStart(2, '0');
            const el = document.getElementById(`timer-${t.id}`);
            if(el) el.innerText = `${h}:${m}:${s}`;
        });
    }, 1000);

    render();
</script>
</body>
</html>
