<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhas Atividades Diárias</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d1117; --card: #161b22; --border: #30363d;
            --primary: #58a6ff; --ok: #238636; --text: #c9d1d9; --text-dim: #8b949e;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; }

        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        #clock { font-family: 'JetBrains Mono'; color: var(--primary); font-size: 1.2rem; }

        /* Form */
        .form-container { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 12px; margin-bottom: 30px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }
        
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 0.75rem; font-weight: bold; color: var(--text-dim); text-transform: uppercase; }
        input { background: #010409; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 8px; outline: none; }
        input:focus { border-color: var(--primary); }

        .btn-add { 
            grid-column: 1 / -1; background: var(--primary); color: #0d1117; border: none; 
            padding: 14px; border-radius: 8px; font-weight: 800; cursor: pointer; margin-top: 10px;
        }

        /* Tasks */
        .section-title { font-size: 0.9rem; color: var(--text-dim); margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 5px; }
        .task-card { 
            background: var(--card); border: 1px solid var(--border); border-radius: 10px; 
            padding: 15px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center;
        }
        .task-info h3 { margin: 0 0 5px 0; font-size: 1.1rem; }
        .task-meta { font-size: 0.8rem; color: var(--text-dim); }
        .task-meta i { margin-right: 5px; color: var(--primary); }
        
        .timer-badge { font-family: 'JetBrains Mono'; background: #010409; padding: 5px 10px; border-radius: 5px; color: var(--primary); margin-left: 10px; }

        .btn-check { background: var(--ok); color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; }
        .btn-delete { background: transparent; color: #f85149; border: 1px solid #f85149; padding: 8px; border-radius: 8px; cursor: pointer; margin-left: 10px; }

        .link-btn { color: var(--primary); text-decoration: none; font-size: 0.8rem; display: inline-block; margin-top: 8px; }
        
        /* Histórico */
        .history-item { opacity: 0.7; border-left: 4px solid var(--text-dim); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Dashboard Pessoal</h1>
        <div id="clock">00:00:00</div>
    </div>

    <!-- Cadastro -->
    <div class="form-container">
        <div class="form-grid">
            <div class="input-group">
                <label>Atividade</label>
                <input type="text" id="task-title" placeholder="O que você vai fazer?">
            </div>
            <div class="input-group">
                <label>Link / Referência</label>
                <input type="text" id="task-link" placeholder="Cole o link da planilha ou site">
            </div>
            <button class="btn-add" onclick="createTask()">INICIAR ATIVIDADE</button>
        </div>
    </div>

    <!-- Ativas -->
    <div class="section-title">ATIVIDADES EM ANDAMENTO</div>
    <div id="active-tasks"></div>

    <!-- Concluídas -->
    <div class="section-title" style="margin-top: 40px;">HISTÓRICO DE HOJE (CONCLUÍDAS)</div>
    <div id="completed-tasks"></div>
</div>

<script>
    // Banco de dados no LocalStorage
    let db = JSON.parse(localStorage.getItem('minhas_atividades_v1')) || { ativas: [], concluidas: [] };

    function save() {
        localStorage.setItem('minhas_atividades_v1', JSON.stringify(db));
        render();
    }

    function createTask() {
        const title = document.getElementById('task-title').value;
        const link = document.getElementById('task-link').value;
        if(!title) return alert("Digite o nome da atividade");

        const agora = new Date();
        const novaTarefa = {
            id: Date.now(),
            titulo: title,
            link: link,
            inicio: agora.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'}),
            inicioRaw: agora.getTime(),
            fim: null
        };

        db.ativas.push(novaTarefa);
        document.getElementById('task-title').value = '';
        document.getElementById('task-link').value = '';
        save();
    }

    function finishTask(id) {
        const index = db.ativas.findIndex(t => t.id === id);
        const tarefa = db.ativas.splice(index, 1)[0];
        tarefa.fim = new Date().toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
        db.concluidas.push(tarefa);
        save();
    }

    function deleteTask(id, lista) {
        if(confirm("Deseja excluir este registro?")) {
            db[lista] = db[lista].filter(t => t.id !== id);
            save();
        }
    }

    function render() {
        const activeContainer = document.getElementById('active-tasks');
        const completedContainer = document.getElementById('completed-tasks');
        
        activeContainer.innerHTML = '';
        completedContainer.innerHTML = '';

        db.ativas.forEach(t => {
            activeContainer.innerHTML += `
                <div class="task-card">
                    <div class="task-info">
                        <h3>${t.titulo}</h3>
                        <div class="task-meta">
                            <span><i class="fa-regular fa-clock"></i> Início: ${t.inicio}</span>
                            <span class="timer-badge" id="timer-${t.id}">00:00</span>
                        </div>
                        ${t.link ? `<a href="${t.link}" target="_blank" class="link-btn"><i class="fa-solid fa-up-right-from-square"></i> Abrir Referência</a>` : ''}
                    </div>
                    <div>
                        <button class="btn-check" onclick="finishTask(${t.id})"><i class="fa-solid fa-check"></i> Finalizar</button>
                    </div>
                </div>
            `;
        });

        db.concluidas.forEach(t => {
            completedContainer.innerHTML += `
                <div class="task-card history-item">
                    <div class="task-info">
                        <h3>${t.titulo}</h3>
                        <div class="task-meta">
                            <i class="fa-solid fa-calendar-check"></i> ${t.inicio} às ${t.fim}
                        </div>
                    </div>
                    <button class="btn-delete" onclick="deleteTask(${t.id}, 'concluidas')"><i class="fa-solid fa-trash"></i></button>
                </div>
            `;
        });
    }

    // Loop de Atualização (Relógio e Timers)
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('pt-BR');
        
        db.ativas.forEach(t => {
            const el = document.getElementById(`timer-${t.id}`);
            if(el) {
                const diff = Math.floor((Date.now() - t.inicioRaw) / 1000);
                const h = Math.floor(diff / 3600).toString().padStart(2, '0');
                const m = Math.floor((diff % 3600) / 60).toString().padStart(2, '0');
                const s = (diff % 60).toString().padStart(2, '0');
                el.innerText = `${h}:${m}:${s}`;
            }
        });
    }, 1000);

    render();
</script>
</body>
</html>
