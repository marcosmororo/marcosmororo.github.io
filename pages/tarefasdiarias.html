<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProFlow | Dashboard de Produtividade</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d1117; --card: #161b22; --border: #30363d;
            --primary: #58a6ff; --ok: #238636; --danger: #f85149;
            --warning: #d29922; --text: #c9d1d9; --text-dim: #8b949e;
            --pomodoro: #eb5757;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; line-height: 1.6; }
        .container { max-width: 1000px; margin: auto; }

        /* Header e Relógio */
        .header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        .header h1 { margin: 0; font-weight: 800; letter-spacing: -1px; }
        #clock-container { text-align: right; }
        #clock { font-family: 'JetBrains Mono'; color: var(--primary); font-size: 1.5rem; display: block; }
        #date-display { font-size: 0.85rem; color: var(--text-dim); }

        /* Pomodoro Section */
        .pomodoro-bar { 
            background: var(--card); border: 1px solid var(--border); border-radius: 12px; 
            padding: 20px; margin-bottom: 30px; display: flex; align-items: center; justify-content: space-around;
            border-left: 5px solid var(--pomodoro);
        }
        .pomo-timer { font-family: 'JetBrains Mono'; font-size: 2.5rem; font-weight: bold; color: var(--pomodoro); }
        .pomo-controls button { 
            background: transparent; border: 1px solid var(--pomodoro); color: var(--pomodoro);
            padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        .pomo-controls button:hover { background: var(--pomodoro); color: white; }
        .pomo-label { font-size: 0.7rem; text-transform: uppercase; color: var(--text-dim); letter-spacing: 1px; }

        /* Grid Layout */
        .main-grid { display: grid; grid-template-columns: 1fr 350px; gap: 30px; }
        @media (max-width: 850px) { .main-grid { grid-template-columns: 1fr; } }

        /* Form */
        .form-container { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 12px; }
        .input-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        label { font-size: 0.7rem; font-weight: bold; color: var(--text-dim); text-transform: uppercase; }
        input { background: #010409; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 8px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(88, 166, 255, 0.2); }
        .btn-add { 
            width: 100%; background: var(--primary); color: #0d1117; border: none; 
            padding: 14px; border-radius: 8px; font-weight: 800; cursor: pointer; transition: 0.2s;
        }
        .btn-add:hover { opacity: 0.9; transform: translateY(-1px); }

        /* Tasks */
        .section-title { font-size: 0.8rem; color: var(--text-dim); margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .section-title::after { content: ""; flex: 1; height: 1px; background: var(--border); }
        
        .task-card { 
            background: var(--card); border: 1px solid var(--border); border-radius: 10px; 
            padding: 18px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center;
            transition: 0.2s;
        }
        .task-card:hover { border-color: var(--text-dim); }
        .task-info h3 { margin: 0 0 8px 0; font-size: 1.1rem; }
        .task-meta { font-size: 0.75rem; color: var(--text-dim); display: flex; gap: 15px; flex-wrap: wrap; }
        .task-meta i { color: var(--primary); }
        
        .timer-badge { font-family: 'JetBrains Mono'; background: #010409; padding: 4px 8px; border-radius: 4px; color: var(--primary); border: 1px solid #21262d; }

        .actions { display: flex; gap: 10px; }
        .btn-check { background: var(--ok); color: white; border: none; padding: 10px 18px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-delete { background: transparent; color: var(--danger); border: 1px solid var(--danger); padding: 8px 12px; border-radius: 8px; cursor: pointer; }
        
        .link-btn { color: var(--primary); text-decoration: none; font-size: 0.75rem; display: inline-block; margin-top: 10px; font-weight: 600; }
        
        /* Histórico */
        .history-item { opacity: 0.8; border-left: 4px solid var(--border); }
        .history-date { font-size: 0.7rem; color: var(--warning); font-weight: bold; margin-bottom: 4px; display: block; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h1>ProFlow <span style="font-weight: 300; color: var(--text-dim);">Dashboard</span></h1>
        </div>
        <div id="clock-container">
            <span id="clock">00:00:00</span>
            <span id="date-display">Carregando data...</span>
        </div>
    </div>

    <!-- Pomodoro Timer -->
    <div class="pomodoro-bar">
        <div>
            <div class="pomo-label">Status Pomodoro</div>
            <div id="pomo-status" style="font-weight: bold; color: var(--text);">Focado</div>
        </div>
        <div class="pomo-timer" id="pomo-display">25:00</div>
        <div class="pomo-controls">
            <button onclick="togglePomodoro()" id="pomo-btn"><i class="fa-solid fa-play"></i> START</button>
            <button onclick="resetPomodoro()"><i class="fa-solid fa-rotate-right"></i></button>
        </div>
    </div>

    <div class="main-grid">
        <!-- Coluna Esquerda: Atividades -->
        <div class="left-col">
            <div class="section-title">ATIVIDADES EM ANDAMENTO</div>
            <div id="active-tasks"></div>

            <div class="section-title" style="margin-top: 40px;">HISTÓRICO RECENTE</div>
            <div id="completed-tasks"></div>
        </div>

        <!-- Coluna Direita: Cadastro -->
        <div class="right-col">
            <div class="form-container">
                <div class="section-title">NOVA TAREFA</div>
                <div class="input-group">
                    <label><i class="fa-solid fa-pen-to-square"></i> O que você vai fazer?</label>
                    <input type="text" id="task-title" placeholder="Ex: Relatório mensal, Estudo de JS...">
                </div>
                <div class="input-group">
                    <label><i class="fa-solid fa-link"></i> Link de Referência (Opcional)</label>
                    <input type="text" id="task-link" placeholder="https://...">
                </div>
                <button class="btn-add" onclick="createTask()">
                    <i class="fa-solid fa-rocket"></i> INICIAR ATIVIDADE
                </button>
            </div>
            
            <div style="margin-top: 20px; padding: 15px; font-size: 0.75rem; color: var(--text-dim); background: var(--card); border-radius: 12px; border: 1px solid var(--border);">
                <i class="fa-solid fa-circle-info"></i> <strong>Dica:</strong> Foque em uma atividade por vez. O timer Pomodoro ajuda a manter o cérebro fresco com pausas programadas.
            </div>
        </div>
    </div>
</div>

<script>
    // Banco de dados e Variáveis de Controle
    let db = JSON.parse(localStorage.getItem('proflow_db_v2')) || { ativas: [], concluidas: [] };
    
    // Config Pomodoro
    let pomoTime = 25 * 60;
    let pomoInterval = null;
    let isPaused = true;

    function save() {
        localStorage.setItem('proflow_db_v2', JSON.stringify(db));
        render();
    }

    // Gerenciamento de Atividades
    function createTask() {
        const title = document.getElementById('task-title').value;
        const link = document.getElementById('task-link').value;
        if(!title) return alert("Por favor, digite o nome da atividade.");

        const agora = new Date();
        const novaTarefa = {
            id: Date.now(),
            titulo: title,
            link: link,
            dataStr: agora.toLocaleDateString('pt-BR'),
            inicio: agora.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'}),
            inicioRaw: agora.getTime(),
            fim: null
        };

        db.ativas.push(novaTarefa);
        document.getElementById('task-title').value = '';
        document.getElementById('task-link').value = '';
        save();
    }

    function finishTask(id) {
        const index = db.ativas.findIndex(t => t.id === id);
        const tarefa = db.ativas.splice(index, 1)[0];
        tarefa.fim = new Date().toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
        db.concluidas.unshift(tarefa); // Adiciona no início da lista
        if(db.concluidas.length > 10) db.concluidas.pop(); // Mantém apenas os 10 últimos
        save();
    }

    function deleteTask(id, lista) {
        if(confirm("Deseja excluir este registro permanentemente?")) {
            db[lista] = db[lista].filter(t => t.id !== id);
            save();
        }
    }

    // Pomodoro Logic
    function togglePomodoro() {
        const btn = document.getElementById('pomo-btn');
        if(isPaused) {
            isPaused = false;
            btn.innerHTML = `<i class="fa-solid fa-pause"></i> PAUSE`;
            pomoInterval = setInterval(() => {
                pomoTime--;
                updatePomoDisplay();
                if(pomoTime <= 0) {
                    clearInterval(pomoInterval);
                    alert("Pomodoro finalizado! Hora de uma pausa.");
                    resetPomodoro();
                }
            }, 1000);
        } else {
            isPaused = true;
            btn.innerHTML = `<i class="fa-solid fa-play"></i> START`;
            clearInterval(pomoInterval);
        }
    }

    function resetPomodoro() {
        clearInterval(pomoInterval);
        isPaused = true;
        pomoTime = 25 * 60;
        document.getElementById('pomo-btn').innerHTML = `<i class="fa-solid fa-play"></i> START`;
        updatePomoDisplay();
    }

    function updatePomoDisplay() {
        const m = Math.floor(pomoTime / 60).toString().padStart(2, '0');
        const s = (pomoTime % 60).toString().padStart(2, '0');
        document.getElementById('pomo-display').innerText = `${m}:${s}`;
    }

    // Renderização da Interface
    function render() {
        const activeContainer = document.getElementById('active-tasks');
        const completedContainer = document.getElementById('completed-tasks');
        
        activeContainer.innerHTML = db.ativas.length === 0 ? '<p style="color:var(--text-dim); font-size:0.9rem">Nenhuma atividade em foco agora.</p>' : '';
        completedContainer.innerHTML = '';

        db.ativas.forEach(t => {
            activeContainer.innerHTML += `
                <div class="task-card">
                    <div class="task-info">
                        <h3>${t.titulo}</h3>
                        <div class="task-meta">
                            <span><i class="fa-regular fa-calendar"></i> ${t.dataStr}</span>
                            <span><i class="fa-regular fa-clock"></i> Início: ${t.inicio}</span>
                            <span class="timer-badge" id="timer-${t.id}">00:00:00</span>
                        </div>
                        ${t.link ? `<a href="${t.link}" target="_blank" class="link-btn"><i class="fa-solid fa-external-link"></i> Abrir Referência</a>` : ''}
                    </div>
                    <div class="actions">
                        <button class="btn-check" onclick="finishTask(${t.id})"><i class="fa-solid fa-check"></i></button>
                    </div>
                </div>
            `;
        });

        db.concluidas.forEach(t => {
            completedContainer.innerHTML += `
                <div class="task-card history-item">
                    <div class="task-info">
                        <span class="history-date">${t.dataStr}</span>
                        <h3 style="font-size: 1rem; color: var(--text-dim);">${t.titulo}</h3>
                        <div class="task-meta">
                            <span><i class="fa-solid fa-flag-checkered"></i> ${t.inicio} — ${t.fim}</span>
                        </div>
                    </div>
                    <button class="btn-delete" onclick="deleteTask(${t.id}, 'concluidas')"><i class="fa-solid fa-trash-can"></i></button>
                </div>
            `;
        });
    }

    // Loop Geral
    setInterval(() => {
        const agora = new Date();
        document.getElementById('clock').innerText = agora.toLocaleTimeString('pt-BR');
        document.getElementById('date-display').innerText = agora.toLocaleDateString('pt-BR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        
        db.ativas.forEach(t => {
            const el = document.getElementById(`timer-${t.id}`);
            if(el) {
                const diff = Math.floor((Date.now() - t.inicioRaw) / 1000);
                const h = Math.floor(diff / 3600).toString().padStart(2, '0');
                const m = Math.floor((diff % 3600) / 60).toString().padStart(2, '0');
                const s = (diff % 60).toString().padStart(2, '0');
                el.innerText = `${h}:${m}:${s}`;
            }
        });
    }, 1000);

    render();
</script>
</body>
</html>
