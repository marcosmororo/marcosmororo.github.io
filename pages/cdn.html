<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDN - Planejamento de Capacidade</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #020617;
            --card: #0f172a;
            --accent: #3b82f6;
            --up: #ef4444;
            --down: #10b981;
            --text: #f1f5f9;
            --border: #1e293b;
        }

        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0;
            padding: 20px;
        }

        .container { max-width: 1400px; margin: 0 auto; }

        .header-nav { 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            margin-bottom: 25px; 
        }
        
        button {
            padding: 10px 16px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background: var(--accent);
            color: #fff;
            font-weight: 600;
            transition: 0.2s;
        }

        button:hover { filter: brightness(1.1); }

        /* Grid Layout */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
        }

        .card {
            background: var(--card);
            padding: 24px;
            border-radius: 16px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        /* Estilização da Tabela */
        .table-wrapper { overflow-x: auto; border-radius: 12px; }
        
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th { 
            background: #1e293b; 
            padding: 14px; 
            text-align: center; 
            font-size: 11px; 
            text-transform: uppercase; 
            letter-spacing: 0.05em;
            color: #94a3b8;
        }
        td { 
            padding: 12px; 
            border-bottom: 1px solid var(--border); 
            text-align: center;
            font-size: 14px;
        }

        .cdn-name { text-align: left; font-weight: 600; }
        .cdn-name small { font-weight: normal; color: #64748b; }

        input[type="number"] {
            width: 85px;
            padding: 8px;
            background: #020617;
            border: 1px solid #334155;
            color: #38bdf8;
            border-radius: 6px;
            text-align: center;
            font-weight: bold;
        }

        /* Cores das colunas */
        .bg-past { background: rgba(255, 255, 255, 0.02); }
        .bg-current { background: rgba(59, 130, 246, 0.04); }

        .diff-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: 800;
            font-size: 12px;
        }

        /* Gráfico */
        .chart-section {
            height: 450px; /* Aumentado para não ficar esmagado */
            margin-top: 20px;
        }

        .stats-overview {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: var(--card);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            text-align: center;
        }

        .stat-card span { color: #94a3b8; font-size: 13px; }
        .stat-card h2 { margin: 8px 0 0; font-size: 24px; color: var(--accent); }

        @media print { .header-nav, button { display: none; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header-nav">
        <button onclick="window.history.back()" style="background: #334155;">⬅ Voltar</button>
        <h1 style="font-size: 1.5rem;">Capacity Planning - CDN</h1>
        <button onclick="window.print()">🖨 Exportar PDF</button>
    </div>

    <div class="stats-overview">
        <div class="stat-card">
            <span>Crescimento de Pico (Geral)</span>
            <h2 id="total-growth">0%</h2>
        </div>
        <div class="stat-card">
            <span>Maior Consumo Atual</span>
            <h2 id="top-cdn">--</h2>
        </div>
        <div class="stat-card">
            <span>Total Gbps (Pico Vigente)</span>
            <h2 id="total-gbps">0.00</h2>
        </div>
    </div>

    <div class="dashboard-grid">
        <!-- Tabela de Dados -->
        <div class="card">
            <h3>Dados Operacionais (Gbps)</h3>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th rowspan="2">CDN / Interface</th>
                            <th colspan="2" class="bg-past">Mês Anterior</th>
                            <th colspan="2" class="bg-current">Mês Vigente</th>
                            <th rowspan="2">Variação (%)</th>
                        </tr>
                        <tr>
                            <th class="bg-past">Consumo Pico</th>
                            <th class="bg-past">Percentil 95</th>
                            <th class="bg-current">Consumo Pico</th>
                            <th class="bg-current">Percentil 95</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <!-- Gerado via JS -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Área do Gráfico -->
        <div class="card">
            <h3>Comparativo Visual: Pico Mensal</h3>
            <div class="chart-section">
                <canvas id="mainChart"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
const dataSet = [
    { name: "GOOGLE", info: "irb.428 (CORE)" },
    { name: "FACEBOOK", info: "ae6 (CORE)" },
    { name: "NETFLIX", info: "ae3 (CORE)" },
    { name: "CLOUDFLARE", info: "ae7 (CORE)" },
    { name: "MICROSOFT", info: "xe-0/0/30 (CORE)" },
    { name: "GLOBO", info: "eth-trunk1 (BKB)" }
];

let chart;

function initTable() {
    const body = document.getElementById('table-body');
    dataSet.forEach((item, index) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td class="cdn-name">${item.name}<br><small>${item.info}</small></td>
            <td class="bg-past"><input type="number" class="p-ant" oninput="update()" value="0"></td>
            <td class="bg-past"><input type="number" class="p95-ant" oninput="update()" value="0"></td>
            <td class="bg-current"><input type="number" class="p-vig" oninput="update()" value="0"></td>
            <td class="bg-current"><input type="number" class="p95-vig" oninput="update()" value="0"></td>
            <td><span class="diff-badge" id="diff-${index}">0%</span></td>
        `;
        body.appendChild(tr);
    });
}

function update() {
    const rows = document.querySelectorAll("#table-body tr");
    let labels = [], antData = [], vigData = [];
    let sumAnt = 0, sumVig = 0;
    let maxVigVal = 0, maxVigName = "";

    rows.forEach((row, i) => {
        const pAnt = parseFloat(row.querySelector('.p-ant').value) || 0;
        const pVig = parseFloat(row.querySelector('.p-vig').value) || 0;
        
        // Cálculo Variação
        let diff = pAnt > 0 ? ((pVig - pAnt) / pAnt) * 100 : 0;
        const badge = document.getElementById(`diff-${i}`);
        badge.innerText = (diff > 0 ? '+' : '') + diff.toFixed(1) + '%';
        badge.style.color = diff > 0 ? '#ef4444' : '#10b981';
        badge.style.background = diff > 0 ? 'rgba(239, 68, 68, 0.1)' : 'rgba(16, 185, 129, 0.1)';

        // Somatórios
        sumAnt += pAnt;
        sumVig += pVig;
        labels.push(dataSet[i].name);
        antData.push(pAnt);
        vigData.push(pVig);

        if(pVig > maxVigVal) {
            maxVigVal = pVig;
            maxVigName = dataSet[i].name;
        }
    });

    // Widgets
    const growth = sumAnt > 0 ? ((sumVig - sumAnt) / sumAnt) * 100 : 0;
    document.getElementById('total-growth').innerText = growth.toFixed(1) + '%';
    document.getElementById('total-growth').style.color = growth > 0 ? '#ef4444' : '#10b981';
    document.getElementById('top-cdn').innerText = maxVigName || "--";
    document.getElementById('total-gbps').innerText = sumVig.toFixed(2);

    renderChart(labels, antData, vigData);
}

function renderChart(labels, past, current) {
    const ctx = document.getElementById('mainChart').getContext('2d');
    if (chart) chart.destroy();

    chart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [
                { 
                    label: 'Mês Anterior (Pico)', 
                    data: past, 
                    backgroundColor: '#475569',
                    borderRadius: 5
                },
                { 
                    label: 'Mês Vigente (Pico)', 
                    data: current, 
                    backgroundColor: '#3b82f6',
                    borderRadius: 5
                }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { position: 'top', labels: { color: '#94a3b8', font: { size: 12 } } }
            },
            scales: {
                x: { 
                    grid: { display: false },
                    ticks: { color: '#94a3b8' }
                },
                y: { 
                    grid: { color: 'rgba(255,255,255,0.05)' },
                    ticks: { color: '#94a3b8' },
                    title: { display: true, text: 'Gbps', color: '#64748b' }
                }
            }
        }
    });
}

window.onload = () => {
    initTable();
    update();
};
</script>

</body>
</html>
