<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDN Capacity - Excel Import</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #020617;
            --card: #0f172a;
            --accent: #3b82f6;
            --success: #10b981;
            --text: #f1f5f9;
            --border: #1e293b;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); color: var(--text); 
            margin: 0; padding: 20px; 
        }

        .container { max-width: 1400px; margin: 0 auto; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }

        .dashboard-grid { display: grid; grid-template-columns: 1fr 450px; gap: 20px; }

        .card { 
            background: var(--card); padding: 20px; 
            border-radius: 12px; border: 1px solid var(--border); 
        }

        /* Tabela Otimizada */
        .table-wrapper { max-height: 400px; overflow-y: auto; margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { background: #1e293b; padding: 10px; position: sticky; top: 0; z-index: 5; }
        td { padding: 8px; border-bottom: 1px solid var(--border); text-align: center; }
        
        .cdn-info { text-align: left; border-left: 3px solid var(--accent); padding-left: 10px; }
        
        input[type="number"] {
            width: 70px; padding: 5px; background: #020617;
            border: 1px solid #334155; color: #fff; border-radius: 4px;
        }

        /* Área de Colagem do Excel */
        .import-area {
            display: flex; gap: 10px; align-items: center;
            background: rgba(59, 130, 246, 0.1); padding: 15px; border-radius: 8px;
            border: 1px dashed var(--accent);
        }

        textarea {
            flex-grow: 1; height: 40px; background: #020617;
            border: 1px solid #334155; color: var(--success);
            padding: 8px; border-radius: 4px; font-size: 12px;
        }

        select { padding: 8px; background: #1e293b; color: #fff; border-radius: 4px; border: none; }

        .btn {
            padding: 10px 15px; cursor: pointer; border: none;
            border-radius: 6px; background: var(--accent); color: #fff; font-weight: bold;
        }

        .chart-container { height: 550px; position: relative; }

        .diff-pos { color: #ef4444; font-weight: bold; }
        .diff-neg { color: #10b981; font-weight: bold; }

        @media (max-width: 1100px) { .dashboard-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>CDN Capacity Dashboard</h1>
        <button class="btn" onclick="window.print()">Exportar PDF</button>
    </div>

    <div class="dashboard-grid">
        <div class="left-col">
            <!-- Tabela -->
            <div class="card">
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>CDN / Interface</th>
                                <th>Pico Ant.</th>
                                <th>P95 Ant.</th>
                                <th>Pico Vig.</th>
                                <th>P95 Vig.</th>
                                <th>Δ %</th>
                            </tr>
                        </thead>
                        <tbody id="table-body"></tbody>
                    </table>
                </div>

                <!-- Importador Excel -->
                <div class="import-area">
                    <div style="font-size: 11px; color: var(--accent); width: 120px;">
                        <strong>IMPORTAR EXCEL:</strong><br>Cole a coluna aqui
                    </div>
                    <textarea id="bulk-input" placeholder="Cole os valores do Excel aqui..."></textarea>
                    <select id="target-col">
                        <option value="p-ant">Pico Anterior</option>
                        <option value="p95-ant">P95 Anterior</option>
                        <option value="p-vig">Pico Vigente</option>
                        <option value="p95-vig">P95 Vigente</option>
                    </select>
                    <button class="btn" onclick="importFromExcel()" style="background: var(--success);">Processar</button>
                </div>
            </div>
        </div>

        <!-- Gráfico -->
        <div class="card">
            <h3>Comparativo de Pico (Gbps)</h3>
            <div class="chart-container">
                <canvas id="mainChart"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
const interfaces = [
    { cdn: "GOOGLE", iface: "irb.428" }, { cdn: "GOOGLE", iface: "irb.400" }, { cdn: "GOOGLE", iface: "et-0/0/54" },
    { cdn: "FACEBOOK", iface: "ae6" }, { cdn: "FACEBOOK", iface: "ae8" },
    { cdn: "NETFLIX", iface: "ae0" }, { cdn: "NETFLIX", iface: "ae3" }, { cdn: "NETFLIX", iface: "ae4" }, { cdn: "NETFLIX", iface: "ae5" },
    { cdn: "CLOUDFLARE", iface: "ae7" }, { cdn: "MICROSOFT", iface: "xe-0/0/30" },
    { cdn: "GLOBO", iface: "ae1" }, { cdn: "GLOBO", iface: "eth-trunk1" }, { cdn: "GLOBO", iface: "eth-trunk3" }
];

let chart;

function init() {
    const body = document.getElementById('table-body');
    interfaces.forEach((it, i) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td class="cdn-info"><strong>${it.cdn}</strong><br><small>${it.iface}</small></td>
            <td><input type="number" class="p-ant" oninput="updateChart()" value="0"></td>
            <td><input type="number" class="p95-ant" oninput="updateChart()" value="0"></td>
            <td><input type="number" class="p-vig" oninput="updateChart()" value="0"></td>
            <td><input type="number" class="p95-vig" oninput="updateChart()" value="0"></td>
            <td id="diff-${i}">0%</td>
        `;
        body.appendChild(tr);
    });
    updateChart();
}

function importFromExcel() {
    const rawData = document.getElementById('bulk-input').value;
    const targetClass = document.getElementById('target-col').value;
    // Separa por quebra de linha ou espaço
    const values = rawData.split(/[\n\r\t ]+/).filter(v => v !== "").map(v => v.replace(',', '.'));
    
    const inputs = document.querySelectorAll(`.${targetClass}`);
    values.forEach((val, i) => {
        if (inputs[i]) inputs[i].value = parseFloat(val) || 0;
    });

    document.getElementById('bulk-input').value = ""; // limpa
    updateChart();
}

function updateChart() {
    const rows = document.querySelectorAll("#table-body tr");
    const labels = [], dataAnt = [], dataVig = [];

    rows.forEach((row, i) => {
        const vAnt = parseFloat(row.querySelector('.p-ant').value) || 0;
        const vVig = parseFloat(row.querySelector('.p-vig').value) || 0;
        
        // Variação
        const diffCell = document.getElementById(`diff-${i}`);
        if (vAnt > 0) {
            const d = ((vVig - vAnt) / vAnt) * 100;
            diffCell.innerText = d.toFixed(1) + "%";
            diffCell.className = d >= 0 ? "diff-pos" : "diff-neg";
        }

        labels.push(`${interfaces[i].cdn} (${interfaces[i].iface})`);
        dataAnt.push(vAnt);
        dataVig.push(vVig);
    });

    renderChart(labels, dataAnt, dataVig);
}

function renderChart(labels, ant, vig) {
    const ctx = document.getElementById('mainChart').getContext('2d');
    if (chart) chart.destroy();

    chart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [
                { label: 'Mês Anterior', data: ant, backgroundColor: '#475569', borderRadius: 4 },
                { label: 'Mês Vigente', data: vig, backgroundColor: '#3b82f6', borderRadius: 4 }
            ]
        },
        options: {
            indexAxis: 'y',
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { labels: { color: '#94a3b8' } } },
            scales: {
                x: { grid: { color: '#1e293b' }, ticks: { color: '#94a3b8' } },
                y: { ticks: { color: '#94a3b8', font: { size: 10 } } }
            }
        }
    });
}

window.onload = init;
</script>
</body>
</html>
