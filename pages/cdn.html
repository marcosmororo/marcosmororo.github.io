<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDN Capacity - Pico & P95</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #020617;
            --card: #0f172a;
            --accent: #3b82f6;
            --p95-color: #8b5cf6;
            --success: #10b981;
            --text: #f1f5f9;
            --border: #1e293b;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); color: var(--text); 
            margin: 0; padding: 20px; 
        }

        .container { max-width: 1500px; margin: 0 auto; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }

        .dashboard-grid { display: grid; grid-template-columns: 1fr 550px; gap: 20px; }

        .card { 
            background: var(--card); padding: 20px; 
            border-radius: 12px; border: 1px solid var(--border); 
        }

        /* Tabela Otimizada */
        .table-wrapper { max-height: 450px; overflow-y: auto; margin-bottom: 15px; border-radius: 8px;}
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th { background: #1e293b; padding: 12px; position: sticky; top: 0; z-index: 5; text-transform: uppercase;}
        td { padding: 8px; border-bottom: 1px solid var(--border); text-align: center; }
        
        .cdn-info { text-align: left; border-left: 3px solid var(--accent); padding-left: 10px; }
        
        input[type="number"] {
            width: 65px; padding: 5px; background: #020617;
            border: 1px solid #334155; color: #fff; border-radius: 4px;
        }

        /* Área de Colagem do Excel */
        .import-area {
            display: flex; gap: 10px; align-items: center;
            background: rgba(59, 130, 246, 0.05); padding: 15px; border-radius: 8px;
            border: 1px solid var(--border);
        }

        textarea {
            flex-grow: 1; height: 45px; background: #020617;
            border: 1px solid #334155; color: var(--success);
            padding: 10px; border-radius: 6px; font-size: 12px; resize: none;
        }

        select { padding: 10px; background: #1e293b; color: #fff; border-radius: 6px; border: 1px solid #334155; cursor: pointer; }

        .btn {
            padding: 10px 20px; cursor: pointer; border: none;
            border-radius: 6px; background: var(--accent); color: #fff; font-weight: bold;
            transition: 0.2s;
        }
        .btn:hover { filter: brightness(1.2); }

        .chart-container { height: 700px; position: relative; }

        .diff-pos { color: #ef4444; font-weight: bold; font-size: 10px; }
        .diff-neg { color: #10b981; font-weight: bold; font-size: 10px; }

        @media (max-width: 1200px) { .dashboard-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h1 style="margin:0">Dashboard CDN</h1>
            <p style="color:#94a3b8; margin:5px 0 0">Comparativo Mensal de Capacidade (Gbps)</p>
        </div>
        <button class="btn" onclick="window.print()">Gerar Relatório PDF</button>
    </div>

    <div class="dashboard-grid">
        <div class="left-col">
            <div class="card">
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>CDN / Interface</th>
                                <th>Pico Ant.</th>
                                <th>P95 Ant.</th>
                                <th>Pico Vig.</th>
                                <th>P95 Vig.</th>
                                <th>Δ Pico</th>
                                <th>Δ P95</th>
                            </tr>
                        </thead>
                        <tbody id="table-body"></tbody>
                    </table>
                </div>

                <!-- Importador Excel -->
                <div class="import-area">
                    <div style="font-size: 11px; color: var(--accent); width: 140px; font-weight: bold;">
                        📥 COLAR DO EXCEL:
                    </div>
                    <textarea id="bulk-input" placeholder="Cole a coluna de valores aqui..."></textarea>
                    <select id="target-col">
                        <option value="p-ant">Pico Anterior</option>
                        <option value="p95-ant">P95 Anterior</option>
                        <option value="p-vig">Pico Vigente</option>
                        <option value="p95-vig">P95 Vigente</option>
                    </select>
                    <button class="btn" onclick="importFromExcel()" style="background: var(--success);">Processar Coluna</button>
                </div>
            </div>
        </div>

        <!-- Gráfico -->
        <div class="card">
            <h3>Visão Geral: Pico vs Percentil 95</h3>
            <div class="chart-container">
                <canvas id="mainChart"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
const interfaces = [
    { cdn: "GOOGLE", iface: "irb.428" }, { cdn: "GOOGLE", iface: "irb.400" }, { cdn: "GOOGLE", iface: "et-0/0/54" },
    { cdn: "FACEBOOK", iface: "ae6" }, { cdn: "FACEBOOK", iface: "ae8" },
    { cdn: "NETFLIX", iface: "ae0" }, { cdn: "NETFLIX", iface: "ae3" }, { cdn: "NETFLIX", iface: "ae4" }, { cdn: "NETFLIX", iface: "ae5" },
    { cdn: "CLOUDFLARE", iface: "ae7" }, { cdn: "MICROSOFT", iface: "xe-0/0/30" },
    { cdn: "GLOBO", iface: "ae1" }, { cdn: "GLOBO", iface: "eth-trunk1" }, { cdn: "GLOBO", iface: "eth-trunk3" }
];

let chart;

function init() {
    const body = document.getElementById('table-body');
    interfaces.forEach((it, i) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td class="cdn-info"><strong>${it.cdn}</strong><br><small>${it.iface}</small></td>
            <td><input type="number" class="p-ant" oninput="updateChart()" value="0" step="0.01"></td>
            <td><input type="number" class="p95-ant" oninput="updateChart()" value="0" step="0.01"></td>
            <td><input type="number" class="p-vig" oninput="updateChart()" value="0" step="0.01"></td>
            <td><input type="number" class="p95-vig" oninput="updateChart()" value="0" step="0.01"></td>
            <td id="diff-pico-${i}" class="diff-pos">0%</td>
            <td id="diff-p95-${i}" class="diff-pos">0%</td>
        `;
        body.appendChild(tr);
    });
    updateChart();
}

function importFromExcel() {
    const rawData = document.getElementById('bulk-input').value;
    const targetClass = document.getElementById('target-col').value;
    const values = rawData.split(/[\n\r\t ]+/).filter(v => v !== "").map(v => v.replace(',', '.'));
    
    const inputs = document.querySelectorAll(`.${targetClass}`);
    values.forEach((val, i) => {
        if (inputs[i]) inputs[i].value = parseFloat(val) || 0;
    });

    document.getElementById('bulk-input').value = "";
    updateChart();
}

function updateChart() {
    const rows = document.querySelectorAll("#table-body tr");
    const labels = [], pAnt = [], p95Ant = [], pVig = [], p95Vig = [];

    rows.forEach((row, i) => {
        const vPAnt = parseFloat(row.querySelector('.p-ant').value) || 0;
        const vP95Ant = parseFloat(row.querySelector('.p95-ant').value) || 0;
        const vPVig = parseFloat(row.querySelector('.p-vig').value) || 0;
        const vP95Vig = parseFloat(row.querySelector('.p95-vig').value) || 0;
        
        // Cálculo Variação Pico
        const diffPico = document.getElementById(`diff-pico-${i}`);
        if (vPAnt > 0) {
            const d = ((vPVig - vPAnt) / vPAnt) * 100;
            diffPico.innerText = (d > 0 ? '+' : '') + d.toFixed(1) + "%";
            diffPico.className = d >= 0 ? "diff-pos" : "diff-neg";
        }

        // Cálculo Variação P95
        const diffP95 = document.getElementById(`diff-p95-${i}`);
        if (vP95Ant > 0) {
            const d = ((vP95Vig - vP95Ant) / vP95Ant) * 100;
            diffP95.innerText = (d > 0 ? '+' : '') + d.toFixed(1) + "%";
            diffP95.className = d >= 0 ? "diff-pos" : "diff-neg";
        }

        labels.push(`${interfaces[i].cdn} (${interfaces[i].iface})`);
        pAnt.push(vPAnt);
        p95Ant.push(vP95Ant);
        pVig.push(vPVig);
        p95Vig.push(vP95Vig);
    });

    renderChart(labels, pAnt, p95Ant, pVig, p95Vig);
}

function renderChart(labels, pAnt, p95Ant, pVig, p95Vig) {
    const ctx = document.getElementById('mainChart').getContext('2d');
    if (chart) chart.destroy();

    chart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [
                { label: 'Pico Ant.', data: pAnt, backgroundColor: '#475569', borderRadius: 3 },
                { label: 'P95 Ant.', data: p95Ant, backgroundColor: '#1e293b', borderRadius: 3, hidden: true }, // Inicialmente oculto para não poluir
                { label: 'Pico Vig.', data: pVig, backgroundColor: '#3b82f6', borderRadius: 3 },
                { label: 'P95 Vig.', data: p95Vig, backgroundColor: '#8b5cf6', borderRadius: 3 }
            ]
        },
        options: {
            indexAxis: 'y',
            responsive: true,
            maintainAspectRatio: false,
            plugins: { 
                legend: { 
                    position: 'top',
                    labels: { color: '#94a3b8', font: { size: 11 } } 
                },
                tooltip: { mode: 'index', intersect: false }
            },
            scales: {
                x: { 
                    grid: { color: '#1e293b' }, 
                    ticks: { color: '#94a3b8' },
                    title: { display: true, text: 'Gbps', color: '#64748b' }
                },
                y: { 
                    ticks: { color: '#94a3b8', font: { size: 10 } } 
                }
            }
        }
    });
}

window.onload = init;
</script>
</body>
</html>
