<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDN - Planejamento de Capacidade</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #020617;
            --card: #0f172a;
            --accent: #3b82f6;
            --up: #ef4444;
            --down: #10b981;
            --text: #f1f5f9;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            padding: 20px;
        }

        .header-nav { display: flex; justify-content: space-between; margin-bottom: 20px; }
        
        button {
            padding: 10px 15px;
            cursor: pointer;
            border: none;
            border-radius: 6px;
            background: var(--accent);
            color: #fff;
            font-weight: 600;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
        }

        .card {
            background: var(--card);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #1e293b;
        }

        .table-container { overflow-x: auto; }
        
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: #1e293b; padding: 12px; text-align: left; position: sticky; top: 0; }
        td { padding: 10px; border-bottom: 1px solid #1e293b; }

        input[type="number"] {
            width: 80px;
            padding: 5px;
            background: #020617;
            border: 1px solid #334155;
            color: #fff;
            border-radius: 4px;
        }

        /* Destaque para as colunas do mês atual */
        .col-atual { background: rgba(59, 130, 246, 0.05); }

        .diff { font-weight: bold; font-size: 12px; }
        .diff-up { color: var(--up); }
        .diff-down { color: var(--down); }

        .metrics-summary {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .mini-card {
            background: #1e293b;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .mini-card small { color: #94a3b8; display: block; margin-bottom: 5px; }

        #graficoComparativo { height: 300px !important; }

        @media print { .header-nav, button { display: none; } }
    </style>
</head>
<body>

<div class="header-nav">
    <button onclick="window.history.back()">⬅ Voltar</button>
    <h2>Relatório Comparativo Mensal - CDN</h2>
    <button onclick="window.print()">Exportar Relatório</button>
</div>

<div class="dashboard-grid">
    <div class="card">
        <h3>Comparativo de Tráfego (Mês Anterior vs Atual)</h3>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>CDN / Interface</th>
                        <th>Pico Mês Ant.</th>
                        <th>P95 Mês Ant.</th>
                        <th class="col-atual">Pico Atual</th>
                        <th class="col-atual">P95 Atual</th>
                        <th>Variação Pico</th>
                    </tr>
                </thead>
                <tbody id="corpo-tabela">
                    <!-- Gerado via JS para facilitar manutenção -->
                </tbody>
            </table>
        </div>
    </div>

    <div class="card">
        <div class="metrics-summary">
            <div class="mini-card">
                <small>Crescimento Total</small>
                <h3 id="crescimento-geral">0%</h3>
            </div>
            <div class="mini-card">
                <small>Maior Delta</small>
                <h3 id="maior-delta">--</h3>
            </div>
        </div>
        <canvas id="graficoComparativo"></canvas>
        <div style="margin-top:20px">
            <h4>Conclusão Técnica</h4>
            <textarea id="obs" style="width:100%; height:100px; background:#020617; color:#ccc; border:1px solid #334155; border-radius:8px; padding:10px;" placeholder="Digite aqui a análise do aumento de tráfego..."></textarea>
        </div>
    </div>
</div>

<script>
const interfaces = [
    { cdn: "GOOGLE", iface: "irb.428 (CORE)" },
    { cdn: "FACEBOOK", iface: "ae6 (CORE)" },
    { cdn: "NETFLIX", iface: "ae3 (CORE)" },
    { cdn: "CLOUDFLARE", iface: "ae7 (CORE)" },
    { cdn: "MICROSOFT", iface: "xe-0/0/30 (CORE)" },
    { cdn: "GLOBO", iface: "eth-trunk1 (BKB)" }
];

function inicializarTabela() {
    const tbody = document.getElementById('corpo-tabela');
    interfaces.forEach((item, index) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td><strong>${item.cdn}</strong><br><small>${item.iface}</small></td>
            <td><input type="number" class="p-ant" oninput="atualizar()" value="0"></td>
            <td><input type="number" class="p95-ant" oninput="atualizar()" value="0"></td>
            <td class="col-atual"><input type="number" class="p-atu" oninput="atualizar()" value="0"></td>
            <td class="col-atual"><input type="number" class="p95-atu" oninput="atualizar()" value="0"></td>
            <td class="diff">0%</td>
        `;
        tbody.appendChild(tr);
    });
}

let chart;
function atualizar() {
    const linhas = document.querySelectorAll("tbody tr");
    let labels = [];
    let dadosAnt = [];
    let dadosAtu = [];
    let somaAnt = 0;
    let somaAtu = 0;
    let maiorCrescimento = { nome: '', valor: 0 };

    linhas.forEach((l, i) => {
        const pAnt = parseFloat(l.querySelector('.p-ant').value) || 0;
        const pAtu = parseFloat(l.querySelector('.p-atu').value) || 0;
        
        // Cálculo de variação
        let diff = 0;
        if (pAnt > 0) {
            diff = ((pAtu - pAnt) / pAnt) * 100;
        }
        
        const diffTd = l.querySelector('.diff');
        diffTd.innerText = (diff > 0 ? '+' : '') + diff.toFixed(1) + '%';
        diffTd.className = 'diff ' + (diff > 0 ? 'diff-up' : 'diff-down');

        // Dados para métricas globais
        labels.push(interfaces[i].cdn);
        dadosAnt.push(pAnt);
        dadosAtu.push(pAtu);
        somaAnt += pAnt;
        somaAtu += pAtu;

        if(diff > maiorCrescimento.valor) {
            maiorCrescimento = { nome: interfaces[i].cdn, valor: diff };
        }
    });

    // Atualiza mini cards
    const totalDiff = somaAnt > 0 ? ((somaAtu - somaAnt) / somaAnt) * 100 : 0;
    document.getElementById('crescimento-geral').innerText = totalDiff.toFixed(1) + '%';
    document.getElementById('maior-delta').innerText = maiorCrescimento.nome || '--';

    gerarGrafico(labels, dadosAnt, dadosAtu);
}

function gerarGrafico(labels, ant, atu) {
    const ctx = document.getElementById('graficoComparativo').getContext('2d');
    if (chart) chart.destroy();

    chart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [
                { label: 'Mês Anterior', data: ant, backgroundColor: '#475569' },
                { label: 'Mês Atual', data: atu, backgroundColor: '#3b82f6' }
            ]
        },
        options: {
            indexAxis: 'y',
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { labels: { color: '#94a3b8' } }
            },
            scales: {
                x: { grid: { color: '#1e293b' }, ticks: { color: '#94a3b8' } },
                y: { grid: { display: false }, ticks: { color: '#94a3b8' } }
            }
        }
    });
}

window.onload = () => {
    inicializarTabela();
    atualizar();
};
</script>

</body>
</html>
