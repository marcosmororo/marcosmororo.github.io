<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Requisição de Material - Online Telecom</title>
    <style>
        :root {
            --primary-red: #e31e24;
            --border-color: #333;
            --bg-gray: #f9f9f9;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: #525659; /* Cor de fundo estilo leitor de PDF */
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        /* Container que simula a folha A4 */
        .paper {
            width: 210mm;
            min-height: 297mm;
            background-color: #fff;
            padding: 15mm;
            box-shadow: 0 0 15px rgba(0,0,0,0.3);
            box-sizing: border-box;
            position: relative;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--primary-red);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .header-title h1 {
            margin: 0;
            font-size: 22pt;
            letter-spacing: 1px;
        }

        .header-title span {
            color: var(--primary-red);
        }

        .logo-area {
            text-align: right;
        }

        .logo-main {
            color: var(--primary-red);
            font-weight: bold;
            font-size: 20pt;
            line-height: 1;
        }

        .logo-sub {
            display: block;
            font-size: 8pt;
            letter-spacing: 3px;
            color: #555;
        }

        /* Campos de Dados */
        .form-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .field {
            border: 1px solid #ccc;
            padding: 5px 10px;
            display: flex;
            align-items: center;
        }

        .field label {
            font-size: 9pt;
            font-weight: bold;
            color: #444;
            margin-right: 8px;
            white-space: nowrap;
        }

        .field input {
            border: none;
            width: 100%;
            font-size: 10pt;
            outline: none;
        }

        /* Categorias */
        .categories {
            border: 1px solid #ccc;
            padding: 10px;
            font-size: 9pt;
            text-align: center;
            margin-bottom: 20px;
            background-color: var(--bg-gray);
        }

        .categories label {
            margin: 0 10px;
            cursor: pointer;
        }

        /* Tabelas */
        .table-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        th {
            background-color: #eee;
            border: 1px solid #999;
            padding: 4px;
            font-size: 8pt;
            text-transform: uppercase;
        }

        td {
            border: 1px solid #ccc;
            height: 25px;
        }

        td input {
            border: none;
            width: 100%;
            height: 100%;
            padding: 0 5px;
            box-sizing: border-box;
            font-size: 9pt;
            outline: none;
        }

        /* Assinaturas */
        .signatures {
            margin-top: 30px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            text-align: center;
        }

        .sig-block {
            margin-bottom: 20px;
        }

        .sig-line {
            border-bottom: 1px solid #000;
            margin-bottom: 5px;
        }

        .sig-name {
            font-size: 10pt;
            font-style: italic;
        }

        .sig-title {
            font-size: 8pt;
            font-weight: bold;
            display: block;
        }

        .footer-lines {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            margin-top: 40px;
            text-align: center;
            font-size: 7pt;
        }

        /* Botão Flutuante */
        .print-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: var(--primary-red);
            color: white;
            padding: 15px 25px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            z-index: 100;
        }

        @media print {
            body { background-color: #fff; padding: 0; }
            .paper { box-shadow: none; width: 100%; border: none; padding: 0; }
            .print-btn { display: none; }
        }
    </style>
</head>
