<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOC Command Center - Incident Report</title>
    <style>
        :root {
            --bg: #020617;
            --surface: #1e293b;
            --primary: #38bdf8;
            --danger: #f43f5e;
            --warning: #fbbf24;
            --text: #f8fafc;
            --border: #334155;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            line-height: 1.5;
        }

        .container { max-width: 1200px; margin: auto; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: var(--surface);
            border-radius: 12px;
            margin-bottom: 25px;
            border: 1px solid var(--border);
        }

        .status-badge {
            background: #0ea5e9;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* Formulário de Alta Performance */
        .grid-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            background: var(--surface);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .field { display: flex; flex-direction: column; gap: 8px; }
        .field label { font-size: 11px; font-weight: 700; color: var(--primary); text-transform: uppercase; letter-spacing: 0.5px; }
        
        input, select, textarea {
            background: #0f172a;
            border: 1px solid var(--border);
            color: white;
            padding: 12px;
            border-radius: 8px;
            transition: all 0.2s;
        }

        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2); }

        .full-width { grid-column: 1 / -1; }

        button.main-btn {
            grid-column: 1 / -1;
            background: var(--primary);
            color: #020617;
            font-weight: 800;
            padding: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            text-transform: uppercase;
            transition: 0.3s;
        }

        button.main-btn:hover { background: #7dd3fc; transform: translateY(-2px); }

        /* Lista de Incidentes Gerados */
        .output-section {
            margin-top: 40px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 25px;
        }

        .report-card {
            background: var(--surface);
            border-radius: 12px;
            padding: 20px;
            border-top: 5px solid var(--primary);
            position: relative;
        }

        .report-card.interrompido { border-top-color: var(--danger); }
        .report-card.degradado { border-top-color: var(--warning); }

        .report-content {
            font-family: 'Courier New', Courier, monospace;
            font-size: 13px;
            background: #020617;
            padding: 15px;
            border-radius: 6px;
            white-space: pre-wrap;
            margin: 15px 0;
            color: #cbd5e1;
        }

        .copy-btn {
            background: #334155;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }

        .copy-btn:hover { background: var(--primary); color: #020617; }

        .tag {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 4px;
            background: #334155;
            margin-right: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1 style="margin: 0; font-size: 24px;">📡 NOC Incident Manager</h1>
            <p style="margin: 0; font-size: 14px; opacity: 0.6;">Registro e Padronização de Falhas</p>
        </div>
        <div id="clock" style="font-family: monospace; font-size: 22px; font-weight: bold;">00:00:00</div>
    </header>

    <form class="grid-form" id="nocForm">
        <div class="field">
            <label>👤 Reclamante (Nome)</label>
            <input type="text" id="nome_reclamante" required placeholder="Ex: João Silva">
        </div>
        <div class="field">
            <label>🏢 Operadora Reclamante</label>
            <input type="text" id="operadora" required placeholder="Ex: Vivo / Claro">
        </div>
        <div class="field">
            <label>📍 Trecho (Ponta A – Ponta B)</label>
            <input type="text" id="trecho" required placeholder="Ex: SP - RJ">
        </div>

        <div class="field full-width">
            <label>🏠 Endereço Completo Ponta A</label>
            <input type="text" id="end_a" required>
        </div>
        <div class="field full-width">
            <label>🏠 Endereço Completo Ponta B</label>
            <input type="text" id="end_b" required>
        </div>

        <div class="field">
            <label>📅 Data/Hora Extração</label>
            <input type="datetime-local" id="data_extracao" required>
        </div>
        <div class="field">
            <label>↔️ Sentido da Extração</label>
            <select id="sentido" required>
                <option value="A > B">A > B</option>
                <option value="B > A">B > A</option>
            </select>
        </div>
        <div class="field">
            <label>⚠️ Tipo de Falha</label>
            <select id="falha" required>
                <option value="INTERROMPIDO">🔴 INTERROMPIDO</option>
                <option value="DEGRADADO">🟡 DEGRADADO</option>
            </select>
        </div>

        <div class="field">
            <label>⚡ Atuação</label>
            <select id="atuacao" required>
                <option value="IMEDIATO">IMEDIATO</option>
                <option value="PROGRAMADO">PROGRAMADO</option>
            </select>
        </div>
        <div class="field">
            <label>📞 Telefone Testes Operadora</label>
            <input type="text" id="tel_op" required>
        </div>
        <div class="field">
            <label>🎫 Nº Chamado Interno Op.</label>
            <input type="text" id="chamado_op" required>
        </div>

        <div class="field">
            <label>⏰ Horário Alarme Equipamento</label>
            <input type="time" id="hora_alarme" required>
        </div>
        <div class="field">
            <label>🧬 Tipo de Fibra</label>
            <select id="tipo_fibra" required>
                <option value="Iluminada">Iluminada</option>
                <option value="Apagada">Apagada</option>
            </select>
        </div>
        <div class="field">
            <label>📡 Possui RAMAN?</label>
            <select id="raman" required>
                <option value="Sim">Sim</option>
                <option value="Não">Não</option>
            </select>
        </div>
        <div class="field">
            <label>🔌 RAMAN Desligado?</label>
            <select id="raman_off" required>
                <option value="Não">Não</option>
                <option value="Sim">Sim</option>
            </select>
        </div>

        <button type="submit" class="main-btn">Gerar Relatório de Incidente</button>
    </form>

    <div class="output-section" id="reportsList">
        </div>
</div>

<script>
    // Atualização do Relógio
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('pt-BR');
    }, 1000);

    const form = document.getElementById('nocForm');
    const list = document.getElementById('reportsList');

    form.addEventListener('submit', (e) => {
        e.preventDefault();

        // Coleta de dados
        const d = {
            nome: document.getElementById('nome_reclamante').value,
            op: document.getElementById('operadora').value,
            trecho: document.getElementById('trecho').value,
            endA: document.getElementById('end_a').value,
            endB: document.getElementById('end_b').value,
            dataExt: new Date(document.getElementById('data_extracao').value).toLocaleString('pt-BR'),
            sentido: document.getElementById('sentido').value,
            falha: document.getElementById('falha').value,
            atuacao: document.getElementById('atuacao').value,
            tel: document.getElementById('tel_op').value,
            ticket: document.getElementById('chamado_op').value,
            alarme: document.getElementById('hora_alarme').value,
            fibra: document.getElementById('tipo_fibra').value,
            raman: document.getElementById('raman').value,
            ramanOff: document.getElementById('raman_off').value
        };

        // Formatação do Texto para Cópia
        const reportText = `📝 **RELATÓRIO DE INCIDENTE NOC**
---------------------------------------
👤 **Reclamante:** ${d.nome}
🏢 **Operadora:** ${d.op}
📍 **Trecho:** ${d.trecho}
🏠 **End. Ponta A:** ${d.endA}
🏠 **End. Ponta B:** ${d.endB}
📅 **Extração:** ${d.dataExt}
↔️ **Sentido:** ${d.sentido}
⚠️ **Falha:** ${d.falha}
⚡ **Atuação:** ${d.atuacao}
📞 **Tel. Testes:** ${d.tel}
🎫 **Chamado Op:** ${d.ticket}
⏰ **Alarme Equip:** ${d.alarme}
🧬 **Tipo Fibra:** ${d.fibra}
📡 **RAMAN:** ${d.raman} | **Desligado:** ${d.ramanOff}`;

        // Criação do Card Visual
        const card = document.createElement('div');
        card.className = `report-card ${d.falha.includes('INTERROMPIDO') ? 'interrompido' : 'degradado'}`;
        
        card.innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                <h3 style="margin:0">${d.trecho}</h3>
                <span class="tag">${d.atuacao}</span>
            </div>
            <div class="report-content" id="text-${Date.now()}">${reportText}</div>
            <button class="copy-btn" onclick="copyText(this)">Copiar Relatório</button>
            <button class="copy-btn" style="background:#450a0a" onclick="this.parentElement.remove()">Remover</button>
        `;

        list.prepend(card);
        form.reset();
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    });

    function copyText(btn) {
        const text = btn.parentElement.querySelector('.report-content').innerText;
        navigator.clipboard.writeText(text).then(() => {
            const originalText = btn.innerText;
            btn.innerText = "✅ Copiado!";
            btn.style.background = "#10b981";
            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.background = "#334155";
            }, 2000);
        });
    }
</script>

</body>
</html>
