<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOC Command Center - Live Preview</title>
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --primary: #38bdf8;
            --danger: #ef4444;
            --warning: #f59e0b;
            --success: #10b981;
            --text: #f1f5f9;
            --border: #334155;
            --preview-bg: #020617;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        .container { max-width: 1400px; margin: auto; }

        header {
            background: linear-gradient(90deg, #1e293b 0%, #0f172a 100%);
            padding: 15px 25px;
            border-radius: 12px;
            border: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 450px 1fr;
            gap: 25px;
        }

        .panel {
            background: var(--surface);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            height: fit-content;
        }

        .field { margin-bottom: 15px; }
        .field label { display: block; font-size: 11px; font-weight: 800; color: var(--primary); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        
        input, select, textarea {
            width: 100%;
            background: #0f172a;
            border: 1px solid var(--border);
            color: white;
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            transition: 0.2s;
        }

        input:focus, select:focus { border-color: var(--primary); outline: none; }

        /* Preview Dinâmico */
        .preview-container {
            position: sticky;
            top: 20px;
        }

        .preview-card {
            background: var(--preview-bg);
            border-radius: 12px;
            border: 2px solid var(--primary);
            padding: 25px;
            min-height: 400px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }

        #live-text {
            font-family: 'Fira Code', 'Consolas', monospace;
            font-size: 14px;
            line-height: 1.6;
            color: #94a3b8;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .btn-copy-big {
            width: 100%;
            background: var(--primary);
            color: #0f172a;
            border: none;
            padding: 18px;
            border-radius: 8px;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-copy-big:hover { background: #7dd3fc; transform: translateY(-2px); }

        .btn-copy-big.success { background: var(--success); color: white; }

        .tag {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: bold;
            background: var(--primary);
            color: #0f172a;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1 style="margin:0; font-size: 20px;">📡 NOC DASHBOARD | LIVE PREVIEW</h1>
            <p style="margin:0; font-size: 12px; opacity: 0.6;">Preencha e visualize o carimbo em tempo real</p>
        </div>
        <div id="clock" style="font-family: monospace; font-size: 22px; color: var(--primary);">00:00:00</div>
    </header>

    <div class="main-layout">
        <div class="panel">
            <div class="field">
                <label>Tipo de Ocorrência</label>
                <select id="tipo_falha" oninput="updatePreview()">
                    <option value="ROMPIMENTO">✂️ ROMPIMENTO DE FIBRA</option>
                    <option value="SWAP">🔄 SWAP DE EQUIPAMENTO</option>
                    <option value="ENERGIA">⚡ FALHA DE ENERGIA / AC</option>
                    <option value="TEMPERATURA">🔥 ALTA TEMPERATURA</option>
                    <option value="LATENCIA">🛰️ ALTA LATÊNCIA (PING)</option>
                    <option value="PERDA">📦 PERDA DE PACOTES</option>
                    <option value="INDISPONIVEL">🚫 INDISPONIBILIDADE GERAL</option>
                </select>
            </div>

            <div class="field">
                <label>ID / Protocolo / Chamado</label>
                <input type="text" id="protocolo" placeholder="Ex: 2026.04.1234" oninput="updatePreview()">
            </div>

            <div class="field">
                <label>Trecho ou Localidade</label>
                <input type="text" id="local" placeholder="Ex: SP > RJ (Backbone)" oninput="updatePreview()">
            </div>

            <div class="field">
                <label>Equipamento / Interface</label>
                <input type="text" id="equip" placeholder="Ex: OLT Nokia - Slot 01" oninput="updatePreview()">
            </div>

            <div class="field">
                <label>Técnico / Responsável</label>
                <input type="text" id="tecnico" placeholder="Seu nome ou técnico de campo" oninput="updatePreview()">
            </div>

            <div class="field">
                <label>Observações Detalhadas</label>
                <textarea id="obs" rows="4" placeholder="Descreva a ação técnica..." oninput="updatePreview()"></textarea>
            </div>
            
            <p style="font-size: 11px; color: var(--warning); border-top: 1px solid var(--border); padding-top: 10px;">
                * O carimbo é atualizado automaticamente ao digitar.
            </p>
        </div>

        <div class="preview-container">
            <div class="preview-card" id="card-status">
                <div class="preview-header">
                    <span class="tag" id="tag-tipo">ROMPIMENTO</span>
                    <span style="font-size: 12px; color: var(--primary)" id="live-clock">--:--:--</span>
                </div>
                
                <div id="live-text">Carregando carimbo...</div>

                <button class="btn-copy-big" id="copyBtn" onclick="copyToClipboard()">
                    COPIAR PARA O CLIPBOARD
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    // Relógio
    setInterval(() => {
        const now = new Date();
        const timeStr = now.toLocaleTimeString('pt-BR');
        document.getElementById('clock').innerText = timeStr;
        document.getElementById('live-clock').innerText = timeStr;
    }, 1000);

    function updatePreview() {
        const tipo = document.getElementById('tipo_falha').value;
        const protocolo = document.getElementById('protocolo').value || "AGUARDANDO ID";
        const local = document.getElementById('local').value || "NÃO DEFINIDO";
        const equip = document.getElementById('equip').value || "N/A";
        const tecnico = document.getElementById('tecnico').value || "NOC_AUTO";
        const obs = document.getElementById('obs').value || "Sem observações no momento.";
        const data = new Date().toLocaleString('pt-BR');
        
        const tag = document.getElementById('tag-tipo');
        const card = document.getElementById('card-status');
        tag.innerText = tipo;

        // Estilos Visuais do Card
        if(tipo === 'ROMPIMENTO' || tipo === 'INDISPONIVEL') card.style.borderColor = "var(--danger)";
        else if(tipo === 'ENERGIA' || tipo === 'TEMPERATURA') card.style.borderColor = "var(--warning)";
        else card.style.borderColor = "var(--primary)";

        let template = "";

        // Lógica de Construção do Texto Padronizado
        switch(tipo) {
            case 'ROMPIMENTO':
                template = `✂️ **[NOTIFICAÇÃO DE ROMPIMENTO]**
-----------------------------------------
📍 LOCAL: ${local}
🎫 ID: ${protocolo}
⏰ DETECÇÃO: ${data}
⚠️ STATUS: TOTALMENTE INTERROMPIDO
🧬 EQUIP: ${equip}
👤 RESP: ${tecnico}
📝 OBS: Suspeita de rompimento de fibra óptica. 
Aguardando técnico em campo para testes de OTDR.
-----------------------------------------`;
                break;
            case 'SWAP':
                template = `🔄 **[CARIMBO DE SWAP TÉCNICO]**
-----------------------------------------
📍 LOCAL: ${local}
🎫 ID: ${protocolo}
⏰ INÍCIO: ${data}
🛠️ EQUIP. SAI: ${equip}
🛠️ EQUIP. ENTRA: [AGUARDANDO]
👤 TÉCNICO: ${tecnico}
📝 MOTIVO: ${obs}
-----------------------------------------`;
                break;
            case 'ENERGIA':
                template = `⚡ **[FALHA DE ALIMENTAÇÃO / AC]**
-----------------------------------------
📍 SITE: ${local}
🎫 ID: ${protocolo}
⏰ QUEDA: ${data}
🔋 EQUIP: ${equip}
👤 RESP: ${tecnico}
📝 STATUS: Equipamento deslogado da gerência. 
Provável falta de energia elétrica ou falha no banco de baterias.
-----------------------------------------`;
                break;
            case 'TEMPERATURA':
                template = `🔥 **[ALERTA DE ALTA TEMPERATURA]**
-----------------------------------------
📍 LOCAL: ${local}
🎫 ID: ${protocolo}
🌡️ TEMP: [DIGITE AQUI] °C
🧬 EQUIP: ${equip}
👤 RESP: ${tecnico}
📝 OBS: ${obs}
-----------------------------------------`;
                break;
            case 'LATENCIA':
                template = `🛰️ **[DEGRADAÇÃO: ALTA LATÊNCIA]**
-----------------------------------------
📍 TRECHO: ${local}
🎫 ID: ${protocolo}
📊 MÉTRICA: [DIGITE AQUI] ms
🧬 EQUIP: ${equip}
👤 RESP: ${tecnico}
📝 TESTES: ${obs}
-----------------------------------------`;
                break;
            case 'PERDA':
                template = `📦 **[DEGRADAÇÃO: PERDA DE PACOTES]**
-----------------------------------------
📍 ALVO: ${local}
🎫 ID: ${protocolo}
📊 PERDA: [DIGITE AQUI]%
🧬 EQUIP: ${equip}
👤 RESP: ${tecnico}
📝 OBS: Verificado aumento de CRC na interface. ${obs}
-----------------------------------------`;
                break;
            case 'INDISPONIVEL':
                template = `🚫 **[CARIMBO DE INDISPONIBILIDADE]**
-----------------------------------------
📍 LOCAL: ${local}
🎫 ID: ${protocolo}
⏰ DESDE: ${data}
⚠️ IMPACTO: TOTAL
👤 RESP: ${tecnico}
📝 OBS: ${obs}
-----------------------------------------`;
                break;
        }

        document.getElementById('live-text').innerText = template;
    }

    function copyToClipboard() {
        const text = document.getElementById('live-text').innerText;
        const btn = document.getElementById('copyBtn');
        
        navigator.clipboard.writeText(text).then(() => {
            btn.innerText = "✅ CARIMBO COPIADO!";
            btn.classList.add('success');
            setTimeout(() => {
                btn.innerText = "COPIAR PARA O CLIPBOARD";
                btn.classList.remove('success');
            }, 2000);
        });
    }

    // Inicializa o preview
    updatePreview();
</script>

</body>
</html>
