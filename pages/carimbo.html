<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOC Command Center - Padronização v3.0</title>
    <style>
        :root {
            --bg: #0a0f1e;
            --surface: #161e2d;
            --primary: #00d4ff;
            --danger: #ff4b5c;
            --warning: #ffb400;
            --success: #00e676;
            --text: #e2e8f0;
            --border: #2d3748;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        .container { max-width: 1200px; margin: auto; }

        .header-main {
            background: linear-gradient(135deg, #1a202c 0%, #0a0f1e 100%);
            padding: 20px;
            border-radius: 10px;
            border-bottom: 3px solid var(--primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .grid-layout {
            display: grid;
            grid-template-columns: 400px 1fr;
            gap: 20px;
        }

        .panel {
            background: var(--surface);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .field { margin-bottom: 15px; }
        .field label { display: block; font-size: 11px; font-weight: bold; color: var(--primary); margin-bottom: 5px; text-transform: uppercase; }
        
        input, select, textarea {
            width: 100%;
            background: #0d1117;
            border: 1px solid var(--border);
            color: #fff;
            padding: 10px;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 13px;
        }

        .btn-generate {
            width: 100%;
            background: var(--primary);
            color: #000;
            border: none;
            padding: 15px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-generate:hover { background: #00b8e6; transform: scale(1.02); }

        /* Estilo dos Carimbos Gerados */
        .output-area { display: flex; flex-direction: column; gap: 15px; }
        
        .card-report {
            background: #1a202c;
            border-radius: 8px;
            border-left: 5px solid var(--primary);
            padding: 15px;
            position: relative;
            animation: fadeIn 0.4s ease;
        }

        .card-report.rompimento { border-left-color: var(--danger); }
        .card-report.energia { border-left-color: #f6e05e; }
        .card-report.performance { border-left-color: var(--warning); }

        .code-box {
            background: #000;
            color: #adbac7;
            padding: 12px;
            font-family: 'Consolas', monospace;
            font-size: 12px;
            border-radius: 4px;
            margin: 10px 0;
            white-space: pre-wrap;
            border: 1px solid #30363d;
        }

        .actions { display: flex; gap: 10px; }
        .btn-copy { background: #2d3748; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .btn-copy:hover { background: var(--primary); color: #000; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <div class="header-main">
        <div>
            <h1 style="margin:0; font-size: 22px; letter-spacing: 1px;">NOC COMMAND CENTER</h1>
            <span style="font-size: 12px; color: var(--primary)">PADRONIZAÇÃO DE CARIMBOS TÉCNICOS</span>
        </div>
        <div id="clock" style="font-family: monospace; font-size: 20px;">00:00:00</div>
    </div>

    <div class="grid-layout">
        <div class="panel">
            <form id="stampForm">
                <div class="field">
                    <label>Tipo de Ocorrência</label>
                    <select id="tipo_falha">
                        <option value="ROMPIMENTO">✂️ ROMPIMENTO DE FIBRA</option>
                        <option value="SWAP">🔄 SWAP DE EQUIPAMENTO</option>
                        <option value="ENERGIA">⚡ FALHA DE ENERGIA / AC</option>
                        <option value="TEMPERATURA">🔥 ALTA TEMPERATURA</option>
                        <option value="LATENCIA">🛰️ ALTA LATÊNCIA (PING)</option>
                        <option value="PERDA">📦 PERDA DE PACOTES</option>
                        <option value="INDISPONIVEL">🚫 INDISPONIBILIDADE GERAL</option>
                    </select>
                </div>
                <div class="field">
                    <label>ID Chamado / Protocolo</label>
                    <input type="text" id="id_chamado" placeholder="Ex: INC009823">
                </div>
                <div class="field">
                    <label>Trecho / Site Afetado</label>
                    <input type="text" id="local" placeholder="Ex: POP-CENTRO p/ POP-SUL">
                </div>
                <div class="field">
                    <label>Equipamento / Interface</label>
                    <input type="text" id="equip" placeholder="Ex: OLT-01 (Slot 5)">
                </div>
                <div class="field">
                    <label>Técnico em Campo</label>
                    <input type="text" id="tec_campo" placeholder="Ex: Nome do Técnico ou Vazio">
                </div>
                <div class="field">
                    <label>Observações Adicionais</label>
                    <textarea id="obs" rows="3" placeholder="Detalhes técnicos rápidos..."></textarea>
                </div>
                <button type="submit" class="btn-generate">Gerar Carimbo Padronizado</button>
            </form>
        </div>

        <div class="output-area" id="outputList">
            </div>
    </div>
</div>

<script>
    // Relógio
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('pt-BR');
    }, 1000);

    const form = document.getElementById('stampForm');
    const outputList = document.getElementById('outputList');

    form.addEventListener('submit', (e) => {
        e.preventDefault();
        
        const tipo = document.getElementById('tipo_falha').value;
        const d = {
            id: document.getElementById('id_chamado').value || "NÃO INFORMADO",
            local: document.getElementById('local').value || "NÃO INFORMADO",
            equip: document.getElementById('equip').value || "N/A",
            tec: document.getElementById('tec_campo').value || "NOC_CENTRAL",
            obs: document.getElementById('obs').value || "Sem observações adicionais.",
            hora: new Date().toLocaleString('pt-BR')
        };

        let carimboTexto = "";

        // LÓGICA DE PADRONIZAÇÃO POR TIPO
        switch(tipo) {
            case 'ROMPIMENTO':
                carimboTexto = `✂️ [CARIMBO DE ROMPIMENTO]\n----------------------------------\nSTATUS: TOTALMENTE INTERROMPIDO\nID: ${d.id}\nLOCAL: ${d.local}\nDETECÇÃO: ${d.hora}\nEQUIPAMENTO: ${d.equip}\nTÉCNICO EM CAMPO: ${d.tec}\nOBS: Suspeita de rompimento de fibra óptica. Aguardando OTDR.\n----------------------------------`;
                break;
            case 'SWAP':
                carimboTexto = `🔄 [CARIMBO DE SWAP / TROCA]\n----------------------------------\nMOTIVO: FALHA DE HARDWARE\nID: ${d.id}\nLOCAL: ${d.local}\nEQUIP. SAI: ${d.equip}\nEQUIP. ENTRA: [AGUARDANDO]\nTÉCNICO: ${d.tec}\nOBS: ${d.obs}\n----------------------------------`;
                break;
            case 'ENERGIA':
                carimboTexto = `⚡ [CARIMBO DE FALHA DE ENERGIA]\n----------------------------------\nSTATUS: EQUIPAMENTO OFFLINE\nID: ${d.id}\nLOCAL: ${d.local}\nHORA DA QUEDA: ${d.hora}\nTÉCNICO: ${d.tec}\nDETALHES: Equipamento sem resposta (Perca de gerência). Provável falta de AC ou falha de retificadora.\n----------------------------------`;
                break;
            case 'TEMPERATURA':
                carimboTexto = `🔥 [CARIMBO DE ALTA TEMPERATURA]\n----------------------------------\nSTATUS: ALERTA CRÍTICO\nID: ${d.id}\nLOCAL: ${d.local}\nEQUIPAMENTO: ${d.equip}\nTEMPERATURA ATUAL: [INSERIR] °C\nOBS: ${d.obs}\n----------------------------------`;
                break;
            case 'LATENCIA':
                carimboTexto = `🛰️ [CARIMBO DE ALTA LATÊNCIA]\n----------------------------------\nSTATUS: DEGRADADO\nID: ${d.id}\nTRECHO: ${d.local}\nLATÊNCIA MÉDIA: [INSERIR] ms\nTESTE REALIZADO: MTR / PING\nOBS: ${d.obs}\n----------------------------------`;
                break;
            case 'PERDA':
                carimboTexto = `📦 [CARIMBO DE PERDA DE PACOTES]\n----------------------------------\nSTATUS: DEGRADADO\nID: ${d.id}\nALVO: ${d.local}\nPORCENTAGEM: [INSERIR]%\nEQUIPAMENTO: ${d.equip}\nOBS: Verificado erro de CRC na interface ou saturação de link.\n----------------------------------`;
                break;
            case 'INDISPONIVEL':
                carimboTexto = `🚫 [CARIMBO DE INDISPONIBILIDADE]\n----------------------------------\nSTATUS: FORA DE OPERAÇÃO\nID: ${d.id}\nAFETADO: ${d.local}\nPREVISÃO: [INSERIR]\nTÉCNICO: ${d.tec}\nOBS: ${d.obs}\n----------------------------------`;
                break;
        }

        renderCard(tipo.toLowerCase(), carimboTexto, d.local);
        form.reset();
    });

    function renderCard(classe, texto, local) {
        const card = document.createElement('div');
        card.className = `card-report ${classe}`;
        
        card.innerHTML = `
            <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                <strong style="font-size:12px; color:var(--primary)">${local}</strong>
                <small style="opacity:0.5">${new Date().toLocaleTimeString()}</small>
            </div>
            <div class="code-box">${texto}</div>
            <div class="actions">
                <button class="btn-copy" onclick="copyText(this)">Copiar Carimbo</button>
                <button class="btn-copy" style="background:#4a1212" onclick="this.parentElement.parentElement.remove()">Excluir</button>
            </div>
        `;
        outputList.prepend(card);
    }

    function copyText(btn) {
        const text = btn.parentElement.parentElement.querySelector('.code-box').innerText;
        navigator.clipboard.writeText(text).then(() => {
            const originalText = btn.innerText;
            btn.innerText = "✅ Copiado!";
            setTimeout(() => btn.innerText = originalText, 2000);
        });
    }
</script>

</body>
</html>
