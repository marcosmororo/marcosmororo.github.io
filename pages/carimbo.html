<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOC Command Center v2.0</title>
    <style>
        :root {
            --bg: #020617;
            --surface: #1e293b;
            --primary: #38bdf8;
            --danger: #f43f5e;
            --warning: #fbbf24;
            --success: #10b981;
            --text: #f8fafc;
            --border: #334155;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            line-height: 1.5;
        }

        .container { max-width: 1400px; margin: auto; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: linear-gradient(90deg, #1e293b 0%, #0f172a 100%);
            border-radius: 12px;
            margin-bottom: 25px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
        }

        /* Formulário */
        .card-panel {
            background: var(--surface);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .grid-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .field { display: flex; flex-direction: column; gap: 6px; }
        .field label { font-size: 10px; font-weight: 800; color: var(--primary); text-transform: uppercase; }
        
        input, select, textarea {
            background: #0f172a;
            border: 1px solid var(--border);
            color: white;
            padding: 10px;
            border-radius: 6px;
            font-size: 13px;
        }

        .full-width { grid-column: 1 / -1; }

        /* Botões */
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        
        button {
            cursor: pointer;
            border: none;
            border-radius: 6px;
            font-weight: 700;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary { background: var(--primary); color: #020617; padding: 12px 20px; flex: 2; }
        .btn-secondary { background: var(--border); color: white; padding: 10px; flex: 1; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }

        /* Quick Templates (Barra Lateral) */
        .sidebar { display: flex; flex-direction: column; gap: 20px; }
        
        .template-box {
            background: #0f172a;
            border-radius: 8px;
            padding: 15px;
            border-left: 4px solid var(--primary);
        }

        .template-box h4 { margin: 0 0 10px 0; font-size: 12px; color: var(--primary); }
        
        /* Relatórios Gerados */
        .output-section {
            margin-top: 30px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(450px, 1fr));
            gap: 20px;
        }

        .report-card {
            background: var(--surface);
            border-radius: 8px;
            padding: 15px;
            border: 1px solid var(--border);
            position: relative;
        }

        .report-header {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
            margin-bottom: 10px;
        }

        .report-content {
            font-family: 'Fira Code', 'Consolas', monospace;
            font-size: 12px;
            background: #020617;
            padding: 12px;
            border-radius: 4px;
            white-space: pre-wrap;
            color: #7dd3fc;
            border: 1px solid #334155;
        }

        .copy-btn-mini {
            background: var(--success);
            color: white;
            padding: 6px 12px;
            font-size: 11px;
            margin-top: 10px;
        }

        .tag-status {
            font-size: 9px;
            padding: 2px 6px;
            border-radius: 4px;
            background: var(--primary);
            color: #020617;
            font-weight: bold;
        }

        #clock { font-family: monospace; color: var(--primary); font-size: 20px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1 style="margin: 0; font-size: 20px;">⚡ NOC COMMAND CENTER v2.0</h1>
            <p style="margin: 0; font-size: 12px; opacity: 0.6;">SISTEMA DE PADRONIZAÇÃO DE INCIDENTES E SWAP</p>
        </div>
        <div id="clock">00:00:00</div>
    </header>

    <div class="main-grid">
        <div class="card-panel">
            <form id="nocForm" class="grid-form">
                <div class="field">
                    <label>ID / Protocolo Interno</label>
                    <input type="text" id="protocolo" placeholder="20260429-001">
                </div>
                <div class="field">
                    <label>Operadora / Cliente</label>
                    <input type="text" id="operadora" placeholder="Ex: WIN Telecom">
                </div>
                <div class="field">
                    <label>📍 Trecho Principal</label>
                    <input type="text" id="trecho" placeholder="Ex: RJ - SP">
                </div>
                
                <div class="field full-width">
                    <label>📝 Descrição Detalhada da Falha</label>
                    <input type="text" id="desc_falha" placeholder="Ex: Queda de potência no slot 04 - Alarme de LOS">
                </div>

                <div class="field">
                    <label>Equipamento (Marca/Modelo)</label>
                    <input type="text" id="equip" placeholder="Ex: Nokia 7360 / Juniper MX">
                </div>
                <div class="field">
                    <label>Interface / Slot</label>
                    <input type="text" id="interface" placeholder="Ex: PON 0/1/2">
                </div>
                <div class="field">
                    <label>⚠️ Gravidade</label>
                    <select id="falha">
                        <option value="CRÍTICO (INTERRUPÇÃO)">🔴 CRÍTICO</option>
                        <option value="DEGRADADO (LENTIDÃO)">🟡 DEGRADADO</option>
                        <option value="SWAP TÉCNICO">🔵 SWAP TÉCNICO</option>
                    </select>
                </div>
                <div class="field">
                    <label>Técnico Responsável</label>
                    <input type="text" id="tecnico" placeholder="Seu Nome">
                </div>

                <div class="btn-group full-width">
                    <button type="submit" class="btn-primary">GERAR CARIMBO COMPLETO</button>
                    <button type="button" class="btn-secondary" onclick="generateSwap()">GERAR CARIMBO SWAP</button>
                </div>
            </form>
        </div>

        <div class="sidebar">
            <div class="template-box">
                <h4>📌 AVISO DE MANUTENÇÃO</h4>
                <button class="btn-secondary" style="width:100%; font-size:11px;" onclick="copyTemplate('manutencao')">Copiar Template</button>
            </div>
            <div class="template-box" style="border-left-color: var(--warning);">
                <h4>📢 NOTIFICAÇÃO CLIENTE</h4>
                <button class="btn-secondary" style="width:100%; font-size:11px;" onclick="copyTemplate('cliente')">Copiar Template</button>
            </div>
            <div class="template-box" style="border-left-color: var(--success);">
                <h4>✅ ENCERRAMENTO/RFO</h4>
                <button class="btn-secondary" style="width:100%; font-size:11px;" onclick="copyTemplate('rfo')">Copiar Template</button>
            </div>
        </div>
    </div>

    <div class="output-section" id="reportsList"></div>
</div>

<script>
    // Relógio Real-time
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('pt-BR');
    }, 1000);

    const list = document.getElementById('reportsList');

    // Funções de Template
    const templates = {
        manutencao: "⚠️ NOTIFICAÇÃO DE MANUTENÇÃO EMERGENCIAL\n----------------------------------\nPrezados,\nInformamos que realizaremos uma intervenção técnica no trecho [TRECHO].\nInício: [HORA]\nPrevisão: 02 Horas\nImpacto: Interrupção temporária dos serviços.",
        cliente: "📢 STATUS DE INCIDENTE\n----------------------------------\nInformamos que detectamos uma instabilidade no trecho [TRECHO].\nNossas equipes técnicas já foram acionadas e estão em fase de diagnóstico.\nProtocolo: [PROT]",
        rfo: "✅ INCIDENTE FINALIZADO (RFO)\n----------------------------------\nCausa: [CAUSA]\nAção: [REPARO]\nNormalização: [HORA]\nStatus: Estabilizado e em monitoramento."
    };

    function copyTemplate(tipo) {
        navigator.clipboard.writeText(templates[tipo]);
        alert("Template copiado! Cole e edite as informações entre colchetes [ ].");
    }

    // Gerar Carimbo de Incidente
    document.getElementById('nocForm').addEventListener('submit', (e) => {
        e.preventDefault();
        createCard("INCIDENTE", getFormData());
    });

    // Gerar Carimbo de SWAP
    function generateSwap() {
        const data = getFormData();
        createCard("SWAP TÉCNICO", data, true);
    }

    function getFormData() {
        return {
            protocolo: document.getElementById('protocolo').value || "N/A",
            op: document.getElementById('operadora').value || "N/A",
            trecho: document.getElementById('trecho').value || "N/A",
            desc: document.getElementById('desc_falha').value || "N/A",
            equip: document.getElementById('equip').value || "N/A",
            inter: document.getElementById('interface').value || "N/A",
            status: document.getElementById('falha').value,
            tec: document.getElementById('tecnico').value || "NOC_AUTO",
            hora: new Date().toLocaleString('pt-BR')
        };
    }

    function createCard(tipo, d, isSwap = false) {
        let content = "";
        
        if(isSwap) {
            content = `🔄 **CARIMBO DE SWAP / TROCA DE EQUIPAMENTO**
-------------------------------------------
ID PROT: ${d.protocolo}
DATA/HORA: ${d.hora}
EQUIP. ATUAL: ${d.equip}
INTERFACE: ${d.inter}
TRECHO AFETADO: ${d.trecho}
MOTIVO: ${d.desc}
TÉCNICO RESP: ${d.tec}
STATUS: AGUARDANDO SUBSTITUIÇÃO
-------------------------------------------`;
        } else {
            content = `🚨 **CARIMBO DE INCIDENTE NOC**
-------------------------------------------
ID: ${d.protocolo} | STATUS: ${d.status}
DATA: ${d.hora}
CLIENTE/OP: ${d.op}
LOCAL/TRECHO: ${d.trecho}
FALHA: ${d.desc}
HARDWARE: ${d.equip} (${d.inter})
RESPONSÁVEL: ${d.tec}
-------------------------------------------`;
        }

        const card = document.createElement('div');
        card.className = 'report-card';
        card.innerHTML = `
            <div class="report-header">
                <span class="tag-status">${tipo}</span>
                <span style="font-size:10px; opacity:0.7">${d.hora}</span>
            </div>
            <div class="report-content">${content}</div>
            <div style="display:flex; gap:10px;">
                <button class="copy-btn-mini" onclick="copyCard(this)">COPIAR CARIMBO</button>
                <button class="copy-btn-mini" style="background:var(--danger)" onclick="this.parentElement.parentElement.remove()">REMOVER</button>
            </div>
        `;
        list.prepend(card);
    }

    function copyCard(btn) {
        const text = btn.parentElement.parentElement.querySelector('.report-content').innerText;
        navigator.clipboard.writeText(text);
        const originalText = btn.innerText;
        btn.innerText = "✅ COPIADO!";
        setTimeout(() => btn.innerText = originalText, 2000);
    }
</script>

</body>
</html>
