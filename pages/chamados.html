<!DOCTYPE html>

<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOC - Escalonamentos</title>

<style>
:root {
  --bg:#020617;
  --card:#1e293b;
  --primary:#38bdf8;
  --ok:#22c55e;
  --warn:#facc15;
  --danger:#ef4444;
}

body { font-family: Arial; background:var(--bg); color:#fff; padding:20px;}
.container { max-width:1100px; margin:auto;}

input,select,textarea,button{
  padding:10px;margin:5px;border-radius:6px;border:none;
}

button{background:var(--primary);cursor:pointer;}

.card{
  background:var(--card);
  padding:15px;
  margin:10px 0;
  border-radius:10px;
  border-left:6px solid var(--ok);
}

.card.warn{border-color:var(--warn);}
.card.danger{border-color:var(--danger);}

.step{
  padding:5px;
  margin:4px 0;
  border-radius:6px;
  cursor:pointer;
  background:#0f172a;
}

.step.done{
  text-decoration: line-through;
  opacity:0.5;
}

.step.current{
  border-left:4px solid var(--primary);
  font-weight:bold;
}

.timer{margin-top:5px;font-weight:bold;}

.tabs button{margin:5px;}
.hidden{display:none;}
</style>

</head>

<body>

<div class="container">

<h2>📡 NOC Escalation</h2>

<div>
<input id="titulo" placeholder="Título">
<input id="pai" placeholder="Pai">
<input id="filho" placeholder="Filho">
<select id="tipo">
<option value="externa">Rede Externa</option>
<option value="interna">Rede Interna</option>
</select>
<textarea id="descricao" placeholder="Descrição"></textarea>
<button onclick="add()">Adicionar</button>
</div>

<div class="tabs">
<button onclick="showTab('ativos')">Ativos</button>
<button onclick="showTab('resolvidos')">Resolvidos</button>
</div>

<div id="ativos"></div>
<div id="resolvidos" class="hidden"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import {
getDatabase, ref, push, onChildAdded,
onChildRemoved, update, remove, get
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

// FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyCdSj6somJinHJvcGGJs3C6Od6Sri92ETg",
  authDomain: "chamadosnoc-c45c4.firebaseapp.com",
  databaseURL: "https://chamadosnoc-c45c4-default-rtdb.firebaseio.com",
  projectId: "chamadosnoc-c45c4",
  storageBucket: "chamadosnoc-c45c4.appspot.com",
  messagingSenderId: "25502320062",
  appId: "1:25502320062:web:a7f41ad4f61e0c38b265ef"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ESCALA COMPLETA
const escala = {
  externa: [
    {h:4,n:"Erivelton",tel:"558898283311"},
    {h:8,n:"Guilherme",tel:"558899282323"},
    {h:10,n:"Valmir",tel:"558898287071"},
    {h:12,n:"Fernando",tel:"5588994401255"}
  ],
  interna: [
    {h:4,n:"Joao",tel:"558898283337"},
    {h:8,n:"Wescley",tel:"558894866085"},
    {h:10,n:"Valmir",tel:"558898287071"},
    {h:12,n:"Fernando",tel:"5588994401255"}
  ]
};

// ADD
window.add = function(){
  push(ref(db,"ativos"),{
    titulo:titulo.value,
    pai:pai.value,
    filho:filho.value,
    descricao:descricao.value,
    tipo:tipo.value,
    inicio:new Date().getTime(),
    escalado:[]
  });

  document.querySelectorAll("input, textarea").forEach(e=>e.value="");
}

// RENDER
function renderCard(id,data,container){

  const div = document.createElement("div");
  div.className="card";
  div.id=id;

  function updateUI(){

    const diff = (Date.now()-data.inicio)/3600000;

    let nivelAtual = null;

    escala[data.tipo].forEach(e=>{
      if(diff>=e.h) nivelAtual = e;
    });

    div.classList.remove("warn","danger");
    if(diff>=8) div.classList.add("warn");
    if(diff>=10) div.classList.add("danger");

    let stepsHTML="";

    escala[data.tipo].forEach(e=>{

      const done = data.escalado?.includes(e.h);
      const current = nivelAtual && nivelAtual.h===e.h;

      stepsHTML += `
        <div class="step ${done?'done':''} ${current?'current':''}"
             onclick="toggleEscala('${id}',${e.h})">
          ${e.h}h - ${e.n} 
          ${done?'✔':''}
          <br>
          <a href="tel:+${e.tel}">📞</a>
          <a href="https://wa.me/${e.tel}" target="_blank">💬</a>
        </div>
      `;
    });

    div.innerHTML = `
      <strong>${data.titulo}</strong><br>
      Pai: ${data.pai||"-"} | Filho: ${data.filho||"-"}<br>
      📝 ${data.descricao||"-"}<br>

      <div class="timer">
        ⏱ ${Math.floor(diff)}h ${Math.floor((diff%1)*60)}m
      </div>

      <div>${stepsHTML}</div>

      <br>
      ${
        container==="ativos"
        ? `<button onclick="finalizar('${id}')">Finalizar</button>`
        : `<small>✔ Resolvido</small>`
      }
    `;

  }

  updateUI();
  setInterval(updateUI,60000);

  document.getElementById(container).appendChild(div);
}

// FIREBASE
onChildAdded(ref(db,"ativos"), snap=>{
  renderCard(snap.key,snap.val(),"ativos");
});

onChildAdded(ref(db,"resolvidos"), snap=>{
  renderCard(snap.key,snap.val(),"resolvidos");
});

// TOGGLE ESCALA
window.toggleEscala = function(id,h){

  get(ref(db,"ativos/"+id)).then(snap=>{
    let data = snap.val();
    let lista = data.escalado || [];

    if(lista.includes(h)){
      lista = lista.filter(x=>x!==h);
    } else {
      lista.push(h);
    }

    update(ref(db,"ativos/"+id),{escalado:lista});
    location.reload();
  });

}

// FINALIZAR
window.finalizar = function(id){
  get(ref(db,"ativos/"+id)).then(snap=>{
    push(ref(db,"resolvidos"), snap.val());
    remove(ref(db,"ativos/"+id));
    location.reload();
  });
}

// TABS
window.showTab = function(tab){
  ativos.style.display = tab==="ativos"?"block":"none";
  resolvidos.style.display = tab==="resolvidos"?"block":"none";
}

</script>

</body>
</html>
