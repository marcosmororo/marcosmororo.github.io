<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOC Escalation Pro - Dark Elite</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #05070a;
            --card: #11141d;
            --header: #1a1f2e;
            --primary: #00d2ff;
            --primary-glow: rgba(0, 210, 255, 0.2);
            --ok: #00ff95;
            --warn: #ffb800;
            --danger: #ff4d4d;
            --text-main: #e2e8f0;
            --text-dim: #64748b;
            --whatsapp: #25d366;
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-main); margin: 0; padding: 15px; }

        /* Scrollbar Moderna */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--header); border-radius: 10px; }

        .container { max-width: 100%; margin: auto; }

        /* Header Moderno */
        .page-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; padding: 10px; background: rgba(26, 31, 46, 0.5);
            backdrop-filter: blur(10px); border-radius: 12px; border: 1px solid rgba(255,255,255,0.05);
        }
        .logo-area h2 { 
            margin: 0; font-size: 1.5rem; font-weight: 800;
            background: linear-gradient(to right, #00d2ff, #3a7bd5);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        #page-clock { font-family: 'JetBrains Mono', monospace; font-size: 1.2rem; color: var(--primary); text-shadow: 0 0 10px var(--primary-glow); }

        /* Painel de Controle (Glassmorphism) */
        .admin-panel {
            background: rgba(17, 20, 29, 0.8); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px; padding: 25px; margin-bottom: 30px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        
        label { font-size: 0.75rem; color: var(--primary); text-transform: uppercase; font-weight: 800; letter-spacing: 1px; }
        
        input, select, textarea { 
            background: #080a0f; border: 1px solid var(--header); color: white; 
            padding: 12px 16px; border-radius: 10px; font-size: 14px; outline: none;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-glow); }
        
        textarea { grid-column: span 2; height: 50px; resize: none; }

        .btn-add { 
            background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%); 
            color: white; border: none; border-radius: 10px; cursor: pointer;
            font-weight: 800; text-transform: uppercase; letter-spacing: 1px;
            height: 50px; width: 100%; box-shadow: 0 10px 20px rgba(0, 210, 255, 0.2);
        }
        .btn-add:hover { transform: scale(1.02); filter: brightness(1.2); }

        /* Tabs Elite */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tabs button { 
            background: #11141d; color: var(--text-dim); padding: 12px 25px; 
            border: 1px solid var(--header); border-radius: 10px; font-size: 0.8rem; font-weight: 700; cursor: pointer;
        }
        .tabs button.active { border-color: var(--primary); color: var(--primary); background: rgba(0, 210, 255, 0.05); }

        /* Cards Grid */
        .grid-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }

        .card {
            background: var(--card); border: 1px solid rgba(255,255,255,0.03); border-radius: 18px;
            padding: 20px; position: relative; overflow: hidden;
        }
        .card::before { content: ""; position: absolute; top:0; left:0; width: 100%; height: 4px; background: var(--ok); }
        .card.warn::before { background: var(--warn); }
        .card.danger::before { background: var(--danger); }
        .card.ativo { box-shadow: 0 0 20px rgba(0, 255, 149, 0.05); }
        .card.finalizado { opacity: 0.6; filter: grayscale(0.8); }

        /* Timer Neon */
        .timer-box { background: #080a0f; border-radius: 12px; padding: 15px; text-align: center; margin: 15px 0; border: 1px solid rgba(255,255,255,0.02); }
        .timer-val { font-family: 'JetBrains Mono', monospace; font-size: 1.6rem; color: var(--primary); text-shadow: 0 0 15px rgba(0, 210, 255, 0.3); }

        .step {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.02); padding: 10px 15px; margin: 6px 0;
            border-radius: 10px; font-size: 0.85rem; border: 1px solid transparent;
        }
        .step.done { background: rgba(0, 255, 149, 0.05); border-color: rgba(0, 255, 149, 0.2); }
        .step.next-to-call { border: 1px solid var(--warn); background: rgba(255, 184, 0, 0.05); animation: pulse 1.5s infinite; }

        @keyframes pulse { 0% { box-shadow: 0 0 0px var(--warn); } 50% { box-shadow: 0 0 15px var(--warn); } 100% { box-shadow: 0 0 0px var(--warn); } }

        .wa-link { color: var(--whatsapp); font-size: 1.2rem; text-decoration: none; }
        .wa-link:hover { transform: scale(1.2); }

        .log-container { background: #080a0f; padding: 10px; border-radius: 10px; font-size: 0.75rem; max-height: 100px; overflow-y: auto; color: var(--text-dim); }
        
        .btn-encerrar { 
            background: transparent; border: 1px solid var(--ok); color: var(--ok); 
            width: 100%; border-radius: 10px; padding: 12px; margin-top: 15px; 
            font-weight: 800; cursor: pointer;
        }
        .btn-encerrar:hover { background: var(--ok); color: var(--bg); }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="page-header">
        <div class="logo-area"><h2><i class="fa-solid fa-satellite-dish"></i> NOC ELITE ESCALATION</h2></div>
        <div id="page-clock">00:00:00</div>
    </div>

    <div class="admin-panel">
        <div class="form-row">
            <div class="form-group"><label><i class="fa-solid fa-tag"></i> Título</label><input id="titulo" placeholder="Ex: Queda Geral Core"></div>
            <div class="form-group"><label><i class="fa-solid fa-server"></i> Elemento Pai</label><input id="pai" placeholder="Concentrador"></div>
            <div class="form-group"><label><i class="fa-solid fa-microchip"></i> Filho</label><input id="filho" placeholder="Slot/CTO"></div>
            <div class="form-group">
                <label><i class="fa-solid fa-network-wired"></i> Tipo</label>
                <select id="tipo">
                    <option value="externa">Rede Externa</option>
                    <option value="interna">Rede Interna</option>
                </select>
            </div>
        </div>
        <div class="form-row" style="grid-template-columns: 1fr 1fr 2fr 1fr;">
            <div class="form-group"><label>Data</label><input type="date" id="data_manual"></div>
            <div class="form-group"><label>Hora</label><input type="time" id="hora_manual"></div>
            <div class="form-group"><label>Detalhes</label><textarea id="descricao" placeholder="Relatório inicial..."></textarea></div>
            <button class="btn-add" onclick="add()">Registrar <i class="fa-solid fa-bolt"></i></button>
        </div>
    </div>

    <div class="tabs">
        <button id="btn-tab-ativos" class="active" onclick="showTab('ativos')">INCIDENTES ATIVOS</button>
        <button id="btn-tab-resolvidos" onclick="showTab('resolvidos')">HISTÓRICO</button>
    </div>

    <div id="ativos" class="grid-cards"></div>
    <div id="resolvidos" class="grid-cards hidden"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getDatabase, ref, push, update, remove, onValue } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCdSj6somJinHJvcGGJs3C6Od6Sri92ETg",
        authDomain: "chamadosnoc-c45c4.firebaseapp.com",
        databaseURL: "https://chamadosnoc-c45c4-default-rtdb.firebaseio.com",
        projectId: "chamadosnoc-c45c4",
        storageBucket: "chamadosnoc-c45c4.appspot.com",
        messagingSenderId: "25502320062",
        appId: "1:25502320062:web:a7f41ad4f61e0c38b265ef"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const escala = {
        externa: [{h:4, n:"Erivelton", tel:"558898283311"}, {h:8, n:"Guilherme", tel:"558899282323"}, {h:10, n:"Valmir", tel:"558898287071"}, {h:12, n:"Fernando", tel:"5588994401255"}],
        interna: [{h:4, n:"Joao", tel:"558898283337"}, {h:8, n:"Wescley", tel:"558894866085"}, {h:10, n:"Valmir", tel:"558898287071"}, {h:12, n:"Fernando", tel:"5588994401255"}]
    };

    setInterval(() => { document.getElementById('page-clock').innerText = new Date().toLocaleTimeString('pt-BR'); }, 1000);

    function formatTime(ms) {
        const h = Math.floor(ms / 3600000);
        const m = Math.floor((ms % 3600000) / 60000);
        const s = Math.floor((ms % 60000) / 1000);
        return `${h}h ${m}m ${s}s`;
    }

    function refreshTimers() {
        const now = Date.now();
        document.querySelectorAll('.card.ativo').forEach(card => {
            const start = parseInt(card.dataset.start);
            const escalado = JSON.parse(card.dataset.escalado || "[]");
            const diffMs = now - start;
            const diffH = diffMs / 3600000;

            card.querySelector('.timer-val').innerText = formatTime(diffMs);
            card.classList.toggle('warn', diffH >= 8 && diffH < 10);
            card.classList.toggle('danger', diffH >= 10);

            let alertado = false;
            card.querySelectorAll('.step[data-h]').forEach(step => {
                const stepH = parseInt(step.dataset.h);
                const isNext = diffH >= stepH && !escalado.includes(stepH) && !alertado;
                step.classList.toggle('next-to-call', isNext);
                if(isNext) alertado = true;
            });
        });
    }
    setInterval(refreshTimers, 1000);

    window.add = function(){
        const t = document.getElementById("titulo").value;
        const dM = document.getElementById("data_manual").value;
        const hM = document.getElementById("hora_manual").value;
        if(!t) return alert("Defina um título!");

        let dataE = dM && hM ? new Date(`${dM}T${hM}`) : new Date();

        push(ref(db,"ativos"), {
            titulo: t, pai: document.getElementById("pai").value, filho: document.getElementById("filho").value,
            descricao: document.getElementById("descricao").value, tipo: document.getElementById("tipo").value,
            inicio: dataE.getTime(), dataStr: dataE.toLocaleString('pt-BR'), escalado: [], comentarios: []
        });
        document.querySelectorAll("input, textarea").forEach(e=>e.value="");
    };

    function renderCard(id, data, containerId) {
        const container = document.getElementById(containerId);
        const div = document.createElement("div");
        const isResolvido = containerId === 'resolvidos';
        div.className = `card ${isResolvido ? 'finalizado' : 'ativo'}`;
        div.id = id;
        div.dataset.start = data.inicio;
        div.dataset.escalado = JSON.stringify(data.escalado || []);

        const stepsHTML = escala[data.tipo].map(e => `
            <div class="step ${data.escalado?.includes(e.h) ? 'done' : ''}" data-h="${e.h}" onclick="${!isResolvido ? `toggleEscala('${id}', ${e.h})` : ''}">
                <span><b>${e.h}h</b> - ${e.n}</span>
                <div style="display:flex; gap:12px;">
                    <a href="tel:+${e.tel}" style="color:var(--primary)"><i class="fa-solid fa-phone"></i></a>
                    <a href="https://wa.me/${e.tel}" target="_blank" class="wa-link"><i class="fa-brands fa-whatsapp"></i></a>
                </div>
            </div>`).join('');

        const logsHTML = (data.comentarios || []).map(c => `<div><b style="color:var(--primary)">[${c.hora}]</b> ${c.texto}</div>`).reverse().join('');

        div.innerHTML = `
            <div style="font-size:0.65rem; font-weight:800; color:var(--text-dim); text-transform:uppercase;">${data.dataStr}</div>
            <div style="font-weight:800; font-size:1.2rem; color:white; margin: 5px 0;">${data.titulo}</div>
            <div style="font-size:0.8rem; color:var(--primary);">${data.pai || 'Geral'} / ${data.filho || '-'}</div>
            
            <div class="timer-box"><div class="timer-val">${isResolvido ? formatTime(data.fim - data.inicio) : '...'}</div></div>
            
            <div class="log-container">${logsHTML || 'Sem observações.'}</div>
            ${!isResolvido ? `<div style="display:flex; gap:8px; margin-top:10px;"><input type="text" id="in-${id}" placeholder="Nota..." style="flex:1; padding:8px; font-size:12px;"><button style="background:var(--header); color:white; padding:0 15px; border-radius:8px;" onclick="addComment('${id}')">SALVAR</button></div>` : ''}

            <div style="margin-top:15px;">${stepsHTML}</div>
            
            ${!isResolvido ? `<button class="btn-encerrar" onclick="finalizar('${id}')">FINALIZAR CHAMADO</button>` : `<div style="display:flex; gap:10px;"><button style="background:var(--warn); color:black; flex:1; margin-top:15px; border-radius:10px; padding:10px; font-weight:bold;" onclick="reabrir('${id}')">REABRIR</button><button style="background:var(--danger); color:white; flex:1; margin-top:15px; border-radius:10px; padding:10px; font-weight:bold;" onclick="apagar('${id}')">EXCLUIR</button></div>`}
        `;
        container.appendChild(div);
    }

    // (Funções de Banco de Dados permanecem iguais para manter os dados intactos)
    window.addComment = (id) => {
        const inp = document.getElementById(`in-${id}`);
        if(!inp.value) return;
        onValue(ref(db, `ativos/${id}`), s => {
            const list = s.val().comentarios || [];
            list.push({ texto: inp.value, hora: new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'}) });
            update(ref(db, `ativos/${id}`), { comentarios: list });
            inp.value = "";
        }, { onlyOnce: true });
    };

    window.toggleEscala = (id, h) => {
        onValue(ref(db, `ativos/${id}`), s => {
            let list = s.val().escalado || [];
            list = list.includes(h) ? list.filter(x => x !== h) : [...list, h];
            update(ref(db, `ativos/${id}`), { escalado: list });
        }, { onlyOnce: true });
    };

    window.finalizar = (id) => {
        onValue(ref(db, `ativos/${id}`), s => {
            const d = s.val(); if(!d) return;
            push(ref(db, "resolvidos"), { ...d, fim: Date.now() });
            remove(ref(db, `ativos/${id}`));
        }, { onlyOnce: true });
    };

    window.reabrir = (id) => {
        onValue(ref(db, `resolvidos/${id}`), s => {
            const d = s.val(); if(!d) return;
            const { fim, ...rest } = d;
            push(ref(db, "ativos"), rest);
            remove(ref(db, `resolvidos/${id}`));
        }, { onlyOnce: true });
    };

    window.apagar = (id) => { if(confirm("Deseja deletar do histórico?")) remove(ref(db, `resolvidos/${id}`)); };

    onValue(ref(db, "ativos"), snap => { document.getElementById("ativos").innerHTML = ""; snap.forEach(c => renderCard(c.key, c.val(), "ativos")); });
    onValue(ref(db, "resolvidos"), snap => { document.getElementById("resolvidos").innerHTML = ""; snap.forEach(c => renderCard(c.key, c.val(), "resolvidos")); });

    window.showTab = (tab) => {
        document.getElementById("ativos").classList.toggle("hidden", tab !== "ativos");
        document.getElementById("resolvidos").classList.toggle("hidden", tab !== "resolvidos");
        document.getElementById("btn-tab-ativos").classList.toggle("active", tab === "ativos");
        document.getElementById("btn-tab-resolvidos").classList.toggle("active", tab === "resolvidos");
    };
</script>
</body>
</html>
