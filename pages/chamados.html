<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOC Horizon Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #05070a; --card: #11141d; --header: #1a1f2e;
            --primary: #00d2ff; --ok: #00ff95; --warn: #ffb800; --danger: #ff4d4d;
            --text-main: #e2e8f0; --text-dim: #64748b; --input-bg: #080a0f; --whatsapp: #25d366;
        }

        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-main); margin: 0; padding: 10px; }
        
        .page-header { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: var(--card); border-radius: 12px; border: 1px solid var(--header); margin-bottom: 15px; }
        .nav-btn { background: var(--primary); border: none; padding: 10px 15px; border-radius: 8px; color: #000; font-weight: 800; cursor: pointer; }

        .metrics-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .metric-card { background: var(--card); padding: 12px; border-radius: 12px; border: 1px solid var(--header); text-align: center; }
        .metric-card span { font-size: 0.65rem; color: var(--text-dim); display: block; }
        .metric-card b { font-size: 1.3rem; font-family: 'JetBrains Mono'; color: var(--primary); }

        .admin-panel { background: var(--card); border: 1px solid var(--header); border-radius: 12px; padding: 15px; margin-bottom: 20px; }
        .form-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        @media (min-width: 600px) { .form-grid { grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); } }
        
        input, select { background: var(--input-bg); border: 1px solid var(--header); color: #fff; padding: 12px; border-radius: 8px; font-size: 16px; width: 100%; }
        .btn-add { background: var(--ok); color: #000; border: none; border-radius: 8px; font-weight: 800; cursor: pointer; }

        .tabs { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 12px; background: var(--card); border: 1px solid var(--header); color: var(--text-dim); border-radius: 8px; font-weight: 700; }
        .tab-btn.active { border-color: var(--primary); color: var(--primary); background: rgba(0,210,255,0.05); }

        .grid-cards { display: grid; grid-template-columns: 1fr; gap: 15px; }
        @media (min-width: 800px) { .grid-cards { grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); } }

        .card { background: var(--card); border: 1px solid var(--header); border-radius: 16px; padding: 15px; border-top: 5px solid var(--ok); }
        .card.warning { border-top-color: var(--warn); }
        .card.danger { border-top-color: var(--danger); }

        .timer-val { font-family: 'JetBrains Mono'; font-size: 1.5rem; color: var(--primary); text-align: center; display: block; margin: 10px 0; }

        /* Notas e Logs */
        .log-box { background: var(--input-bg); border-radius: 8px; padding: 10px; font-size: 0.8rem; max-height: 120px; overflow-y: auto; border: 1px solid var(--header); margin-bottom: 10px; }
        .log-entry { margin-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 4px; }
        .log-meta { color: var(--primary); font-size: 0.7rem; font-weight: 800; display: block; }

        .note-input { display: flex; gap: 5px; margin-bottom: 15px; }
        .note-input input { font-size: 0.85rem; padding: 10px; }

        /* Escalonamento */
        .step { display: flex; justify-content: space-between; align-items: center; background: var(--input-bg); padding: 12px; border-radius: 10px; margin-bottom: 6px; border: 1px solid transparent; }
        .step.done { opacity: 0.3; border-style: dashed; background: transparent; }
        .step.pulse { border-color: var(--warn); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0px rgba(255,184,0,0.4); } 100% { box-shadow: 0 0 0 8px rgba(255,184,0,0); } }

        .wa-link { color: var(--whatsapp); font-size: 1.4rem; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="page-header">
        <b>NOC HORIZON</b>
        <div style="display:flex; gap:10px;">
            <button class="nav-btn" onclick="toggleView('partners')" id="btn-p"><i class="fa-solid fa-phone"></i></button>
            <button class="nav-btn hidden" onclick="toggleView('main')" id="btn-m"><i class="fa-solid fa-house"></i></button>
        </div>
    </div>

    <div id="view-main">
        <div class="metrics-bar">
            <div class="metric-card"><span>ATIVOS</span><b id="m-total">0</b></div>
            <div class="metric-card"><span>EXTERNA</span><b id="m-ext">0</b></div>
            <div class="metric-card"><span>INTERNA</span><b id="m-int">0</b></div>
        </div>

        <div class="admin-panel">
            <div class="form-grid">
                <input id="f-tit" placeholder="Título do Chamado">
                <input id="f-pai" placeholder="Protocolo Pai" type="tel">
                <input id="f-fil" placeholder="Protocolo Filho" type="tel">
                <select id="f-tipo">
                    <option value="externa_ne">Externa (NE)</option>
                    <option value="externa_no">Externa (NO)</option>
                    <option value="interna_ne">Interna (NE)</option>
                    <option value="interna_no">Interna (NO)</option>
                </select>
                <button class="btn-add" onclick="criarChamado()">ABRIR</button>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" id="t-atv" onclick="changeTab('ativos')">ATIVOS</button>
            <button class="tab-btn" id="t-his" onclick="changeTab('resolvidos')">HISTÓRICO</button>
        </div>

        <div id="container-ativos" class="grid-cards"></div>
        <div id="container-resolvidos" class="grid-cards hidden"></div>
    </div>

    <div id="view-partners" class="hidden">
        <div class="admin-panel">
            <h3>Parceiros</h3>
            <div style="background:var(--input-bg); padding:15px; border-radius:10px; display:flex; justify-content:space-between; align-items:center;">
                <div><b>Operadora X</b><br><small>Link Principal</small></div>
                <a href="#" class="wa-link"><i class="fa-brands fa-whatsapp"></i></a>
            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getDatabase, ref, push, update, remove, onValue, get } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCdSj6somJinHJvcGGJs3C6Od6Sri92ETg",
        authDomain: "chamadosnoc-c45c4.firebaseapp.com",
        databaseURL: "https://chamadosnoc-c45c4-default-rtdb.firebaseio.com",
        projectId: "chamadosnoc-c45c4",
        storageBucket: "chamadosnoc-c45c4.appspot.com",
        messagingSenderId: "25502320062",
        appId: "1:25502320062:web:a7f41ad4f61e0c38b265ef"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const ESCALONAMENTOS = {
        "externa_ne": [{h:4, n:"Erivelton", t:"558898283311"}, {h:8, n:"Guilherme", t:"558899282323"}, {h:10, n:"Iran Jr", t:"558899870725"}, {h:12, n:"Fernando", t:"5588994401255"}],
        "externa_no": [{h:4, n:"Clecio", t:"558898283311"}, {h:8, n:"Maciel", t:"558899282323"}, {h:10, n:"Valmir", t:"558898287071"}, {h:12, n:"Fernando", t:"5588994401255"}],
        "interna_ne": [{h:4, n:"Joao", t:"558898283337"}, {h:8, n:"Wescley", t:"558894866085"}, {h:10, n:"Iran Jr", t:"558899870725"}, {h:12, n:"Fernando", t:"5588994401255"}],
        "interna_no": [{h:4, n:"Nildo", t:"558898283337"}, {h:8, n:"Julio Gaia", t:"558894866085"}, {h:10, n:"Valmir", t:"558898287071"}, {h:12, n:"Fernando", t:"5588994401255"}]
    };

    // CRIAÇÃO
    window.criarChamado = () => {
        const tit = document.getElementById('f-tit').value;
        const pai = document.getElementById('f-pai').value;
        if(!tit || !pai) return alert("Título e Pai são obrigatórios!");

        push(ref(db, 'ativos'), {
            titulo: tit, pai: pai, filho: document.getElementById('f-fil').value,
            tipo: document.getElementById('f-tipo').value,
            inicio: Date.now(), escalados: [], notas: []
        });
        document.getElementById('f-tit').value = ''; document.getElementById('f-pai').value = '';
    };

    // RENDERIZAÇÃO DOS CARDS
    onValue(ref(db, 'ativos'), snap => {
        const div = document.getElementById('container-ativos');
        div.innerHTML = '';
        let total = 0, ext = 0, i_nt = 0;

        snap.forEach(child => {
            const d = child.val();
            const id = child.key;
            total++; (d.tipo.includes('externa')) ? ext++ : i_nt++;

            const logs = (d.notas || []).map(n => `<div class="log-entry"><span class="log-meta">${n.dh}</span>${n.txt}</div>`).reverse().join('');
            const steps = (ESCALONAMENTOS[d.tipo] || []).map(e => {
                const feito = (d.escalados || []).includes(e.h);
                return `
                <div class="step ${feito ? 'done' : ''}" id="step-${id}-${e.h}">
                    <span onclick="toggleEscala('${id}', ${e.h})"><b>${e.h}h</b> - ${e.n}</span>
                    <a href="https://wa.me/${e.t}" class="wa-link" target="_blank"><i class="fa-brands fa-whatsapp"></i></a>
                </div>`;
            }).join('');

            div.innerHTML += `
                <div class="card" id="card-${id}" data-start="${d.inicio}" data-tipo="${d.tipo}" data-esc='${JSON.stringify(d.escalados || [])}'>
                    <div style="font-weight:800">${d.titulo}</div>
                    <div style="font-size:0.7rem; color:var(--text-dim)">P: ${d.pai} | F: ${d.filho}</div>
                    <b class="timer-val" id="time-${id}">00:00:00</b>
                    <div class="log-box">${logs || 'Sem notas registradas.'}</div>
                    <div class="note-input">
                        <input type="text" id="in-${id}" placeholder="Nota de escalonamento...">
                        <button class="nav-btn" onclick="addNota('${id}')"><i class="fa-solid fa-save"></i></button>
                    </div>
                    <div class="steps-area">${steps}</div>
                    <button class="btn-add" style="width:100%; margin-top:10px; padding:10px" onclick="finalizar('${id}')">ENCERRAR</button>
                </div>
            `;
        });
        document.getElementById('m-total').innerText = total;
        document.getElementById('m-ext').innerText = ext;
        document.getElementById('m-int').innerText = i_nt;
    });

    // LÓGICA DE TEMPO E PULSO
    setInterval(() => {
        document.querySelectorAll('.card').forEach(c => {
            const start = parseInt(c.dataset.start);
            const now = Date.now();
            const diff = now - start;
            const horas = diff / 3600000;
            const id = c.id.replace('card-', '');
            
            document.getElementById(`time-${id}`).innerText = new Date(diff).toISOString().substr(11, 8);

            // Alertas de Cor
            c.classList.toggle('warning', horas >= 8 && horas < 10);
            c.classList.toggle('danger', horas >= 10);

            // Verificação de próximo escalonamento
            const escFeitos = JSON.parse(c.dataset.esc);
            const config = ESCALONAMENTOS[c.dataset.tipo];
            let alertado = false;

            config.forEach(e => {
                const el = document.getElementById(`step-${id}-${e.h}`);
                if(horas >= e.h && !escFeitos.includes(e.h) && !alertado) {
                    el.classList.add('pulse'); alertado = true;
                } else {
                    el.classList.remove('pulse');
                }
            });
        });
    }, 1000);

    // FUNÇÕES DE AÇÃO
    window.addNota = (id) => {
        const val = document.getElementById(`in-${id}`).value;
        if(!val) return;
        const dh = new Date().toLocaleString('pt-BR', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'});
        
        get(ref(db, `ativos/${id}/notas`)).then(s => {
            const notas = s.val() || [];
            notas.push({ txt: val, dh: dh });
            update(ref(db, `ativos/${id}`), { notas: notas });
        });
    };

    window.toggleEscala = (id, h) => {
        get(ref(db, `ativos/${id}/escalados`)).then(s => {
            let list = s.val() || [];
            list = list.includes(h) ? list.filter(x => x !== h) : [...list, h];
            update(ref(db, `ativos/${id}`), { escalados: list });
        });
    };

    window.finalizar = (id) => {
        get(ref(db, `ativos/${id}`)).then(s => {
            push(ref(db, 'resolvidos'), { ...s.val(), fim: Date.now() });
            remove(ref(db, `ativos/${id}`));
        });
    };

    // NAVEGAÇÃO
    window.toggleView = (v) => {
        document.getElementById('view-main').classList.toggle('hidden', v==='partners');
        document.getElementById('view-partners').classList.toggle('hidden', v==='main');
        document.getElementById('btn-p').classList.toggle('hidden', v==='partners');
        document.getElementById('btn-m').classList.toggle('hidden', v==='main');
    };

    window.changeTab = (t) => {
        document.getElementById('container-ativos').classList.toggle('hidden', t==='resolvidos');
        document.getElementById('container-resolvidos').classList.toggle('hidden', t==='ativos');
        document.getElementById('t-atv').classList.toggle('active', t==='ativos');
        document.getElementById('t-his').classList.toggle('active', t==='resolvidos');
    };
</script>
</body>
</html>
