<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>NOC Monitor - Sincronizado</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <style>
        :root { --bg: #020617; --card: #1e293b; --primary: #38bdf8; --text: #f1f5f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        .form { background: var(--card); padding: 20px; border-radius: 12px; display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 30px; }
        input, select, button { padding: 10px; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: white; }
        button { background: var(--primary); color: #020617; font-weight: bold; cursor: pointer; border: none; }
        .card { background: var(--card); border-radius: 12px; padding: 20px; margin-bottom: 15px; border-left: 8px solid var(--primary); display: flex; justify-content: space-between; align-items: center; }
        .timer { background: var(--primary); color: #020617; padding: 5px 10px; border-radius: 6px; font-weight: bold; font-family: monospace; }
        .step { font-size: 13px; padding: 5px; opacity: 0.3; }
        .step.active { opacity: 1; background: rgba(56, 189, 248, 0.1); border-left: 3px solid var(--primary); font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>📑 NOC Monitor (GitHub Pages)</h2>
    
    <div class="form">
        <input type="text" id="titulo" placeholder="Título do Incidente">
        <input type="time" id="hora">
        <select id="tipo">
            <option value="externa">Rede Externa</option>
            <option value="interna">Rede Interna</option>
        </select>
        <button onclick="adicionar()">Lançar na Nuvem</button>
    </div>

    <div id="lista-chamados"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCdSj6somJinHJvcGGJs3C6Od6Sri92ETg",
        authDomain: "chamadosnoc-c45c4.firebaseapp.com",
        projectId: "chamadosnoc-c45c4",
        storageBucket: "chamadosnoc-c45c4.firebasestorage.app",
        messagingSenderId: "25502320062",
        appId: "1:25502320062:web:0b53a68ebd5324b3b265ef",
        // ESSA URL PRECISA SER EXATAMENTE A DO SEU CONSOLE
        databaseURL: "https://chamadosnoc-c45c4-default-rtdb.firebaseio.com" 
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const escala = {
        externa: [{h:0,n:"Início"}, {h:4,n:"Erivelton"}, {h:8,n:"Guilherme"}, {h:10,n:"Valmir"}, {h:12,n:"Fernando"}],
        interna: [{h:0,n:"Início"}, {h:4,n:"Joao"}, {h:8,n:"Wescley"}, {h:10,n:"Valmir"}, {h:12,n:"Fernando"}]
    };

    function adicionar() {
        const t = document.getElementById("titulo").value;
        const h = document.getElementById("hora").value;
        const tp = document.getElementById("tipo").value;
        if (!t || !h) return alert("Preencha título e hora!");

        const hoje = new Date().toISOString().split('T')[0];
        const inicio = new Date(`${hoje}T${h}`).getTime();

        db.ref('incidentes').push({ titulo: t, inicio: inicio, tipo: tp })
            .then(() => document.getElementById("titulo").value = "")
            .catch(e => alert("Erro ao salvar: " + e.message));
    }

    // LISTAGEM EM TEMPO REAL
    db.ref('incidentes').on('value', (snap) => {
        const container = document.getElementById("lista-chamados");
        container.innerHTML = ""; // Limpa antes de mostrar
        const dados = snap.val();
        
        if (!dados) {
            container.innerHTML = "<p style='opacity:0.5'>Nenhum chamado ativo.</p>";
            return;
        }

        Object.keys(dados).forEach(id => {
            const item = dados[id];
            const decorridoH = (Date.now() - item.inicio) / 3600000;
            
            let htmlEscala = "";
            escala[item.tipo].forEach(e => {
                const ativo = decorridoH >= e.h && (escala[item.tipo].find(p => p.h > e.h)?.h > decorridoH || decorridoH >= 12);
                htmlEscal += `<div class="step ${ativo ? 'active' : ''}">${e.h}h - ${e.n}</div>`;
            });

            container.innerHTML += `
                <div class="card">
                    <div>
                        <h3 style="margin:0">${item.titulo}</h3>
                        <div class="timer" style="margin-top:10px;">${Math.floor(decorridoH)}h ${Math.floor((decorridoH % 1) * 60)}m</div><br>
                        <button onclick="db.ref('incidentes/${id}').remove()" style="background:red; margin-top:10px; font-size:10px;">Encerrar</button>
                    </div>
                    <div style="background:#0f172a; padding:10px; border-radius:8px; width:180px;">${htmlEscala}</div>
                </div>`;
        });
    });

    setInterval(() => { /* Atualiza a página a cada minuto para o timer rodar */ }, 60000);
</script>
</body>
</html>
