<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOC Escalation Pro - Precision</title>

    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --header: #334155;
            --primary: #38bdf8;
            --ok: #10b981;
            --warn: #f59e0b;
            --danger: #ef4444;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --alert: #fbbf24;
        }

        * { box-sizing: border-box; transition: background 0.3s ease; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text-main); margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: auto; }

        /* Header e Relógio da Página */
        .page-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 30px; border-bottom: 1px solid var(--header); padding-bottom: 15px;
        }
        #page-clock { font-family: monospace; font-size: 1.5rem; color: var(--primary); font-weight: bold; }

        /* Formulario Superior */
        .form-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px; background: var(--card); padding: 20px; border-radius: 12px;
            margin-bottom: 25px; border: 1px solid var(--header);
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; font-weight: bold; }
        
        input, select, textarea { background: var(--bg); border: 1px solid var(--header); color: white; padding: 10px; border-radius: 8px; font-size: 14px; }
        textarea { grid-column: 1 / -1; height: 50px; }

        /* Botões */
        button { padding: 10px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .btn-add { background: var(--primary); color: var(--bg); grid-column: 1 / -1; margin-top: 10px; height: 45px; }
        .btn-finish { background: var(--ok); color: white; width: 100%; margin-top: 10px; height: 35px; font-size: 11px; }

        /* Tabs */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tabs button { background: var(--card); color: var(--text-dim); padding: 12px 25px; font-size: 13px; }
        .tabs button.active { background: var(--primary); color: var(--bg); }

        /* Cards */
        .grid-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 20px; }
        .card {
            background: var(--card); padding: 20px; border-radius: 15px;
            border-top: 5px solid var(--ok); box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            display: flex; flex-direction: column; gap: 10px;
        }
        .card.warn { border-top-color: var(--warn); }
        .card.danger { border-top-color: var(--danger); }

        .datetime-badge {
            background: rgba(56, 189, 248, 0.1); color: var(--primary);
            padding: 5px 10px; border-radius: 5px; font-size: 0.8rem; font-weight: bold; text-align: center;
        }

        .timer-box { 
            background: #0f172a; padding: 12px; border-radius: 8px; text-align: center;
            border: 1px solid var(--header);
        }
        .timer-val { font-family: monospace; color: var(--alert); font-size: 1.6rem; font-weight: bold; }

        /* Escalation Steps */
        .step {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(15, 23, 42, 0.6); padding: 10px; margin: 4px 0;
            border-radius: 8px; font-size: 0.85rem; border: 2px solid transparent;
        }
        .step.done { opacity: 0.4; text-decoration: line-through; border-left: 5px solid var(--ok); }
        .step.next-to-call { 
            border-color: var(--alert); 
            background: rgba(251, 191, 36, 0.1);
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse { from { opacity: 0.6; } to { opacity: 1; } }

        .log-container {
            background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; 
            font-size: 0.8rem; max-height: 100px; overflow-y: auto;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="page-header">
        <h2 style="color: var(--primary); margin:0;">📡 NOC ESCALATION SYSTEM</h2>
        <div id="page-clock">00:00:00</div>
    </div>

    <div class="form-grid">
        <div class="form-group"><label>Título</label><input id="titulo" placeholder="Ex: Queda POP Centro"></div>
        <div class="form-group"><label>Pai</label><input id="pai" placeholder="Elemento Pai"></div>
        <div class="form-group"><label>Filho</label><input id="filho" placeholder="Elemento Filho"></div>
        <div class="form-group">
            <label>Tipo</label>
            <select id="tipo">
                <option value="externa">Rede Externa</option>
                <option value="interna">Rede Interna</option>
            </select>
        </div>
        <div class="form-group"><label>Data do Evento</label><input type="date" id="data_manual"></div>
        <div class="form-group"><label>Hora do Evento</label><input type="time" id="hora_manual"></div>
        <textarea id="descricao" placeholder="Descrição inicial do incidente..."></textarea>
        <button class="btn-add" onclick="add()">Registrar Incidente</button>
    </div>

    <div class="tabs">
        <button id="btn-tab-ativos" class="active" onclick="showTab('ativos')">Incidentes Ativos</button>
        <button id="btn-tab-resolvidos" onclick="showTab('resolvidos')">Histórico Resolvidos</button>
    </div>

    <div id="ativos" class="grid-cards"></div>
    <div id="resolvidos" class="grid-cards hidden"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getDatabase, ref, push, update, remove, onValue } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCdSj6somJinHJvcGGJs3C6Od6Sri92ETg",
        authDomain: "chamadosnoc-c45c4.firebaseapp.com",
        databaseURL: "https://chamadosnoc-c45c4-default-rtdb.firebaseio.com",
        projectId: "chamadosnoc-c45c4",
        storageBucket: "chamadosnoc-c45c4.appspot.com",
        messagingSenderId: "25502320062",
        appId: "1:25502320062:web:a7f41ad4f61e0c38b265ef"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const escala = {
        externa: [{h:4, n:"Erivelton", tel:"558898283311"}, {h:8, n:"Guilherme", tel:"558899282323"}, {h:10, n:"Valmir", tel:"558898287071"}, {h:12, n:"Fernando", tel:"5588994401255"}],
        interna: [{h:4, n:"Joao", tel:"558898283337"}, {h:8, n:"Wescley", tel:"558894866085"}, {h:10, n:"Valmir", tel:"558898287071"}, {h:12, n:"Fernando", tel:"5588994401255"}]
    };

    // --- RELÓGIO DA PÁGINA ---
    function updatePageClock() {
        document.getElementById('page-clock').innerText = new Date().toLocaleTimeString('pt-BR');
    }
    setInterval(updatePageClock, 1000);

    // --- LOGICA DE TEMPO REAL DOS CARDS ---
    function refreshTimers() {
        const now = Date.now();
        document.querySelectorAll('.card[data-start]').forEach(card => {
            const start = parseInt(card.dataset.start);
            const escalado = JSON.parse(card.dataset.escalado || "[]");
            const diffMs = now - start;
            const diffH = diffMs / 3600000;

            // Timer do card
            const h = Math.floor(diffH);
            const m = Math.floor((diffMs % 3600000) / 60000);
            const s = Math.floor((diffMs % 60000) / 1000);
            card.querySelector('.timer-val').innerText = `${h}h ${m}m ${s}s`;

            // Cores do card
            card.classList.toggle('warn', diffH >= 8 && diffH < 10);
            card.classList.toggle('danger', diffH >= 10);

            // Alerta de Escalonamento Pendente
            let jaAvisou = false;
            card.querySelectorAll('.step[data-h]').forEach(step => {
                const stepH = parseInt(step.dataset.h);
                const isNext = diffH >= stepH && !escalado.includes(stepH) && !jaAvisou;
                step.classList.toggle('next-to-call', isNext);
                if(isNext) jaAvisou = true;
            });
        });
    }
    setInterval(refreshTimers, 1000);

    window.add = function(){
        const t = document.getElementById("titulo").value;
        const dManual = document.getElementById("data_manual").value;
        const hManual = document.getElementById("hora_manual").value;
        if(!t) return alert("Título obrigatório");

        let dataEvento = new Date();
        if(dManual && hManual) {
            dataEvento = new Date(`${dManual}T${hManual}`);
        }

        push(ref(db,"ativos"), {
            titulo: t,
            pai: document.getElementById("pai").value,
            filho: document.getElementById("filho").value,
            descricao: document.getElementById("descricao").value,
            tipo: document.getElementById("tipo").value,
            inicio: dataEvento.getTime(),
            dataStr: dataEvento.toLocaleString('pt-BR'),
            escalado: [],
            comentarios: []
        });
        document.querySelectorAll("input, textarea").forEach(e=>e.value="");
    };

    function renderCard(id, data, containerId) {
        const container = document.getElementById(containerId);
        const div = document.createElement("div");
        div.className = `card`;
        div.id = id;
        div.dataset.start = data.inicio;
        div.dataset.escalado = JSON.stringify(data.escalado || []);

        const stepsHTML = escala[data.tipo].map(e => `
            <div class="step" data-h="${e.h}" onclick="${containerId === 'ativos' ? `toggleEscala('${id}', ${e.h})` : ''}">
                <span><strong>${e.h}h</strong> - ${e.n} ${data.escalado?.includes(e.h) ? '✔' : ''}</span>
                <div>
                    <a href="tel:+${e.tel}" style="text-decoration:none">📞</a>
                    <a href="https://wa.me/${e.tel}" target="_blank" style="text-decoration:none; margin-left:10px">💬</a>
                </div>
            </div>`).join('');

        const logsHTML = (data.comentarios || []).map(c => `<div><small>[${c.hora}]</small> ${c.texto}</div>`).reverse().join('');

        div.innerHTML = `
            <div class="datetime-badge">OCORRÊNCIA: ${data.dataStr}</div>
            <h3 style="margin:5px 0; color:var(--primary);">${data.titulo}</h3>
            <div style="font-size:0.8rem; color:var(--text-dim); margin-bottom:10px;">${data.pai || '-'} / ${data.filho || '-'}</div>
            
            <div class="timer-box"><span class="timer-val">0h 0m 0s</span></div>
            
            <div class="log-container">${logsHTML || 'Sem notas.'}</div>
            ${containerId === 'ativos' ? `
                <div style="display:flex; gap:5px; margin-top:5px;">
                    <input type="text" id="in-${id}" placeholder="Nota..." style="flex:1; padding:5px; font-size:12px;">
                    <button style="background:var(--header); color:white; padding:5px 10px;" onclick="addComment('${id}')">OK</button>
                </div>
            ` : ''}

            <div style="font-size:0.7rem; font-weight:bold; margin-top:10px; color:var(--primary);">ESCALONAMENTO:</div>
            <div>${stepsHTML}</div>
            
            <div class="action-group">
                ${containerId === "ativos" 
                    ? `<button class="btn-finish" onclick="finalizar('${id}')">Encerrar</button>` 
                    : `<button style="background:var(--warn); width:100%; margin-top:10px;" onclick="reabrir('${id}')">Reabrir</button>`}
            </div>`;
        container.appendChild(div);
    }

    // --- FIREBASE OPS ---
    window.addComment = (id) => {
        const inp = document.getElementById(`in-${id}`);
        if(!inp.value) return;
        onValue(ref(db, `ativos/${id}`), s => {
            const list = s.val().comentarios || [];
            list.push({ texto: inp.value, hora: new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'}) });
            update(ref(db, `ativos/${id}`), { comentarios: list });
            inp.value = "";
        }, { onlyOnce: true });
    };

    window.toggleEscala = (id, h) => {
        onValue(ref(db, `ativos/${id}`), s => {
            let list = s.val().escalado || [];
            list = list.includes(h) ? list.filter(x => x !== h) : [...list, h];
            update(ref(db, `ativos/${id}`), { escalado: list });
        }, { onlyOnce: true });
    };

    window.finalizar = (id) => {
        onValue(ref(db, `ativos/${id}`), s => {
            push(ref(db, "resolvidos"), { ...s.val(), fim: new Date().toLocaleString('pt-BR') });
            remove(ref(db, `ativos/${id}`));
        }, { onlyOnce: true });
    };

    window.reabrir = (id) => {
        onValue(ref(db, `resolvidos/${id}`), s => {
            push(ref(db, "ativos"), s.val());
            remove(ref(db, `resolvidos/${id}`));
        }, { onlyOnce: true });
    };

    onValue(ref(db, "ativos"), snap => {
        document.getElementById("ativos").innerHTML = "";
        snap.forEach(c => renderCard(c.key, c.val(), "ativos"));
    });

    onValue(ref(db, "resolvidos"), snap => {
        document.getElementById("resolvidos").innerHTML = "";
        snap.forEach(c => renderCard(c.key, c.val(), "resolvidos"));
    });

    window.showTab = (tab) => {
        document.getElementById("ativos").classList.toggle("hidden", tab !== "ativos");
        document.getElementById("resolvidos").classList.toggle("hidden", tab !== "resolvidos");
        document.getElementById("btn-tab-ativos").classList.toggle("active", tab === "ativos");
        document.getElementById("btn-tab-resolvidos").classList.toggle("active", tab === "resolvidos");
    };

</script>
</body>
</html>
