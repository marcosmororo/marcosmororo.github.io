<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOC Escalation Pro - Multi-Theme</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">

    <style>
        /* DEFINIÇÃO DE TEMAS */
        :root {
            --bg: #05070a;
            --card: #11141d;
            --header: #1a1f2e;
            --primary: #00d2ff;
            --primary-glow: rgba(0, 210, 255, 0.2);
            --ok: #00ff95;
            --warn: #ffb800;
            --danger: #ff4d4d;
            --text-main: #e2e8f0;
            --text-dim: #64748b;
            --input-bg: #080a0f;
            --whatsapp: #25d366;
        }

        body.light-mode {
            --bg: #f0f2f5;
            --card: #ffffff;
            --header: #e4e6eb;
            --primary: #007bff;
            --primary-glow: rgba(0, 123, 255, 0.1);
            --ok: #28a745;
            --warn: #fd7e14;
            --danger: #dc3545;
            --text-main: #1c1e21;
            --text-dim: #606770;
            --input-bg: #f5f6f7;
        }

        * { box-sizing: border-box; transition: background 0.3s, color 0.3s, border-color 0.3s; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-main); margin: 0; padding: 15px; }
        .container { max-width: 1400px; margin: auto; }

        /* Header */
        .page-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; padding: 10px 20px; background: var(--card);
            border-radius: 12px; border: 1px solid var(--header);
        }
        .logo-area h2 { 
            margin: 0; font-size: 1.4rem; font-weight: 800;
            background: linear-gradient(to right, var(--primary), #3a7bd5);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .header-actions { display: flex; align-items: center; gap: 15px; }
        
        .nav-btn {
            background: var(--primary); color: #fff; border: none; padding: 8px 15px;
            border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.8rem;
            text-transform: uppercase;
        }

        #theme-toggle {
            background: var(--header); border: none; color: var(--text-main);
            width: 40px; height: 40px; border-radius: 10px; cursor: pointer;
        }
        #page-clock { font-family: 'JetBrains Mono', monospace; font-size: 1.1rem; color: var(--primary); }

        /* Painel Admin */
        .admin-panel {
            background: var(--card); border: 1px solid var(--header);
            border-radius: 16px; padding: 25px; margin-bottom: 30px;
        }
        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 15px; }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 0.7rem; color: var(--primary); text-transform: uppercase; font-weight: 800; }
        input, select, textarea { 
            background: var(--input-bg); border: 1px solid var(--header); color: var(--text-main); 
            padding: 12px; border-radius: 10px; font-size: 14px; outline: none;
        }
        input.error { border-color: var(--danger); }
        textarea { grid-column: span 2; height: 50px; resize: none; }
        .btn-add { 
            background: var(--primary); color: white; border: none; border-radius: 10px; cursor: pointer;
            font-weight: 800; text-transform: uppercase; height: 50px; width: 100%;
        }

        /* Tabs */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tabs button { 
            background: var(--card); color: var(--text-dim); padding: 12px 25px; 
            border: 1px solid var(--header); border-radius: 10px; cursor: pointer; font-weight: bold;
        }
        .tabs button.active { border-color: var(--primary); color: var(--primary); }

        /* Grid e Cards */
        .grid-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { background: var(--card); border: 1px solid var(--header); border-radius: 18px; padding: 20px; border-top: 5px solid var(--ok); }
        .card.warn { border-top-color: var(--warn); }
        .card.danger { border-top-color: var(--danger); }
        
        .timer-box { background: var(--input-bg); border-radius: 12px; padding: 10px; text-align: center; margin: 10px 0; }
        .timer-val { font-family: 'JetBrains Mono', monospace; font-size: 1.4rem; color: var(--primary); }

        .step {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--input-bg); padding: 8px 12px; margin: 4px 0; border-radius: 8px; font-size: 0.8rem;
        }
        .step.done { opacity: 0.4; text-decoration: line-through; }
        
        .wa-link { color: var(--whatsapp); font-size: 1.2rem; }
        .btn-encerrar { background: var(--ok); color: white; width: 100%; border: none; border-radius: 8px; padding: 10px; margin-top: 10px; font-weight: bold; cursor: pointer; }

        /* Parceiros Table */
        .partner-table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 12px; overflow: hidden; }
        .partner-table th, .partner-table td { padding: 15px; text-align: left; border-bottom: 1px solid var(--header); }
        .partner-table th { background: var(--header); color: var(--primary); font-size: 0.7rem; text-transform: uppercase; }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="main-view">
        <div class="page-header">
            <div class="logo-area"><h2><i class="fa-solid fa-tower-broadcast"></i> NOC ESCALATION</h2></div>
            <div class="header-actions">
                <button class="nav-btn" onclick="toggleView('partners')"><i class="fa-solid fa-handshake"></i> Parceiros</button>
                <div id="page-clock">00:00:00</div>
                <button id="theme-toggle" onclick="toggleTheme()"><i class="fa-solid fa-moon"></i></button>
            </div>
        </div>

        <div class="admin-panel">
            <div class="form-row">
                <div class="form-group"><label>Título do Incidente</label><input id="titulo" placeholder="Ex: Rompimento de Fibra"></div>
                <div class="form-group"><label>Chamado Pai (Nº)</label><input id="pai" type="text" placeholder="Apenas números" oninput="this.value = this.value.replace(/[^0-9]/g, '')"></div>
                <div class="form-group"><label>Chamado Filho (Nº)</label><input id="filho" type="text" placeholder="Apenas números" oninput="this.value = this.value.replace(/[^0-9]/g, '')"></div>
                <div class="form-group">
                    <label>Escopo de Rede</label>
                    <select id="tipo">
                        <option value="externa_ne">Rede Externa (Nordeste)</option>
                        <option value="externa_no">Rede Externa (Norte)</option>
                        <option value="interna_ne">Rede Interna (Nordeste)</option>
                        <option value="interna_no">Rede Interna (Norte)</option>
                    </select>
                </div>
            </div>
            <div class="form-row" style="grid-template-columns: 1fr 1fr 2fr 1fr;">
                <div class="form-group"><label>Data</label><input type="date" id="data_manual"></div>
                <div class="form-group"><label>Hora</label><input type="time" id="hora_manual"></div>
                <div class="form-group"><label>Descrição</label><textarea id="descricao" placeholder="Relato inicial..."></textarea></div>
                <button class="btn-add" onclick="add()">Registrar Incidente</button>
            </div>
        </div>

        <div class="tabs">
            <button id="btn-tab-ativos" class="active" onclick="showTab('ativos')">MONITORAMENTO</button>
            <button id="btn-tab-resolvidos" onclick="showTab('resolvidos')">HISTÓRICO</button>
        </div>

        <div id="ativos" class="grid-cards"></div>
        <div id="resolvidos" class="grid-cards hidden"></div>
    </div>

    <div id="partners-view" class="hidden">
        <div class="page-header">
            <div class="logo-area"><h2><i class="fa-solid fa-handshake"></i> ESCALATION PARCEIROS</h2></div>
            <button class="nav-btn" onclick="toggleView('main')" style="background: var(--header);"><i class="fa-solid fa-arrow-left"></i> Voltar ao NOC</button>
        </div>

        <div class="admin-panel">
            <table class="partner-table">
                <thead>
                    <tr>
                        <th>Empresa / Parceiro</th>
                        <th>Tipo de Serviço</th>
                        <th>Contato Principal</th>
                        <th>WhatsApp / Telefone</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><b>Operadora VTR</b></td>
                        <td>Link de Internet</td>
                        <td>Suporte N3</td>
                        <td>0800 123 456</td>
                        <td><a href="#" class="wa-link"><i class="fa-brands fa-whatsapp"></i></a></td>
                    </tr>
                    <tr>
                        <td><b>Equatorial Energia</b></td>
                        <td>Energia Elétrica</td>
                        <td>Emergência</td>
                        <td>558890000000</td>
                        <td><a href="#" class="wa-link"><i class="fa-brands fa-whatsapp"></i></a></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getDatabase, ref, push, update, remove, onValue } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCdSj6somJinHJvcGGJs3C6Od6Sri92ETg",
        authDomain: "chamadosnoc-c45c4.firebaseapp.com",
        databaseURL: "https://chamadosnoc-c45c4-default-rtdb.firebaseio.com",
        projectId: "chamadosnoc-c45c4",
        storageBucket: "chamadosnoc-c45c4.appspot.com",
        messagingSenderId: "25502320062",
        appId: "1:25502320062:web:a7f41ad4f61e0c38b265ef"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const CONFIG_ESCALATION = {
        "externa_ne": [
            { h: 4,  nome: "Erivelton",  tel: "558898283311" },
            { h: 8,  nome: "Guilherme",  tel: "558899282323" },
            { h: 10, nome: "Iran Jr",    tel: "558899870725" },
            { h: 10, nome: "Valmir",     tel: "558898287071" },
            { h: 12, nome: "Fernando",   tel: "5588994401255" }
        ],
        "externa_no": [
            { h: 4,  nome: "Clecio",     tel: "558898283311" },
            { h: 8,  nome: "Maciel",     tel: "558899282323" },
            { h: 10, nome: "Iran Jr",    tel: "558899870725" },
            { h: 10, nome: "Valmir",     tel: "558898287071" },
            { h: 12, nome: "Fernando",   tel: "5588994401255" }
        ],
        "interna_ne": [
            { h: 4,  nome: "Joao",       tel: "558898283337" },
            { h: 8,  nome: "Wescley",    tel: "558894866085" },
            { h: 10, nome: "Iran Jr",    tel: "558899870725" },
            { h: 10, nome: "Valmir",     tel: "558898287071" },
            { h: 12, nome: "Fernando",   tel: "5588994401255" }
        ],
        "interna_no": [
            { h: 4,  nome: "Nildo",      tel: "558898283337" },
            { h: 8,  nome: "Julio Gaia", tel: "558894866085" },
            { h: 10, nome: "Iran Jr",    tel: "558899870725" },
            { h: 10, nome: "Valmir",     tel: "558898287071" },
            { h: 12, nome: "Fernando",   tel: "5588994401255" }
        ]
    };

    // Alternar Visualização (NOC vs Parceiros)
    window.toggleView = (view) => {
        if(view === 'partners') {
            document.getElementById('main-view').classList.add('hidden');
            document.getElementById('partners-view').classList.remove('hidden');
        } else {
            document.getElementById('main-view').classList.remove('hidden');
            document.getElementById('partners-view').classList.add('hidden');
        }
    };

    // Relógio e Tema
    setInterval(() => { document.getElementById('page-clock').innerText = new Date().toLocaleTimeString('pt-BR'); }, 1000);
    window.toggleTheme = () => {
        document.body.classList.toggle('light-mode');
        const icon = document.querySelector('#theme-toggle i');
        icon.className = document.body.classList.contains('light-mode') ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
    };

    window.add = function(){
        const t = document.getElementById("titulo").value;
        const pai = document.getElementById("pai").value;
        const filho = document.getElementById("filho").value;
        const dM = document.getElementById("data_manual").value;
        const hM = document.getElementById("hora_manual").value;
        const tipo = document.getElementById("tipo").value;

        // Validação de Obrigatoriedade e Números
        if(!t || !pai || !filho) {
            alert("Título e Protocolos (Pai/Filho) são obrigatórios e devem conter apenas números.");
            return;
        }

        let dataE = dM && hM ? new Date(`${dM}T${hM}`) : new Date();

        push(ref(db,"ativos"), {
            titulo: t, pai: pai, filho: filho,
            descricao: document.getElementById("descricao").value, tipo: tipo,
            inicio: dataE.getTime(), dataStr: dataE.toLocaleString('pt-BR'), escalado: [], comentarios: []
        });
        
        document.querySelectorAll(".admin-panel input, .admin-panel textarea").forEach(e=>e.value="");
    };

    // Funções de Renderização e Timer (Mantidas do código anterior)
    function formatTime(ms) {
        const h = Math.floor(ms / 3600000);
        const m = Math.floor((ms % 3600000) / 60000);
        const s = Math.floor((ms % 60000) / 1000);
        return `${h}h ${m}m ${s}s`;
    }

    function refreshTimers() {
        const now = Date.now();
        document.querySelectorAll('.card.ativo').forEach(card => {
            const start = parseInt(card.dataset.start);
            card.querySelector('.timer-val').innerText = formatTime(now - start);
        });
    }
    setInterval(refreshTimers, 1000);

    function renderCard(id, data, containerId) {
        const container = document.getElementById(containerId);
        const div = document.createElement("div");
        const isResolvido = containerId === 'resolvidos';
        div.className = `card ${isResolvido ? 'finalizado' : 'ativo'}`;
        div.id = id;
        div.dataset.start = data.inicio;

        const listaEscalation = CONFIG_ESCALATION[data.tipo] || [];
        const stepsHTML = listaEscalation.map(e => `
            <div class="step ${data.escalado?.includes(e.h) ? 'done' : ''}">
                <span><b>${e.h}h</b> - ${e.nome}</span>
                <a href="https://wa.me/${e.tel}" target="_blank" class="wa-link"><i class="fa-brands fa-whatsapp"></i></a>
            </div>`).join('');

        div.innerHTML = `
            <div style="font-size:0.7rem; color:var(--text-dim);">${data.dataStr}</div>
            <div style="font-weight:800; font-size:1.1rem; margin: 5px 0;">${data.titulo}</div>
            <div style="font-size:0.8rem; color:var(--primary);">Pai: ${data.pai} | Filho: ${data.filho}</div>
            <div class="timer-box"><div class="timer-val">...</div></div>
            <div style="margin-top:10px;">${stepsHTML}</div>
            ${!isResolvido ? `<button class="btn-encerrar" onclick="finalizar('${id}')">ENCERRAR</button>` : ''}
        `;
        container.appendChild(div);
    }

    window.finalizar = (id) => {
        onValue(ref(db, `ativos/${id}`), s => {
            const d = s.val(); if(!d) return;
            push(ref(db, "resolvidos"), { ...d, fim: Date.now() });
            remove(ref(db, `ativos/${id}`));
        }, { onlyOnce: true });
    };

    onValue(ref(db, "ativos"), snap => { document.getElementById("ativos").innerHTML = ""; snap.forEach(c => renderCard(c.key, c.val(), "ativos")); });
    onValue(ref(db, "resolvidos"), snap => { document.getElementById("resolvidos").innerHTML = ""; snap.forEach(c => renderCard(c.key, c.val(), "resolvidos")); });

    window.showTab = (tab) => {
        document.getElementById("ativos").classList.toggle("hidden", tab !== "ativos");
        document.getElementById("resolvidos").classList.toggle("hidden", tab !== "resolvidos");
        document.getElementById("btn-tab-ativos").classList.toggle("active", tab === "ativos");
        document.getElementById("btn-tab-resolvidos").classList.toggle("active", tab === "resolvidos");
    };
</script>
</body>
</html>
