<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOC - Monitoramento e Escalonamento</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg: #020617;
            --card: #1e293b;
            --primary: #38bdf8;
            --accent: #0ea5e9;
            --danger: #ef4444;
            --text: #f1f5f9;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        .container { max-width: 1100px; margin: auto; }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--card);
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .doc-form {
            background: var(--card);
            padding: 20px;
            border-radius: 12px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }

        .form-group { display: flex; flex-direction: column; }
        label { font-size: 12px; margin-bottom: 5px; color: var(--primary); font-weight: bold; }

        input, select {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
        }

        button.add-btn {
            background: var(--primary);
            color: #020617;
            border: none;
            font-weight: bold;
            cursor: pointer;
            height: 40px;
            margin-top: auto;
            border-radius: 6px;
        }

        .chamado-card {
            background: var(--card);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 8px solid var(--accent);
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 20px;
        }

        .info-section h3 { margin: 0 0 10px 0; color: var(--primary); }
        .meta-info { font-size: 13px; opacity: 0.9; line-height: 1.6; }

        .escalation-tracker {
            background: #0f172a;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #334155;
        }

        .step {
            font-size: 13px;
            padding: 10px;
            margin-bottom: 6px;
            border-radius: 4px;
            opacity: 0.3;
            border-left: 3px solid transparent;
        }

        .step.active {
            opacity: 1;
            background: rgba(56, 189, 248, 0.15);
            border-left-color: var(--primary);
            font-weight: bold;
        }

        .step.past { opacity: 0.6; text-decoration: line-through; color: #94a3b8; }

        .timer-badge {
            background: var(--primary);
            color: #020617;
            padding: 4px 12px;
            border-radius: 6px;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            font-size: 18px;
            display: inline-block;
            margin-top: 10px;
        }

        .delete-btn {
            background: none;
            border: 1px solid var(--danger);
            color: var(--danger);
            cursor: pointer;
            padding: 8px 15px;
            border-radius: 6px;
            margin-top: 20px;
            width: 100%;
        }

        .delete-btn:hover { background: var(--danger); color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>📑 Monitoramento NOC Cloud</h1>
        <div id="clock" style="font-family: monospace; font-size: 20px; color: var(--primary);"></div>
    </div>

    <div class="doc-form">
        <div class="form-group">
            <label>Título do Incidente</label>
            <input type="text" id="titulo" placeholder="Ex: Rompimento Backbone">
        </div>
        <div class="form-group">
            <label>Hora de Início</label>
            <input type="time" id="hora_inicio">
        </div>
        <div class="form-group">
            <label>Tipo de Rede</label>
            <select id="tipo">
                <option value="externa">Rede Externa</option>
                <option value="interna">Rede Interna</option>
            </select>
        </div>
        <div class="form-group">
            <label>ID Chamado</label>
            <input type="text" id="filho" placeholder="Opcional">
        </div>
        <button class="add-btn" onclick="adicionarRegistro()">Lançar na Nuvem</button>
    </div>

    <div id="lista-chamados"></div>
</div>

<script>
    // CONFIGURAÇÃO FIREBASE (CHAMADOSNOC-C45C4)
    const firebaseConfig = {
        apiKey: "AIzaSyCdSj6somJinHJvcGGJs3C6Od6Sri92ETg",
        authDomain: "chamadosnoc-c45c4.firebaseapp.com",
        projectId: "chamadosnoc-c45c4",
        storageBucket: "chamadosnoc-c45c4.firebasestorage.app",
        messagingSenderId: "25502320062",
        appId: "1:25502320062:web:0b53a68ebd5324b3b265ef",
        databaseURL: "https://chamadosnoc-c45c4-default-rtdb.firebaseio.com" 
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const contatos = {
        externa: [
            { horas: 0, nome: "Início do Evento" },
            { horas: 4, nome: "Nível 1: Erivelton Rodrigues" },
            { horas: 8, nome: "Nível 2: Guilherme Silva" },
            { horas: 10, nome: "Nível 3: Valmir (Coordenação)" },
            { horas: 12, nome: "Nível 4: Fernando (Gerência)" }
        ],
        interna: [
            { horas: 0, nome: "Início do Evento" },
            { horas: 4, nome: "Nível 1: Joao Martins" },
            { horas: 8, nome: "Nível 2: Wescley" },
            { horas: 10, nome: "Nível 3: Valmir (Coordenação)" },
            { horas: 12, nome: "Nível 4: Fernando (Gerência)" }
        ]
    };

    function adicionarRegistro() {
        const titulo = document.getElementById("titulo").value;
        const hora = document.getElementById("hora_inicio").value;
        const tipo = document.getElementById("tipo").value;
        const filho = document.getElementById("filho").value;

        if (!titulo || !hora) return alert("Preencha o título e a hora!");

        const hoje = new Date().toISOString().split('T')[0];
        const inicio = new Date(`${hoje}T${hora}`).getTime();
        
        db.ref('incidentes').push({ titulo, inicio, tipo, filho });
        document.getElementById("titulo").value = "";
        document.getElementById("filho").value = "";
    }

    function excluir(id) {
        if(confirm("Deseja encerrar este incidente para toda a equipe?")) {
            db.ref('incidentes/' + id).remove();
        }
    }

    // ESCUTA EM TEMPO REAL
    db.ref('incidentes').on('value', (snapshot) => {
        const container = document.getElementById("lista-chamados");
        container.innerHTML = "";
        const dados = snapshot.val();
        
        if (!dados) return;

        Object.keys(dados).forEach(id => {
            const item = dados[id];
            const decorridoMs = Date.now() - item.inicio;
            const decorridoH = decorridoMs / 3600000;
            
            let htmlEscalation = "";
            contatos[item.tipo].forEach(c => {
                let statusClass = "";
                if (decorridoH >= c.horas) {
                    const proximo = contatos[item.tipo].find(p => p.horas > c.horas);
                    statusClass = (!proximo || decorridoH < proximo.horas) ? "active" : "past";
                }
                htmlEscalation += `<div class="step ${statusClass}">${c.horas}h - ${c.nome}</div>`;
            });

            container.innerHTML += `
                <div class="chamado-card">
                    <div class="info-section">
                        <h3>${item.titulo}</h3>
                        <div class="meta-info">
                            <strong>🕗 Início:</strong> ${new Date(item.inicio).toLocaleString('pt-BR')}<br>
                            <strong>🌐 Rede:</strong> ${item.tipo === 'externa' ? 'Externa' : 'Interna'}<br>
                            <strong>🔗 ID:</strong> ${item.filho || "N/A"}<br>
                            <span class="timer-badge">${formatarTempo(decorridoMs)}</span>
                        </div>
                        <button class="delete-btn" onclick="excluir('${id}')">Encerrar Incidente</button>
                    </div>
                    <div class="escalation-tracker">
                        <label>Régua de Escalonamento:</label>
                        ${htmlEscalation}
                    </div>
                </div>`;
        });
    });

    function formatarTempo(ms) {
        const s = Math.floor(ms / 1000);
        return `${Math.floor(s/3600)}h ${Math.floor((s%3600)/60)}m ${s%60}s`;
    }

    setInterval(() => {
        document.getElementById("clock").innerText = new Date().toLocaleTimeString('pt-BR');
    }, 1000);
</script>

</body>
</html>
