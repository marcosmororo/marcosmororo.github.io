<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOC - Documentação e Escalonamento 2026</title>
    <style>
        :root {
            --bg: #020617;
            --card: #1e293b;
            --primary: #38bdf8;
            --accent: #0ea5e9;
            --danger: #ef4444;
            --text: #f1f5f9;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        .container { max-width: 1100px; margin: auto; }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--card);
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        /* Formulário de Documentação */
        .doc-form {
            background: var(--card);
            padding: 20px;
            border-radius: 12px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }

        .form-group { display: flex; flex-direction: column; }
        label { font-size: 12px; margin-bottom: 5px; color: var(--primary); font-weight: bold; }

        input, select, textarea {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
        }

        button.add-btn {
            background: var(--primary);
            color: #020617;
            border: none;
            font-weight: bold;
            cursor: pointer;
            height: 40px;
            margin-top: auto;
            border-radius: 6px;
        }

        /* Cards de Monitoramento */
        .chamado-card {
            background: var(--card);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 8px solid var(--accent);
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 20px;
        }

        .info-section h3 { margin: 0 0 10px 0; color: var(--primary); }
        .meta-info { font-size: 13px; opacity: 0.8; line-height: 1.6; }

        .escalation-tracker {
            background: #0f172a;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #334155;
        }

        .step {
            font-size: 13px;
            padding: 8px;
            margin-bottom: 5px;
            border-radius: 4px;
            opacity: 0.4;
            transition: all 0.3s;
        }

        .step.active {
            opacity: 1;
            background: rgba(56, 189, 248, 0.2);
            border-left: 4px solid var(--primary);
            font-weight: bold;
        }

        .step.past { opacity: 0.7; text-decoration: line-through; color: #94a3b8; }

        .timer-badge {
            background: var(--primary);
            color: #020617;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: bold;
            font-family: monospace;
            font-size: 16px;
        }

        .delete-btn {
            background: none;
            border: 1px solid var(--danger);
            color: var(--danger);
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 4px;
            margin-top: 15px;
        }

        .delete-btn:hover { background: var(--danger); color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>📑 Documentação de Incidentes NOC</h1>
        <div id="clock" style="font-family: monospace; font-size: 20px;"></div>
    </div>

    <div class="doc-form">
        <div class="form-group">
            <label>ID / Título</label>
            <input type="text" id="titulo" placeholder="Ex: Queda Fibra Crateús">
        </div>
        <div class="form-group">
            <label>Data Início</label>
            <input type="date" id="data_inicio">
        </div>
        <div class="form-group">
            <label>Hora Início</label>
            <input type="time" id="hora_inicio">
        </div>
        <div class="form-group">
            <label>Tipo de Rede</label>
            <select id="tipo">
                <option value="externa">Rede Externa</option>
                <option value="interna">Rede Interna</option>
            </select>
        </div>
        <div class="form-group">
            <label>Chamado Filho</label>
            <input type="text" id="filho" placeholder="Opcional">
        </div>
        <button class="add-btn" onclick="adicionarRegistro()">Registrar e Monitorar</button>
    </div>

    <div id="lista-chamados"></div>
</div>

<script>
    // Banco de contatos oficial conforme solicitado
    const contatos = {
        externa: [
            { min: 0, nome: "Abertura do Incidente" },
            { min: 4, nome: "Nível 1: Erivelton Rodrigues" },
            { min: 8, nome: "Nível 2: Guilherme Silva" },
            { min: 10, nome: "Nível 3: Valmir (Coordenação)" },
            { min: 12, nome: "Nível 4: Fernando (Gerência)" }
        ],
        interna: [
            { min: 0, nome: "Abertura do Incidente" },
            { min: 4, nome: "Nível 1: Joao Martins" },
            { min: 8, nome: "Nível 2: Wescley" },
            { min: 10, nome: "Nível 3: Valmir (Coordenação)" },
            { min: 12, nome: "Nível 4: Fernando (Gerência)" }
        ]
    };

    let registros = JSON.parse(localStorage.getItem("noc_documentacao_2026")) || [];

    // Setar data de hoje por padrão no input
    document.getElementById('data_inicio').valueAsDate = new Date();

    function adicionarRegistro() {
        const titulo = document.getElementById("titulo").value;
        const data = document.getElementById("data_inicio").value;
        const hora = document.getElementById("hora_inicio").value;
        const tipo = document.getElementById("tipo").value;
        const filho = document.getElementById("filho").value;

        if (!titulo || !data || !hora) return alert("Preencha título, data e hora.");

        const inicio = new Date(`${data}T${hora}`);
        
        registros.push({
            id: Date.now(),
            titulo,
            inicio: inicio.getTime(),
            tipo,
            filho,
            alertaSla: false
        });

        localStorage.setItem("noc_documentacao_2026", JSON.stringify(registros));
        render();
    }

    function excluir(id) {
        registros = registros.filter(r => r.id !== id);
        localStorage.setItem("noc_documentacao_2026", JSON.stringify(registros));
        render();
    }

    function render() {
        const container = document.getElementById("lista-chamados");
        const agora = new Date().getTime();
        container.innerHTML = "";

        registros.forEach(reg => {
            const decorridoMs = agora - reg.inicio;
            const decorridoMin = Math.floor(decorridoMs / 60000);
            
            const card = document.createElement("div");
            card.className = "chamado-card";

            // Lógica de contatos
            const listaContatos = contatos[reg.tipo];
            let htmlEscalation = "";
            
            listaContatos.forEach(c => {
                let statusClass = "";
                if (decorridoMin >= c.min) {
                    // Verifica se é o nível atual (o maior min que já passou)
                    const proximo = listaContatos.find(p => p.min > c.min);
                    if (!proximo || decorridoMin < proximo.min) {
                        statusClass = "active";
                    } else {
                        statusClass = "past";
                    }
                }
                htmlEscalation += `<div class="step ${statusClass}">${c.min}min - ${c.nome}</div>`;
            });

            const dataFormatada = new Date(reg.inicio).toLocaleString('pt-BR');

            card.innerHTML = `
                <div class="info-section">
                    <h3>${reg.titulo}</h3>
                    <div class="meta-info">
                        <strong>Início:</strong> ${dataFormatada}<br>
                        <strong>Tipo:</strong> Rede ${reg.tipo.charAt(0).toUpperCase() + reg.tipo.slice(1)}<br>
                        <strong>Filho:</strong> ${reg.filho || "Nenhum"}<br>
                        <strong>Tempo Decorrido:</strong> <span class="timer-badge">${formatarTempo(decorridoMs)}</span>
                    </div>
                    <button class="delete-btn" onclick="excluir(${reg.id})">Encerrar Documentação</button>
                </div>
                <div class="escalation-tracker">
                    <label>Régua de Acionamento:</label>
                    ${htmlEscalation}
                </div>
            `;
            container.appendChild(card);
        });
    }

    function formatarTempo(ms) {
        const totalSegundos = Math.floor(ms / 1000);
        const h = Math.floor(totalSegundos / 3600);
        const m = Math.floor((totalSegundos % 3600) / 60);
        const s = totalSegundos % 60;
        return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    }

    // Relógio e Update
    setInterval(() => {
        document.getElementById("clock").innerText = new Date().toLocaleTimeString('pt-BR');
        render();
    }, 1000);

    render();
</script>

</body>
</html>
