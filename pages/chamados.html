<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOC Escalation Pro - Ultra Edition</title>

    <style>
        :root {
            --bg: #0b0f1a;
            --card: #161e2d;
            --header: #242f41;
            --primary: #0ea5e9;
            --primary-glow: rgba(14, 165, 233, 0.3);
            --ok: #10b981;
            --warn: #f59e0b;
            --danger: #ef4444;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --alert: #fbbf24;
        }

        * { box-sizing: border-box; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text-main); margin: 0; padding: 15px; }
        .container { max-width: 100%; margin: auto; }

        /* Header Profissional */
        .page-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; padding: 0 5px;
        }
        .logo-area h2 { margin: 0; font-size: 1.4rem; letter-spacing: -0.5px; background: linear-gradient(90deg, #0ea5e9, #6366f1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        #page-clock { font-family: 'JetBrains Mono', monospace; font-size: 1.1rem; color: var(--text-dim); background: var(--header); padding: 4px 12px; border-radius: 6px; }

        /* FORMULÁRIO TOP (DASHBOARD STYLE) */
        .admin-panel {
            background: var(--card); border: 1px solid var(--header); border-radius: 12px;
            padding: 20px; margin-bottom: 25px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }
        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 15px; }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        
        label { font-size: 0.7rem; color: var(--primary); text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px; }
        
        input, select, textarea { 
            background: #0f172a; border: 1px solid var(--header); color: white; 
            padding: 10px 14px; border-radius: 8px; font-size: 14px; outline: none;
        }
        input:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-glow); }
        
        textarea { grid-column: span 2; height: 42px; resize: none; }

        .btn-add { 
            background: linear-gradient(135deg, #0ea5e9 0%, #2563eb 100%); 
            color: white; border: none; border-radius: 8px; cursor: pointer;
            font-weight: 700; text-transform: uppercase; font-size: 12px;
            height: 42px; align-self: flex-end; width: 100%;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }
        .btn-add:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(37, 99, 235, 0.4); }

        /* Tabs Profissionais */
        .tabs { display: flex; gap: 8px; margin-bottom: 15px; }
        .tabs button { 
            background: transparent; color: var(--text-dim); padding: 10px 20px; 
            border: 1px solid var(--header); border-radius: 8px; font-size: 12px; font-weight: 600;
        }
        .tabs button.active { background: var(--header); color: var(--primary); border-color: var(--primary); }

        /* Grid de Cards */
        .grid-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }

        .card {
            background: var(--card); border: 1px solid var(--header); border-radius: 12px;
            padding: 15px; border-left: 4px solid var(--ok); position: relative;
        }
        .card.warn { border-left-color: var(--warn); }
        .card.danger { border-left-color: var(--danger); }
        .card.finalizado { opacity: 0.7; grayscale: 0.5; }

        .timer-box { background: #0b0f1a; border-radius: 8px; padding: 10px; text-align: center; margin: 10px 0; border: 1px solid var(--header); }
        .timer-val { font-family: 'JetBrains Mono', monospace; font-size: 1.4rem; color: var(--alert); font-weight: bold; }

        .step {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.03); padding: 8px 12px; margin: 4px 0;
            border-radius: 6px; font-size: 0.8rem;
        }
        .step.done { opacity: 0.3; text-decoration: line-through; }
        .step.next-to-call { border: 1px solid var(--alert); background: rgba(251, 191, 36, 0.05); animation: pulse 1s infinite alternate; }

        @keyframes pulse { from { box-shadow: 0 0 2px var(--alert); } to { box-shadow: 0 0 10px var(--alert); } }

        .log-container { background: rgba(0,0,0,0.2); padding: 8px; border-radius: 6px; font-size: 0.75rem; max-height: 80px; overflow-y: auto; color: #94a3b8; border: 1px solid #ffffff05; }
        
        .btn-encerrar { background: var(--ok); color: white; width: 100%; border-radius: 6px; padding: 8px; margin-top: 10px; font-size: 11px; }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="page-header">
        <div class="logo-area"><h2>📡 NOC ESCALATION <small style="font-size: 0.6rem; vertical-align: middle; opacity: 0.5;">v5.0</small></h2></div>
        <div id="page-clock">00:00:00</div>
    </div>

    <div class="admin-panel">
        <div class="form-row">
            <div class="form-group"><label>Título do Evento</label><input id="titulo" placeholder="Ex: Rompimento Backbone"></div>
            <div class="form-group"><label>Elemento Pai</label><input id="pai" placeholder="Concentrador/OLT"></div>
            <div class="form-group"><label>Elemento Filho</label><input id="filho" placeholder="CTO/Slot"></div>
            <div class="form-group">
                <label>Tipo de Rede</label>
                <select id="tipo">
                    <option value="externa">Rede Externa (Campo)</option>
                    <option value="interna">Rede Interna (Core)</option>
                </select>
            </div>
        </div>
        <div class="form-row" style="grid-template-columns: 1fr 1fr 2fr 1fr;">
            <div class="form-group"><label>Data Início</label><input type="date" id="data_manual"></div>
            <div class="form-group"><label>Hora Início</label><input type="time" id="hora_manual"></div>
            <div class="form-group"><label>Descrição Técnica</label><textarea id="descricao" placeholder="Relato inicial da falha..."></textarea></div>
            <button class="btn-add" onclick="add()">Registrar Incidente</button>
        </div>
    </div>

    <div class="tabs">
        <button id="btn-tab-ativos" class="active" onclick="showTab('ativos')">MONITORAMENTO ATIVO</button>
        <button id="btn-tab-resolvidos" onclick="showTab('resolvidos')">HISTÓRICO DE INCIDENTES</button>
    </div>

    <div id="ativos" class="grid-cards"></div>
    <div id="resolvidos" class="grid-cards hidden"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getDatabase, ref, push, update, remove, onValue } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCdSj6somJinHJvcGGJs3C6Od6Sri92ETg",
        authDomain: "chamadosnoc-c45c4.firebaseapp.com",
        databaseURL: "https://chamadosnoc-c45c4-default-rtdb.firebaseio.com",
        projectId: "chamadosnoc-c45c4",
        storageBucket: "chamadosnoc-c45c4.appspot.com",
        messagingSenderId: "25502320062",
        appId: "1:25502320062:web:a7f41ad4f61e0c38b265ef"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const escala = {
        externa: [{h:4, n:"Erivelton", tel:"558898283311"}, {h:8, n:"Guilherme", tel:"558899282323"}, {h:10, n:"Valmir", tel:"558898287071"}, {h:12, n:"Fernando", tel:"5588994401255"}],
        interna: [{h:4, n:"Joao", tel:"558898283337"}, {h:8, n:"Wescley", tel:"558894866085"}, {h:10, n:"Valmir", tel:"558898287071"}, {h:12, n:"Fernando", tel:"5588994401255"}]
    };

    setInterval(() => { document.getElementById('page-clock').innerText = new Date().toLocaleTimeString('pt-BR'); }, 1000);

    function formatTime(ms) {
        const h = Math.floor(ms / 3600000);
        const m = Math.floor((ms % 3600000) / 60000);
        const s = Math.floor((ms % 60000) / 1000);
        return `${h}h ${m}m ${s}s`;
    }

    function refreshTimers() {
        const now = Date.now();
        document.querySelectorAll('.card.ativo').forEach(card => {
            const start = parseInt(card.dataset.start);
            const escalado = JSON.parse(card.dataset.escalado || "[]");
            const diffMs = now - start;
            const diffH = diffMs / 3600000;

            card.querySelector('.timer-val').innerText = formatTime(diffMs);
            card.classList.toggle('warn', diffH >= 8 && diffH < 10);
            card.classList.toggle('danger', diffH >= 10);

            let alertado = false;
            card.querySelectorAll('.step[data-h]').forEach(step => {
                const stepH = parseInt(step.dataset.h);
                const isNext = diffH >= stepH && !escalado.includes(stepH) && !alertado;
                step.classList.toggle('next-to-call', isNext);
                if(isNext) alertado = true;
            });
        });
    }
    setInterval(refreshTimers, 1000);

    window.add = function(){
        const t = document.getElementById("titulo").value;
        const dM = document.getElementById("data_manual").value;
        const hM = document.getElementById("hora_manual").value;
        if(!t) return alert("Título é obrigatório!");

        let dataE = dM && hM ? new Date(`${dM}T${hM}`) : new Date();

        push(ref(db,"ativos"), {
            titulo: t, pai: document.getElementById("pai").value, filho: document.getElementById("filho").value,
            descricao: document.getElementById("descricao").value, tipo: document.getElementById("tipo").value,
            inicio: dataE.getTime(), dataStr: dataE.toLocaleString('pt-BR'), escalado: [], comentarios: []
        });
        document.querySelectorAll("input, textarea").forEach(e=>e.value="");
    };

    function renderCard(id, data, containerId) {
        const container = document.getElementById(containerId);
        const div = document.createElement("div");
        const isResolvido = containerId === 'resolvidos';
        div.className = `card ${isResolvido ? 'finalizado' : 'ativo'}`;
        div.id = id;
        div.dataset.start = data.inicio;
        div.dataset.escalado = JSON.stringify(data.escalado || []);

        const stepsHTML = escala[data.tipo].map(e => `
            <div class="step ${data.escalado?.includes(e.h) ? 'done' : ''}" data-h="${e.h}" onclick="${!isResolvido ? `toggleEscala('${id}', ${e.h})` : ''}">
                <span>${e.h}h - ${e.n}</span>
                <div style="display:flex; gap:8px;"><a href="tel:+${e.tel}" style="text-decoration:none;">📞</a> <a href="https://wa.me/${e.tel}" target="_blank" style="text-decoration:none;">💬</a></div>
            </div>`).join('');

        const logsHTML = (data.comentarios || []).map(c => `<div><b style="color:var(--primary)">[${c.hora}]</b> ${c.texto}</div>`).reverse().join('');

        div.innerHTML = `
            <div class="datetime-badge">${isResolvido ? 'RESOLVIDO' : 'REGISTRADO EM'}: ${data.dataStr}</div>
            <div style="font-weight:700; font-size:1.1rem; margin-top:5px;">${data.titulo}</div>
            <div style="font-size:0.75rem; color:var(--text-dim); margin-bottom:8px;">${data.pai || '-'} / ${data.filho || '-'}</div>
            
            <div class="timer-box"><div class="timer-val">${isResolvido ? formatTime(data.fim - data.inicio) : '...'}</div></div>
            
            <div class="log-container">${logsHTML || 'Aguardando notas...'}</div>
            ${!isResolvido ? `<div style="display:flex; gap:5px; margin-top:5px;"><input type="text" id="in-${id}" placeholder="Adicionar nota..." style="flex:1; font-size:12px; padding:6px;"><button style="background:var(--header); color:white; padding:0 12px; border-radius:6px;" onclick="addComment('${id}')">OK</button></div>` : ''}

            <div style="margin-top:10px;">${stepsHTML}</div>
            
            ${!isResolvido ? `<button class="btn-encerrar" onclick="finalizar('${id}')">Encerrar Incidente</button>` : `<div style="display:flex; gap:5px;"><button style="background:var(--warn); color:white; flex:1; margin-top:10px; border-radius:6px; padding:8px;" onclick="reabrir('${id}')">Reabrir</button><button style="background:var(--danger); color:white; flex:1; margin-top:10px; border-radius:6px; padding:8px;" onclick="apagar('${id}')">Excluir</button></div>`}
        `;
        container.appendChild(div);
    }

    window.addComment = (id) => {
        const inp = document.getElementById(`in-${id}`);
        if(!inp.value) return;
        onValue(ref(db, `ativos/${id}`), s => {
            const list = s.val().comentarios || [];
            list.push({ texto: inp.value, hora: new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'}) });
            update(ref(db, `ativos/${id}`), { comentarios: list });
            inp.value = "";
        }, { onlyOnce: true });
    };

    window.toggleEscala = (id, h) => {
        onValue(ref(db, `ativos/${id}`), s => {
            let list = s.val().escalado || [];
            list = list.includes(h) ? list.filter(x => x !== h) : [...list, h];
            update(ref(db, `ativos/${id}`), { escalado: list });
        }, { onlyOnce: true });
    };

    window.finalizar = (id) => {
        onValue(ref(db, `ativos/${id}`), s => {
            const d = s.val(); if(!d) return;
            push(ref(db, "resolvidos"), { ...d, fim: Date.now() });
            remove(ref(db, `ativos/${id}`));
        }, { onlyOnce: true });
    };

    window.reabrir = (id) => {
        onValue(ref(db, `resolvidos/${id}`), s => {
            const d = s.val(); if(!d) return;
            const { fim, ...rest } = d;
            push(ref(db, "ativos"), rest);
            remove(ref(db, `resolvidos/${id}`));
        }, { onlyOnce: true });
    };

    window.apagar = (id) => { if(confirm("Deseja deletar do histórico?")) remove(ref(db, `resolvidos/${id}`)); };

    onValue(ref(db, "ativos"), snap => { document.getElementById("ativos").innerHTML = ""; snap.forEach(c => renderCard(c.key, c.val(), "ativos")); });
    onValue(ref(db, "resolvidos"), snap => { document.getElementById("resolvidos").innerHTML = ""; snap.forEach(c => renderCard(c.key, c.val(), "resolvidos")); });

    window.showTab = (tab) => {
        document.getElementById("ativos").classList.toggle("hidden", tab !== "ativos");
        document.getElementById("resolvidos").classList.toggle("hidden", tab !== "resolvidos");
        document.getElementById("btn-tab-ativos").classList.toggle("active", tab === "ativos");
        document.getElementById("btn-tab-resolvidos").classList.toggle("active", tab === "resolvidos");
    };
</script>

</body>
</html>
