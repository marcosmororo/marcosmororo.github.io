<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

<script>
    // 2. Sua configuração específica que você enviou
    const firebaseConfig = {
        apiKey: "AIzaSyCdSj6somJinHJvcGGJs3C6Od6Sri92ETg",
        authDomain: "chamadosnoc-c45c4.firebaseapp.com",
        projectId: "chamadosnoc-c45c4",
        storageBucket: "chamadosnoc-c45c4.firebasestorage.app",
        messagingSenderId: "25502320062",
        appId: "1:25502320062:web:0b53a68ebd5324b3b265ef",
        // Importante: O Realtime Database precisa da URL do banco
        databaseURL: "https://chamadosnoc-c45c4-default-rtdb.firebaseio.com" 
    };

    // 3. Inicialização
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 4. Configuração dos Contatos e Tempos (Horas)
    const escala = {
        externa: [
            { h: 0, n: "Início" },
            { h: 4, n: "Erivelton Rodrigues" },
            { h: 8, n: "Guilherme Silva" },
            { h: 10, n: "Valmir (Coordenação)" },
            { h: 12, n: "Fernando (Gerência)" }
        ],
        interna: [
            { h: 0, n: "Início" },
            { h: 4, n: "Joao Martins" },
            { h: 8, n: "Wescley" },
            { h: 10, n: "Valmir (Coordenação)" },
            { h: 12, n: "Fernando (Gerência)" }
        ]
    };

    // 5. Função para Enviar Dados para a Nuvem
    function adicionarRegistro() {
        const titulo = document.getElementById("titulo").value;
        const data = document.getElementById("data_inicio").value;
        const hora = document.getElementById("hora_inicio").value;
        const tipo = document.getElementById("tipo").value;
        const filho = document.getElementById("filho").value;

        if (!titulo || !data || !hora) return alert("Preencha Título, Data e Hora!");

        const inicio = new Date(`${data}T${hora}`).getTime();
        
        // Salva no Firebase
        db.ref('incidentes').push({
            titulo,
            inicio,
            tipo,
            filho
        });

        // Limpa o campo de título
        document.getElementById("titulo").value = "";
    }

    // 6. Função para Encerrar (Deletar da Nuvem)
    function excluir(id) {
        if(confirm("Deseja encerrar este incidente para todos?")) {
            db.ref('incidentes/' + id).remove();
        }
    }

    // 7. Escuta em Tempo Real (Sincronização)
    db.ref('incidentes').on('value', (snapshot) => {
        const listaDiv = document.getElementById("lista-chamados");
        listaDiv.innerHTML = "";
        const dados = snapshot.val();
        const agora = Date.now();

        if (!dados) {
            listaDiv.innerHTML = "<p style='opacity:0.5'>Nenhum incidente ativo no momento.</p>";
            return;
        }

        for (let id in dados) {
            const item = dados[id];
            const decorridoMs = agora - item.inicio;
            const decorridoH = decorridoMs / 3600000;

            let htmlEscala = "";
            escala[item.tipo].forEach(e => {
                let statusClass = "";
                if (decorridoH >= e.h) {
                    const proximo = escala[item.tipo].find(p => p.h > e.h);
                    statusClass = (!proximo || decorridoH < proximo.h) ? "active" : "past";
                }
                htmlEscala += `<div class="step ${statusClass}">${e.h}h - ${e.n}</div>`;
            });

            listaDiv.innerHTML += `
                <div class="chamado-card">
                    <div class="info-section">
                        <h3>${item.titulo}</h3>
                        <div class="meta-info">
                            <strong>Início:</strong> ${new Date(item.inicio).toLocaleString()}<br>
                            <strong>Ref:</strong> ${item.filho || "N/A"}<br>
                            <strong>Tempo total:</strong> <span class="timer-badge">${formatarTempo(decorridoMs)}</span>
                        </div>
                        <button class="delete-btn" onclick="excluir('${id}')">Encerrar e Arquivar</button>
                    </div>
                    <div class="escalation-tracker">
                        <label>Régua de Escalonamento:</label>
                        ${htmlEscala}
                    </div>
                </div>
            `;
        }
    });

    function formatarTempo(ms) {
        const s = Math.floor(ms / 1000);
        const h = Math.floor(s / 3600);
        const m = Math.floor((s % 3600) / 60);
        const seg = s % 60;
        return `${h}h ${m}m ${seg}s`;
    }

    // Atualiza apenas o relógio visual
    setInterval(() => {
        const clock = document.getElementById("clock");
        if(clock) clock.innerText = new Date().toLocaleTimeString();
    }, 1000);
</script>
