<!DOCTYPE html>

<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOC Monitor (Firebase)</title>

<style>
body { font-family: Arial; background:#020617; color:#fff; padding:20px;}
.container { max-width:900px; margin:auto;}
input, select, button { padding:10px; margin:5px; border-radius:6px; border:none;}
button { background:#38bdf8; cursor:pointer;}
.card { background:#1e293b; padding:15px; margin:10px 0; border-radius:10px; display:flex; justify-content:space-between;}
.timer { background:#38bdf8; color:#000; padding:5px 10px; border-radius:6px;}
.step { font-size:12px; opacity:0.3;}
.step.active { opacity:1; font-weight:bold; }
</style>

</head>

<body>

<div class="container">
<h2>📑 NOC Monitor (Realtime)</h2>

<input type="text" id="titulo" placeholder="Chamado">
<input type="time" id="hora">

<select id="tipo">
<option value="externa">Rede Externa</option>
<option value="interna">Rede Interna</option>
</select>

<button onclick="adicionar()">Adicionar</button>

<div id="lista"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, onChildRemoved, remove } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

// 🔥 CONFIG (SEU PROJETO)
const firebaseConfig = {
  apiKey: "AIzaSyCdSj6somJinHJvcGGJs3C6Od6Sri92ETg",
  authDomain: "chamadosnoc-c45c4.firebaseapp.com",
  databaseURL: "https://chamadosnoc-c45c4-default-rtdb.firebaseio.com",
  projectId: "chamadosnoc-c45c4",
  storageBucket: "chamadosnoc-c45c4.appspot.com",
  messagingSenderId: "25502320062",
  appId: "1:25502320062:web:a7f41ad4f61e0c38b265ef"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const lista = document.getElementById("lista");

// ESCALA
const escala = {
  externa: [
    {h:0,n:"Início"},
    {h:4,n:"Erivelton"},
    {h:8,n:"Guilherme"},
    {h:10,n:"Valmir"},
    {h:12,n:"Fernando"}
  ],
  interna: [
    {h:0,n:"Início"},
    {h:4,n:"Joao"},
    {h:8,n:"Wescley"},
    {h:10,n:"Valmir"},
    {h:12,n:"Fernando"}
  ]
};

// ➕ ADD
window.adicionar = function () {
  const titulo = document.getElementById("titulo").value;
  const hora = document.getElementById("hora").value;
  const tipo = document.getElementById("tipo").value;

  if (!titulo || !hora) return alert("Preencha!");

  const hoje = new Date();
  const [h,m] = hora.split(":");
  hoje.setHours(h,m,0,0);

  push(ref(db, "incidentes"), {
    titulo,
    inicio: hoje.getTime(),
    tipo
  });

  document.getElementById("titulo").value = "";
};

// 🎯 RENDER
function criarCard(id, item) {

  const decorrido = (Date.now() - item.inicio) / 3600000;

  let html = "";

  escala[item.tipo].forEach((e,i)=>{
    let ativo;

    if (i === escala[item.tipo].length -1){
      ativo = decorrido >= e.h;
    } else {
      ativo = decorrido >= e.h && decorrido < escala[item.tipo][i+1].h;
    }

    html += `<div class="step ${ativo ? 'active':''}">${e.h}h - ${e.n}</div>`;
  });

  const div = document.createElement("div");
  div.className = "card";
  div.id = id;

  div.innerHTML = `
    <div>
      <strong>${item.titulo}</strong><br>
      <div class="timer">${Math.floor(decorrido)}h ${Math.floor((decorrido%1)*60)}m</div>
      <button onclick="removerChamado('${id}')" style="background:red;margin-top:10px;">Encerrar</button>
    </div>
    <div>${html}</div>
  `;

  lista.appendChild(div);
}

// 🔄 REALTIME
onChildAdded(ref(db, "incidentes"), (snap)=>{
  criarCard(snap.key, snap.val());
});

onChildRemoved(ref(db, "incidentes"), (snap)=>{
  const el = document.getElementById(snap.key);
  if(el) el.remove();
});

// ❌ REMOVE
window.removerChamado = function(id){
  remove(ref(db, "incidentes/"+id));
}

// ⏱️ UPDATE TIMER
setInterval(()=>{
  lista.innerHTML="";
  onChildAdded(ref(db,"incidentes"), (snap)=>{
    criarCard(snap.key, snap.val());
  });
},60000);

</script>

</body>
</html>
