<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOC Escalation Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #05070a; --card: #11141d; --header: #1a1f2e;
            --primary: #00d2ff; --ok: #00ff95; --warn: #ffb800; --danger: #ff4d4d;
            --text-main: #e2e8f0; --text-dim: #64748b; --input-bg: #080a0f; --whatsapp: #25d366;
        }

        body.light-mode {
            --bg: #f0f2f5; --card: #ffffff; --header: #e4e6eb;
            --primary: #007bff; --ok: #28a745; --warn: #fd7e14; --danger: #dc3545;
            --text-main: #1c1e21; --text-dim: #606770; --input-bg: #f5f6f7;
        }

        * { box-sizing: border-box; transition: background 0.3s, border-color 0.3s; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-main); margin: 0; padding: 15px; }
        .container { max-width: 1400px; margin: auto; }

        /* Header */
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 10px 20px; background: var(--card); border-radius: 12px; border: 1px solid var(--header); }
        .header-actions { display: flex; align-items: center; gap: 15px; }
        
        .nav-btn { background: var(--primary); color: #fff; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.8rem; display: flex; align-items: center; gap: 8px; }

        /* Metrics */
        .metrics-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .metric-card { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--header); display: flex; flex-direction: column; align-items: center; }
        .metric-card b { font-size: 1.5rem; color: var(--primary); font-family: 'JetBrains Mono'; }

        /* Admin Panel */
        .admin-panel { background: var(--card); border: 1px solid var(--header); border-radius: 16px; padding: 20px; margin-bottom: 25px; }
        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
        input, select { background: var(--input-bg); border: 1px solid var(--header); color: var(--text-main); padding: 10px; border-radius: 8px; outline: none; }
        .btn-add { background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 800; height: 45px; }

        /* Tabs */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tabs button { background: var(--card); color: var(--text-dim); padding: 10px 20px; border: 1px solid var(--header); border-radius: 8px; cursor: pointer; font-weight: bold; }
        .tabs button.active { border-color: var(--primary); color: var(--primary); }

        /* Cards */
        .grid-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .card { background: var(--card); border: 1px solid var(--header); border-radius: 18px; padding: 20px; border-top: 5px solid var(--ok); position: relative; }
        .timer-box { background: var(--input-bg); border-radius: 12px; padding: 10px; text-align: center; margin: 10px 0; border: 1px solid var(--header); }
        .timer-val { font-family: 'JetBrains Mono', monospace; font-size: 1.4rem; color: var(--primary); }

        /* Escalation Steps */
        .step { display: flex; justify-content: space-between; align-items: center; background: var(--input-bg); padding: 10px 15px; margin: 6px 0; border-radius: 10px; font-size: 0.85rem; border: 1px solid transparent; }
        .step.done { opacity: 0.4; }
        .step.next-to-call { border-color: var(--warn); animation: pulse-border 1.5s infinite; }
        @keyframes pulse-border { 0% { box-shadow: 0 0 0 0px rgba(255, 184, 0, 0.4); } 100% { box-shadow: 0 0 0 8px rgba(255, 184, 0, 0); } }

        /* Aba Parceiros - Estilo */
        .partner-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .partner-table th { text-align: left; padding: 12px; color: var(--primary); font-size: 0.8rem; text-transform: uppercase; border-bottom: 2px solid var(--header); }
        .partner-table td { padding: 15px; border-bottom: 1px solid var(--header); }
        .wa-btn { color: var(--whatsapp); font-size: 1.5rem; text-decoration: none; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <div class="page-header">
        <div class="logo-area"><h2><i class="fa-solid fa-tower-broadcast"></i> NOC HORIZON</h2></div>
        <div class="header-actions">
            <button id="btn-view-partners" class="nav-btn" onclick="toggleView('partners')"><i class="fa-solid fa-address-book"></i> Parceiros</button>
            <button id="btn-view-main" class="nav-btn hidden" onclick="toggleView('main')"><i class="fa-solid fa-arrow-left"></i> Voltar</button>
            <div id="page-clock">00:00:00</div>
            <button id="theme-toggle" onclick="toggleTheme()"><i class="fa-solid fa-moon"></i></button>
        </div>
    </div>

    <div id="view-main">
        <div class="metrics-bar">
            <div class="metric-card"><span>ATIVOS</span><b id="count-total">0</b></div>
            <div class="metric-card"><span>EXTERNA</span><b id="count-externa" style="color:var(--warn)">0</b></div>
            <div class="metric-card"><span>INTERNA</span><b id="count-interna" style="color:var(--ok)">0</b></div>
        </div>

        <div class="admin-panel">
            <div class="form-row">
                <input id="titulo" placeholder="Título do Incidente">
                <input id="pai" placeholder="Protocolo Pai" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                <input id="filho" placeholder="Protocolo Filho" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                <select id="tipo">
                    <option value="externa_ne">Externa (NE)</option>
                    <option value="externa_no">Externa (NO)</option>
                    <option value="interna_ne">Interna (NE)</option>
                    <option value="interna_no">Interna (NO)</option>
                </select>
                <button class="btn-add" onclick="add()">ABRIR</button>
            </div>
        </div>

        <div class="tabs">
            <button id="btn-tab-ativos" class="active" onclick="showTab('ativos')">ATIVOS (0)</button>
            <button id="btn-tab-resolvidos" onclick="showTab('resolvidos')">HISTÓRICO (0)</button>
        </div>

        <div id="ativos" class="grid-cards"></div>
        <div id="resolvidos" class="grid-cards hidden"></div>
    </div>

    <div id="view-partners" class="hidden">
        <div class="admin-panel">
            <h3 style="margin-top:0"><i class="fa-solid fa-address-book" style="color:var(--primary)"></i> Contatos de Emergência e Operadoras</h3>
            <table class="partner-table">
                <thead>
                    <tr>
                        <th>Parceiro / Operadora</th>
                        <th>Tipo de Link / Serviço</th>
                        <th>Telefone / Contato</th>
                        <th>Ação</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><b>Operadora X</b></td>
                        <td>Link Principal IP</td>
                        <td>0800 123 4567</td>
                        <td><a href="https://wa.me/558899999999" target="_blank" class="wa-btn"><i class="fa-brands fa-whatsapp"></i></a></td>
                    </tr>
                    <tr>
                        <td><b>Data Center Y</b></td>
                        <td>Colocation / Cloud</td>
                        <td>suporte@datacenter.com</td>
                        <td><a href="#" class="wa-btn" style="color:var(--primary)"><i class="fa-solid fa-envelope"></i></a></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getDatabase, ref, push, update, remove, onValue } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCdSj6somJinHJvcGGJs3C6Od6Sri92ETg",
        authDomain: "chamadosnoc-c45c4.firebaseapp.com",
        databaseURL: "https://chamadosnoc-c45c4-default-rtdb.firebaseio.com",
        projectId: "chamadosnoc-c45c4",
        storageBucket: "chamadosnoc-c45c4.appspot.com",
        messagingSenderId: "25502320062",
        appId: "1:25502320062:web:a7f41ad4f61e0c38b265ef"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const CONFIG_ESCALATION = {
        "externa_ne": [{h:4, nome:"Erivelton", tel:"558898283311"}, {h:8, nome:"Guilherme", tel:"558899282323"}, {h:10, nome:"Iran Jr", tel:"558899870725"}, {h:12, nome:"Fernando", tel:"5588994401255"}],
        "externa_no": [{h:4, nome:"Clecio", tel:"558898283311"}, {h:8, nome:"Maciel", tel:"558899282323"}, {h:10, nome:"Valmir", tel:"558898287071"}, {h:12, nome:"Fernando", tel:"5588994401255"}],
        "interna_ne": [{h:4, nome:"Joao", tel:"558898283337"}, {h:8, nome:"Wescley", tel:"558894866085"}, {h:10, nome:"Iran Jr", tel:"558899870725"}, {h:12, nome:"Fernando", tel:"5588994401255"}],
        "interna_no": [{h:4, nome:"Nildo", tel:"558898283337"}, {h:8, nome:"Julio Gaia", tel:"558894866085"}, {h:10, nome:"Valmir", tel:"558898287071"}, {h:12, nome:"Fernando", tel:"5588994401255"}]
    };

    // ALTERNAR ENTRE TELAS
    window.toggleView = (view) => {
        const isPartner = view === 'partners';
        document.getElementById('view-main').classList.toggle('hidden', isPartner);
        document.getElementById('view-partners').classList.toggle('hidden', !isPartner);
        document.getElementById('btn-view-partners').classList.toggle('hidden', isPartner);
        document.getElementById('btn-view-main').classList.toggle('hidden', !isPartner);
    };

    // RELOGIO E MONITORAMENTO DE TEMPO
    setInterval(() => {
        const now = Date.now();
        document.querySelectorAll('.card.ativo').forEach(card => {
            const start = parseInt(card.dataset.start);
            const diffH = (now - start) / 3600000;
            const escalados = JSON.parse(card.dataset.escalado || "[]");

            card.querySelector('.timer-val').innerText = new Date(now - start).toISOString().substr(11, 8);
            
            // Cores de Alerta
            if(diffH >= 10) card.style.borderTopColor = "var(--danger)";
            else if(diffH >= 8) card.style.borderTopColor = "var(--warn)";

            // Proximo Escalonamento
            let alertSet = false;
            card.querySelectorAll('.step').forEach(step => {
                const h = parseInt(step.dataset.h);
                if(diffH >= h && !escalados.includes(h) && !alertSet) {
                    step.classList.add('next-to-call');
                    alertSet = true;
                } else {
                    step.classList.remove('next-to-call');
                }
            });
        });
        document.getElementById('page-clock').innerText = new Date().toLocaleTimeString();
    }, 1000);

    // DADOS DO FIREBASE
    onValue(ref(db, "ativos"), snap => {
        const container = document.getElementById("ativos");
        container.innerHTML = "";
        let t=0, e=0, i=0;
        snap.forEach(c => {
            const data = c.val();
            renderCard(c.key, data, "ativos");
            t++; (data.tipo.includes('externa')) ? e++ : i++;
        });
        document.getElementById('count-total').innerText = t;
        document.getElementById('count-externa').innerText = e;
        document.getElementById('count-interna').innerText = i;
        document.getElementById('btn-tab-ativos').innerText = `ATIVOS (${t})`;
    });

    onValue(ref(db, "resolvidos"), snap => {
        document.getElementById("resolvidos").innerHTML = "";
        let t=0; snap.forEach(c => { renderCard(c.key, c.val(), "resolvidos"); t++; });
        document.getElementById('btn-tab-resolvidos').innerText = `HISTÓRICO (${t})`;
    });

    function renderCard(id, data, containerId) {
        const isRes = containerId === 'resolvidos';
        const div = document.createElement("div");
        div.className = `card ${isRes ? 'res' : 'ativo'}`;
        div.id = id; div.dataset.start = data.inicio; div.dataset.escalado = JSON.stringify(data.escalado || []);
        
        const steps = (CONFIG_ESCALATION[data.tipo] || []).map(e => `
            <div class="step ${data.escalado?.includes(e.h) ? 'done' : ''}" data-h="${e.h}" onclick="${!isRes ? `toggleEscala('${id}', ${e.h})` : ''}">
                <span><b>${e.h}h</b> - ${e.nome}</span>
                <a href="https://wa.me/${e.tel}" target="_blank" class="wa-btn" onclick="event.stopPropagation()" style="font-size:1.1rem"><i class="fa-brands fa-whatsapp"></i></a>
            </div>`).join('');

        div.innerHTML = `
            <div style="font-weight:800">${data.titulo}</div>
            <div style="font-size:0.7rem; color:var(--text-dim)">P: ${data.pai} | F: ${data.filho}</div>
            <div class="timer-box"><div class="timer-val">00:00:00</div></div>
            <div style="margin-top:10px">${steps}</div>
            ${!isRes ? `<button class="btn-add" style="width:100%; margin-top:10px" onclick="finalizar('${id}')">Finalizar</button>` : ''}
        `;
        document.getElementById(containerId).appendChild(div);
    }

    window.add = () => {
        const t = document.getElementById("titulo").value, p = document.getElementById("pai").value;
        if(!t || !p) return alert("Preencha o título e protocolo pai!");
        push(ref(db,"ativos"), { titulo: t, pai: p, filho: document.getElementById("filho").value, tipo: document.getElementById("tipo").value, inicio: Date.now(), escalado: [] });
    };

    window.toggleEscala = (id, h) => {
        onValue(ref(db, `ativos/${id}`), s => {
            let list = s.val().escalado || [];
            list = list.includes(h) ? list.filter(x => x !== h) : [...list, h];
            update(ref(db, `ativos/${id}`), { escalado: list });
        }, { onlyOnce: true });
    };

    window.finalizar = (id) => { onValue(ref(db, `ativos/${id}`), s => { push(ref(db, "resolvidos"), { ...s.val(), fim: Date.now() }); remove(ref(db, `ativos/${id}`)); }, { onlyOnce: true }); };
    window.showTab = (t) => { document.getElementById("ativos").classList.toggle("hidden", t!=='ativos'); document.getElementById("resolvidos").classList.toggle("hidden", t!=='resolvidos'); document.getElementById("btn-tab-ativos").classList.toggle("active", t==='ativos'); document.getElementById("btn-tab-resolvidos").classList.toggle("active", t==='resolvidos'); };
    window.toggleTheme = () => document.body.classList.toggle('light-mode');
</script>
</body>
</html>
