<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOC Escalation Pro - Alerta Ativo</title>

    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --header: #334155;
            --primary: #38bdf8;
            --ok: #10b981;
            --warn: #f59e0b;
            --danger: #ef4444;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --alert: #fbbf24; /* Cor de alerta para escalonamento pendente */
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text-main); margin: 0; padding: 20px; }
        .container { max-width: 1300px; margin: auto; }

        /* Form */
        .form-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px; background: var(--card); padding: 20px; border-radius: 12px;
            margin-bottom: 25px; border: 1px solid var(--header);
        }
        input, select, textarea { background: var(--bg); border: 1px solid var(--header); color: white; padding: 10px; border-radius: 6px; }
        textarea { grid-column: 1 / -1; height: 50px; }

        /* Buttons */
        button { padding: 10px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 11px; }
        .btn-add { background: var(--primary); color: var(--bg); }
        .btn-finish { background: var(--ok); color: white; width: 100%; margin-top: 10px; }
        .btn-update { background: var(--header); color: var(--primary); margin-top: 5px; }

        /* Tabs */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tabs button { background: var(--card); color: var(--text-dim); padding: 10px 20px; }
        .tabs button.active { background: var(--primary); color: var(--bg); }

        /* Cards Grid */
        .grid-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 20px; }

        .card {
            background: var(--card); padding: 18px; border-radius: 12px;
            border-left: 6px solid var(--ok); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
            display: flex; flex-direction: column; gap: 10px;
        }
        .card.warn { border-left-color: var(--warn); }
        .card.danger { border-left-color: var(--danger); }

        .card-header { border-bottom: 1px solid var(--header); padding-bottom: 8px; }
        .card-title { font-size: 1.1rem; font-weight: bold; color: var(--primary); }
        .card-meta { font-size: 0.75rem; color: var(--text-dim); display: block; margin-top: 4px; }

        .timer { font-family: monospace; color: var(--warn); font-size: 1.3rem; font-weight: bold; text-align: center; background: rgba(0,0,0,0.2); padding: 5px; border-radius: 4px; }

        /* Escalation Steps */
        .step {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(15, 23, 42, 0.4); padding: 10px 12px; margin: 6px 0;
            border-radius: 6px; font-size: 0.85rem; border: 2px solid transparent;
        }
        .step.done { opacity: 0.4; text-decoration: line-through; border-left: 4px solid var(--ok); background: transparent; }
        
        /* ALERTA: Este é o próximo que você DEVE ligar */
        .step.next-to-call { 
            border-color: var(--alert); 
            background: rgba(251, 191, 36, 0.15);
            animation: blinker 1.5s linear infinite;
        }

        @keyframes blinker {
            50% { border-color: transparent; }
        }

        /* Comments Area */
        .comments-box {
            background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; font-size: 0.85rem;
            max-height: 120px; overflow-y: auto; border: 1px solid var(--header);
        }
        .comment-item { border-bottom: 1px solid #33415566; padding: 4px 0; color: #cbd5e1; }
        .comment-time { font-size: 0.7rem; color: var(--primary); margin-right: 5px; font-weight: bold; }

        .action-group { display: flex; gap: 8px; margin-top: 10px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <header style="text-align:center; margin-bottom: 25px;">
        <h2 style="color: var(--primary); letter-spacing: 2px;">📡 NOC ESCALATION PRO</h2>
    </header>

    <div class="form-grid">
        <input id="titulo" placeholder="Título (Ex: Rompimento de Fibra)">
        <input id="pai" placeholder="Concentrador / POP">
        <input id="filho" placeholder="Elemento / CTO">
        <select id="tipo">
            <option value="externa">Rede Externa</option>
            <option value="interna">Rede Interna</option>
        </select>
        <textarea id="descricao" placeholder="Descrição técnica inicial do incidente..."></textarea>
        <button class="btn-add" onclick="add()">Iniciar Monitoramento</button>
    </div>

    <div class="tabs">
        <button id="btn-tab-ativos" class="active" onclick="showTab('ativos')">Incidentes Ativos</button>
        <button id="btn-tab-resolvidos" onclick="showTab('resolvidos')">Histórico Finalizado</button>
    </div>

    <div id="ativos" class="grid-cards"></div>
    <div id="resolvidos" class="grid-cards hidden"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getDatabase, ref, push, update, remove, onValue } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCdSj6somJinHJvcGGJs3C6Od6Sri92ETg",
        authDomain: "chamadosnoc-c45c4.firebaseapp.com",
        databaseURL: "https://chamadosnoc-c45c4-default-rtdb.firebaseio.com",
        projectId: "chamadosnoc-c45c4",
        storageBucket: "chamadosnoc-c45c4.appspot.com",
        messagingSenderId: "25502320062",
        appId: "1:25502320062:web:a7f41ad4f61e0c38b265ef"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const escala = {
        externa: [
            {h:4, n:"Erivelton", tel:"558898283311"},
            {h:8, n:"Guilherme", tel:"558899282323"},
            {h:10, n:"Valmir", tel:"558898287071"},
            {h:12, n:"Fernando", tel:"5588994401255"}
        ],
        interna: [
            {h:4, n:"Joao", tel:"558898283337"},
            {h:8, n:"Wescley", tel:"558894866085"},
            {h:10, n:"Valmir", tel:"558898287071"},
            {h:12, n:"Fernando", tel:"5588994401255"}
        ]
    };

    window.add = function(){
        const t = document.getElementById("titulo").value;
        if(!t) return alert("Título é obrigatório");

        const agora = new Date();
        push(ref(db,"ativos"), {
            titulo: t,
            pai: document.getElementById("pai").value,
            filho: document.getElementById("filho").value,
            descricao: document.getElementById("descricao").value,
            tipo: document.getElementById("tipo").value,
            inicio: agora.getTime(),
            dataStr: agora.toLocaleString('pt-BR'),
            escalado: [],
            comentarios: []
        });
        document.querySelectorAll("input, textarea").forEach(e=>e.value="");
    };

    function renderCard(id, data, containerId) {
        const container = document.getElementById(containerId);
        const div = document.createElement("div");
        const diffH = (Date.now() - data.inicio) / 3600000;
        
        div.className = `card ${diffH >= 10 ? 'danger' : diffH >= 8 ? 'warn' : ''}`;
        
        // Lógica de Próximo Escalonamento (Onde a mágica acontece)
        let proximoH = null;
        // Filtra quais níveis da escala já deveriam ter sido acionados com base no tempo atual
        const niveisAtingidos = escala[data.tipo].filter(e => diffH >= e.h);
        if(niveisAtingidos.length > 0) {
            // Pega o primeiro nível que já atingiu o horário mas NÃO foi marcado como feito ainda
            const pendentes = niveisAtingidos.filter(e => !data.escalado?.includes(e.h));
            if(pendentes.length > 0) proximoH = pendentes[0].h;
        }

        const stepsHTML = escala[data.tipo].map(e => {
            const isDone = data.escalado?.includes(e.h);
            const isNext = e.h === proximoH && containerId === 'ativos';
            
            return `
                <div class="step ${isDone?'done':''} ${isNext?'next-to-call':''}" 
                     onclick="${containerId === 'ativos' ? `toggleEscala('${id}', ${e.h})` : ''}"
                     title="${isNext ? 'ESCALONAMENTO PENDENTE!' : ''}">
                    <span><strong>${e.h}h</strong> - ${e.n} ${isDone ? '✔' : ''}</span>
                    <div>
                        <a href="tel:+${e.tel}" style="text-decoration:none; font-size:1.2rem;">📞</a>
                        <a href="https://wa.me/${e.tel}" target="_blank" style="text-decoration:none; margin-left:12px; font-size:1.2rem;">💬</a>
                    </div>
                </div>`;
        }).join('');

        const commentsHTML = (data.comentarios || []).map(c => `
            <div class="comment-item">
                <span class="comment-time">[${c.hora}]</span> ${c.texto}
            </div>
        `).reverse().join('');

        div.innerHTML = `
            <div class="card-header">
                <span class="card-title">${data.titulo}</span>
                <span class="card-meta">Aberto em: ${data.dataStr}<br>Local: ${data.pai || '-'} / ${data.filho || '-'}</span>
            </div>
            
            <div class="timer">⏱ ${Math.floor(diffH)}h ${Math.floor((diffH % 1) * 60)}m</div>
            
            <div style="font-size:0.85rem; color:var(--text-dim)"><strong>Resumo Inicial:</strong> ${data.descricao || 'Nenhuma descrição.'}</div>

            <div class="comments-box">${commentsHTML || 'Sem atualizações técnicas ainda.'}</div>

            ${containerId === 'ativos' ? `
                <div style="display:flex; gap:5px;">
                    <input type="text" id="in-${id}" placeholder="Adicionar comentário..." style="flex:1; font-size:12px;">
                    <button class="btn-update" onclick="addComment('${id}')">Salvar</button>
                </div>
            ` : ''}

            <div style="margin-top:10px; font-weight:bold; font-size:0.75rem; color:var(--primary);">FLUXO DE ESCALONAMENTO:</div>
            <div class="step-list">${stepsHTML}</div>
            
            <div class="action-group">
                ${containerId === "ativos" 
                    ? `<button class="btn-finish" onclick="finalizar('${id}')">Encerrar Incidente</button>` 
                    : `<button style="background:var(--warn); flex:1;" onclick="reabrir('${id}')">Reabrir</button>
                       <button style="background:var(--danger); color:white; flex:1;" onclick="apagar('${id}')">Excluir Registro</button>`
                }
            </div>
        `;
        container.appendChild(div);
    }

    // --- FUNÇÕES DE INTERAÇÃO ---

    window.addComment = function(id) {
        const input = document.getElementById(`in-${id}`);
        if(!input.value) return;
        
        const r = ref(db, `ativos/${id}`);
        onValue(r, s => {
            const d = s.val(); if(!d) return;
            const lista = d.comentarios || [];
            lista.push({ 
                texto: input.value, 
                hora: new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'}) 
            });
            update(r, { comentarios: lista });
            input.value = "";
        }, { onlyOnce: true });
    };

    window.toggleEscala = function(id, h){
        const r = ref(db, `ativos/${id}`);
        onValue(r, s => {
            const d = s.val(); if(!d) return;
            let lista = d.escalado || [];
            lista = lista.includes(h) ? lista.filter(x => x !== h) : [...lista, h];
            update(r, { escalado: lista });
        }, { onlyOnce: true });
    };

    window.finalizar = function(id){
        onValue(ref(db, `ativos/${id}`), s => {
            if(!s.val()) return;
            push(ref(db, "resolvidos"), { ...s.val(), fim: new Date().toLocaleString('pt-BR') });
            remove(ref(db, `ativos/${id}`));
        }, { onlyOnce: true });
    };

    window.reabrir = function(id){
        onValue(ref(db, `resolvidos/${id}`), s => {
            if(!s.val()) return;
            push(ref(db, "ativos"), s.val());
            remove(ref(db, `resolvidos/${id}`));
        }, { onlyOnce: true });
    };

    window.apagar = function(id){
        if(confirm("Tem certeza que deseja excluir permanentemente este registro histórico?")) 
            remove(ref(db, `resolvidos/${id}`));
    };

    // --- SINCRONIZAÇÃO EM TEMPO REAL ---

    onValue(ref(db, "ativos"), snap => {
        document.getElementById("ativos").innerHTML = "";
        snap.forEach(c => renderCard(c.key, c.val(), "ativos"));
    });

    onValue(ref(db, "resolvidos"), snap => {
        document.getElementById("resolvidos").innerHTML = "";
        snap.forEach(c => renderCard(c.key, c.val(), "resolvidos"));
    });

    window.showTab = function(tab){
        document.getElementById("ativos").classList.toggle("hidden", tab !== "ativos");
        document.getElementById("resolvidos").classList.toggle("hidden", tab !== "resolvidos");
        document.getElementById("btn-tab-ativos").classList.toggle("active", tab === "ativos");
        document.getElementById("btn-tab-resolvidos").classList.toggle("active", tab === "resolvidos");
    };

    // Atualiza a tela a cada 60 segundos para repintar os timers e alertas
    setInterval(() => { 
        if(!document.getElementById("ativos").classList.contains("hidden")) {
            const container = document.getElementById("ativos");
            // Forçamos uma atualização visual sem refresh total da página
            onValue(ref(db, "ativos"), snap => {
                container.innerHTML = "";
                snap.forEach(c => renderCard(c.key, c.val(), "ativos"));
            }, { onlyOnce: true });
        }
    }, 60000);
</script>

</body>
</html>
