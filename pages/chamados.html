<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOC Escalation - Advanced</title>

    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --header: #334155;
            --primary: #38bdf8;
            --ok: #10b981;
            --warn: #f59e0b;
            --danger: #ef4444;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --next-step: #fbbf24; /* Cor para o próximo escalonamento */
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            margin: 0; padding: 20px;
        }

        .container { max-width: 1200px; margin: auto; }

        /* Form */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            background: var(--card);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            border: 1px solid var(--header);
        }

        input, select, textarea {
            background: var(--bg);
            border: 1px solid var(--header);
            color: white; padding: 12px; border-radius: 8px;
        }

        textarea { grid-column: 1 / -1; height: 60px; }

        button {
            padding: 12px; border-radius: 8px; border: none;
            cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 12px;
        }

        .btn-add { background: var(--primary); color: var(--bg); }
        .btn-finish { background: var(--ok); color: white; width: 100%; margin-top: 10px; }
        .btn-reopen { background: var(--warn); color: var(--bg); flex: 1; }
        .btn-delete { background: var(--danger); color: white; flex: 1; }

        /* Tabs */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tabs button { background: var(--card); color: var(--text-dim); padding: 10px 20px; }
        .tabs button.active { background: var(--primary); color: var(--bg); }

        /* Grid */
        .grid-cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        /* Card */
        .card {
            background: var(--card);
            padding: 18px;
            border-radius: 12px;
            border-left: 6px solid var(--ok);
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
        }

        .card.warn { border-left-color: var(--warn); }
        .card.danger { border-left-color: var(--danger); }

        .card-header { margin-bottom: 10px; border-bottom: 1px solid var(--header); padding-bottom: 8px; }
        .card-title { font-size: 1.1rem; font-weight: bold; color: var(--primary); display: block; }
        
        .timer { font-family: monospace; color: var(--warn); font-size: 1.1rem; margin: 8px 0; }

        /* Steps */
        .step {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 23, 42, 0.5);
            padding: 8px 12px;
            margin: 4px 0;
            border-radius: 6px;
            font-size: 0.85rem;
            border: 1px solid transparent;
        }

        .step.done { opacity: 0.4; text-decoration: line-through; border-left: 3px solid var(--ok); }

        /* Efeito para o PRÓXIMO que deve ser acionado */
        .step.next-to-call {
            border: 1px solid var(--next-step);
            background: rgba(251, 191, 36, 0.1);
            animation: pulse-next 2s infinite;
        }

        @keyframes pulse-next {
            0% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.4); }
            70% { box-shadow: 0 0 0 6px rgba(251, 191, 36, 0); }
            100% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0); }
        }

        .step-actions a { text-decoration: none; margin-left: 10px; font-size: 1.1rem; }

        .action-group { display: flex; gap: 8px; margin-top: 15px; }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <header style="text-align:center; margin-bottom: 20px;">
        <h2 style="color: var(--primary);">📡 NOC DASHBOARD - ESCALONAMENTO</h2>
    </header>

    <div class="form-grid">
        <input id="titulo" placeholder="Título">
        <input id="pai" placeholder="Pai">
        <input id="filho" placeholder="Filho">
        <select id="tipo">
            <option value="externa">Rede Externa</option>
            <option value="interna">Rede Interna</option>
        </select>
        <textarea id="descricao" placeholder="Descrição da falha..."></textarea>
        <button class="btn-add" onclick="add()">Iniciar Evento</button>
    </div>

    <div class="tabs">
        <button id="btn-tab-ativos" class="active" onclick="showTab('ativos')">Incidentes Ativos</button>
        <button id="btn-tab-resolvidos" onclick="showTab('resolvidos')">Histórico / Resolvidos</button>
    </div>

    <div id="ativos" class="grid-cards"></div>
    <div id="resolvidos" class="grid-cards hidden"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import {
        getDatabase, ref, push, update, remove, onValue
    } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCdSj6somJinHJvcGGJs3C6Od6Sri92ETg",
        authDomain: "chamadosnoc-c45c4.firebaseapp.com",
        databaseURL: "https://chamadosnoc-c45c4-default-rtdb.firebaseio.com",
        projectId: "chamadosnoc-c45c4",
        storageBucket: "chamadosnoc-c45c4.appspot.com",
        messagingSenderId: "25502320062",
        appId: "1:25502320062:web:a7f41ad4f61e0c38b265ef"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const escala = {
        externa: [
            {h:4, n:"Erivelton", tel:"558898283311"},
            {h:8, n:"Guilherme", tel:"558899282323"},
            {h:10, n:"Valmir", tel:"558898287071"},
            {h:12, n:"Fernando", tel:"5588994401255"}
        ],
        interna: [
            {h:4, n:"Joao", tel:"558898283337"},
            {h:8, n:"Wescley", tel:"558894866085"},
            {h:10, n:"Valmir", tel:"558898287071"},
            {h:12, n:"Fernando", tel:"5588994401255"}
        ]
    };

    window.add = function(){
        const t = document.getElementById("titulo").value;
        if(!t) return alert("Título necessário");

        push(ref(db,"ativos"), {
            titulo: t,
            pai: document.getElementById("pai").value,
            filho: document.getElementById("filho").value,
            descricao: document.getElementById("descricao").value,
            tipo: document.getElementById("tipo").value,
            inicio: new Date().getTime(),
            escalado: []
        });
        document.querySelectorAll("input, textarea").forEach(e=>e.value="");
    };

    function renderCard(id, data, containerId) {
        const container = document.getElementById(containerId);
        let div = document.createElement("div");
        
        const diffH = (Date.now() - data.inicio) / 3600000;
        
        // Lógica de cores do card
        let statusClass = "";
        if(diffH >= 10) statusClass = "danger";
        else if(diffH >= 8) statusClass = "warn";
        
        div.className = `card ${statusClass}`;
        div.id = id;

        // Encontrar o próximo contato a ser feito (que ainda não foi marcado como feito)
        let proximoH = null;
        const contatosPosiveis = escala[data.tipo].filter(e => diffH >= e.h);
        if(contatosPosiveis.length > 0) {
            // O último da lista de tempos atingidos que ainda não foi marcado
            const pendentes = contatosPosiveis.filter(e => !data.escalado?.includes(e.h));
            if(pendentes.length > 0) proximoH = pendentes[0].h;
        }

        const stepsHTML = escala[data.tipo].map(e => {
            const isDone = data.escalado?.includes(e.h);
            const isNext = e.h === proximoH && containerId === 'ativos';
            
            return `
                <div class="step ${isDone?'done':''} ${isNext?'next-to-call':''}" 
                     onclick="${containerId === 'ativos' ? `toggleEscala('${id}', ${e.h})` : ''}">
                    <span><strong>${e.h}h</strong> - ${e.n} ${isDone ? '✔' : ''}</span>
                    <div class="step-actions">
                        <a href="tel:+${e.tel}">📞</a>
                        <a href="https://wa.me/${e.tel}" target="_blank">💬</a>
                    </div>
                </div>
            `;
        }).join('');

        div.innerHTML = `
            <div class="card-header">
                <span class="card-title">${data.titulo}</span>
                <small>${data.pai || '-'} / ${data.filho || '-'}</small>
            </div>
            <div style="font-size:0.85rem; flex-grow:1;">${data.descricao || ''}</div>
            <div class="timer">⏱ ${Math.floor(diffH)}h ${Math.floor((diffH % 1) * 60)}m</div>
            <div class="step-list">${stepsHTML}</div>
            
            ${containerId === "ativos" 
                ? `<button class="btn-finish" onclick="finalizar('${id}')">Finalizar</button>` 
                : `<div class="action-group">
                    <button class="btn-reopen" onclick="reabrir('${id}')">Reabrir</button>
                    <button class="btn-delete" onclick="apagar('${id}', 'resolvidos')">Apagar</button>
                   </div>`
            }
        `;
        container.appendChild(div);
    }

    // Sincronização Firebase
    onValue(ref(db, "ativos"), snap => {
        document.getElementById("ativos").innerHTML = "";
        snap.forEach(c => renderCard(c.key, c.val(), "ativos"));
    });

    onValue(ref(db, "resolvidos"), snap => {
        document.getElementById("resolvidos").innerHTML = "";
        snap.forEach(c => renderCard(c.key, c.val(), "resolvidos"));
    });

    window.toggleEscala = function(id, h){
        const r = ref(db, `ativos/${id}`);
        onValue(r, s => {
            const d = s.val(); if(!d) return;
            let lista = d.escalado || [];
            lista = lista.includes(h) ? lista.filter(x => x !== h) : [...lista, h];
            update(r, { escalado: lista });
        }, { onlyOnce: true });
    };

    window.finalizar = function(id){
        const r = ref(db, `ativos/${id}`);
        onValue(r, s => {
            push(ref(db, "resolvidos"), s.val());
            remove(r);
        }, { onlyOnce: true });
    };

    window.reabrir = function(id){
        const r = ref(db, `resolvidos/${id}`);
        onValue(r, s => {
            push(ref(db, "ativos"), s.val());
            remove(r);
        }, { onlyOnce: true });
    };

    window.apagar = function(id, path){
        if(confirm("Deseja apagar permanentemente?")) {
            remove(ref(db, `${path}/${id}`));
        }
    };

    window.showTab = function(tab){
        document.getElementById("ativos").classList.toggle("hidden", tab !== "ativos");
        document.getElementById("resolvidos").classList.toggle("hidden", tab !== "resolvidos");
        document.getElementById("btn-tab-ativos").classList.toggle("active", tab === "ativos");
        document.getElementById("btn-tab-resolvidos").classList.toggle("active", tab === "resolvidos");
    };

    // Atualiza timers a cada minuto
    setInterval(() => {
        const activeTab = document.getElementById("btn-tab-ativos").classList.contains("active") ? "ativos" : "resolvidos";
        showTab(activeTab); 
    }, 60000);

</script>
</body>
</html>
