<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NOC ESCALATION</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #05070a; --card: #11141d; --header: #1a1f2e;
            --primary: #00d2ff; --ok: #00ff95; --warn: #ffb800; --danger: #ff4d4d;
            --text-main: #e2e8f0; --text-dim: #64748b; --input-bg: #080a0f; --whatsapp: #25d366;
        }

        body.light-mode {
            --bg: #f0f2f5; --card: #ffffff; --header: #e4e6eb;
            --primary: #007bff; --ok: #28a745; --warn: #fd7e14; --danger: #dc3545;
            --text-main: #1c1e21; --text-dim: #606770; --input-bg: #f5f6f7;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-main); margin: 0; padding: 10px; line-height: 1.4; }
        .container { max-width: 1400px; margin: auto; }

        .page-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 15px; background: var(--card); border-radius: 12px;
            border: 1px solid var(--header); margin-bottom: 15px;
        }
        .logo-area h2 { margin: 0; font-size: 1.1rem; font-weight: 800; color: var(--primary); }
        .header-actions { display: flex; align-items: center; gap: 10px; }
        
        .nav-btn {
            background: var(--primary); color: #000; border: none; padding: 8px 12px;
            border-radius: 8px; cursor: pointer; font-weight: 800; font-size: 0.75rem;
        }

        #page-clock { font-family: 'JetBrains Mono'; font-size: 0.9rem; color: var(--primary); }

        .admin-panel { background: var(--card); border: 1px solid var(--header); border-radius: 16px; padding: 15px; margin-bottom: 20px; }
        .form-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        
        @media (min-width: 768px) {
            .form-grid { grid-template-columns: repeat(4, 1fr); }
            .span-2-desktop { grid-column: span 2; }
        }

        .form-group { display: flex; flex-direction: column; gap: 4px; }
        label { font-size: 0.65rem; color: var(--primary); text-transform: uppercase; font-weight: 800; padding-left: 4px; }
        input, select, textarea { 
            background: var(--input-bg); border: 1px solid var(--header); color: var(--text-main); 
            padding: 12px; border-radius: 10px; outline: none; font-size: 16px; width: 100%;
        }
        
        .btn-add { 
            background: var(--ok); color: #000; border: none; border-radius: 10px; 
            cursor: pointer; font-weight: 800; height: 50px; font-size: 1rem; margin-top: 10px; width: 100%;
        }

        .stats-bar { 
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 15px;
            padding-top: 15px; border-top: 1px solid var(--header);
        }
        @media (min-width: 768px) { .stats-bar { grid-template-columns: repeat(4, 1fr); } }
        .stat-item { background: var(--input-bg); padding: 8px; border-radius: 8px; text-align: center; border: 1px solid var(--header); }
        .stat-item div { font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; font-weight: 800; }
        .stat-item span { font-family: 'JetBrains Mono'; font-size: 1.1rem; color: var(--primary); }

        .tabs { display: flex; gap: 8px; margin-bottom: 15px; }
        .tabs button { 
            flex: 1; background: var(--card); color: var(--text-dim); padding: 12px; 
            border: 1px solid var(--header); border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 0.8rem;
        }
        .tabs button.active { border-color: var(--primary); color: var(--primary); background: rgba(0, 210, 255, 0.05); }

        .grid-cards { display: grid; grid-template-columns: 1fr; gap: 15px; }
        @media (min-width: 768px) { .grid-cards { grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); } }

        .card { background: var(--card); border: 1px solid var(--header); border-radius: 18px; padding: 15px; border-top: 5px solid var(--ok); }
        .card.warn { border-top-color: var(--warn); }
        .card.danger { border-top-color: var(--danger); }
        
        .timer-box { background: var(--input-bg); border-radius: 12px; padding: 12px; text-align: center; margin: 10px 0; border: 1px solid var(--header); }
        .timer-val { font-family: 'JetBrains Mono'; font-size: 1.4rem; color: var(--primary); display: block; }

        .step { 
            display: flex; justify-content: space-between; align-items: center; 
            background: var(--input-bg); padding: 12px; margin: 6px 0; border-radius: 10px; 
            font-size: 0.85rem; border: 1px solid transparent;
        }
        .step.done { opacity: 0.3; border-style: dashed; background: transparent; }
        .step.next-to-call { border-color: var(--warn); animation: pulse-border 1.5s infinite; }
        
        @keyframes pulse-border {
            0% { box-shadow: 0 0 0 0px rgba(255, 184, 0, 0.4); }
            100% { box-shadow: 0 0 0 10px rgba(255, 184, 0, 0); }
        }

        .actions-step { display: flex; gap: 12px; align-items: center; }
        .wa-link { color: var(--whatsapp); font-size: 1.4rem; text-decoration: none; }
        .copy-btn { color: var(--text-dim); font-size: 1.2rem; cursor: pointer; transition: color 0.2s; }
        .copy-btn:active { color: var(--ok); }

        .log-container { 
            background: var(--input-bg); padding: 10px; border-radius: 8px; 
            font-size: 0.75rem; max-height: 100px; overflow-y: auto; margin: 10px 0; border: 1px solid var(--header);
        }
        .log-item { margin-bottom: 6px; padding-bottom: 4px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .btn-encerrar { 
            background: var(--ok); color: #000; width: 100%; border: none; 
            border-radius: 10px; padding: 12px; margin-top: 10px; font-weight: 800; cursor: pointer; 
        }

        .btn-hist-group { display: flex; gap: 8px; margin-top: 10px; }
        .btn-reabrir { background: var(--warn); color: #000; flex: 2; border: none; border-radius: 10px; padding: 12px; font-weight: 800; cursor: pointer; }
        .btn-excluir { background: var(--danger); color: #fff; flex: 1; border: none; border-radius: 10px; padding: 12px; font-weight: 800; cursor: pointer; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <div id="main-view">
        <div class="page-header">
            <div class="logo-area"><h2><i class="fa-solid fa-tower-broadcast"></i> NOC MONITORING</h2></div>
            <div class="header-actions">
                <button class="nav-btn" onclick="toggleView('partners')">OPERADORAS</button>
                <div id="page-clock">00:00:00</div>
                <button id="theme-toggle" onclick="toggleTheme()"><i class="fa-solid fa-moon"></i></button>
            </div>
        </div>

        <div class="admin-panel">
            <div class="form-grid">
                <div class="form-group span-2-desktop"><label>Título da Ocorrência</label><input id="titulo" placeholder="Ex: Pop Juazeiro Fora"></div>
                <div class="form-group"><label>Prot. Pai</label><input id="pai" type="tel" placeholder="Nº Pai"></div>
                <div class="form-group"><label>Prot. Filho</label><input id="filho" type="tel" placeholder="Nº Filho"></div>
                <div class="form-group"><label>Data Início</label><input type="date" id="data_manual"></div>
                <div class="form-group"><label>Hora Início</label><input type="time" id="hora_manual"></div>
                <div class="form-group span-2-desktop">
                    <label>Escopo / Tipo</label>
                    <select id="tipo">
                        <option value="externa_ne">Externa (NE)</option>
                        <option value="externa_no">Externa (NO)</option>
                        <option value="interna_ne">Interna (NE)</option>
                        <option value="interna_no">Interna (NO)</option>
                    </select>
                </div>
            </div>
            <button class="btn-add" onclick="add()">ABRIR NOVO CHAMADO</button>

            <div class="stats-bar">
                <div class="stat-item"><div>Ext. NE</div><span id="count-externa_ne">0</span></div>
                <div class="stat-item"><div>Ext. NO</div><span id="count-externa_no">0</span></div>
                <div class="stat-item"><div>Int. NE</div><span id="count-interna_ne">0</span></div>
                <div class="stat-item"><div>Int. NO</div><span id="count-interna_no">0</span></div>
            </div>
        </div>

        <div class="tabs">
            <button id="btn-tab-ativos" class="active" onclick="showTab('ativos')">ATIVOS</button>
            <button id="btn-tab-resolvidos" onclick="showTab('resolvidos')">HISTÓRICO</button>
        </div>

        <div id="ativos" class="grid-cards"></div>
        <div id="resolvidos" class="grid-cards hidden"></div>
    </div>

    <div id="partners-view" class="hidden">
        <div class="page-header">
            <div class="logo-area"><h2><i class="fa-solid fa-handshake"></i> OPERADORAS</h2></div>
            <button class="nav-btn" onclick="toggleView('main')">VOLTAR</button>
        </div>
        <div class="admin-panel">
            <div style="background:var(--input-bg); padding:15px; border-radius:12px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;">
                <div><b>Operadora X</b><br><small style="color:var(--text-dim)">Suporte Link IP</small></div>
                <div class="actions-step">
                    <i class="fa-solid fa-copy copy-btn" onclick="copyTel('08005551234', this)"></i>
                    <a href="#" class="wa-link"><i class="fa-brands fa-whatsapp"></i></a>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getDatabase, ref, push, update, remove, onValue, get } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCdSj6somJinHJvcGGJs3C6Od6Sri92ETg",
        authDomain: "chamadosnoc-c45c4.firebaseapp.com",
        databaseURL: "https://chamadosnoc-c45c4-default-rtdb.firebaseio.com",
        projectId: "chamadosnoc-c45c4",
        storageBucket: "chamadosnoc-c45c4.appspot.com",
        messagingSenderId: "25502320062",
        appId: "1:25502320062:web:a7f41ad4f61e0c38b265ef"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const agora = new Date();
    document.getElementById('data_manual').value = agora.toISOString().split('T')[0];
    document.getElementById('hora_manual').value = agora.toTimeString().slice(0,5);

    const CONFIG_ESCALATION = {
        "externa_ne": [{h:4, nome:"Erivelton", tel:"558898283311"}, {h:8, nome:"Guilherme", tel:"558899282323"}, {h:10, nome:"Iran Jr", tel:"558899870725"}, {h:12, nome:"Fernando", tel:"5588994401255"}],
        "externa_no": [{h:4, nome:"Clecio", tel:"558898283311"}, {h:8, nome:"Maciel", tel:"558899282323"}, {h:10, nome:"Valmir", tel:"558898287071"}, {h:12, nome:"Fernando", tel:"5588994401255"}],
        "interna_ne": [{h:4, nome:"Joao", tel:"558898283337"}, {h:8, nome:"Wescley", tel:"558894866085"}, {h:10, nome:"Iran Jr", tel:"558899870725"}, {h:12, nome:"Fernando", tel:"5588994401255"}],
        "interna_no": [{h:4, nome:"Nildo", tel:"558898283337"}, {h:8, nome:"Julio Gaia", tel:"558894866085"}, {h:10, nome:"Valmir", tel:"558898287071"}, {h:12, nome:"Fernando", tel:"5588994401255"}]
    };

    window.copyTel = (num, el) => {
        navigator.clipboard.writeText(num).then(() => {
            const originalClass = el.className;
            el.className = "fa-solid fa-check copy-btn";
            el.style.color = "var(--ok)";
            setTimeout(() => {
                el.className = originalClass;
                el.style.color = "";
            }, 1500);
        });
    };

    window.toggleView = (v) => {
        document.getElementById('main-view').classList.toggle('hidden', v==='partners');
        document.getElementById('partners-view').classList.toggle('hidden', v==='main');
    };

    setInterval(() => { document.getElementById('page-clock').innerText = new Date().toLocaleTimeString('pt-BR'); }, 1000);
    window.toggleTheme = () => document.body.classList.toggle('light-mode');

    function formatDuration(ms) {
        const h = Math.floor(ms/3600000), m = Math.floor((ms%3600000)/60000), s = Math.floor((ms%60000)/1000);
        return `${h}h ${m}m ${s}s`;
    }

    window.add = function(){
        const t = document.getElementById("titulo").value, p = document.getElementById("pai").value;
        if(!t || !p) return alert("Título e Pai são obrigatórios!");
        const fullDate = new Date(`${document.getElementById("data_manual").value}T${document.getElementById("hora_manual").value}`);
        push(ref(db,"ativos"), { 
            titulo: t, pai: p, filho: document.getElementById("filho").value || "N/A", 
            tipo: document.getElementById("tipo").value, 
            inicio: fullDate.getTime(), dataStr: fullDate.toLocaleString('pt-BR'), 
            escalado: [], comentarios: [] 
        });
        document.getElementById("titulo").value = "";
    };

    function renderCard(id, data, containerId) {
        const container = document.getElementById(containerId), isResolvido = containerId === 'resolvidos', div = document.createElement("div");
        div.className = `card ${isResolvido ? 'finalizado' : 'ativo'}`; 
        div.id = id; div.dataset.start = data.inicio; div.dataset.tipo = data.tipo; div.dataset.esc = JSON.stringify(data.escalado || []);
        
        const logsHTML = (data.comentarios || []).map(c => `<div class="log-item"><b style="color:var(--primary)">[${c.hora}]</b> ${c.texto}</div>`).reverse().join('');
        const stepsHTML = (CONFIG_ESCALATION[data.tipo] || []).map(e => `
            <div class="step ${(data.escalado || []).includes(e.h) ? 'done' : ''}" data-h="${e.h}" onclick="${!isResolvido ? `window.toggleEscala('${id}', ${e.h})` : ''}">
                <span><b>${e.h}h</b> - ${e.nome}</span>
                <div class="actions-step">
                    <i class="fa-solid fa-copy copy-btn" onclick="event.stopPropagation(); window.copyTel('${e.tel}', this)"></i>
                    <a href="https://wa.me/${e.tel}" target="_blank" class="wa-link" onclick="event.stopPropagation()"><i class="fa-brands fa-whatsapp"></i></a>
                </div>
            </div>`).join('');

        div.innerHTML = `
            <div style="font-size:0.65rem; color:var(--text-dim);">${data.dataStr}</div>
            <div style="font-weight:800; font-size:1.1rem; color:var(--primary)">${data.titulo}</div>
            <div style="font-size:0.75rem; opacity:0.8">Pai: ${data.pai} | Filho: ${data.filho}</div>
            <div class="timer-box"><span class="timer-val" id="timer-${id}">${isResolvido ? formatDuration(data.fim - data.inicio) : '...'}</span></div>
            <div class="log-container">${logsHTML || 'Sem registros.'}</div>
            ${!isResolvido ? `<div style="display:flex; gap:5px;"><input type="text" id="in-${id}" placeholder="Nota..." style="flex:1; padding:8px; font-size:14px;"><button class="nav-btn" onclick="window.addComment('${id}')">OK</button></div>` : ''}
            <div style="margin-top:10px;">${stepsHTML}</div>
            ${!isResolvido ? `<button class="btn-encerrar" onclick="window.finalizar('${id}')">FINALIZAR</button>` : 
            `<div class="btn-hist-group">
                <button class="btn-reabrir" onclick="window.reabrir('${id}')">REABRIR</button>
                <button class="btn-excluir" onclick="window.apagar('${id}')"><i class="fa-solid fa-trash"></i></button>
            </div>`}
        `;
        
        // ORDENAÇÃO: prepend coloca o novo item no topo da lista
        container.prepend(div);
    }

    window.addComment = (id) => {
        const inp = document.getElementById(`in-${id}`); if(!inp.value) return;
        get(ref(db, `ativos/${id}/comentarios`)).then(s => {
            const list = s.val() || [];
            list.push({ texto: inp.value, hora: new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'}) });
            update(ref(db, `ativos/${id}`), { comentarios: list });
        });
    };

    window.toggleEscala = (id, h) => {
        get(ref(db, `ativos/${id}/escalado`)).then(s => {
            let list = s.val() || [];
            list = list.includes(h) ? list.filter(x => x !== h) : [...list, h];
            update(ref(db, `ativos/${id}`), { escalado: list });
        });
    };

    window.finalizar = (id) => { get(ref(db, `ativos/${id}`)).then(s => { push(ref(db, "resolvidos"), { ...s.val(), fim: Date.now() }); remove(ref(db, `ativos/${id}`)); }); };
    window.reabrir = (id) => { get(ref(db, `resolvidos/${id}`)).then(s => { const {fim, ...rest} = s.val(); push(ref(db, "ativos"), rest); remove(ref(db, `resolvidos/${id}`)); }); };
    window.apagar = (id) => { if(confirm("Deseja apagar do histórico?")) remove(ref(db, `resolvidos/${id}`)); };

    onValue(ref(db, "ativos"), snap => {
        document.getElementById("ativos").innerHTML = "";
        const counts = { externa_ne: 0, externa_no: 0, interna_ne: 0, interna_no: 0 };
        snap.forEach(c => {
            const data = c.val();
            renderCard(c.key, data, "ativos");
            if(counts.hasOwnProperty(data.tipo)) counts[data.tipo]++;
        });
        Object.keys(counts).forEach(tipo => { document.getElementById(`count-${tipo}`).innerText = counts[tipo]; });
    });

    onValue(ref(db, "resolvidos"), snap => { 
        document.getElementById("resolvidos").innerHTML = ""; 
        snap.forEach(c => renderCard(c.key, c.val(), "resolvidos")); 
    });

    setInterval(() => {
        const now = Date.now();
        document.querySelectorAll('.card.ativo').forEach(card => {
            const start = parseInt(card.dataset.start);
            const diffH = (now - start) / 3600000;
            const timerEl = document.getElementById(`timer-${card.id}`);
            if(timerEl) timerEl.innerText = formatDuration(now - start);
            card.classList.toggle('warn', diffH >= 8 && diffH < 10);
            card.classList.toggle('danger', diffH >= 10);
            const escFeito = JSON.parse(card.dataset.esc);
            let alertSet = false;
            card.querySelectorAll('.step').forEach(step => {
                const h = parseInt(step.dataset.h);
                const isNext = diffH >= h && !escFeito.includes(h) && !alertSet;
                step.classList.toggle('next-to-call', isNext);
                if(isNext) alertSet = true;
            });
        });
    }, 1000);

    window.showTab = (t) => {
        document.getElementById("ativos").classList.toggle("hidden", t!=='ativos');
        document.getElementById("resolvidos").classList.toggle("hidden", t!=='resolvidos');
        document.getElementById("btn-tab-ativos").classList.toggle("active", t==='ativos');
        document.getElementById("btn-tab-resolvidos").classList.toggle("active", t==='resolvidos');
    };
</script>
</body>
</html>
