<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOC Dashboard - Controle de Escalonamento</title>

    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --header: #334155;
            --primary: #38bdf8;
            --primary-hover: #0ea5e9;
            --ok: #10b981;
            --warn: #f59e0b;
            --danger: #ef4444;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            margin: 0;
            padding: 20px;
            line-height: 1.5;
        }

        .container { max-width: 1200px; margin: auto; }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--card);
        }

        h2 { font-weight: 300; letter-spacing: 1px; color: var(--primary); margin: 0; }

        /* Form Style */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            background: var(--card);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3);
            margin-bottom: 30px;
        }

        input, select, textarea {
            background: var(--bg);
            border: 1px solid var(--header);
            color: white;
            padding: 12px;
            border-radius: 8px;
            outline: none;
        }

        input:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2); }

        textarea { grid-column: 1 / -1; height: 80px; resize: vertical; }

        button {
            background: var(--primary);
            color: var(--bg);
            font-weight: bold;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        button:hover { background: var(--primary-hover); transform: translateY(-1px); }

        /* Tabs */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tabs button { background: var(--card); color: var(--text-dim); }
        .tabs button.active { background: var(--primary); color: var(--bg); }

        /* Cards */
        .grid-cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card);
            padding: 20px;
            border-radius: 12px;
            border-top: 4px solid var(--ok);
            position: relative;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.2);
        }

        .card.warn { border-top-color: var(--warn); }
        .card.danger { border-top-color: var(--danger); }

        .card-header { margin-bottom: 15px; }
        .card-title { font-size: 1.2rem; font-weight: 600; display: block; color: var(--primary); }
        .card-subtitle { font-size: 0.8rem; color: var(--text-dim); }

        .description { 
            background: rgba(0,0,0,0.2); 
            padding: 10px; 
            border-radius: 6px; 
            margin: 10px 0; 
            font-size: 0.9rem;
        }

        .timer {
            font-family: monospace;
            font-size: 1.1rem;
            color: var(--warn);
            display: flex;
            align-items: center;
            gap: 5px;
            margin: 10px 0;
        }

        /* Escalation Steps */
        .step-list { margin-top: 15px; }
        .step {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--header);
            padding: 10px;
            margin: 6px 0;
            border-radius: 8px;
            font-size: 0.85rem;
            cursor: pointer;
        }

        .step.done { border-left: 4px solid var(--ok); background: rgba(16, 185, 129, 0.1); opacity: 0.7; }
        .step.current { border-left: 4px solid var(--primary); animation: pulse 2s infinite; }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(56, 189, 248, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(56, 189, 248, 0); }
            100% { box-shadow: 0 0 0 0 rgba(56, 189, 248, 0); }
        }

        .step-actions a {
            text-decoration: none;
            margin-left: 8px;
            font-size: 1.2rem;
        }

        .btn-finish { width: 100%; margin-top: 15px; background: var(--ok); color: white; }
        .btn-finish:hover { background: #059669; }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2>📡 NOC ESCALATION SYSTEM</h2>
    </header>

    <div class="form-grid">
        <input id="titulo" placeholder="Título da Ocorrência (Ex: Rompimento Fibra)">
        <input id="pai" placeholder="Elemento Pai">
        <input id="filho" placeholder="Elemento Filho">
        <select id="tipo">
            <option value="externa">Rede Externa</option>
            <option value="interna">Rede Interna</option>
        </select>
        <textarea id="descricao" placeholder="Detalhes técnicos da falha..."></textarea>
        <button onclick="add()">Abrir Escalonamento</button>
    </div>

    <div class="tabs">
        <button id="btn-ativos" class="active" onclick="showTab('ativos')">Ativos</button>
        <button id="btn-resolvidos" onclick="showTab('resolvidos')">Histórico Resolvidos</button>
    </div>

    <div id="ativos" class="grid-cards"></div>
    <div id="resolvidos" class="grid-cards hidden"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import {
        getDatabase, ref, push, onChildAdded,
        onChildRemoved, update, remove, onValue
    } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCdSj6somJinHJvcGGJs3C6Od6Sri92ETg",
        authDomain: "chamadosnoc-c45c4.firebaseapp.com",
        databaseURL: "https://chamadosnoc-c45c4-default-rtdb.firebaseio.com",
        projectId: "chamadosnoc-c45c4",
        storageBucket: "chamadosnoc-c45c4.appspot.com",
        messagingSenderId: "25502320062",
        appId: "1:25502320062:web:a7f41ad4f61e0c38b265ef"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const escala = {
        externa: [
            {h:4, n:"Erivelton", tel:"558898283311"},
            {h:8, n:"Guilherme", tel:"558899282323"},
            {h:10, n:"Valmir", tel:"558898287071"},
            {h:12, n:"Fernando", tel:"5588994401255"}
        ],
        interna: [
            {h:4, n:"Joao", tel:"558898283337"},
            {h:8, n:"Wescley", tel:"558894866085"},
            {h:10, n:"Valmir", tel:"558898287071"},
            {h:12, n:"Fernando", tel:"5588994401255"}
        ]
    };

    window.add = function(){
        const t = document.getElementById("titulo").value;
        if(!t) return alert("Título é obrigatório");

        push(ref(db,"ativos"), {
            titulo: t,
            pai: document.getElementById("pai").value,
            filho: document.getElementById("filho").value,
            descricao: document.getElementById("descricao").value,
            tipo: document.getElementById("tipo").value,
            inicio: new Date().getTime(),
            escalado: []
        });

        document.querySelectorAll("input, textarea").forEach(e=>e.value="");
    }

    function renderCard(id, data, containerId) {
        const container = document.getElementById(containerId);
        let div = document.getElementById(id);
        
        if(!div) {
            div = document.createElement("div");
            div.id = id;
            container.appendChild(div);
        }

        const updateUI = () => {
            const diffMs = Date.now() - data.inicio;
            const diffH = diffMs / 3600000;
            const hDisplay = Math.floor(diffH);
            const mDisplay = Math.floor((diffH % 1) * 60);

            let nivelAtual = null;
            escala[data.tipo].forEach(e => { if(diffH >= e.h) nivelAtual = e; });

            div.className = `card ${diffH >= 10 ? 'danger' : diffH >= 8 ? 'warn' : ''}`;

            let stepsHTML = escala[data.tipo].map(e => {
                const done = data.escalado?.includes(e.h);
                const isCurrent = nivelAtual && nivelAtual.h === e.h;
                return `
                    <div class="step ${done?'done':''} ${isCurrent?'current':''}" onclick="toggleEscala('${id}', ${e.h})">
                        <span><strong>${e.h}h</strong> - ${e.n} ${done ? '✔' : ''}</span>
                        <div class="step-actions">
                            <a href="tel:+${e.tel}" title="Ligar">📞</a>
                            <a href="https://wa.me/${e.tel}" target="_blank" title="WhatsApp">💬</a>
                        </div>
                    </div>
                `;
            }).join('');

            div.innerHTML = `
                <div class="card-header">
                    <span class="card-title">${data.titulo}</span>
                    <span class="card-subtitle">Local: ${data.pai || 'N/A'} > ${data.filho || 'N/A'} | Tipo: ${data.tipo}</span>
                </div>
                <div class="description">${data.descricao || "Sem descrição adicional."}</div>
                <div class="timer">⏱ ${hDisplay}h ${mDisplay}m ocorrendo</div>
                <div class="step-list">${stepsHTML}</div>
                ${containerId === "ativos" 
                    ? `<button class="btn-finish" onclick="finalizar('${id}')">Encerrar Ocorrência</button>` 
                    : `<div style="text-align:center; color:var(--ok); margin-top:10px;">✓ Resolvido</div>`}
            `;
        };

        updateUI();
        if(containerId === "ativos") {
            if(div.dataset.interval) clearInterval(div.dataset.interval);
            div.dataset.interval = setInterval(updateUI, 30000);
        }
    }

    // Listeners em tempo real
    onValue(ref(db, "ativos"), snap => {
        document.getElementById("ativos").innerHTML = "";
        snap.forEach(child => renderCard(child.key, child.val(), "ativos"));
    });

    onValue(ref(db, "resolvidos"), snap => {
        document.getElementById("resolvidos").innerHTML = "";
        snap.forEach(child => renderCard(child.key, child.val(), "resolvidos"));
    });

    window.toggleEscala = function(id, h){
        const itemRef = ref(db, `ativos/${id}`);
        onValue(itemRef, snap => {
            const data = snap.val();
            if(!data) return;
            let lista = data.escalado || [];
            lista = lista.includes(h) ? lista.filter(x => x !== h) : [...lista, h];
            update(itemRef, { escalado: lista });
        }, { onlyOnce: true });
    }

    window.finalizar = function(id){
        const itemRef = ref(db, `ativos/${id}`);
        onValue(itemRef, snap => {
            const data = snap.val();
            push(ref(db, "resolvidos"), { ...data, fim: new Date().getTime() });
            remove(itemRef);
        }, { onlyOnce: true });
    }

    window.showTab = function(tab){
        document.getElementById("ativos").classList.toggle("hidden", tab !== "ativos");
        document.getElementById("resolvidos").classList.toggle("hidden", tab !== "resolvidos");
        document.getElementById("btn-ativos").classList.toggle("active", tab === "ativos");
        document.getElementById("btn-resolvidos").classList.toggle("active", tab === "resolvidos");
    }
</script>

</body>
</html>
