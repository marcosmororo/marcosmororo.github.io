<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOC Escalation Pro - Compact</title>

    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --header: #334155;
            --primary: #38bdf8;
            --ok: #10b981;
            --warn: #f59e0b;
            --danger: #ef4444;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --alert: #fbbf24;
        }

        * { box-sizing: border-box; transition: background 0.2s ease; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text-main); margin: 0; padding: 10px; }
        .container { max-width: 100%; margin: auto; }

        /* Header Compacto */
        .page-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 10px; border-bottom: 1px solid var(--header); padding-bottom: 5px;
        }
        #page-clock { font-family: monospace; font-size: 1.2rem; color: var(--primary); font-weight: bold; }

        /* Formulario Super Compacto */
        .form-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 8px; background: var(--card); padding: 12px; border-radius: 8px;
            margin-bottom: 15px; border: 1px solid var(--header);
        }
        .form-group { display: flex; flex-direction: column; gap: 2px; }
        label { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; font-weight: bold; }
        input, select, textarea { background: var(--bg); border: 1px solid var(--header); color: white; padding: 6px 10px; border-radius: 4px; font-size: 13px; }
        textarea { grid-column: span 2; height: 38px; }

        button { padding: 8px; border-radius: 4px; border: none; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 10px; }
        .btn-add { background: var(--primary); color: var(--bg); grid-column: -1; height: 38px; align-self: flex-end; }
        .btn-finish { background: var(--ok); color: white; width: 100%; margin-top: 8px; height: 28px; }

        /* Tabs */
        .tabs { display: flex; gap: 5px; margin-bottom: 10px; }
        .tabs button { background: var(--card); color: var(--text-dim); padding: 8px 15px; font-size: 11px; }
        .tabs button.active { background: var(--primary); color: var(--bg); }

        /* GRID DE CARDS - AQUI ESTÁ O SEGREDO */
        .grid-cards { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 12px; 
        }

        .card {
            background: var(--card); padding: 12px; border-radius: 8px;
            border-top: 4px solid var(--ok); box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            display: flex; flex-direction: column; gap: 6px; position: relative;
        }
        .card.warn { border-top-color: var(--warn); }
        .card.danger { border-top-color: var(--danger); }
        .card.finalizado { border-top-color: var(--header); opacity: 0.8; }

        .datetime-badge { font-size: 0.65rem; color: var(--primary); font-weight: bold; }

        .timer-box { 
            background: #0f172a; padding: 6px; border-radius: 4px; text-align: center;
            border: 1px solid var(--header);
        }
        .timer-val { font-family: monospace; color: var(--alert); font-size: 1.2rem; font-weight: bold; }

        .step {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(15, 23, 42, 0.6); padding: 6px 8px; margin: 2px 0;
            border-radius: 4px; font-size: 0.75rem; border: 1px solid transparent;
        }
        .step.done { opacity: 0.4; text-decoration: line-through; border-left: 3px solid var(--ok); }
        .step.next-to-call { 
            border-color: var(--alert); 
            background: rgba(251, 191, 36, 0.1);
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse { from { opacity: 0.7; } to { opacity: 1; } }

        .log-container {
            background: rgba(0,0,0,0.2); padding: 6px; border-radius: 4px; 
            font-size: 0.7rem; max-height: 80px; overflow-y: auto; color: #cbd5e1;
        }

        .hidden { display: none; }
        .flex-row { display: flex; gap: 4px; align-items: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="page-header">
        <h3 style="color: var(--primary); margin:0;">📡 NOC ESCALATION PRO</h3>
        <div id="page-clock">00:00:00</div>
    </div>

    <div class="form-grid">
        <div class="form-group"><label>Título</label><input id="titulo"></div>
        <div class="form-group"><label>Pai</label><input id="pai"></div>
        <div class="form-group"><label>Filho</label><input id="filho"></div>
        <div class="form-group">
            <label>Tipo</label>
            <select id="tipo">
                <option value="externa">Externa</option>
                <option value="interna">Interna</option>
            </select>
        </div>
        <div class="form-group"><label>Data</label><input type="date" id="data_manual"></div>
        <div class="form-group"><label>Hora</label><input type="time" id="hora_manual"></div>
        <textarea id="descricao" placeholder="Descrição rápida..."></textarea>
        <button class="btn-add" onclick="add()">Registrar</button>
    </div>

    <div class="tabs">
        <button id="btn-tab-ativos" class="active" onclick="showTab('ativos')">Ativos</button>
        <button id="btn-tab-resolvidos" onclick="showTab('resolvidos')">Histórico</button>
    </div>

    <div id="ativos" class="grid-cards"></div>
    <div id="resolvidos" class="grid-cards hidden"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getDatabase, ref, push, update, remove, onValue } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCdSj6somJinHJvcGGJs3C6Od6Sri92ETg",
        authDomain: "chamadosnoc-c45c4.firebaseapp.com",
        databaseURL: "https://chamadosnoc-c45c4-default-rtdb.firebaseio.com",
        projectId: "chamadosnoc-c45c4",
        storageBucket: "chamadosnoc-c45c4.appspot.com",
        messagingSenderId: "25502320062",
        appId: "1:25502320062:web:a7f41ad4f61e0c38b265ef"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const escala = {
        externa: [{h:4, n:"Erivelton", tel:"558898283311"}, {h:8, n:"Guilherme", tel:"558899282323"}, {h:10, n:"Valmir", tel:"558898287071"}, {h:12, n:"Fernando", tel:"5588994401255"}],
        interna: [{h:4, n:"Joao", tel:"558898283337"}, {h:8, n:"Wescley", tel:"558894866085"}, {h:10, n:"Valmir", tel:"558898287071"}, {h:12, n:"Fernando", tel:"5588994401255"}]
    };

    setInterval(() => { document.getElementById('page-clock').innerText = new Date().toLocaleTimeString('pt-BR'); }, 1000);

    function formatTime(ms) {
        const h = Math.floor(ms / 3600000);
        const m = Math.floor((ms % 3600000) / 60000);
        const s = Math.floor((ms % 60000) / 1000);
        return `${h}h ${m}m ${s}s`;
    }

    function refreshTimers() {
        const now = Date.now();
        document.querySelectorAll('.card.ativo').forEach(card => {
            const start = parseInt(card.dataset.start);
            const escalado = JSON.parse(card.dataset.escalado || "[]");
            const diffMs = now - start;
            const diffH = diffMs / 3600000;

            card.querySelector('.timer-val').innerText = formatTime(diffMs);
            card.classList.toggle('warn', diffH >= 8 && diffH < 10);
            card.classList.toggle('danger', diffH >= 10);

            let alertado = false;
            card.querySelectorAll('.step[data-h]').forEach(step => {
                const stepH = parseInt(step.dataset.h);
                const isNext = diffH >= stepH && !escalado.includes(stepH) && !alertado;
                step.classList.toggle('next-to-call', isNext);
                if(isNext) alertado = true;
            });
        });
    }
    setInterval(refreshTimers, 1000);

    window.add = function(){
        const t = document.getElementById("titulo").value;
        const dM = document.getElementById("data_manual").value;
        const hM = document.getElementById("hora_manual").value;
        if(!t) return alert("Insira o título");

        let dataE = dM && hM ? new Date(`${dM}T${hM}`) : new Date();

        push(ref(db,"ativos"), {
            titulo: t, pai: document.getElementById("pai").value, filho: document.getElementById("filho").value,
            descricao: document.getElementById("descricao").value, tipo: document.getElementById("tipo").value,
            inicio: dataE.getTime(), dataStr: dataE.toLocaleString('pt-BR'), escalado: [], comentarios: []
        });
        document.querySelectorAll("input, textarea").forEach(e=>e.value="");
    };

    function renderCard(id, data, containerId) {
        const container = document.getElementById(containerId);
        const div = document.createElement("div");
        const isResolvido = containerId === 'resolvidos';
        
        div.className = `card ${isResolvido ? 'finalizado' : 'ativo'}`;
        div.id = id;
        div.dataset.start = data.inicio;
        div.dataset.escalado = JSON.stringify(data.escalado || []);

        const timeDisplay = isResolvido && data.fim ? formatTime(data.fim - data.inicio) : '...';

        const stepsHTML = escala[data.tipo].map(e => `
            <div class="step ${data.escalado?.includes(e.h) ? 'done' : ''}" data-h="${e.h}" onclick="${!isResolvido ? `toggleEscala('${id}', ${e.h})` : ''}">
                <span>${e.h}h - ${e.n}</span>
                <div class="flex-row"><a href="tel:+${e.tel}">📞</a> <a href="https://wa.me/${e.tel}" target="_blank">💬</a></div>
            </div>`).join('');

        const logsHTML = (data.comentarios || []).map(c => `<div><span style="color:var(--primary)">[${c.hora}]</span> ${c.texto}</div>`).reverse().join('');

        div.innerHTML = `
            <div class="datetime-badge">${data.dataStr}</div>
            <div style="font-weight:bold; font-size: 0.9rem;">${data.titulo}</div>
            <div style="font-size:0.7rem; color:var(--text-dim);">${data.pai || '-'} / ${data.filho || '-'}</div>
            
            <div class="timer-box">
                <div class="timer-val">${timeDisplay}</div>
            </div>
            
            <div class="log-container">${logsHTML || 'Sem notas.'}</div>
            ${!isResolvido ? `<div class="flex-row" style="margin-top:2px;"><input type="text" id="in-${id}" placeholder="Nota..." style="flex:1; font-size:11px; padding:4px;"><button style="padding:4px 8px; background:var(--header); color:white;" onclick="addComment('${id}')">OK</button></div>` : ''}

            <div style="display:grid; grid-template-columns: 1fr; margin-top:5px;">${stepsHTML}</div>
            
            ${!isResolvido 
                ? `<button class="btn-finish" onclick="finalizar('${id}')">Finalizar</button>` 
                : `<div class="flex-row" style="margin-top:5px;"><button style="background:var(--warn); flex:1; padding:5px;" onclick="reabrir('${id}')">Reabrir</button>
                   <button style="background:var(--danger); color:white; flex:1; padding:5px;" onclick="apagar('${id}')">Limpar</button></div>`}
        `;
        container.appendChild(div);
    }

    window.addComment = (id) => {
        const inp = document.getElementById(`in-${id}`);
        onValue(ref(db, `ativos/${id}`), s => {
            const list = s.val().comentarios || [];
            list.push({ texto: inp.value, hora: new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'}) });
            update(ref(db, `ativos/${id}`), { comentarios: list });
            inp.value = "";
        }, { onlyOnce: true });
    };

    window.toggleEscala = (id, h) => {
        onValue(ref(db, `ativos/${id}`), s => {
            let list = s.val().escalado || [];
            list = list.includes(h) ? list.filter(x => x !== h) : [...list, h];
            update(ref(db, `ativos/${id}`), { escalado: list });
        }, { onlyOnce: true });
    };

    window.finalizar = (id) => {
        onValue(ref(db, `ativos/${id}`), s => {
            const data = s.val(); if(!data) return;
            push(ref(db, "resolvidos"), { ...data, fim: Date.now() });
            remove(ref(db, `ativos/${id}`));
        }, { onlyOnce: true });
    };

    window.reabrir = (id) => {
        onValue(ref(db, `resolvidos/${id}`), s => {
            const data = s.val(); if(!data) return;
            const { fim, ...rest } = data;
            push(ref(db, "ativos"), rest);
            remove(ref(db, `resolvidos/${id}`));
        }, { onlyOnce: true });
    };

    window.apagar = (id) => { if(confirm("Excluir?")) remove(ref(db, `resolvidos/${id}`)); };

    onValue(ref(db, "ativos"), snap => { document.getElementById("ativos").innerHTML = ""; snap.forEach(c => renderCard(c.key, c.val(), "ativos")); });
    onValue(ref(db, "resolvidos"), snap => { document.getElementById("resolvidos").innerHTML = ""; snap.forEach(c => renderCard(c.key, c.val(), "resolvidos")); });

    window.showTab = (tab) => {
        document.getElementById("ativos").classList.toggle("hidden", tab !== "ativos");
        document.getElementById("resolvidos").classList.toggle("hidden", tab !== "resolvidos");
        document.getElementById("btn-tab-ativos").classList.toggle("active", tab === "ativos");
        document.getElementById("btn-tab-resolvidos").classList.toggle("active", tab === "resolvidos");
    };
</script>
</body>
</html>
