<script>
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const lista = document.getElementById("lista-chamados");

const escala = {
    externa: [
        {h:0,n:"Início"},
        {h:4,n:"Erivelton"},
        {h:8,n:"Guilherme"},
        {h:10,n:"Valmir"},
        {h:12,n:"Fernando"}
    ],
    interna: [
        {h:0,n:"Início"},
        {h:4,n:"Joao"},
        {h:8,n:"Wescley"},
        {h:10,n:"Valmir"},
        {h:12,n:"Fernando"}
    ]
};

// =========================
// ADICIONAR
// =========================
function adicionar() {
    const titulo = document.getElementById("titulo").value;
    const hora = document.getElementById("hora").value;
    const tipo = document.getElementById("tipo").value;

    if (!titulo || !hora) {
        alert("Preencha os campos!");
        return;
    }

    const hoje = new Date();
    const [h, m] = hora.split(":");

    hoje.setHours(h, m, 0, 0);

    db.ref("incidentes").push({
        titulo,
        inicio: hoje.getTime(),
        tipo
    })
    .then(() => {
        document.getElementById("titulo").value = "";
        console.log("Salvo com sucesso");
    })
    .catch(e => {
        console.error("Erro Firebase:", e);
        alert("Erro ao salvar");
    });
}

// =========================
// RENDER
// =========================
function criarCard(id, item) {

    const decorridoH = (Date.now() - item.inicio) / 3600000;

    let htmlEscala = "";

    escala[item.tipo].forEach((e, index) => {

        let ativo = false;

        if (index === escala[item.tipo].length - 1) {
            ativo = decorridoH >= e.h;
        } else {
            const prox = escala[item.tipo][index + 1];
            ativo = decorridoH >= e.h && decorridoH < prox.h;
        }

        htmlEscala += `
            <div class="step ${ativo ? 'active' : ''}">
                ${e.h}h - ${e.n}
            </div>
        `;
    });

    const div = document.createElement("div");
    div.className = "card";
    div.id = id;

    div.innerHTML = `
        <div>
            <h3 style="margin:0">${item.titulo}</h3>
            <div class="timer">
                ${Math.floor(decorridoH)}h ${Math.floor((decorridoH % 1) * 60)}m
            </div>

            <button onclick="remover('${id}')" 
                style="background:red; margin-top:10px;">
                Encerrar
            </button>
        </div>

        <div style="background:#0f172a; padding:10px; border-radius:8px; width:180px;">
            ${htmlEscala}
        </div>
    `;

    lista.appendChild(div);
}

// =========================
// REALTIME FIREBASE
// =========================

// ADD
db.ref("incidentes").on("child_added", (snap) => {
    criarCard(snap.key, snap.val());
});

// REMOVE
db.ref("incidentes").on("child_removed", (snap) => {
    const el = document.getElementById(snap.key);
    if (el) el.remove();
});

// =========================
// REMOVER
// =========================
function remover(id) {
    db.ref("incidentes/" + id).remove();
}

// =========================
// ATUALIZA TEMPO DINÂMICO
// =========================
setInterval(() => {
    lista.innerHTML = "";
    db.ref("incidentes").once("value", (snap) => {
        snap.forEach(child => {
            criarCard(child.key, child.val());
        });
    });
}, 60000);
</script>
