<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>NOC Monitor - Sincronizado</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #020617; --card: #1e293b; --primary: #38bdf8; --text: #f1f5f9; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .form { background: var(--card); padding: 20px; border-radius: 8px; display: flex; gap: 10px; margin-bottom: 20px; }
        input, select, button { padding: 10px; border-radius: 4px; border: 1px solid #334155; background: #0f172a; color: white; }
        button { background: var(--primary); color: #020617; font-weight: bold; cursor: pointer; border: none; }
        .card { background: var(--card); padding: 15px; border-radius: 8px; margin-bottom: 10px; border-left: 5px solid var(--primary); display: flex; justify-content: space-between; }
        .active { color: var(--primary); font-weight: bold; border-left: 2px solid var(--primary); padding-left: 5px; }
    </style>
</head>
<body>

    <h2>📑 Monitor de Chamados NOC</h2>
    
    <div class="form">
        <input type="text" id="titulo" placeholder="O que aconteceu?">
        <input type="time" id="hora">
        <select id="tipo">
            <option value="externa">Rede Externa</option>
            <option value="interna">Rede Interna</option>
        </select>
        <button onclick="salvar()">Lançar na Nuvem</button>
    </div>

    <div id="lista"></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCdSj6somJinHJvcGGJs3C6Od6Sri92ETg",
        databaseURL: "https://chamadosnoc-c45c4-default-rtdb.firebaseio.com",
        projectId: "chamadosnoc-c45c4",
        appId: "1:25502320062:web:0b53a68ebd5324b3b265ef"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const escala = {
        externa: [{h:0,n:"Início"}, {h:4,n:"Erivelton"}, {h:8,n:"Guilherme"}, {h:10,n:"Valmir"}, {h:12,n:"Fernando"}],
        interna: [{h:0,n:"Início"}, {h:4,n:"Joao"}, {h:8,n:"Wescley"}, {h:10,n:"Valmir"}, {h:12,n:"Fernando"}]
    };

    function salvar() {
        const t = document.getElementById("titulo").value;
        const h = document.getElementById("hora").value;
        if(!t || !h) return alert("Preencha título e hora!");
        
        const hoje = new Date().toISOString().split('T')[0];
        const inicio = new Date(`${hoje}T${h}`).getTime();
        
        db.ref('incidentes').push({ titulo: t, inicio, tipo: document.getElementById("tipo").value });
        document.getElementById("titulo").value = "";
    }

    db.ref('incidentes').on('value', (snap) => {
        const listaDiv = document.getElementById("lista");
        listaDiv.innerHTML = "";
        const dados = snap.val();
        if(!dados) return;

        Object.keys(dados).forEach(id => {
            const item = dados[id];
            const horas = (Date.now() - item.inicio) / 3600000;
            
            let htmlEscala = "";
            escala[item.tipo].forEach(e => {
                const isAtivo = horas >= e.h && (escala[item.tipo].find(p => p.h > e.h)?.h > horas || horas >= 12);
                htmlEscala += `<div class="${isAtivo ? 'active' : ''}">${e.h}h - ${e.n}</div>`;
            });

            listaDiv.innerHTML += `
                <div class="card">
                    <div>
                        <h3>${item.titulo}</h3>
                        <strong>Tempo: ${Math.floor(horas)}h ${Math.floor((horas%1)*60)}m</strong><br>
                        <button onclick="db.ref('incidentes/${id}').remove()" style="background:red; color:white; margin-top:10px;">Encerrar</button>
                    </div>
                    <div style="background:#0f172a; padding:10px; border-radius:5px; width:150px;">${htmlEscala}</div>
                </div>`;
        });
    });
</script>
</body>
</html>
