<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOC Escalation Pro - RealTime</title>

    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --header: #334155;
            --primary: #38bdf8;
            --ok: #10b981;
            --warn: #f59e0b;
            --danger: #ef4444;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --alert: #fbbf24;
        }

        * { box-sizing: border-box; transition: background 0.3s ease; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text-main); margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: auto; }

        /* Formulario Superior */
        .form-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px; background: var(--card); padding: 20px; border-radius: 12px;
            margin-bottom: 25px; border: 1px solid var(--header);
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }
        input, select, textarea { background: var(--bg); border: 1px solid var(--header); color: white; padding: 12px; border-radius: 8px; font-size: 14px; }
        textarea { grid-column: 1 / -1; height: 60px; }

        /* Botoes */
        button { padding: 10px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 11px; }
        .btn-add { background: var(--primary); color: var(--bg); font-size: 13px; }
        .btn-finish { background: var(--ok); color: white; width: 100%; margin-top: 10px; font-size: 13px; height: 40px; }
        .btn-update { background: var(--primary); color: var(--bg); }

        /* Tabs */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tabs button { background: var(--card); color: var(--text-dim); padding: 12px 25px; font-size: 13px; }
        .tabs button.active { background: var(--primary); color: var(--bg); box-shadow: 0 0 15px rgba(56, 189, 248, 0.3); }

        /* Grid de Cards */
        .grid-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 20px; }

        .card {
            background: var(--card); padding: 20px; border-radius: 15px;
            border-top: 5px solid var(--ok); box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            display: flex; flex-direction: column; gap: 12px;
        }
        .card.warn { border-top-color: var(--warn); }
        .card.danger { border-top-color: var(--danger); }

        .datetime-badge {
            background: rgba(56, 189, 248, 0.1); color: var(--primary);
            padding: 4px 8px; border-radius: 5px; font-size: 0.75rem; font-weight: bold;
            display: inline-flex; align-items: center; gap: 5px;
        }

        .card-title { font-size: 1.2rem; font-weight: bold; color: #fff; margin: 5px 0 0 0; }
        .card-sub { color: var(--text-dim); font-size: 0.85rem; }

        .timer-box { 
            background: #0f172a; padding: 10px; border-radius: 8px; text-align: center;
            border: 1px solid var(--header); margin: 5px 0;
        }
        .timer-label { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; display: block; }
        .timer-val { font-family: 'Courier New', monospace; color: var(--alert); font-size: 1.6rem; font-weight: bold; }

        /* Escalation Steps */
        .step {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(15, 23, 42, 0.6); padding: 12px; margin: 6px 0;
            border-radius: 8px; font-size: 0.9rem; border: 2px solid transparent;
        }
        .step.done { opacity: 0.4; text-decoration: line-through; border-left: 5px solid var(--ok); }
        
        /* ALERTA DE PRÓXIMO ESCALONAMENTO */
        .step.next-to-call { 
            border-color: var(--alert); 
            background: rgba(251, 191, 36, 0.15);
            animation: pulse-alert 1s infinite alternate;
        }

        @keyframes pulse-alert {
            from { box-shadow: 0 0 5px var(--alert); }
            to { box-shadow: 0 0 15px var(--alert); }
        }

        .log-container {
            background: rgba(0,0,0,0.2); padding: 12px; border-radius: 8px; 
            font-size: 0.85rem; max-height: 120px; overflow-y: auto;
        }
        .log-item { border-bottom: 1px solid #334155; padding: 5px 0; }
        .log-time { color: var(--primary); font-weight: bold; font-size: 0.75rem; margin-right: 6px; }

        .action-group { display: flex; gap: 8px; margin-top: 10px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <header style="text-align:center; margin-bottom: 30px;">
        <h2 style="color: var(--primary); letter-spacing: 3px; margin:0;">📡 NOC ESCALATION PRO <small style="font-size: 12px; color: var(--text-dim);">REAL-TIME</small></h2>
    </header>

    <div class="form-grid">
        <input id="titulo" placeholder="Título do Evento">
        <input id="pai" placeholder="Pai (Ex: OLT Sul)">
        <input id="filho" placeholder="Filho (Ex: Slot 02)">
        <select id="tipo">
            <option value="externa">Rede Externa</option>
            <option value="interna">Rede Interna</option>
        </select>
        <textarea id="descricao" placeholder="Descrição técnica inicial..."></textarea>
        <button class="btn-add" onclick="add()">Registrar Incidente</button>
    </div>

    <div class="tabs">
        <button id="btn-tab-ativos" class="active" onclick="showTab('ativos')">Incidentes Ativos</button>
        <button id="btn-tab-resolvidos" onclick="showTab('resolvidos')">Histórico Resolvidos</button>
    </div>

    <div id="ativos" class="grid-cards"></div>
    <div id="resolvidos" class="grid-cards hidden"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getDatabase, ref, push, update, remove, onValue } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCdSj6somJinHJvcGGJs3C6Od6Sri92ETg",
        authDomain: "chamadosnoc-c45c4.firebaseapp.com",
        databaseURL: "https://chamadosnoc-c45c4-default-rtdb.firebaseio.com",
        projectId: "chamadosnoc-c45c4",
        storageBucket: "chamadosnoc-c45c4.appspot.com",
        messagingSenderId: "25502320062",
        appId: "1:25502320062:web:a7f41ad4f61e0c38b265ef"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const escala = {
        externa: [
            {h:4, n:"Erivelton", tel:"558898283311"},
            {h:8, n:"Guilherme", tel:"558899282323"},
            {h:10, n:"Valmir", tel:"558898287071"},
            {h:12, n:"Fernando", tel:"5588994401255"}
        ],
        interna: [
            {h:4, n:"Joao", tel:"558898283337"},
            {h:8, n:"Wescley", tel:"558894866085"},
            {h:10, n:"Valmir", tel:"558898287071"},
            {h:12, n:"Fernando", tel:"5588994401255"}
        ]
    };

    // --- RELÓGIO GLOBAL ---
    // Esta função roda a cada 1 segundo e atualiza todos os cards sem reconstruir o HTML
    function updateTimers() {
        const now = Date.now();
        document.querySelectorAll('.card[data-start]').forEach(card => {
            const start = parseInt(card.dataset.start);
            const type = card.dataset.type;
            const escalado = JSON.parse(card.dataset.escalado || "[]");
            const diffMs = now - start;
            const diffH = diffMs / 3600000;
            
            // Atualiza Texto do Timer
            const hours = Math.floor(diffH);
            const minutes = Math.floor((diffMs % 3600000) / 60000);
            const seconds = Math.floor((diffMs % 60000) / 1000);
            const timerVal = card.querySelector('.timer-val');
            if(timerVal) timerVal.innerText = `${hours}h ${minutes}m ${seconds}s`;

            // Atualiza Cor do Card baseado no tempo
            card.classList.toggle('warn', diffH >= 8 && diffH < 10);
            card.classList.toggle('danger', diffH >= 10);

            // Atualiza Alerta de Próximo Escalonamento (Piscante)
            const steps = card.querySelectorAll('.step[data-h]');
            let achouProximo = false;
            steps.forEach(step => {
                const stepH = parseInt(step.dataset.h);
                const jaPassouDoTempo = diffH >= stepH;
                const jaFoiMarcado = escalado.includes(stepH);
                
                const isNext = jaPassouDoTempo && !jaFoiMarcado && !achouProximo;
                step.classList.toggle('next-to-call', isNext);
                if(isNext) achouProximo = true;
            });
        });
    }
    setInterval(updateTimers, 1000);

    window.add = function(){
        const t = document.getElementById("titulo").value;
        if(!t) return alert("Título obrigatório");
        const agora = new Date();
        push(ref(db,"ativos"), {
            titulo: t,
            pai: document.getElementById("pai").value,
            filho: document.getElementById("filho").value,
            descricao: document.getElementById("descricao").value,
            tipo: document.getElementById("tipo").value,
            inicio: agora.getTime(),
            registroData: agora.toLocaleDateString('pt-BR'),
            registroHora: agora.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'}),
            escalado: [],
            comentarios: []
        });
        document.querySelectorAll("input, textarea").forEach(e=>e.value="");
    };

    function renderCard(id, data, containerId) {
        const container = document.getElementById(containerId);
        const div = document.createElement("div");
        div.className = `card`;
        div.id = id;
        div.dataset.start = data.inicio;
        div.dataset.type = data.tipo;
        div.dataset.escalado = JSON.stringify(data.escalado || []);

        const stepsHTML = escala[data.tipo].map(e => `
            <div class="step" data-h="${e.h}" onclick="${containerId === 'ativos' ? `toggleEscala('${id}', ${e.h})` : ''}">
                <span><strong>${e.h}h</strong> - ${e.n} ${data.escalado?.includes(e.h) ? '✔' : ''}</span>
                <div>
                    <a href="tel:+${e.tel}" style="text-decoration:none">📞</a>
                    <a href="https://wa.me/${e.tel}" target="_blank" style="text-decoration:none; margin-left:10px">💬</a>
                </div>
            </div>`).join('');

        const commentsHTML = (data.comentarios || []).map(c => `
            <div class="log-item"><span class="log-time">[${c.hora}]</span> ${c.texto}</div>
        `).reverse().join('');

        div.innerHTML = `
            <div class="datetime-badge">📅 ${data.registroData} às ${data.registroHora}</div>
            <h3 class="card-title">${data.titulo}</h3>
            <div class="card-sub">${data.pai || '-'} / ${data.filho || '-'}</div>
            
            <div class="timer-box">
                <span class="timer-label">Tempo de Interrupção</span>
                <span class="timer-val">Calculando...</span>
            </div>
            
            <div class="log-container">${commentsHTML || 'Sem atualizações...'}</div>

            ${containerId === 'ativos' ? `
                <div style="display:flex; gap:5px;">
                    <input type="text" id="in-${id}" placeholder="Nota..." style="flex:1; padding:8px; font-size:12px;">
                    <button class="btn-update" onclick="addComment('${id}')">Ok</button>
                </div>
            ` : ''}

            <div class="step-list">${stepsHTML}</div>
            
            <div class="action-group">
                ${containerId === "ativos" 
                    ? `<button class="btn-finish" onclick="finalizar('${id}')">Resolver</button>` 
                    : `<button style="background:var(--warn); flex:1;" onclick="reabrir('${id}')">Reativar</button>
                       <button style="background:var(--danger); color:white; flex:1;" onclick="apagar('${id}')">Excluir</button>`
                }
            </div>`;
        container.appendChild(div);
        updateTimers(); // Força atualização imediata após renderizar
    }

    window.addComment = function(id) {
        const input = document.getElementById(`in-${id}`);
        if(!input.value) return;
        onValue(ref(db, `ativos/${id}`), s => {
            const lista = s.val().comentarios || [];
            lista.push({ texto: input.value, hora: new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'}) });
            update(ref(db, `ativos/${id}`), { comentarios: lista });
            input.value = "";
        }, { onlyOnce: true });
    };

    window.toggleEscala = function(id, h){
        onValue(ref(db, `ativos/${id}`), s => {
            let lista = s.val().escalado || [];
            lista = lista.includes(h) ? lista.filter(x => x !== h) : [...lista, h];
            update(ref(db, `ativos/${id}`), { escalado: lista });
        }, { onlyOnce: true });
    };

    window.finalizar = function(id){
        onValue(ref(db, `ativos/${id}`), s => {
            push(ref(db, "resolvidos"), { ...s.val(), dataFim: new Date().toLocaleString('pt-BR') });
            remove(ref(db, `ativos/${id}`));
        }, { onlyOnce: true });
    };

    window.reabrir = function(id){
        onValue(ref(db, `resolvidos/${id}`), s => {
            push(ref(db, "ativos"), s.val());
            remove(ref(db, `resolvidos/${id}`));
        }, { onlyOnce: true });
    };

    window.apagar = function(id){
        if(confirm("Excluir?")) remove(ref(db, `resolvidos/${id}`));
    };

    onValue(ref(db, "ativos"), snap => {
        document.getElementById("ativos").innerHTML = "";
        snap.forEach(c => renderCard(c.key, c.val(), "ativos"));
    });

    onValue(ref(db, "resolvidos"), snap => {
        document.getElementById("resolvidos").innerHTML = "";
        snap.forEach(c => renderCard(c.key, c.val(), "resolvidos"));
    });

    window.showTab = function(tab){
        document.getElementById("ativos").classList.toggle("hidden", tab !== "ativos");
        document.getElementById("resolvidos").classList.toggle("hidden", tab !== "resolvidos");
        document.getElementById("btn-tab-ativos").classList.toggle("active", tab === "ativos");
        document.getElementById("btn-tab-resolvidos").classList.toggle("active", tab === "resolvidos");
    };
</script>
</body>
</html>
