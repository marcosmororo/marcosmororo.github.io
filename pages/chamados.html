<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOC Mobile Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #05070a; --card: #11141d; --header: #1a1f2e;
            --primary: #00d2ff; --ok: #00ff95; --warn: #ffb800; --danger: #ff4d4d;
            --text-main: #e2e8f0; --text-dim: #64748b; --input-bg: #080a0f; --whatsapp: #25d366;
        }

        body.light-mode {
            --bg: #f0f2f5; --card: #ffffff; --header: #e4e6eb;
            --primary: #007bff; --ok: #28a745; --warn: #fd7e14; --danger: #dc3545;
            --text-main: #1c1e21; --text-dim: #606770; --input-bg: #f5f6f7;
        }

        * { box-sizing: border-box; transition: all 0.2s; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-main); margin: 0; padding: 10px; }
        .container { max-width: 1400px; margin: auto; }

        /* Header Mobile First */
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding: 12px; background: var(--card); border-radius: 12px; border: 1px solid var(--header); }
        .header-actions { display: flex; align-items: center; gap: 8px; }
        .nav-btn { background: var(--primary); color: #fff; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; }

        /* Dashboard Metrics */
        .metrics-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .metric-card { background: var(--card); padding: 10px; border-radius: 10px; border: 1px solid var(--header); text-align: center; }
        .metric-card span { font-size: 0.6rem; color: var(--text-dim); display: block; margin-bottom: 4px; }
        .metric-card b { font-size: 1.2rem; color: var(--primary); font-family: 'JetBrains Mono'; }

        /* Admin Panel Responsivo */
        .admin-panel { background: var(--card); border: 1px solid var(--header); border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .form-row { display: grid; grid-template-columns: 1fr; gap: 10px; }
        @media (min-width: 600px) { .form-row { grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); } }
        
        input, select { background: var(--input-bg); border: 1px solid var(--header); color: var(--text-main); padding: 12px; border-radius: 8px; outline: none; font-size: 16px; } /* font 16px evita zoom no iOS */
        .btn-add { background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: 800; padding: 12px; cursor: pointer; }

        /* Tabs */
        .tabs { display: flex; gap: 8px; margin-bottom: 15px; }
        .tabs button { flex: 1; background: var(--card); color: var(--text-dim); padding: 12px; border: 1px solid var(--header); border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.8rem; }
        .tabs button.active { border-color: var(--primary); color: var(--primary); background: rgba(0, 210, 255, 0.05); }

        /* Grid de Cards */
        .grid-cards { display: grid; grid-template-columns: 1fr; gap: 15px; }
        @media (min-width: 900px) { .grid-cards { grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); } }

        /* Card Visual */
        .card { background: var(--card); border: 1px solid var(--header); border-radius: 16px; padding: 15px; border-top: 4px solid var(--ok); position: relative; }
        .timer-box { background: var(--input-bg); border-radius: 10px; padding: 8px; text-align: center; margin: 10px 0; border: 1px solid var(--header); }
        .timer-val { font-family: 'JetBrains Mono'; font-size: 1.4rem; color: var(--primary); }

        /* Notas com Horário */
        .log-container { background: var(--input-bg); border-radius: 8px; padding: 10px; font-size: 0.75rem; max-height: 110px; overflow-y: auto; margin-bottom: 10px; border: 1px solid var(--header); }
        .log-item { margin-bottom: 6px; padding-bottom: 4px; border-bottom: 1px solid rgba(255,255,255,0.05); line-height: 1.4; }
        .log-time { color: var(--primary); font-weight: 800; display: block; margin-bottom: 2px; font-size: 0.65rem; }
        
        .note-input-group { display: flex; gap: 6px; margin-bottom: 12px; }
        .note-input-group input { flex: 1; padding: 10px; font-size: 0.85rem; }
        .note-input-group button { background: var(--primary); border: none; border-radius: 8px; padding: 0 15px; color: #000; cursor: pointer; }

        /* Escalation Steps Mobile */
        .step { display: flex; justify-content: space-between; align-items: center; background: var(--input-bg); padding: 12px; margin: 5px 0; border-radius: 10px; font-size: 0.85rem; border: 1px solid transparent; }
        .step.done { opacity: 0.3; border: 1px dashed var(--header); background: transparent; }
        .step.next-to-call { border-color: var(--warn); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0px rgba(255, 184, 0, 0.4); } 100% { box-shadow: 0 0 0 8px rgba(255, 184, 0, 0); } }

        .wa-btn { color: var(--whatsapp); font-size: 1.5rem; text-decoration: none; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <div class="page-header">
        <div class="logo"><b>NOC HORIZON</b></div>
        <div class="header-actions">
            <button id="btn-view-partners" class="nav-btn" onclick="toggleView('partners')"><i class="fa-solid fa-phone"></i></button>
            <button id="btn-view-main" class="nav-btn hidden" onclick="toggleView('main')"><i class="fa-solid fa-arrow-left"></i></button>
            <button onclick="document.body.classList.toggle('light-mode')"><i class="fa-solid fa-circle-half-stroke"></i></button>
        </div>
    </div>

    <div id="view-main">
        <div class="metrics-bar">
            <div class="metric-card"><span>ATIVOS</span><b id="count-total">0</b></div>
            <div class="metric-card"><span>EXTERNA</span><b id="count-externa" style="color:var(--warn)">0</b></div>
            <div class="metric-card"><span>INTERNA</span><b id="count-interna" style="color:var(--ok)">0</b></div>
        </div>

        <div class="admin-panel">
            <div class="form-row">
                <input id="titulo" placeholder="Título / Local">
                <input id="pai" placeholder="Pai" type="tel">
                <input id="filho" placeholder="Filho" type="tel">
                <select id="tipo">
                    <option value="externa_ne">Externa (NE)</option>
                    <option value="externa_no">Externa (NO)</option>
                    <option value="interna_ne">Interna (NE)</option>
                    <option value="interna_no">Interna (NO)</option>
                </select>
                <button class="btn-add" onclick="add()">ABRIR CHAMADO</button>
            </div>
        </div>

        <div class="tabs">
            <button id="btn-tab-ativos" class="active" onclick="showTab('ativos')">ATIVOS (0)</button>
            <button id="btn-tab-resolvidos" onclick="showTab('resolvidos')">HISTÓRICO</button>
        </div>

        <div id="ativos" class="grid-cards"></div>
        <div id="resolvidos" class="grid-cards hidden"></div>
    </div>

    <div id="view-partners" class="hidden">
        <div class="admin-panel">
            <h3 style="margin:0 0 15px 0">Parceiros</h3>
            <div id="partner-list">
                <div style="background:var(--input-bg); padding:12px; border-radius:10px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;">
                    <div><b>Operadora X</b><br><small>Suporte IP</small></div>
                    <a href="https://wa.me/558899999999" class="wa-btn"><i class="fa-brands fa-whatsapp"></i></a>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getDatabase, ref, push, update, remove, onValue } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCdSj6somJinHJvcGGJs3C6Od6Sri92ETg",
        authDomain: "chamadosnoc-c45c4.firebaseapp.com",
        databaseURL: "https://chamadosnoc-c45c4-default-rtdb.firebaseio.com",
        projectId: "chamadosnoc-c45c4",
        storageBucket: "chamadosnoc-c45c4.appspot.com",
        messagingSenderId: "25502320062",
        appId: "1:25502320062:web:a7f41ad4f61e0c38b265ef"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const CONFIG_ESCALATION = {
        "externa_ne": [{h:4, nome:"Erivelton", tel:"558898283311"}, {h:8, nome:"Guilherme", tel:"558899282323"}, {h:10, nome:"Iran Jr", tel:"558899870725"}, {h:12, nome:"Fernando", tel:"5588994401255"}],
        "externa_no": [{h:4, nome:"Clecio", tel:"558898283311"}, {h:8, nome:"Maciel", tel:"558899282323"}, {h:10, nome:"Valmir", tel:"558898287071"}, {h:12, nome:"Fernando", tel:"5588994401255"}],
        "interna_ne": [{h:4, nome:"Joao", tel:"558898283337"}, {h:8, nome:"Wescley", tel:"558894866085"}, {h:10, nome:"Iran Jr", tel:"558899870725"}, {h:12, nome:"Fernando", tel:"5588994401255"}],
        "interna_no": [{h:4, nome:"Nildo", tel:"558898283337"}, {h:8, nome:"Julio Gaia", tel:"558894866085"}, {h:10, nome:"Valmir", tel:"558898287071"}, {h:12, nome:"Fernando", tel:"5588994401255"}]
    };

    window.toggleView = (v) => {
        const isP = v === 'partners';
        document.getElementById('view-main').classList.toggle('hidden', isP);
        document.getElementById('view-partners').classList.toggle('hidden', !isP);
        document.getElementById('btn-view-partners').classList.toggle('hidden', isP);
        document.getElementById('btn-view-main').classList.toggle('hidden', !isP);
    };

    setInterval(() => {
        const now = Date.now();
        document.querySelectorAll('.card.ativo').forEach(card => {
            const start = parseInt(card.dataset.start);
            const diffH = (now - start) / 3600000;
            const esc = JSON.parse(card.dataset.escalado || "[]");
            card.querySelector('.timer-val').innerText = new Date(now - start).toISOString().substr(11, 8);
            
            if(diffH >= 10) card.style.borderTopColor = "var(--danger)";
            else if(diffH >= 8) card.style.borderTopColor = "var(--warn)";

            let alerted = false;
            card.querySelectorAll('.step').forEach(step => {
                const h = parseInt(step.dataset.h);
                if(diffH >= h && !esc.includes(h) && !alerted) {
                    step.classList.add('next-to-call'); alerted = true;
                } else step.classList.remove('next-to-call');
            });
        });
    }, 1000);

    onValue(ref(db, "ativos"), snap => {
        document.getElementById("ativos").innerHTML = "";
        let t=0, e=0, i=0;
        snap.forEach(c => {
            const d = c.val(); renderCard(c.key, d, "ativos");
            t++; (d.tipo.includes('externa')) ? e++ : i++;
        });
        document.getElementById('count-total').innerText = t;
        document.getElementById('count-externa').innerText = e;
        document.getElementById('count-interna').innerText = i;
        document.getElementById('btn-tab-ativos').innerText = `ATIVOS (${t})`;
    });

    onValue(ref(db, "resolvidos"), snap => {
        document.getElementById("resolvidos").innerHTML = "";
        snap.forEach(c => renderCard(c.key, c.val(), "resolvidos"));
    });

    function renderCard(id, data, containerId) {
        const isRes = containerId === 'resolvidos';
        const div = document.createElement("div");
        div.className = `card ${isRes ? 'res' : 'ativo'}`;
        div.id = id; div.dataset.start = data.inicio; div.dataset.escalado = JSON.stringify(data.escalado || []);
        
        const logs = (data.comentarios || []).map(l => `
            <div class="log-item">
                <span class="log-time">${l.datahora}</span>
                ${l.texto}
            </div>`).reverse().join('');

        const steps = (CONFIG_ESCALATION[data.tipo] || []).map(e => `
            <div class="step ${data.escalado?.includes(e.h) ? 'done' : ''}" data-h="${e.h}" onclick="${!isRes ? `toggleEscala('${id}', ${e.h})` : ''}">
                <span><b>${e.h}h</b> - ${e.nome}</span>
                <a href="https://wa.me/${e.tel}" target="_blank" class="wa-btn" onclick="event.stopPropagation()"><i class="fa-brands fa-whatsapp"></i></a>
            </div>`).join('');

        div.innerHTML = `
            <div style="font-weight:800">${data.titulo}</div>
            <div style="font-size:0.7rem; color:var(--text-dim)">Pai: ${data.pai} | Filho: ${data.filho}</div>
            <div class="timer-box"><div class="timer-val">00:00:00</div>
