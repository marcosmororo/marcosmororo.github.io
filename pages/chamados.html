<!DOCTYPE html>

<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOC Monitor PRO</title>

<style>
body { font-family: Arial; background:#020617; color:#fff; padding:20px;}
.container { max-width:1100px; margin:auto;}

input, select, textarea, button {
  padding:10px; margin:5px; border-radius:6px; border:none;
}

button { background:#38bdf8; cursor:pointer;}

.card {
  background:#1e293b;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
  border-left:6px solid #22c55e;
}

.card.warning { border-color:#facc15; }
.card.danger { border-color:#ef4444; }

.timer {
  font-weight:bold;
  margin-top:5px;
}

.escalation {
  margin-top:10px;
  padding:10px;
  background:#0f172a;
  border-radius:8px;
}

.tabs button { margin:5px; }
.hidden { display:none; }
</style>

</head>

<body>

<div class="container">

<h2>📡 NOC Monitor</h2>

<div>
<input type="text" id="titulo" placeholder="Chamado">
<input type="text" id="pai" placeholder="Pai">
<input type="text" id="filho" placeholder="Filho">
<input type="time" id="hora">
<select id="tipo">
<option value="externa">Rede Externa</option>
<option value="interna">Rede Interna</option>
</select>
<textarea id="descricao" placeholder="Descrição"></textarea>
<button onclick="add()">Adicionar</button>
</div>

<div class="tabs">
<button onclick="showTab('ativos')">Ativos</button>
<button onclick="showTab('resolvidos')">Resolvidos</button>
</div>

<div id="ativos"></div>
<div id="resolvidos" class="hidden"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import {
getDatabase, ref, push, onChildAdded,
onChildRemoved, update, remove, get
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "SUA_API",
  authDomain: "chamadosnoc-c45c4.firebaseapp.com",
  databaseURL: "https://chamadosnoc-c45c4-default-rtdb.firebaseio.com",
  projectId: "chamadosnoc-c45c4"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const escala = {
  externa: [
    {h:4,n:"Erivelton",tel:"558898283311"},
    {h:8,n:"Guilherme",tel:"558899282323"},
    {h:10,n:"Valmir",tel:"558898287071"},
    {h:12,n:"Fernando",tel:"5588994401255"}
  ],
  interna: [
    {h:4,n:"Joao",tel:"558898283337"},
    {h:8,n:"Wescley",tel:"558894866085"},
    {h:10,n:"Valmir",tel:"558898287071"},
    {h:12,n:"Fernando",tel:"5588994401255"}
  ]
};

// ADD
window.add = function() {
  push(ref(db,"ativos"),{
    titulo:titulo.value,
    pai:pai.value,
    filho:filho.value,
    descricao:descricao.value,
    tipo:tipo.value,
    inicio:new Date().getTime()
  });

  document.querySelectorAll("input, textarea").forEach(e=>e.value="");
}

// RENDER
function render(id,data,containerId){

  const container = document.getElementById(containerId);

  const div = document.createElement("div");
  div.className="card";

  function atualizar(){

    const diff = (Date.now()-data.inicio)/3600000;

    let nivelAtual=null;

    escala[data.tipo].forEach(e=>{
      if(diff>=e.h) nivelAtual=e;
    });

    div.classList.remove("warning","danger");

    if(diff>=8) div.classList.add("warning");
    if(diff>=10) div.classList.add("danger");

    div.innerHTML = `
      <strong>${data.titulo}</strong><br>
      Pai: ${data.pai||"-"} | Filho: ${data.filho||"-"}<br>
      📝 ${data.descricao||"-"}<br>

      <div class="timer">
        ⏱ ${Math.floor(diff)}h ${Math.floor((diff%1)*60)}m
      </div>

      ${
        nivelAtual ? `
        <div class="escalation">
          🚨 Escalar AGORA:<br>
          <b>${nivelAtual.n}</b><br>

          <a href="tel:+${nivelAtual.tel}">
            📞 Ligar
          </a> |

          <a href="https://wa.me/${nivelAtual.tel}" target="_blank">
            💬 WhatsApp
          </a>
        </div>
        ` : "🟢 Dentro do SLA"
      }

      <br>
      ${containerId==="ativos"
        ? `<button onclick="finalizar('${id}')">Finalizar</button>`
        : `<small>Resolvido</small>`}
    `;
  }

  atualizar();
  setInterval(atualizar,60000);

  container.appendChild(div);
}

// FIREBASE
onChildAdded(ref(db,"ativos"), snap=>{
  render(snap.key, snap.val(),"ativos");
});

onChildAdded(ref(db,"resolvidos"), snap=>{
  render(snap.key, snap.val(),"resolvidos");
});

// FINALIZAR
window.finalizar = function(id){
  get(ref(db,"ativos/"+id)).then(snap=>{
    push(ref(db,"resolvidos"), snap.val());
    remove(ref(db,"ativos/"+id));
  });
}

// TABS
window.showTab = function(tab){
  ativos.classList.toggle("hidden",tab!=="ativos");
  resolvidos.classList.toggle("hidden",tab!=="resolvidos");
}

</script>

</body>
</html>
