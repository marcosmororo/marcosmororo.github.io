<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contato</title>

<link rel="stylesheet" href="../assets/css/style.css">
<script src="../assets/js/script.js"></script>

<!-- Ícones -->
<link rel="apple-touch-icon" sizes="180x180" href="../favicon/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="../favicon/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="../favicon/favicon-16x16.png">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* CENTRAL */
.center-page {
  display: flex;
  justify-content: center;
}

/* CONTAINER */
.container {
  max-width: 500px;
  width: 100%;
}

/* PERFIL */
.profile {
  text-align: center;
  margin-bottom: 20px;
}

.profile img {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  object-fit: cover;
  margin-bottom: 10px;
}

.profile h2 {
  margin: 5px 0;
}

.profile p {
  font-size: 14px;
  opacity: 0.7;
}

/* GRID CONTATO */
.card.contato {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
  padding: 25px;
}

/* ITEM */
.item {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;

  padding: 20px;
  border-radius: 12px;
  text-decoration: none;
  color: inherit;

  text-align: center;
  transition: 0.3s;
}

/* ÍCONE BADGE */
.icon {
  width: 45px;
  height: 45px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
}

/* CORES */
.email { background: #334155; }
.instagram { background: #114cd6; }
.linkedin { background: #0a66c2; }

/* HOVER */
.item:hover {
  transform: translateY(-5px);
  background: rgba(255,255,255,0.05);
}

/* RESPONSIVO */
@media (min-width: 768px) {
  .card.contato {
    grid-template-columns: repeat(3, 1fr);
  }
}

/* BOTÃO */
.btn {
  display: inline-block;
  margin-top: 20px;
  text-decoration: none;
  padding: 10px 18px;
  border-radius: 6px;
  transition: 0.3s;
}

.btn:hover {
  opacity: 0.8;
}

</style>

</head>

<body>

<button class="theme-btn" onclick="toggleTheme()">🌙</button>

<nav>
<a href="../index.html">Home</a>
<a href="metodos.html">Métodos</a>
<a href="organizacao.html">Organização</a>
<a href="ferramentas.html">Ferramentas</a>
<a href="sobre.html">Sobre</a>
<a href="contato.html">Contato</a>
</nav>

<section class="center-page">
  <div class="container">

    <h1 style="text-align:center;">📬 Contato</h1>

    <!-- PERFIL -->
    <div class="profile">
      <img src="../assets/img/renan.jpeg" alt="Perfil">
      <h2>Marcos Renan</h2>
      <p>Senior Network Analyst • NOC</p>
    </div>

    <!-- CONTATOS -->
    <div class="card contato">

      <a class="item" href="mailto:marcosrenan@outlook.com">
        <div class="icon email">
          <i class="fas fa-envelope"></i>
        </div>
        <span>Email</span>
      </a>

      <a class="item" href="https://instagram.com/marcosrm_" target="_blank">
        <div class="icon instagram">
          <i class="fab fa-instagram"></i>
        </div>
        <span>Instagram</span>
      </a>

      <a class="item" href="https://linkedin.com/in/marcosrenan" target="_blank">
        <div class="icon linkedin">
          <i class="fab fa-linkedin-in"></i>
        </div>
        <span>LinkedIn</span>
      </a>

    </div>

    <a href="../index.html" class="btn">← Voltar para Home</a>

  </div>
</section>

<footer>
<p>Todos os direitos reservados © MARCOS RENAN</p>
</footer>


</body>
</html>
