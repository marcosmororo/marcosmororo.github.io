<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICG - Dashboard Operacional</title>
    
    <!-- Ícones Modernos -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --hover-bg: #2d3e5a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(56, 189, 248, 0.05) 0px, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.025em;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        p {
            color: var(--text-dim);
            font-size: 1.1rem;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 24px;
            width: 100%;
            max-width: 900px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 40px 30px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* Efeito de brilho no hover */
        .card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, var(--accent), transparent 70%);
            opacity: 0;
            transition: opacity 0.4s;
            z-index: 0;
            pointer-events: none;
        }

        .card:hover::before {
            opacity: 0.1;
        }

        .card:hover {
            transform: translateY(-8px);
            border-color: var(--accent);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.2);
        }

        .icon-wrapper {
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }

        .card h2 {
            font-size: 1.25rem;
            font-weight: 600;
            position: relative;
            z-index: 1;
        }

        .card span {
            font-size: 0.85rem;
            color: var(--text-dim);
            margin-top: 8px;
            position: relative;
            z-index: 1;
        }

        /* Responsividade */
        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .menu-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Dashboard ICG</h1>
        <p>Selecione o módulo de monitoramento</p>
    </header>

    <main class="menu-grid">
        <!-- Card CDN -->
        <div class="card" onclick="abrir('cdn.html')">
            <div class="icon-wrapper">
                <i data-lucide="layers"></i>
            </div>
            <h2>CDN</h2>
            <span>Conteúdo e Performance</span>
        </div>

        <!-- Card Link IP -->
        <div class="card" onclick="abrir('linkip.html')">
            <div class="icon-wrapper">
                <i data-lucide="globe"></i>
            </div>
            <h2>Link IP</h2>
            <span>Tráfego e Conectividade</span>
        </div>

        <!-- Card PTT e PNI -->
        <div class="card" onclick="abrir('pttepni.html')">
            <div class="icon-wrapper">
                <i data-lucide="shuffle"></i>
            </div>
            <h2>PTT e PNI</h2>
            <span>Troca de Tráfego</span>
        </div>
    </main>

    <script>
        // Inicializa os ícones Lucide
        lucide.createIcons();

        function abrir(pagina) {
            // Pequeno delay para sentir o feedback visual do clique
            document.body.style.opacity = "0.5";
            setTimeout(() => {
                window.location.href = pagina;
            }, 150);
        }
    </script>

</body>
</html>
