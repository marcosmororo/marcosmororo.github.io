<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Despacho Técnico NOC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #004085; --externa: #d9534f; --interna: #02b3e4;
            --border: #dee2e6; --bg-gray: #f8f9fa; --accent: #ffc107;
        }

        /* Configuração de Impressão */
        @page { 
            size: A4; 
            margin: 10mm; /* Margem física da impressora */
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background-color: #525659;
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
        }

        .report-page {
            background: white; 
            width: 210mm; 
            min-height: 297mm;
            padding: 10mm; 
            box-shadow: 0 0 15px rgba(0,0,0,0.3);
            margin: 10mm 0; 
            box-sizing: border-box; /* Essencial para não cortar */
            display: flex; flex-direction: column;
        }

        /* Identificação Rápida Superior */
        .fast-id {
            display: flex;
            justify-content: space-between;
            background: #333;
            color: white;
            padding: 8px 15px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 4px 4px 0 0;
        }

        .team-banner {
            width: 100%; padding: 12px; text-align: center; font-weight: 800;
            color: white; margin-bottom: 15px; border-radius: 0 0 4px 4px; text-transform: uppercase;
        }

        .bg-externa { background: var(--externa); }
        .bg-interna { background: var(--interna); }

        .info-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 10px; margin-bottom: 15px;
        }

        .field { border: 1px solid var(--border); padding: 6px; border-radius: 4px; background: #fff; }
        .field label {
            display: block; font-size: 9px; color: var(--primary);
            font-weight: bold; text-transform: uppercase; margin-bottom: 2px;
        }

        .field input, .field select {
            border: none; width: 100%; font-size: 13px; outline: none; font-weight: 600; background: transparent;
        }

        h2 {
            font-size: 13px; background: var(--bg-gray);
            border-left: 4px solid var(--primary); padding: 5px 10px; margin: 12px 0 8px 0;
        }

        .content-box {
            border: 1px solid #eee; padding: 10px; min-height: 50px;
            font-size: 13px; line-height: 1.4; outline: none;
        }

        /* Estilo das Evidências */
        .evidence-container { margin-top: 10px; }
        .image-wrapper { 
            margin-bottom: 15px; text-align: center; 
            border: 1px solid #eee; padding: 5px;
            page-break-inside: avoid; /* Evita que a imagem corte entre páginas */
        }
        .image-wrapper img { 
            max-width: 100%; height: auto; border-radius: 2px; 
            max-height: 500px;
        }

        /* Seção Temperatura */
        #secao-temperatura { display: none; border: 2px solid var(--accent); padding: 12px; border-radius: 8px; margin-bottom: 10px; background: #fff9e6; }
        
        .toolbar {
            position: fixed; top: 20px; right: 20px; background: white;
            padding: 15px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            width: 180px; z-index: 1000;
        }
        .toolbar button { width: 100%; padding: 10px; margin-bottom: 8px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; }

        @media print {
            body { background: none; padding: 0; }
            .toolbar, .remove-btn { display: none !important; }
            .report-page { 
                margin: 0 !important; 
                box-shadow: none !important; 
                width: 100% !important;
                min-height: auto;
            }
            .image-wrapper { border: none; }
        }
    </style>
</head>
<body>

    <div class="toolbar">
        <h4 style="margin:0 0 10px 0;">Menu</h4>
        <button style="background: var(--externa); color:white;" onclick="setTeam('externa')">EXTERNA</button>
        <button style="background: var(--interna); color:white;" onclick="setTeam('interna')">INTERNA</button>
        <hr>
        <button style="background: #6c757d; color:white;" onclick="document.getElementById('fileInput').click()">ANEXAR FOTO</button>
        <button style="background: #28a745; color:white;" onclick="window.print()">IMPRIMIR / PDF</button>
        <input type="file" id="fileInput" style="display:none" accept="image/*" multiple onchange="handleImages(this)">
    </div>

    <div class="report-page">
        <!-- Cabeçalho de Identificação Rápida -->
        <div class="fast-id">
            <span contenteditable="true">EQUIPAMENTO: NOME_DO_ATIVO</span>
            <span contenteditable="true">CIDADE: NOME_DA_CIDADE</span>
        </div>
        <div id="teamTag" class="team-banner bg-externa">Ordem de Serviço - Rede Externa</div>

        <div class="info-grid">
            <div class="field"><label>Protocolo</label><input type="text" placeholder="INC-0000"></div>
            <div class="field">
                <label>Falha Detectada</label>
                <select id="tipoFalha" onchange="toggleSections()">
                    <option value="rompimento">Rompimento de Fibra</option>
                    <option value="temperatura">Alta Temperatura</option>
                    <option value="atenuacao">Atenuação Crítica</option>
                    <option value="down">Indisponibilidade</option>
                </select>
            </div>
            <div class="field"><label>Abertura</label><input type="datetime-local" id="dataAtual"></div>
        </div>

        <div id="secao-temperatura">
            <h2 style="margin-top:0; background: var(--accent); color: #000; border-left: none;">DADOS TÉRMICOS</h2>
            <div class="info-grid">
                <div class="field"><label>Temp. Atual</label><input type="text" placeholder="-- °C"></div>
                <div class="field"><label>Temp. Nominal</label><input type="text" placeholder="-- °C"></div>
                <div class="field"><label>Alarme Ativo</label><input type="text" placeholder="Sim/Não"></div>
            </div>
        </div>

        <h2>Detalhes da Localização</h2>
        <div class="info-grid">
            <div class="field"><label>Site / POP</label><input type="text" placeholder="Nome do Local"></div>
            <div class="field"><label>Slot / Porta / PON</label><input type="text" placeholder="0/0/0"></div>
            <div class="field"><label>Coordenadas</label><input type="text" placeholder="Link Maps"></div>
        </div>

        <h2>Diagnóstico NOC</h2>
        <div class="content-box" contenteditable="true">
            Insira o diagnóstico técnico aqui...
        </div>

        <h2>Evidências Visuais</h2>
        <div id="evidenceContainer" class="evidence-container">
            <!-- Imagens -->
        </div>

        <h2>Ações Solicitadas</h2>
        <div class="content-box" contenteditable="true" style="border: 1.5px solid var(--externa); color: #333; font-weight: bold;">
            - Verificar...
        </div>

        <footer style="margin-top: auto; border-top: 1px solid #eee; padding-top: 8px; font-size: 10px; display: flex; justify-content: space-between; color: #777;">
            <span>Gerado por: NOC Online Telecom</span>
            <span>Documento de Uso Técnico</span>
        </footer>
    </div>

    <script>
        // Data Atual automática
        const now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        document.getElementById('dataAtual').value = now.toISOString().slice(0,16);

        function setTeam(team) {
            const tag = document.getElementById('teamTag');
            tag.className = 'team-banner ' + (team === 'externa' ? 'bg-externa' : 'bg-interna');
            tag.innerText = 'Ordem de Serviço - Rede ' + (team === 'externa' ? 'Externa' : 'Interna');
        }

        function toggleSections() {
            const isTemp = document.getElementById('tipoFalha').value === 'temperatura';
            document.getElementById('secao-temperatura').style.display = isTemp ? 'block' : 'none';
        }

        function handleImages(input) {
            const container = document.getElementById('evidenceContainer');
            if (input.files) {
                Array.from(input.files).forEach(file => {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        const wrapper = document.createElement('div');
                        wrapper.className = 'image-wrapper';
                        wrapper.innerHTML = `
                            <img src="${e.target.result}">
                            <button class="remove-btn" onclick="this.parentElement.remove()" style="background:red; color:white; border:none; padding:4px; cursor:pointer; font-size:10px; margin-top:5px;">REMOVER</button>
                        `;
                        container.appendChild(wrapper);
                    };
                    reader.readAsDataURL(file);
                });
            }
        }
    </script>
</body>
</html>
