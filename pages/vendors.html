<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Infraestrutura - OLT Vendors</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        .vendor-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .vendor-card {
            background: var(--card-dark);
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            text-decoration: none;
            color: inherit;
            transition: transform 0.2s, border 0.2s;
            border: 2px solid transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .vendor-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
        }
        .vendor-card i { font-size: 2rem; }
        body.light .vendor-card { background: var(--card-light); }
    </style>
</head>
<body>
    <nav>
        <a href="/index.html">Home</a>
        <a href="infra.html">Infraestrutura</a>
    </nav>

    <section>
        <h1>📡 Selecione o Fabricante (OLT)</h1>
        <p>Escolha o vendor para visualizar os comandos específicos:</p>
        
        <div class="vendor-grid">
            <a href="vendors/nokia.html" class="vendor-card"><span>🍎</span> Nokia</a>
            <a href="vendors/huawei.html" class="vendor-card"><span>🏢</span> Huawei</a>
            <a href="vendors/zte.html" class="vendor-card"><span>⚡</span> ZTE</a>
            <a href="vendors/fiberhome.html" class="vendor-card"><span>🌐</span> FiberHome</a>
            <a href="vendors/datacom.html" class="vendor-card"><span>🇧🇷</span> Datacom</a>
            <a href="vendors/raisecom.html" class="vendor-card"><span>🚀</span> Raisecom</a>
        </div>
    </section>

    <footer><p>© 2026 - Marcos Renan</p></footer>
</body>
</html>
