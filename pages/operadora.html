<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Ticket Técnico | Online Telecom</title>
    <style>
        :root {
            --primary: #002d5b;
            --accent: #f39c12;
            --bg-body: #4a4e51;
            --text-main: #333;
            --border: #ced4da;
            --highlight: #fff9f2;
        }

        /* CONFIGURAÇÃO DE PÁGINA PARA O NAVEGADOR */
        @page { 
            size: A4; 
            margin: 10mm; 
        }

        body {
            font-family: 'Segoe UI', Tahoma, Helvetica, Arial, sans-serif;
            background-color: var(--bg-body);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            background: #fff;
            width: 210mm;
            min-height: 297mm;
            padding: 25px 35px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* CABEÇALHO */
        .header-main {
            display: flex;
            flex-direction: column;
            align-items: center;
            border-bottom: 3px solid var(--primary);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .header-main img {
            max-height: 90px;
            margin-bottom: 10px;
            display: block;
        }

        .header-main h1 {
            margin: 0;
            color: var(--primary);
            font-size: 22px;
            text-transform: uppercase;
            text-align: center;
        }

        /* SEÇÕES E GRIDS */
        .section-title {
            background: var(--primary);
            color: #fff;
            font-size: 12px;
            padding: 6px 12px;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 4px;
            margin: 15px 0 10px 0;
            page-break-after: avoid; /* Evita que o título fique sozinho no fim da página */
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 10px;
        }

        .field {
            border-bottom: 1px solid var(--border);
            padding: 5px 0;
        }

        .full-width { grid-column: span 3; }
        .highlight { background-color: var(--highlight); border-bottom: 1px solid var(--accent); }

        .field label {
            display: block;
            font-size: 9px;
            color: #666;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 2px;
        }

        input, select {
            border: none;
            width: 100%;
            font-size: 13px;
            font-weight: 600;
            outline: none;
            background: transparent;
            color: #000;
        }

        /* CAIXAS DE TESTES */
        .test-box-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: 4px;
            background: #fcfcfc;
            page-break-inside: avoid; /* Não corta a caixa ao meio */
        }

        .test-item {
            display: flex;
            flex-direction: column;
            border-bottom: 1px solid #eee;
            padding-bottom: 5px;
        }

        .test-item label {
            font-size: 10px;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 3px;
        }

        /* EVIDÊNCIAS */
        .evidence-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 10px;
        }

        .img-card {
            border: 1px solid #ddd;
            padding: 5px;
            position: relative;
            background: #fff;
            page-break-inside: avoid; /* Faz a foto pular de página se não couber */
            margin-bottom: 10px;
        }

        .img-card img {
            width: 100%;
            display: block;
            max-height: 400px; /* Limite para não estourar a página */
            object-fit: contain;
        }

        /* TOOLBAR LATERAL */
        .toolbar {
            position: fixed;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 1000;
        }

        .btn-acao {
            padding: 15px;
            border: none;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            font-size: 12px;
            width: 160px;
            text-align: center;
        }

        .btn-anexo { background: #007bff; }
        .btn-print { background: #28a745; }

        .btn-remove {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #d9534f;
            color: white;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 4px;
        }

        footer {
            margin-top: auto;
            padding-top: 20px;
            border-top: 1px solid #eee;
            font-size: 10px;
            color: #777;
            text-align: center;
        }

        /* AJUSTES DEFINITIVOS DE IMPRESSÃO */
        @media print {
            body { background: white !important; margin: 0 !important; padding: 0 !important; }
            .container { 
                box-shadow: none !important; 
                width: 100% !important; 
                margin: 0 !important; 
                padding: 10mm !important; 
                min-height: auto !important;
            }
            .toolbar, .btn-remove { display: none !important; }
            
            /* Garante que cores de fundo apareçam no PDF */
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            
            .test-box-container, .img-card {
                page-break-inside: avoid !important;
            }
        }
    </style>
</head>
<body>

    <div class="toolbar">
        <button class="btn-acao btn-anexo" onclick="document.getElementById('fileInput').click()">📷 ANEXAR PRINT</button>
        <button class="btn-acao btn-print" onclick="window.print()">📄 GERAR PDF</button>
        <input type="file" id="fileInput" style="display:none" accept="image/*" onchange="addImg(this)">
    </div>

    <div class="container">
        <header class="header-main">
            <img src="../assets/img/online.png" onerror="this.style.border='1px solid red'; this.style.padding='10px';">
            <h1>Relatório de Diagnóstico Técnico</h1>
        </header>

        <div class="section-title">Dados do Circuito</div>
        <div class="info-grid">
            <div class="field"><label>Operadora</label><input type="text" placeholder="Ex: Vivo / Claro"></div>
            <div class="field"><label>Protocolo Interno</label><input type="text" placeholder="0000-000000"></div>
            <div class="field"><label>Técnico Responsável</label><input type="text" placeholder="Nome"></div>
            
            <div class="field full-width highlight">
                <label>ID do Circuito / Designação (ID OPERADORA)</label>
                <input type="text" placeholder="DIGITE O ID DO LINK">
            </div>
        </div>

        <div class="section-title">Triagem</div>
        <div class="info-grid">
            <div class="field"><label>Início da Falha</label><input type="datetime-local"></div>
            <div class="field"><label>Localização</label><input type="text" placeholder="POP / Site"></div>
            <div class="field">
                <label>Tipo de Falha</label>
                <select>
                    <option>Indisponibilidade Total (Down)</option>
                    <option>Latência Alta (High Latency)</option>
                    <option>Perda de Pacotes (Packet Loss)</option>
                    <option>Quedas Intermitentes (Flapping)</option>
                </select>
            </div>
        </div>

        <div class="section-title">Checklist de Testes</div>
        <div class="test-box-container">
            <div class="test-item"><label>1. Infraestrutura POP</label><input type="text" value="Energizado e Estável"></div>
            <div class="test-item"><label>2. Hardware Local</label><input type="text" value="Sem alarmes no Core"></div>
            <div class="test-item"><label>3. Potência Óptica</label><input type="text" placeholder="Ex: -19 dBm"></div>
            <div class="test-item"><label>4. Interface Física</label><input type="text" placeholder="Ex: UP / No Errors"></div>
            <div class="test-item"><label>5. Perda de Pacotes</label><input type="text" placeholder="Ex: 0%"></div>
            <div class="test-item"><label>6. Latência Média</label><input type="text" placeholder="Ex: 20ms"></div>
            <div class="test-item" style="grid-column: span 2; border: none;">
                <label>7. Observações</label>
                <input type="text" value="Equipamento Crítico: Reset não realizado.">
            </div>
        </div>

        <div class="section-title">Evidências Técnicas</div>
        <div id="printArea" class="evidence-grid"></div>

        <footer>
            <strong>Online Telecom</strong> | NOC - Network Operations Center<br>
            Suporte: 0800 088 1111 | noc@online.net.br<br>
            <span id="dataGeracao"></span>
        </footer>
    </div>

    <script>
        document.getElementById('dataGeracao').innerText = 'Gerado em: ' + new Date().toLocaleString('pt-BR');

        function addImg(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const area = document.getElementById('printArea');
                    const card = document.createElement('div');
                    card.className = 'img-card';
                    card.innerHTML = `
                        <img src="${e.target.result}">
                        <button class="btn-remove" onclick="this.parentElement.remove()">REMOVER</button>
                    `;
                    area.appendChild(card);
                };
                reader.readAsDataURL(input.files[0]);
            }
        }
    </script>
</body>
</html>
