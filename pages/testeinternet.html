<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagnóstico de Internet - NOC PRO</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {font-family: Arial; background:#0f172a; color:#e2e8f0; padding:20px;}
.container {max-width:1000px; margin:auto; background:#1e293b; padding:20px; border-radius:12px;}
h1 {text-align:center; color:#38bdf8;}
label {display:block; margin-top:10px;}
input, textarea {width:100%; padding:8px; border-radius:6px; border:none; background:#020617; color:#fff;}
button {margin-top:10px; padding:10px; width:100%; border:none; border-radius:6px; background:#38bdf8; font-weight:bold; cursor:pointer;}
.result {margin-top:20px; background:#020617; padding:15px; border-radius:10px; white-space:pre-line;}
.status-ok {color:#22c55e;}
.status-warn {color:#facc15;}
.status-bad {color:#ef4444;}
</style>
</head>
<body>

<div class="container" id="report">
<h1>Diagnóstico de Internet - NOC PRO</h1>

<label>Técnico</label>
<input id="tecnico">

<label>Cliente</label>
<input id="cliente">

<label>IP Cliente</label>
<input id="ip">

<button onclick="rodarTestes()">Rodar Testes Automáticos</button>

<div class="result" id="resultado">Aguardando testes...</div>

<button onclick="baixarPDF()">Salvar PDF</button>
<button onclick="baixarTXT()">Salvar TXT</button>
</div>

<script>
async function pingTest(url, tentativas = 5) {
    let perdas = 0;
    let tempos = [];

    for (let i = 0; i < tentativas; i++) {
        const start = performance.now();
        try {
            await fetch(url, { mode: 'no-cors', cache: 'no-store' });
            const tempo = performance.now() - start;
            tempos.push(tempo);
        } catch {
            perdas++;
        }
    }

    const media = tempos.length ? (tempos.reduce((a,b)=>a+b)/tempos.length).toFixed(2) : 0;
    const perdaPercent = ((perdas / tentativas) * 100).toFixed(0);

    return { media, perdaPercent };
}

async function velocidadeDownload() {
    const inicio = performance.now();
    const response = await fetch('https://speed.hetzner.de/100MB.bin', { cache: 'no-store' });
    const blob = await response.blob();
    const fim = performance.now();

    const tempo = (fim - inicio) / 1000;
    const tamanhoMb = blob.size / (1024 * 1024);
    const velocidade = (tamanhoMb / tempo).toFixed(2);

    return velocidade;
}

function classificarPing(ping) {
    if (ping < 50) return '<span class="status-ok">Ótimo</span>';
    if (ping < 100) return '<span class="status-warn">Regular</span>';
    return '<span class="status-bad">Ruim</span>';
}

function classificarPerda(perda) {
    if (perda == 0) return '<span class="status-ok">Sem perda</span>';
    if (perda < 5) return '<span class="status-warn">Baixa</span>';
    return '<span class="status-bad">Alta</span>';
}

async function rodarTestes() {
    const res = document.getElementById('resultado');
    res.innerText = 'Executando testes...';

    const pingGoogle = await pingTest('https://www.google.com');
    const pingCloudflare = await pingTest('https://1.1.1.1');

    let download = 'Falhou';
    try {
        download = await velocidadeDownload();
    } catch {}

    const relatorio = `
DATA: ${new Date().toLocaleString()}
TÉCNICO: ${document.getElementById('tecnico').value}
CLIENTE: ${document.getElementById('cliente').value}
IP: ${document.getElementById('ip').value}

--- TESTES ---

PING GOOGLE: ${pingGoogle.media} ms (${classificarPing(pingGoogle.media)})
PERDA GOOGLE: ${pingGoogle.perdaPercent}% (${classificarPerda(pingGoogle.perdaPercent)})

PING CLOUDFLARE: ${pingCloudflare.media} ms (${classificarPing(pingCloudflare.media)})
PERDA CLOUDFLARE: ${pingCloudflare.perdaPercent}% (${classificarPerda(pingCloudflare.perdaPercent)})

DOWNLOAD: ${download} Mbps

--- ANÁLISE ---
${gerarDiagnostico(pingGoogle, pingCloudflare, download)}
    `;

    res.innerHTML = relatorio;
}

function gerarDiagnostico(g, c, download) {
    let diag = '';

    if (g.perdaPercent > 5 || c.perdaPercent > 5) {
        diag += 'Possível perda de pacotes - verificar fibra, conectores ou ONU.\n';
    }

    if (g.media > 100) {
        diag += 'Latência alta - possível rota ruim ou congestionamento.\n';
    }

    if (download !== 'Falhou' && download < 50) {
        diag += 'Velocidade baixa - verificar plano, sinal ou gargalo.\n';
    }

    if (!diag) diag = 'Conexão aparentemente saudável.';

    return diag;
}

async function baixarPDF() {
    const { jsPDF } = window.jspdf;
    const canvas = await html2canvas(document.getElementById('report'));
    const img = canvas.toDataURL('image/png');
    const pdf = new jsPDF();
    pdf.addImage(img, 'PNG', 10, 10, 190, 0);
    pdf.save('diagnostico.pdf');
}

function baixarTXT() {
    const texto = document.getElementById('resultado').innerText;
    const blob = new Blob([texto], { type: 'text/plain' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = 'diagnostico.txt';
    link.click();
}
</script>

</body>
</html>
