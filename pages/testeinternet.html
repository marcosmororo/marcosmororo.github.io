<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagnóstico Internet PRO (NOC)</title>

<style>
body {font-family: Arial; background:#0f172a; color:#e2e8f0; padding:20px;}
.container {max-width:1000px; margin:auto; background:#1e293b; padding:20px; border-radius:12px;}
h1 {text-align:center; color:#38bdf8;}
button {margin-top:10px; padding:10px; width:100%; border:none; border-radius:6px; background:#38bdf8; font-weight:bold; cursor:pointer;}
.result {margin-top:20px; background:#020617; padding:15px; border-radius:10px; white-space:pre-line;}
</style>
</head>
<body>

<div class="container">
<h1>Diagnóstico Internet - NOC REAL</h1>

<button onclick="rodar()">Rodar Testes (Ping / DNS / Rota)</button>

<div class="result" id="out">Clique para iniciar os testes...</div>
</div>

<script>
async function rodar(){
    const out = document.getElementById('out');
    out.innerText = 'Executando testes reais via API...';

    try{
        // API pública que faz testes reais (ping, traceroute, dns)
        const res = await fetch('https://api.hackertarget.com/mtr/?q=google.com');
        const traceroute = await res.text();

        const pingRes = await fetch('https://api.hackertarget.com/nping/?q=google.com');
        const ping = await pingRes.text();

        const dnsRes = await fetch('https://api.hackertarget.com/dnslookup/?q=191.7.213.230');
        const dns = await dnsRes.text();

        out.innerText = `\n==== PING REAL ====\n${ping}\n\n==== TRACEROUTE (MTR) ====\n${traceroute}\n\n==== DNS LOOKUP ====\n${dns}`;

    }catch(e){
        out.innerText = 'Erro ao executar testes externos. Pode estar bloqueado pelo navegador/rede.';
    }
}
</script>

</body>
</html>
