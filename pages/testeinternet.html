<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagnóstico Internet NOC (LOCAL)</title>

<style>
body {font-family: Arial; background:#0f172a; color:#e2e8f0; padding:20px;}
.container {max-width:1000px; margin:auto; background:#1e293b; padding:20px; border-radius:12px;}
h1 {text-align:center; color:#38bdf8;}
button {margin-top:10px; padding:10px; width:100%; border:none; border-radius:6px; background:#38bdf8; font-weight:bold; cursor:pointer;}
.result {margin-top:20px; background:#020617; padding:15px; border-radius:10px; white-space:pre-line;}
textarea {width:100%; height:200px; margin-top:10px; background:#020617; color:#fff; border:none; padding:10px; border-radius:8px;}
</style>
</head>
<body>

<div class="container">
<h1>Diagnóstico Internet - NOC LOCAL</h1>

<button onclick="gerarScript()">Gerar Script de Testes (Ping / Traceroute / DNS)</button>
<button onclick="baixarBAT()">Baixar Arquivo .BAT (Executar no PC)</button>

<div class="result" id="cmd"></div>

<label>COLE AQUI O RESULTADO DO CMD:</label>
<textarea id="resultado"></textarea>

<button onclick="baixarTXT()">Salvar Resultado TXT</button>
</div>

<script>
let script = `@echo off
cls
echo ======================================
echo TESTE DE REDE - NOC
 echo ======================================

echo.
echo ==== PING GOOGLE ====
ping 8.8.8.8 -n 10

echo.
echo ==== PING CLOUDFLARE ====
ping 1.1.1.1 -n 10

echo.
echo ==== TRACEROUTE GOOGLE ====
tracert 8.8.8.8

echo.
echo ==== TESTE DNS (SEU SERVIDOR) ====
nslookup google.com 191.7.213.230

echo.
pause`;

function gerarScript(){
    document.getElementById('cmd').innerText = script;
}

function baixarBAT(){
    const blob = new Blob([script], { type: 'text/plain' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = 'teste_rede_noc.bat';
    link.click();
}

function baixarTXT(){
    const conteudo = document.getElementById('resultado').value;
    const blob = new Blob([conteudo], { type: 'text/plain' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = 'resultado_teste.txt';
    link.click();
}
</script>

</body>
</html>
