<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOC Avisos | Gerador de GMUD</title>

    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root {
            --bg-dark: #0f172a;
            --panel-dark: #1e293b;
            --accent-blue: #3b82f6;
            --accent-red: #ef4444;
            --accent-green: #10b981;
            --text-gray: #94a3b8;
        }

        body {
            margin: 0;
            font-family: 'Inter', "Segoe UI", sans-serif;
            background: var(--bg-dark);
            color: white;
        }

        .container {
            display: grid;
            grid-template-columns: 400px 1fr;
            height: 100vh;
        }

        /* Painel Lateral */
        .form {
            background: var(--panel-dark);
            padding: 25px;
            overflow-y: auto;
            border-right: 1px solid #334155;
        }

        h3 { margin-top: 0; color: #f8fafc; display: flex; align-items: center; gap: 10px; }

        label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 15px;
            display: block;
            color: var(--text-gray);
        }

        input, select {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #334155;
            background: #0f172a;
            color: #fff;
            margin-top: 5px;
            box-sizing: border-box;
        }

        /* Preview Area */
        .preview-area {
            background: #f1f5f9;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-y: auto;
            color: #1e293b;
        }

        .card {
            width: 650px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden;
            position: relative;
            margin-bottom: 30px;
        }

        .badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: var(--accent-red);
            color: #fff;
            padding: 6px 12px;
            font-size: 11px;
            font-weight: 800;
            border-radius: 4px;
            display: none;
        }

        .header { text-align: center; padding: 25px; }
        .header img { max-width: 160px; }

        .title {
            text-align: center;
            padding: 15px;
            color: #fff;
            font-weight: bold;
            background: #1e3a8a;
            font-size: 18px;
        }

        .subtitle {
            text-align: center;
            padding: 10px;
            color: #fff;
            background: #2563eb;
            font-size: 13px;
            font-weight: 500;
        }

        table { width: 100%; border-collapse: collapse; }
        td { padding: 14px; border-bottom: 1px solid #f1f5f9; font-size: 14px; }

        .label-cell {
            background: #f8fafc;
            font-weight: 700;
            width: 30%;
            color: #64748b;
        }

        /* Email e Planilha Box */
        .copy-box {
            width: 650px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            border: 1px dashed #cbd5e1;
            margin-bottom: 20px;
        }

        .copy-header {
            font-size: 12px;
            font-weight: bold;
            color: #64748b;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
            padding-bottom: 5px;
        }

        #email-body, #row-preview {
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
            color: #334155;
        }

        #row-preview {
            font-family: monospace;
            background: #f8fafc;
            padding: 10px;
            font-size: 11px;
            overflow-x: auto;
        }

        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .png { background: #2563eb; color: #fff; }
        .pdf { background: #16a34a; color: #fff; }
        .copy-btn { background: #64748b; color: #fff; width: auto; font-size: 11px; padding: 4px 8px; }
        
        .btn-sheet { 
            background: var(--accent-green); 
            color: white; 
            text-decoration: none; 
            text-align: center; 
            display: block;
            margin-top: 10px;
            padding: 10px;
            border-radius: 6px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="form">
        <h3>📡 Gerador de Avisos NOC</h3>
        
        <label>Link da Planilha Oficial</label>
        <input type="text" id="inputLinkPlanilha" placeholder="Cole o link aqui" oninput="vincularPlanilha()">

        <label>Tipo de Manutenção</label>
        <select id="tipo">
            <option value="normal">Programada</option>
            <option value="critico">Emergencial</option>
        </select>

        <label>Data da Atividade</label>
        <input type="date" id="data">

        <div style="display: flex; gap: 10px;">
            <div style="flex: 1;">
                <label>Início</label>
                <input type="time" id="inicio">
            </div>
            <div style="flex: 1;">
                <label>Fim</label>
                <input type="time" id="fim">
            </div>
        </div>

        <label>Local / Abrangência</label>
        <input id="local" placeholder="Ex: Backbone Ceará">

        <label>Descrição Técnica</label>
        <input id="descricao" placeholder="Ex: Troca de Switch Core">

        <label>Impacto Previsto</label>
        <input id="impacto" placeholder="Ex: Lentidão e perda de pacotes">

        <label>Setor Responsável</label>
        <input id="setor" placeholder="Ex: Engenharia de Redes">

        <label>Protocolo / Ticket</label>
        <input id="protocolo" placeholder="Ex: NOC-2026-00123">

        <div class="btn-group">
            <button class="png" onclick="gerarPNG()">Salvar PNG</button>
            <button class="pdf" onclick="gerarPDF()">Salvar PDF</button>
        </div>
        <a id="btnAbrirPlanilha" href="#" target="_blank" class="btn-sheet" style="display:none;">📂 Abrir Planilha Oficial</a>
    </div>

    <div class="preview-area">
        <div id="card" class="card">
            <div id="badge" class="badge">EMERGENCIAL</div>
            <div class="header">
                <img src="../assets/img/online.png" alt="Logo">
            </div>
            <div id="titulo" class="title">INFORME DE ATIVIDADE PROGRAMADA</div>
            <div id="subtitulo" class="subtitle">ATIVIDADE PROGRAMADA</div>
            <table>
                <tr><td class="label-cell">Data</td><td id="p_data">-</td></tr>
                <tr><td class="label-cell">Período</td><td id="p_periodo">-</td></tr>
                <tr><td class="label-cell">Local</td><td id="p_local">-</td></tr>
                <tr><td class="label-cell">Descrição</td><td id="p_descricao">-</td></tr>
                <tr><td class="label-cell">Impacto</td><td id="p_impacto">-</td></tr>
                <tr><td class="label-cell">Setor</td><td id="p_setor">-</td></tr>
                <tr><td class="label-cell">Protocolo</td><td id="p_protocolo">-</td></tr>
            </table>
        </div>

        <div class="copy-box">
            <div class="copy-header">
                <span>DADOS PARA PLANILHA (LINHA ÚNICA)</span>
                <button class="copy-btn" onclick="copiarLinha()">Copiar Linha</button>
            </div>
            <div id="row-preview">...</div>
        </div>

        <div class="copy-box">
            <div class="copy-header">
                <span>CONTEÚDO PARA E-MAIL</span>
                <button class="copy-btn" onclick="copiarEmail()">Copiar Texto</button>
            </div>
            <div id="email-content">
                <strong>TÍTULO:</strong> <span id="mail_titulo">...</span><br><br>
                <div id="email-body"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const campos = ["tipo","data","inicio","fim","local","descricao","impacto","setor","protocolo"];
    campos.forEach(id => document.getElementById(id).addEventListener("input", atualizar));

    function formatarData(d){
        if(!d) return { formatada: "XX/XX", diaSemana: "(dia da semana)" };
        const dataObj = new Date(d + 'T00:00:00');
        const dias = ["domingo", "segunda-feira", "terça-feira", "quarta-feira", "quinta-feira", "sexta-feira", "sábado"];
        return {
            formatada: dataObj.toLocaleDateString('pt-BR', {day: '2-digit', month: '2-digit'}),
            diaSemana: dias[dataObj.getDay()]
        };
    }

    function atualizar() {
        const tipo = document.getElementById("tipo").value;
        const eData = document.getElementById("data").value;
        const eInicio = document.getElementById("inicio").value || "00:00";
        const eFim = document.getElementById("fim").value || "00:00";
        const protocolo = document.getElementById("protocolo").value;
        const local = document.getElementById("local").value;
        const descricao = document.getElementById("descricao").value;
        const impacto = document.getElementById("impacto").value;
        const setor = document.getElementById("setor").value;
        
        const infoData = formatarData(eData);
        const ehEmergencial = tipo === "critico";
        const cor = ehEmergencial ? "#dc2626" : "#1e3a8a";
        const txtTipo = ehEmergencial ? "EMERGENCIAL" : "PROGRAMADA";

        // Atualização Visual do Card
        document.getElementById("badge").style.display = ehEmergencial ? "block" : "none";
        document.getElementById("titulo").style.background = cor;
        document.getElementById("subtitulo").style.background = cor;
        document.getElementById("titulo").innerText = `INFORME DE ATIVIDADE ${txtTipo}`;
        document.getElementById("subtitulo").innerText = ehEmergencial ? "ATIVIDADE EMERGENCIAL EM ANDAMENTO" : "ATIVIDADE PROGRAMADA CONFORME AS INFORMAÇÕES ABAIXO";

        document.getElementById("p_data").innerText = infoData.formatada === "XX/XX" ? "" : `${infoData.formatada} (${infoData.diaSemana})`;
        document.getElementById("p_periodo").innerText = `${eInicio} às ${eFim}`;
        document.getElementById("p_local").innerText = local;
        document.getElementById("p_descricao").innerText = descricao;
        document.getElementById("p_impacto").innerText = impacto;
        document.getElementById("p_setor").innerText = setor;
        document.getElementById("p_protocolo").innerText = protocolo;

        // Atualização E-mail
        const prefixo = protocolo ? `(${protocolo}) ` : "(GMUD) ";
        document.getElementById("mail_titulo").innerText = `${prefixo}GMUD - NOC | AVISO DE MANUTENÇÃO ${txtTipo}`;
        document.getElementById("email-body").innerText = `Prezados,\n\nGostaríamos de informar que na madrugada do dia ${infoData.formatada} (${infoData.diaSemana}), no intervalo entre ${eInicio} até ${eFim} horas, ocorrerá uma manutenção ${ehEmergencial ? 'emergencial' : 'programada'} na qual afetará alguns dos serviços entregues, conforme aviso em anexo.\n\nO serviço poderá sofrer indisponibilidade e impacto de base no varejo.\n\nAtenciosamente,\nNOC - Online Telecom`;

        // Atualização Linha Planilha (Sequência solicitada)
        const colunas = [
            protocolo, setor, "NOC - Online Telecom", txtTipo, 
            eData, eInicio, eData, eFim, `${eInicio}-${eFim}`, 
            local, descricao, "Ver anexo", impacto, "PLANEJADA"
        ];
        document.getElementById("row-preview").innerText = colunas.join(" | ");
        window.dadosPlanilha = colunas.join("\t");
    }

    function vincularPlanilha() {
        const link = document.getElementById("inputLinkPlanilha").value;
        const btn = document.getElementById("btnAbrirPlanilha");
        if(link) {
            btn.href = link;
            btn.style.display = "block";
        } else {
            btn.style.display = "none";
        }
    }

    async function copiarLinha() {
        await navigator.clipboard.writeText(window.dadosPlanilha);
        alert("Linha copiada para a planilha!");
    }

    async function copiarEmail() {
        await navigator.clipboard.writeText(document.getElementById("email-body").innerText);
        alert("E-mail copiado!");
    }

    async function gerarPNG() {
        const canvas = await html2canvas(document.getElementById("card"), { scale: 3, backgroundColor: "#f1f5f9" });
        const link = document.createElement("a");
        link.download = `AVISO_NOC_${document.getElementById("protocolo").value || 'NEW'}.png`;
        link.href = canvas.toDataURL();
        link.click();
    }

    async function gerarPDF() {
        const { jsPDF } = window.jspdf;
        const canvas = await html2canvas(document.getElementById("card"), { scale: 3 });
        const pdf = new jsPDF("p","mm","a4");
        pdf.addImage(canvas.toDataURL("image/png"), "PNG", 10, 10, 190, 0);
        pdf.save("aviso_noc.pdf");
    }

    atualizar();
</script>

</body>
</html>
