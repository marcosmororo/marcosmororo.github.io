<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOC Avisos | Gerador de GMUD</title>

    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root {
            --bg-dark: #0f172a;
            --panel-dark: #1e293b;
            --accent-blue: #3b82f6;
            --accent-red: #ef4444;
            --text-gray: #94a3b8;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: white;
            overflow: hidden; /* Evita rolagem no body, usamos nas divs */
        }

        .container {
            display: grid;
            grid-template-columns: 400px 1fr;
            height: 100vh;
        }

        /* Formulário Lateral */
        .form {
            background: var(--panel-dark);
            padding: 25px;
            overflow-y: auto;
            border-right: 1px solid #334155;
            display: flex;
            flex-direction: column;
        }

        h3 { margin: 0 0 20px 0; color: #f8fafc; font-size: 1.2rem; }

        label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 15px;
            display: block;
            color: var(--text-gray);
        }

        input, select {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #334155;
            background: #0f172a;
            color: #fff;
            margin-top: 5px;
            box-sizing: border-box;
        }

        /* Área de Visualização */
        .preview-area {
            background: #f1f5f9;
            padding: 40px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* CARD - Design idêntico ao solicitado */
        .card {
            width: 650px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden;
            position: relative;
            flex-shrink: 0; /* Impede que o flex encolha o card */
        }

        .badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--accent-red);
            color: #fff;
            padding: 6px 12px;
            font-size: 11px;
            font-weight: 800;
            border-radius: 4px;
            display: none;
        }

        .header { text-align: center; padding: 30px 25px; background: #fff; }
        .header img { max-width: 180px; height: auto; }

        .title {
            text-align: center;
            padding: 15px;
            color: #fff;
            font-weight: bold;
            background: #1e3a8a;
            font-size: 18px;
        }

        .subtitle {
            text-align: center;
            padding: 10px;
            color: #fff;
            background: #2563eb;
            font-size: 13px;
            font-weight: 500;
        }

        table { width: 100%; border-collapse: collapse; }
        td { padding: 15px; border-bottom: 1px solid #f1f5f9; font-size: 14px; color: #1e293b; }

        .label-cell {
            background: #f8fafc;
            font-weight: 700;
            width: 30%;
            color: #64748b;
        }

        /* Utilitários */
        .copy-box {
            width: 650px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            border: 1px dashed #cbd5e1;
            margin-top: 25px;
            color: #1e293b;
        }

        #email-body, #sheet-row {
            font-size: 13px;
            background: #f8fafc;
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #e2e8f0;
            margin: 10px 0;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .png { background: #2563eb; color: #fff; }
        .pdf { background: #16a34a; color: #fff; }
        .copy-btn { background: #64748b; color: #fff; font-size: 11px; padding: 5px 10px; width: auto; flex: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="form">
        <h3>📡 Gerador NOC</h3>
        
        <label>Tipo de Manutenção</label>
        <select id="tipo">
            <option value="normal">Programada</option>
            <option value="critico">Emergencial</option>
        </select>

        <label>Data</label>
        <input type="date" id="data">

        <div style="display: flex; gap: 10px;">
            <div style="flex: 1;"><label>Início</label><input type="time" id="inicio"></div>
            <div style="flex: 1;"><label>Fim</label><input type="time" id="fim"></div>
        </div>

        <label>Local</label>
        <input id="local" placeholder="Ex: Castanhal/PA">

        <label>Descrição</label>
        <input id="descricao" placeholder="Ex: Reboot de Equipamento">

        <label>Impacto</label>
        <input id="impacto" placeholder="Ex: Clientes Residenciais">

        <label>Setor</label>
        <input id="setor" value="NOC">

        <label>Protocolo</label>
        <input id="protocolo" placeholder="0000-000000">

        <div class="btn-group">
            <button class="png" onclick="exportar('png')">Salvar PNG</button>
            <button class="pdf" onclick="exportar('pdf')">Salvar PDF</button>
        </div>
    </div>

    <div class="preview-area">
        <div id="card" class="card">
            <div id="badge" class="badge">EMERGENCIAL</div>
            <div class="header"><img src="../assets/img/online.png" alt="Logo"></div>
            <div id="titulo" class="title">INFORME DE ATIVIDADE PROGRAMADA</div>
            <div id="subtitulo" class="subtitle">ATIVIDADE PROGRAMADA</div>
            <table>
                <tr><td class="label-cell">Data</td><td id="p_data">-</td></tr>
                <tr><td class="label-cell">Período</td><td id="p_periodo">-</td></tr>
                <tr><td class="label-cell">Local</td><td id="p_local">-</td></tr>
                <tr><td class="label-cell">Descrição</td><td id="p_descricao">-</td></tr>
                <tr><td class="label-cell">Impacto</td><td id="p_impacto">-</td></tr>
                <tr><td class="label-cell">Setor</td><td id="p_setor">NOC</td></tr>
                <tr><td class="label-cell">Protocolo</td><td id="p_protocolo">-</td></tr>
            </table>
        </div>

        <div class="copy-box">
            <div style="font-weight:bold; font-size:12px; color:#64748b; border-bottom:1px solid #eee; padding-bottom:5px;">CONTEÚDO E-MAIL</div>
            <div id="email-body"></div>
            <button class="copy-btn" onclick="copiar('email-body')">Copiar E-mail</button>
        </div>

        <div class="copy-box">
            <div style="font-weight:bold; font-size:12px; color:#64748b; border-bottom:1px solid #eee; padding-bottom:5px;">PLANILHA (COPIA E COLA)</div>
            <div id="sheet-row"></div>
            <div style="display:flex; gap:10px;">
                <button class="copy-btn" onclick="copiar('sheet-row')">Copiar Linha</button>
                <a href="#" target="_blank" style="font-size:11px; color:#16a34a; text-decoration:none; font-weight:bold; padding-top:5px;">Abrir Planilha</a>
            </div>
        </div>
    </div>
</div>

<script>
    const campos = ["tipo","data","inicio","fim","local","descricao","impacto","setor","protocolo"];
    campos.forEach(id => document.getElementById(id).addEventListener("input", atualizar));

    function atualizar() {
        const v = {};
        campos.forEach(id => v[id] = document.getElementById(id).value);
        
        const dataObj = v.data ? new Date(v.data + 'T00:00:00') : null;
        const dataF = dataObj ? dataObj.toLocaleDateString('pt-BR') : "XX/XX/XXXX";
        const diaS = dataObj ? ["domingo","segunda-feira","terça-feira","quarta-feira","quinta-feira","sexta-feira","sábado"][dataObj.getDay()] : "dia";

        const ehC = v.tipo === "critico";
        const cor = ehC ? "#dc2626" : "#1e3a8a";

        // Atualiza Card
        document.getElementById("badge").style.display = ehC ? "block" : "none";
        document.getElementById("titulo").style.background = cor;
        document.getElementById("subtitulo").style.background = cor;
        document.getElementById("titulo").innerText = `INFORME DE ATIVIDADE ${ehC ? 'EMERGENCIAL' : 'PROGRAMADA'}`;
        document.getElementById("subtitulo").innerText = ehC ? "ATIVIDADE EMERGENCIAL EM ANDAMENTO" : "ATIVIDADE PROGRAMADA CONFORME AS INFORMAÇÕES ABAIXO";
        
        document.getElementById("p_data").innerText = `${dataF} (${diaS})`;
        document.getElementById("p_periodo").innerText = `${v.inicio || '00:00'} às ${v.fim || '00:00'}`;
        document.getElementById("p_local").innerText = v.local || "-";
        document.getElementById("p_descricao").innerText = v.descricao || "-";
        document.getElementById("p_impacto").innerText = v.impacto || "-";
        document.getElementById("p_setor").innerText = v.setor || "-";
        document.getElementById("p_protocolo").innerText = v.protocolo || "-";

        // E-mail e Planilha
        document.getElementById("email-body").innerText = `Prezados,\n\nInformamos manutenção ${ehC?'emergencial':'programada'} em ${dataF}.\nLocal: ${v.local}\nProtocolo: ${v.protocolo}`;
        document.getElementById("sheet-row").innerText = [v.protocolo, v.setor, "NOC", v.tipo, dataF, v.inicio, dataF, v.fim, "1h", v.local, v.descricao, "Varejo", v.impacto, "OK"].join('\t');
    }

    async function copiar(id) {
        await navigator.clipboard.writeText(document.getElementById(id).innerText);
        alert("Copiado!");
    }

    // FUNÇÃO MESTRA PARA EXPORTAR SEM CORTES
    async function exportar(formato) {
        const originalCard = document.getElementById("card");
        
        // Técnica de Clone Invisível: Criamos uma cópia do card e colocamos no body
        // com posição absoluta e z-index negativo para não aparecer na tela, mas ser "visto" pelo script
        const clone = originalCard.cloneNode(true);
        clone.style.position = "absolute";
        clone.style.top = "-9999px";
        clone.style.left = "0";
        clone.style.width = "650px"; // Mantém a largura fixa
        document.body.appendChild(clone);

        try {
            const canvas = await html2canvas(clone, {
                scale: 3, // Alta qualidade
                backgroundColor: "#ffffff",
                useCORS: true,
                logging: false,
                width: 650,
                windowWidth: 650 // Força o canvas a entender que a largura é essa
            });

            if (formato === 'png') {
                const link = document.createElement("a");
                link.download = `Aviso_NOC_${document.getElementById("protocolo").value || 'Atividade'}.png`;
                link.href = canvas.toDataURL("image/png");
                link.click();
            } else {
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF("p", "mm", "a4");
                const imgData = canvas.toDataURL("image/png");
                pdf.addImage(imgData, 'PNG', 10, 10, 190, (canvas.height * 190) / canvas.width);
                pdf.save("Aviso_NOC.pdf");
            }
        } finally {
            document.body.removeChild(clone); // Limpa o clone
        }
    }

    atualizar();
</script>

</body>
</html>
