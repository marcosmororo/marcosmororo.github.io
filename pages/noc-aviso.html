<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOC Avisos | Gerador de GMUD</title>

    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root {
            --bg-dark: #0f172a;
            --panel-dark: #1e293b;
            --accent-blue: #3b82f6;
            --accent-red: #ef4444;
            --accent-green: #10b981;
            --text-gray: #94a3b8;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: white;
        }

        .container {
            display: grid;
            grid-template-columns: 400px 1fr;
            height: 100vh;
        }

        /* Painel Lateral */
        .form {
            background: var(--panel-dark);
            padding: 20px;
            overflow-y: auto;
            border-right: 1px solid #334155;
        }

        h3 { margin: 0 0 20px 0; font-size: 18px; display: flex; align-items: center; gap: 10px; }

        label {
            font-size: 10px;
            text-transform: uppercase;
            color: var(--text-gray);
            margin-top: 12px;
            display: block;
        }

        input, select {
            width: 100%;
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #334155;
            background: #0f172a;
            color: #fff;
            margin-top: 4px;
            box-sizing: border-box;
        }

        /* Preview Area */
        .preview-area {
            background: #f1f5f9;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-y: auto;
        }

        .card {
            width: 600px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            overflow: hidden;
            position: relative;
            margin-bottom: 20px;
        }

        .header { text-align: center; padding: 15px; background: #fff; }
        .header img { max-width: 140px; }

        .title { text-align: center; padding: 12px; color: #fff; font-weight: bold; background: #1e3a8a; }
        .subtitle { text-align: center; padding: 8px; color: #fff; background: #2563eb; font-size: 12px; }

        table { width: 100%; border-collapse: collapse; color: #334155; }
        td { padding: 10px; border-bottom: 1px solid #f1f5f9; font-size: 13px; }
        .label-cell { background: #f8fafc; font-weight: 700; width: 30%; color: #64748b; }

        /* Utilitários de Cópia */
        .copy-section {
            width: 600px;
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 1px solid #cbd5e1;
            color: #334155;
        }

        .section-title {
            font-size: 11px;
            font-weight: bold;
            color: #64748b;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .data-row-preview {
            background: #f8fafc;
            padding: 10px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 11px;
            white-space: nowrap;
            overflow-x: auto;
            border: 1px solid #e2e8f0;
            color: #0f172a;
        }

        .btn-group { display: flex; flex-direction: column; gap: 8px; margin-top: 15px; }
        .row { display: flex; gap: 8px; }

        button {
            padding: 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            transition: 0.2s;
        }

        .btn-copy { background: var(--accent-blue); color: white; }
        .btn-sheet { background: var(--accent-green); color: white; text-decoration: none; text-align: center; display: block; }
        .btn-export { background: #64748b; color: white; }

        button:hover { opacity: 0.9; }
    </style>
</head>
<body>

<div class="container">
    <div class="form">
        <h3>📡 Painel NOC</h3>
        
        <label>Link da sua Planilha (Google Sheets)</label>
        <input type="text" id="linkPlanilha" placeholder="Cole o link da planilha aqui" oninput="atualizarLink()">

        <label>Protocolo</label>
        <input id="protocolo" placeholder="NOC-2026-001">

        <label>Tipo</label>
        <select id="tipo">
            <option value="PROGRAMADA">Programada</option>
            <option value="EMERGENCIAL">Emergencial</option>
        </select>

        <label>Setor Responsável</label>
        <input id="setor" placeholder="Engenharia de Redes">

        <label>Data Atividade</label>
        <input type="date" id="data">

        <div class="row">
            <div style="flex:1"><label>Início</label><input type="time" id="inicio"></div>
            <div style="flex:1"><label>Fim</label><input type="time" id="fim"></div>
        </div>

        <label>Local</label>
        <input id="local" placeholder="Ex: Backbone CE">

        <label>Descrição</label>
        <input id="descricao" placeholder="Troca de equipamento">

        <label>Impacto</label>
        <input id="impacto" placeholder="Indisponibilidade parcial">

        <div class="btn-group">
            <a id="lnkPlanilha" href="#" target="_blank" class="btn-sheet">📂 Abrir Planilha Oficial</a>
            <div class="row">
                <button class="btn-export" style="flex:1" onclick="gerarPNG()">Salvar PNG</button>
                <button class="btn-export" style="flex:1" onclick="gerarPDF()">Salvar PDF</button>
            </div>
        </div>
    </div>

    <div class="preview-area">
        <div class="copy-section">
            <div class="section-title">
                SEQUÊNCIA PARA PLANILHA (COPIAR E COLAR)
                <button class="btn-copy" onclick="copiarLinha()">Copiar Linha</button>
            </div>
            <div id="row-preview" class="data-row-preview">...</div>
        </div>

        <div id="card" class="card">
            <div class="header"><img src="https://via.placeholder.com/150x50?text=LOGO+NOC" alt="Logo"></div>
            <div id="titulo" class="title">INFORME DE ATIVIDADE</div>
            <div id="subtitulo" class="subtitle">Aguardando dados...</div>
            <table>
                <tr><td class="label-cell">Data</td><td id="p_data">-</td></tr>
                <tr><td class="label-cell">Período</td><td id="p_periodo">-</td></tr>
                <tr><td class="label-cell">Local</td><td id="p_local">-</td></tr>
                <tr><td class="label-cell">Descrição</td><td id="p_descricao">-</td></tr>
                <tr><td class="label-cell">Impacto</td><td id="p_impacto">-</td></tr>
                <tr><td class="label-cell">Setor</td><td id="p_setor">-</td></tr>
                <tr><td class="label-cell">Protocolo</td><td id="p_protocolo">-</td></tr>
            </table>
        </div>
    </div>
</div>

<script>
    const ids = ["protocolo", "tipo", "setor", "data", "inicio", "fim", "local", "descricao", "impacto"];
    ids.forEach(id => document.getElementById(id).addEventListener("input", atualizar));

    function atualizar() {
        const val = (id) => document.getElementById(id).value;
        
        // Atualiza Tabela Visual
        document.getElementById("p_data").innerText = val("data");
        document.getElementById("p_periodo").innerText = `${val("inicio")} às ${val("fim")}`;
        document.getElementById("p_local").innerText = val("local");
        document.getElementById("p_descricao").innerText = val("descricao");
        document.getElementById("p_impacto").innerText = val("impacto");
        document.getElementById("p_setor").innerText = val("setor");
        document.getElementById("p_protocolo").innerText = val("protocolo");
        
        document.getElementById("titulo").innerText = `INFORME DE ATIVIDADE ${val("tipo")}`;
        document.getElementById("subtitulo").innerText = `ATIVIDADE ${val("tipo")} EM ANDAMENTO`;

        // GERA LINHA PARA PLANILHA (Separado por TAB)
        const colunasPlanilha = [
            val("protocolo"),       // PROTOCOLO
            val("setor"),           // DEPARTAMENTO
            "NOC OPERAÇÕES",        // RESPONSÁVEL
            val("tipo"),            // ATIVIDADE
            val("data"),            // DATA INICIO
            val("inicio"),          // HORA INICIO
            val("data"),            // DATA TÉRMINO
            val("fim"),             // HORA TÉRMINO
            `${val("inicio")}-${val("fim")}`, // TEMPO INDISP.
            val("local"),           // LOCAL
            val("descricao"),       // DESCRIÇÃO
            "VER ANEXO",            // CIRCUITOS
            val("impacto"),         // IMPACTO
            "PLANEJADA"             // STATUS
        ];

        document.getElementById("row-preview").innerText = colunasPlanilha.join("   |   ");
        window.linhaFinal = colunasPlanilha.join("\t"); // \t é o segredo para colar em células separadas
    }

    function copiarLinha() {
        navigator.clipboard.writeText(window.linhaFinal);
        alert("Linha copiada! Agora vá na planilha, selecione a célula do Protocolo e dê CTRL+V.");
    }

    function atualizarLink() {
        const link = document.getElementById("linkPlanilha").value;
        document.getElementById("lnkPlanilha").href = link || "#";
    }

    async function gerarPNG() {
        const canvas = await html2canvas(document.getElementById("card"), { scale: 2 });
        const link = document.createElement("a");
        link.download = `GMUD_${document.getElementById("protocolo").value}.png`;
        link.href = canvas.toDataURL();
        link.click();
    }

    async function gerarPDF() {
        const { jsPDF } = window.jspdf;
        const canvas = await html2canvas(document.getElementById("card"), { scale: 2 });
        const pdf = new jsPDF("p","mm","a4");
        pdf.addImage(canvas.toDataURL("image/png"), "PNG", 10, 10, 190, 0);
        pdf.save("aviso.pdf");
    }
</script>

</body>
</html>
