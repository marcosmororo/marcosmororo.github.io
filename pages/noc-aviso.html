<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOC Avisos | Gerador de GMUD</title>

    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root {
            --bg-dark: #0f172a;
            --panel-dark: #1e293b;
            --accent-blue: #3b82f6;
            --accent-red: #ef4444;
            --text-gray: #94a3b8;
        }

        body {
            margin: 0;
            font-family: 'Inter', "Segoe UI", sans-serif;
            background: var(--bg-dark);
            color: white;
        }

        .container {
            display: grid;
            grid-template-columns: 400px 1fr;
            height: 100vh;
        }

        .form {
            background: var(--panel-dark);
            padding: 25px;
            overflow-y: auto;
            border-right: 1px solid #334155;
        }

        h3 { margin-top: 0; color: #f8fafc; }

        label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 15px;
            display: block;
            color: var(--text-gray);
        }

        input, select {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #334155;
            background: #0f172a;
            color: #fff;
            margin-top: 5px;
            box-sizing: border-box;
        }

        .preview-area {
            background: #f1f5f9;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-y: auto;
            color: #1e293b;
        }

        /* CARD AJUSTADO PARA EVITAR CORTES */
        .card {
            width: 650px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden;
            position: relative;
            margin-bottom: 30px;
            padding-top: 5px; /* Espaço de segurança no topo */
        }

        .badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--accent-red);
            color: #fff;
            padding: 6px 12px;
            font-size: 11px;
            font-weight: 800;
            border-radius: 4px;
            display: none;
            z-index: 10;
        }

        .header { text-align: center; padding: 30px 25px 20px 25px; }
        .header img { max-width: 180px; height: auto; display: inline-block; }

        .title {
            text-align: center;
            padding: 15px;
            color: #fff;
            font-weight: bold;
            background: #1e3a8a;
            font-size: 18px;
        }

        .subtitle {
            text-align: center;
            padding: 10px;
            color: #fff;
            background: #2563eb;
            font-size: 13px;
            font-weight: 500;
        }

        table { width: 100%; border-collapse: collapse; background: white; }
        td { padding: 14px; border-bottom: 1px solid #f1f5f9; font-size: 14px; color: #1e293b; }

        .label-cell {
            background: #f8fafc;
            font-weight: 700;
            width: 30%;
            color: #64748b;
        }

        .copy-box {
            width: 650px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            border: 1px dashed #cbd5e1;
            margin-bottom: 20px;
        }

        .copy-header {
            font-size: 12px;
            color: #64748b;
            margin-bottom: 10px;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 5px;
            font-weight: bold;
        }

        #email-body, #sheet-row {
            font-size: 13px;
            line-height: 1.6;
            white-space: pre-wrap;
            color: #334155;
            background: #f8fafc;
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #e2e8f0;
        }

        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .png { background: #2563eb; color: #fff; }
        .pdf { background: #16a34a; color: #fff; }
        .copy-btn { background: #64748b; color: #fff; width: auto; font-size: 11px; padding: 4px 8px; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <div class="form">
        <h3>📡 Gerador de Avisos NOC</h3>
        
        <label>Tipo de Manutenção</label>
        <select id="tipo">
            <option value="normal">Programada</option>
            <option value="critico">Emergencial</option>
        </select>

        <label>Data da Atividade</label>
        <input type="date" id="data">

        <div style="display: flex; gap: 10px;">
            <div style="flex: 1;">
                <label>Início</label>
                <input type="time" id="inicio">
            </div>
            <div style="flex: 1;">
                <label>Fim</label>
                <input type="time" id="fim">
            </div>
        </div>

        <label>Local / Abrangência</label>
        <input id="local" placeholder="Ex: Castanhal/PA">

        <label>Descrição Técnica</label>
        <input id="descricao" placeholder="Ex: Reboot da OLT1">

        <label>Impacto Previsto</label>
        <input id="impacto" placeholder="Ex: Clientes residenciais">

        <label>Setor Responsável</label>
        <input id="setor" placeholder="Ex: NOC">

        <label>Protocolo / Ticket</label>
        <input id="protocolo" placeholder="Ex: 0426-003850">

        <div class="btn-group">
            <button class="png" onclick="gerarPNG()">Salvar PNG</button>
            <button class="pdf" onclick="gerarPDF()">Salvar PDF</button>
        </div>
    </div>

    <div class="preview-area" id="captura-container">
        <div id="card" class="card">
            <div id="badge" class="badge">EMERGENCIAL</div>
            <div class="header">
                <img src="../assets/img/online.png" alt="Logo Online Telecom">
            </div>
            <div id="titulo" class="title">INFORME DE ATIVIDADE PROGRAMADA</div>
            <div id="subtitulo" class="subtitle">ATIVIDADE PROGRAMADA CONFORME AS INFORMAÇÕES ABAIXO</div>
            <table>
                <tr><td class="label-cell">Data</td><td id="p_data">-</td></tr>
                <tr><td class="label-cell">Período</td><td id="p_periodo">-</td></tr>
                <tr><td class="label-cell">Local</td><td id="p_local">-</td></tr>
                <tr><td class="label-cell">Descrição</td><td id="p_descricao">-</td></tr>
                <tr><td class="label-cell">Impacto</td><td id="p_impacto">-</td></tr>
                <tr><td class="label-cell">Setor</td><td id="p_setor">-</td></tr>
                <tr><td class="label-cell">Protocolo</td><td id="p_protocolo">-</td></tr>
            </table>
        </div>

        <div class="copy-box">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div class="copy-header">CONTEÚDO PARA E-MAIL</div>
                <button class="copy-btn" onclick="copiarTexto('email-body')">Copiar Texto</button>
            </div>
            <div id="email-content">
                <strong>TÍTULO:</strong> <span id="mail_titulo">GMUD - NOC | AVISO DE MANUTENÇÃO PROGRAMADA</span><br><br>
                <div id="email-body"></div>
            </div>
        </div>

        <div class="copy-box">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div class="copy-header">LANÇAMENTO EM PLANILHA</div>
                <div style="display: flex; gap: 5px;">
                    <a href="#" target="_blank" class="copy-btn" style="background: #16a34a; text-decoration: none;">Abrir Planilha</a>
                    <button class="copy-btn" onclick="copiarTexto('sheet-row')">Copiar Linha</button>
                </div>
            </div>
            <div id="sheet-row"></div>
        </div>
    </div>
</div>

<script>
    const ids = ["tipo","data","inicio","fim","local","descricao","impacto","setor","protocolo"];
    ids.forEach(id => document.getElementById(id).addEventListener("input", atualizar));

    function formatarData(d){
        if(!d) return { f: "", s: "" };
        const dataObj = new Date(d + 'T00:00:00');
        const dias = ["domingo", "segunda-feira", "terça-feira", "quarta-feira", "quinta-feira", "sexta-feira", "sábado"];
        return { f: dataObj.toLocaleDateString('pt-BR'), s: dias[dataObj.getDay()] };
    }

    function atualizar() {
        const v = {};
        ids.forEach(id => v[id] = document.getElementById(id).value);
        const dataInfo = formatarData(v.data);
        const ehCritico = v.tipo === "critico";
        const cor = ehCritico ? "#dc2626" : "#1e3a8a";

        // Card
        document.getElementById("badge").style.display = ehCritico ? "block" : "none";
        document.getElementById("titulo").style.backgroundColor = cor;
        document.getElementById("subtitulo").style.backgroundColor = cor;
        document.getElementById("titulo").innerText = `INFORME DE ATIVIDADE ${ehCritico ? 'EMERGENCIAL' : 'PROGRAMADA'}`;
        document.getElementById("subtitulo").innerText = ehCritico ? "ATIVIDADE EMERGENCIAL EM ANDAMENTO" : "ATIVIDADE PROGRAMADA CONFORME AS INFORMAÇÕES ABAIXO";

        document.getElementById("p_data").innerText = dataInfo.f ? `${dataInfo.f} (${dataInfo.s})` : "-";
        document.getElementById("p_periodo").innerText = (v.inicio && v.fim) ? `${v.inicio} às ${v.fim}` : "-";
        document.getElementById("p_local").innerText = v.local || "-";
        document.getElementById("p_descricao").innerText = v.descricao || "-";
        document.getElementById("p_impacto").innerText = v.impacto || "-";
        document.getElementById("p_setor").innerText = v.setor || "-";
        document.getElementById("p_protocolo").innerText = v.protocolo || "-";

        // Email
        document.getElementById("mail_titulo").innerText = `${v.protocolo ? '('+v.protocolo+') ' : ''}GMUD - NOC | AVISO DE MANUTENÇÃO ${v.tipo.toUpperCase()}`;
        document.getElementById("email-body").innerText = `Prezados,\n\nGostaríamos de informar que na madrugada do dia ${dataInfo.f || 'XX/XX'} (${dataInfo.s || 'dia'}), no intervalo entre ${v.inicio || '00:00'} até ${v.fim || '00:00'} horas, ocorrerá uma manutenção ${v.tipo} na qual afetará os serviços, conforme aviso em anexo.\n\nAtenciosamente,\nNOC - Online Telecom`;

        // Planilha
        const linha = [v.protocolo, v.setor, "Equipe NOC", v.tipo, dataInfo.f, v.inicio, dataInfo.f, v.fim, "1h", v.local, v.descricao, "Varejo", v.impacto, "OK"].join('\t');
        document.getElementById("sheet-row").innerText = linha;
    }

    async function copiarTexto(id) {
        await navigator.clipboard.writeText(document.getElementById(id).innerText);
        alert("Copiado!");
    }

    // FUNÇÕES DE EXPORTAÇÃO CORRIGIDAS (SEM CORTES)
    async function gerarPNG() {
        const elemento = document.getElementById("card");
        const canvas = await html2canvas(elemento, {
            scale: 3,
            backgroundColor: "#ffffff",
            logging: false,
            useCORS: true,
            y: 0, // Garante que comece do topo do elemento
            scrollX: 0,
            scrollY: -window.scrollY // Compensa o scroll da página para não cortar
        });
        const link = document.createElement("a");
        link.download = `AVISO_${document.getElementById("protocolo").value || 'NOC'}.png`;
        link.href = canvas.toDataURL("image/png");
        link.click();
    }

    async function gerarPDF() {
        const { jsPDF } = window.jspdf;
        const elemento = document.getElementById("card");
        const canvas = await html2canvas(elemento, { scale: 3, y: 0, scrollY: -window.scrollY });
        const imgData = canvas.toDataURL("image/png");
        const pdf = new jsPDF("p", "mm", "a4");
        pdf.addImage(imgData, 'PNG', 10, 10, 190, (canvas.height * 190) / canvas.width);
        pdf.save("aviso_noc.pdf");
    }

    atualizar();
</script>

</body>
</html>
