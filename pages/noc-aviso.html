<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOC Avisos | Gerador de GMUD</title>

    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root {
            --bg-dark: #0f172a;
            --panel-dark: #1e293b;
            --accent-blue: #3b82f6;
            --accent-red: #ef4444;
            --text-gray: #94a3b8;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: white;
            overflow: hidden;
        }

        .container {
            display: grid;
            grid-template-columns: 400px 1fr;
            height: 100vh;
        }

        .form {
            background: var(--panel-dark);
            padding: 25px;
            overflow-y: auto;
            border-right: 1px solid #334155;
            display: flex;
            flex-direction: column;
        }

        h3 { margin: 0 0 20px 0; color: #f8fafc; font-size: 1.2rem; }

        label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 15px;
            display: block;
            color: var(--text-gray);
        }

        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #334155;
            background: #1e293b;
            color: #ffffff;
            margin-top: 5px;
            box-sizing: border-box;
            color-scheme: dark; 
            font-size: 14px;
        }

        .preview-area {
            background: #f1f5f9;
            padding: 40px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card {
            width: 650px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden;
            position: relative;
            flex-shrink: 0;
        }

        .badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--accent-red);
            color: #fff;
            padding: 6px 12px;
            font-size: 11px;
            font-weight: 800;
            border-radius: 4px;
            display: none;
        }

        .header { text-align: center; padding: 30px 25px; background: #fff; }
        .header img { max-width: 180px; height: auto; }

        .title {
            text-align: center;
            padding: 15px;
            color: #fff;
            font-weight: bold;
            background: #1e3a8a;
            font-size: 18px;
        }

        .subtitle {
            text-align: center;
            padding: 10px;
            color: #fff;
            background: #2563eb;
            font-size: 13px;
            font-weight: 500;
        }

        table { width: 100%; border-collapse: collapse; }
        td { padding: 15px; border-bottom: 1px solid #f1f5f9; font-size: 14px; color: #1e293b; }

        .label-cell {
            background: #f8fafc;
            font-weight: 700;
            width: 30%;
            color: #64748b;
        }

        .copy-box {
            width: 650px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            border: 1px dashed #cbd5e1;
            margin-top: 25px;
            color: #1e293b;
        }

        #email-preview-container, #sheet-preview {
            font-size: 14px;
            background: #f8fafc;
            padding: 15px;
            border-radius: 4px;
            border: 1px solid #e2e8f0;
            margin: 10px 0;
            color: #334155;
            line-height: 1.6;
        }

        #email-body { white-space: pre-wrap; }

        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .png { background: #2563eb; color: #fff; }
        .pdf { background: #16a34a; color: #fff; }
        .copy-btn { background: #64748b; color: #fff; font-size: 11px; padding: 5px 10px; width: auto; flex: none; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <div class="form">
        <h3>📡 Gerador NOC</h3>
        
        <label>Tipo de Manutenção</label>
        <select id="tipo">
            <option value="normal">Programada</option>
            <option value="critico">Emergencial</option>
        </select>

        <label>Data da Atividade</label>
        <input type="date" id="data">

        <div style="display: flex; gap: 10px;">
            <div style="flex: 1;"><label>Início</label><input type="time" id="inicio"></div>
            <div style="flex: 1;"><label>Fim</label><input type="time" id="fim"></div>
        </div>

        <label>Local / Abrangência</label>
        <input id="local" placeholder="Ex: Castanhal/PA">

        <label>Descrição Técnica</label>
        <input id="descricao" placeholder="Ex: Reboot da OLT1">

        <label>Impacto Previsto</label>
        <input id="impacto" placeholder="Ex: Clientes residenciais">

        <label>Setor Responsável</label>
        <input id="setor" value="NOC">

        <label>Protocolo / Ticket</label>
        <input id="protocolo" placeholder="0426-003850">

        <div class="btn-group">
            <button class="png" onclick="exportar('png')">Salvar PNG</button>
            <button class="pdf" onclick="exportar('pdf')">Salvar PDF</button>
        </div>
    </div>

    <div class="preview-area">
        <div id="card" class="card">
            <div id="badge" class="badge">EMERGENCIAL</div>
            <div class="header"><img src="../assets/img/online.png" alt="Logo"></div>
            <div id="titulo" class="title">INFORME DE ATIVIDADE PROGRAMADA</div>
            <div id="subtitulo" class="subtitle">ATIVIDADE PROGRAMADA CONFORME AS INFORMAÇÕES ABAIXO</div>
            <table>
                <tr><td class="label-cell">Data</td><td id="p_data">-</td></tr>
                <tr><td class="label-cell">Período</td><td id="p_periodo">-</td></tr>
                <tr><td class="label-cell">Local</td><td id="p_local">-</td></tr>
                <tr><td class="label-cell">Descrição</td><td id="p_descricao">-</td></tr>
                <tr><td class="label-cell">Impacto</td><td id="p_impacto">-</td></tr>
                <tr><td class="label-cell">Setor</td><td id="p_setor">NOC</td></tr>
                <tr><td class="label-cell">Protocolo</td><td id="p_protocolo">-</td></tr>
            </table>
        </div>

        <div class="copy-box">
            <div style="font-weight:bold; font-size:12px; color:#64748b; border-bottom:1px solid #eee; padding-bottom:5px;">CONTEÚDO PARA E-MAIL</div>
            <div id="email-preview-container">
                <strong>TÍTULO:</strong> <span id="mail_titulo"></span><br><br>
                <div id="email-body"></div>
            </div>
            <button class="copy-btn" onclick="copiarEmail()">Copiar Corpo do E-mail</button>
        </div>

        <div class="copy-box">
            <div style="font-weight:bold; font-size:12px; color:#64748b; border-bottom:1px solid #eee; padding-bottom:5px;">LANÇAMENTO EM PLANILHA</div>
            <div id="sheet-preview" style="font-family: monospace; white-space: nowrap; overflow-x: auto;"></div>
            <div style="display:flex; gap:10px;">
                <button class="copy-btn" onclick="copiarPlanilha()">https://docs.google.com/spreadsheets/d/1wzG3PYX7nBzQzXsO-1LAprrjOt-F5KOgvtaJN6appFQ/edit?usp=sharing</button>
                <a href="#" target="_blank" style="font-size:11px; color:#16a34a; text-decoration:none; font-weight:bold; padding-top:5px;">Abrir Planilha</a>
            </div>
        </div>
    </div>
</div>

<script>
    const campos = ["tipo","data","inicio","fim","local","descricao","impacto","setor","protocolo"];
    let dadosPlanilhaRaw = ""; // Variável global para guardar os tabs reais

    campos.forEach(id => document.getElementById(id).addEventListener("input", atualizar));

    function calcularDuracao(inicio, fim) {
        if (!inicio || !fim) return "1h";
        const [h1, m1] = inicio.split(':').map(Number);
        let [h2, m2] = fim.split(':').map(Number);
        
        let min1 = h1 * 60 + m1;
        let min2 = h2 * 60 + m2;
        
        if (min2 <= min1) min2 += 1440; // Ajuste para virada de dia
        
        const diff = min2 - min1;
        const h = Math.floor(diff / 60);
        const m = diff % 60;
        
        return m > 0 ? `${h}h${m}min` : `${h}h`;
    }

    function atualizar() {
        const v = {};
        campos.forEach(id => v[id] = document.getElementById(id).value);
        
        const dataObj = v.data ? new Date(v.data + 'T00:00:00') : null;
        const dataF = dataObj ? dataObj.toLocaleDateString('pt-BR') : "XX/XX";
        const diaS = dataObj ? ["domingo","segunda-feira","terça-feira","quarta-feira","quinta-feira","sexta-feira","sábado"][dataObj.getDay()] : "dia";

        const ehC = v.tipo === "critico";
        const cor = ehC ? "#dc2626" : "#1e3a8a";
        const duracao = calcularDuracao(v.inicio, v.fim);

        // Card
        document.getElementById("badge").style.display = ehC ? "block" : "none";
        document.getElementById("titulo").style.background = cor;
        document.getElementById("subtitulo").style.background = cor;
        document.getElementById("titulo").innerText = `INFORME DE ATIVIDADE ${ehC ? 'EMERGENCIAL' : 'PROGRAMADA'}`;
        document.getElementById("p_data").innerText = v.data ? `${dataObj.toLocaleDateString('pt-BR')} (${diaS})` : "-";
        document.getElementById("p_periodo").innerText = `${v.inicio || '00:00'} até ${v.fim || '00:00'} horas`;
        document.getElementById("p_local").innerText = v.local || "-";
        document.getElementById("p_descricao").innerText = v.descricao || "-";
        document.getElementById("p_impacto").innerText = v.impacto || "-";
        document.getElementById("p_setor").innerText = v.setor || "-";
        document.getElementById("p_protocolo").innerText = v.protocolo || "-";

        // E-mail
        document.getElementById("mail_titulo").innerText = `${v.protocolo ? '('+v.protocolo+') ' : ''}GMUD - NOC | AVISO DE MANUTENÇÃO ${ehC ? 'EMERGENCIAL' : 'PROGRAMADA'}`;
        document.getElementById("email-body").innerText = `Prezados,

Gostaríamos de informar que na madrugada do dia ${dataF} (${diaS}), no intervalo entre ${v.inicio || '00:00'} até ${v.fim || '00:00'} horas, ocorrerá uma manutenção ${ehC ? 'emergencial' : 'normal'} na qual afetará os serviços, conforme aviso em anexo.

Atenciosamente,
NOC - Online Telecom`;

        // Planilha - Montagem com TAB real (\t)
        const colunas = [
            v.protocolo || "",
            v.setor || "NOC",
            "Equipe NOC",
            ehC ? "EMERGENCIAL" : "PROGRAMADA",
            dataF,
            v.inicio || "00:00",
            dataF,
            v.fim || "00:00",
            duracao,
            v.local || "",
            v.descricao || "",
            v.impacto || ""
        ];
        
        dadosPlanilhaRaw = colunas.join('\t');
        document.getElementById("sheet-preview").innerText = colunas.join(' | '); // Visual amigável na tela
    }

    async function copiarPlanilha() {
        try {
            await navigator.clipboard.writeText(dadosPlanilhaRaw);
            alert("Linha copiada com divisões de colunas!");
        } catch (err) {
            alert("Erro ao copiar.");
        }
    }

    async function copiarEmail() {
        await navigator.clipboard.writeText(document.getElementById("email-body").innerText);
        alert("Corpo do e-mail copiado!");
    }

    async function exportar(formato) {
        const originalCard = document.getElementById("card");
        const clone = originalCard.cloneNode(true);
        clone.style.position = "absolute";
        clone.style.top = "-9999px";
        clone.style.width = "650px";
        document.body.appendChild(clone);

        try {
            const canvas = await html2canvas(clone, { scale: 3, backgroundColor: "#ffffff", useCORS: true });
            const imgData = canvas.toDataURL("image/png");
            if (formato === 'png') {
                const link = document.createElement("a");
                link.download = `Aviso_NOC_${document.getElementById("protocolo").value || 'Atividade'}.png`;
                link.href = imgData;
                link.click();
            } else {
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF("p", "mm", "a4");
                pdf.addImage(imgData, 'PNG', 10, 10, 190, (canvas.height * 190) / canvas.width);
                pdf.save("Aviso_NOC.pdf");
            }
        } finally {
            document.body.removeChild(clone);
        }
    }

    atualizar();
</script>

</body>
</html>
