<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>OLTs - Vendors</title>
<link rel="stylesheet" href="css/style.css">

<style>
.tabs {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.tab-btn {
  padding: 8px 12px;
  border-radius: 8px;
  border: 2px solid transparent;
  cursor: pointer;
  background: var(--card-dark);
}

body.light .tab-btn {
  background: var(--card-light);
}

.tab-btn.active {
  background: var(--primary);
  color: #000;
  font-weight: bold;
  border: 2px solid var(--primary);
}

/* 🔥 fix modo branco */
body.light .tab-btn.active {
  border: 2px solid #000;
}

.tab-content {
  display: none;
}

.tab-content.active {
  display: block;
}
</style>
</head>

<body>

<button class="theme-btn" onclick="toggleTheme()">🌙</button>

<nav>
<a href="index.html">Home</a>
<a href="metodos.html">Métodos</a>
<a href="organizacao.html">Organização</a>
<a href="ferramentas.html">Ferramentas</a>
<a href="infra.html">Infraestrutura</a>
<a href="sobre.html">Sobre</a>
<a href="contato.html">Contato</a>
</nav>

<section>

<h1>📡 OLTs</h1>

<a href="infra.html" class="back-btn">← Voltar</a>

<div class="tabs">
<button class="tab-btn active" onclick="openTab(event,'huawei')">Huawei</button>
<button class="tab-btn" onclick="openTab(event,'zte')">ZTE</button>
<button class="tab-btn" onclick="openTab(event,'datacom')">Datacom</button>
</div>

<div id="huawei" class="tab-content active">Huawei conteúdo</div>
<div id="zte" class="tab-content">ZTE conteúdo</div>
<div id="datacom" class="tab-content">Datacom conteúdo</div>

</section>

<footer>
<p>© 2026 - Marcos Renan</p>
</footer>

<script src="js/script.js"></script>

<script>
function openTab(evt, tabName) {
  document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));

  document.getElementById(tabName).classList.add("active");
  evt.currentTarget.classList.add("active");
}
</script>

</body>
</html>
