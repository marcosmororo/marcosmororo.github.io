<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>OLTs - Vendors</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
.tabs {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 15px;
}

.tab-btn {
  padding: 8px 12px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

.tab-btn.active {
  background: var(--primary);
}

.tab-content {
  display: none;
}

.tab-content.active {
  display: block;
}

.accordion {
  cursor: pointer;
  display: flex;
  justify-content: space-between;
}

.accordion::after {
  content: "▼";
  transition: 0.3s;
}

.accordion.active::after {
  transform: rotate(180deg);
}

.panel {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease;
}

pre {
  padding: 10px;
  border-radius: 8px;
  background: var(--card-dark);
}
</style>
</head>

<body>

<button class="theme-btn" onclick="toggleTheme()">🌙</button>

<nav>
<a href="index.html">Home</a>
<a href="metodos.html">Métodos</a>
<a href="organizacao.html">Organização</a>
<a href="ferramentas.html">Ferramentas</a>
<a href="infra.html">Infraestrutura</a>
<a href="sobre.html">Sobre</a>
<a href="contato.html">Contato</a>
</nav>

<section>

<h1>📡 OLTs</h1>

<div class="tabs">
<button class="tab-btn active" onclick="openTab(event,'huawei')">Huawei</button>
<button class="tab-btn" onclick="openTab(event,'zte')">ZTE</button>
<button class="tab-btn" onclick="openTab(event,'nokia')">Nokia</button>
<button class="tab-btn" onclick="openTab(event,'fiberhome')">FiberHome</button>
<button class="tab-btn" onclick="openTab(event,'datacom')">Datacom</button>
</div>

<div id="huawei" class="tab-content active">
<div class="card accordion">Ver ONUs</div>
<div class="panel"><pre>display ont info</pre></div>
</div>

<div id="zte" class="tab-content">
<div class="card accordion">Ver ONUs</div>
<div class="panel"><pre>show gpon onu state</pre></div>
</div>

<div id="nokia" class="tab-content">
<div class="card accordion">Ver ONUs</div>
<div class="panel"><pre>show equipment ont</pre></div>
</div>

<div id="fiberhome" class="tab-content">
<div class="card accordion">Ver ONUs</div>
<div class="panel"><pre>show onu info</pre></div>
</div>

<div id="datacom" class="tab-content">
<div class="card accordion">Ver ONUs</div>
<div class="panel"><pre>show onu</pre></div>
</div>

</section>

<footer>
<p>© 2026 - Marcos Renan</p>
</footer>

<script>
function openTab(evt, tabName) {
  document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));

  document.getElementById(tabName).classList.add("active");
  evt.currentTarget.classList.add("active");
}

document.querySelectorAll(".accordion").forEach(btn => {
  btn.addEventListener("click", () => {
    btn.classList.toggle("active");
    let panel = btn.nextElementSibling;

    panel.style.maxHeight = panel.style.maxHeight ? null : panel.scrollHeight + "px";
  });
});
</script>

</body>
</html>
