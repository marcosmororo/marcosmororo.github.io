<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-3">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="manifest" href="/site.webmanifest">  
<title>Métodos de Estudo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root {
  --primary: #38bdf8;
  --bg-dark: #0f172a;
  --bg-light: #f1f5f9;
  --card-dark: #020617;
  --card-light: #ffffff;
}

* { transition: background 0.3s, color 0.3s; }

body {
  font-family: Arial;
  background: var(--bg-dark);
  color: white;
  margin: 0;
}

body.light {
  background: var(--bg-light);
  color: #111;
}

/* NAV */
nav {
  background: rgba(2,6,23,0.9);
  padding: 15px;
  text-align: center;
}

body.light nav {
  background: rgba(255,255,255,0.9);
}

nav a {
  color: white;
  margin: 0 10px;
  text-decoration: none;
}

body.light nav a {
  color: #111;
}

/* BOTÃO */
.theme-btn {
  position: fixed;
  top: 15px;
  right: 15px;
  background: var(--primary);
  border: none;
  color: white;
  padding: 10px;
  border-radius: 10px;
  cursor: pointer;
  z-index: 1000;
}

/* TIMER TOPO */
.top-timer {
  text-align: center;
  font-size: 2rem;
  padding: 15px;
  font-weight: bold;
  background: rgba(56,189,248,0.1);
}

/* CONTEÚDO */
section {
  max-width: 800px;
  margin: auto;
  padding: 20px;
}

.card {
  background: var(--card-dark);
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 20px;
}

body.light .card {
  background: var(--card-light);
  color: #111;
}

/* CHECKLIST */
.checklist label {
  display: block;
  margin: 10px 0;
  cursor: pointer;
}

.checklist input {
  margin-right: 10px;
}

/* BOTÕES */
button {
  margin-top: 10px;
  padding: 10px;
  border: none;
  background: var(--primary);
  color: white;
  border-radius: 8px;
  cursor: pointer;
}
</style>
</head>

<body>

<button class="theme-btn" onclick="toggleTheme()">🌙</button>

<div class="top-timer" id="tempo">25:00</div>

<nav>
  <a href="https://marcosmororo.github.io/">Home</a>
  <a href="organizacao.html">Organização</a>
  <a href="ferramentas.html">Ferramentas</a>
  <a href="sobre.html">Sobre</a>
  <a href="contato.html">Contato</a>
</nav>

<section>

<h1>📚 Métodos de Estudo</h1>

<div class="card">
<h3>📌 Estudo prático</h3>
<p>Aprenda configurando redes reais ou simuladas.</p>
</div>

<div class="card">
<h3>🧠 Técnica Feynman</h3>
<p>Explique o conteúdo como se estivesse ensinando alguém.</p>
</div>

<div class="card">
<h3>✅ Sessão de estudo</h3>

<div class="checklist">
  <label><input type="checkbox"> Entendi o conteúdo</label>
  <label><input type="checkbox"> Fiz prática</label>
  <label><input type="checkbox"> Revisei</label>
  <label><input type="checkbox"> Expliquei sozinho</label>
</div>

</div>

<div class="card">
<h3>⏱️ Controle Pomodoro</h3>

<button onclick="iniciar()">Iniciar</button>
<button onclick="pausar()">Pausar</button>
<button onclick="resetar()">Resetar</button>
</div>

</section>

<script>
/* ===== TEMA GLOBAL ===== */

/* Aplicar tema ANTES de renderizar */
(function() {
  const tema = localStorage.getItem("tema");
  if (tema === "light") {
    document.body.classList.add("light");
  }
})();

function toggleTheme() {
  document.body.classList.toggle('light');

  const isLight = document.body.classList.contains('light');
  localStorage.setItem("tema", isLight ? "light" : "dark");

  const btn = document.querySelector('.theme-btn');
  btn.textContent = isLight ? '🌙' : '☀️';
}

/* Corrigir ícone ao carregar */
window.onload = () => {
  const btn = document.querySelector('.theme-btn');
  btn.textContent = document.body.classList.contains('light') ? '🌙' : '☀️';
};

/* ===== POMODORO COM SALVAMENTO ===== */

let tempo = localStorage.getItem("tempo") 
  ? parseInt(localStorage.getItem("tempo")) 
  : 1500;

let rodando = localStorage.getItem("rodando") === "true";
let intervalo;

function atualizarTempo() {
  let min = Math.floor(tempo / 60);
  let seg = tempo % 60;
  document.getElementById('tempo').innerText =
    `${String(min).padStart(2,'0')}:${String(seg).padStart(2,'0')}`;
}

function salvar() {
  localStorage.setItem("tempo", tempo);
  localStorage.setItem("rodando", rodando);
}

function iniciar() {
  if (!intervalo) {
    rodando = true;
    intervalo = setInterval(() => {
      if (tempo > 0) {
        tempo--;
        atualizarTempo();
        salvar();
      }
    }, 1000);
  }
}

function pausar() {
  clearInterval(intervalo);
  intervalo = null;
  rodando = false;
  salvar();
}

function resetar() {
  pausar();
  tempo = 1500;
  atualizarTempo();
  salvar();
}

/* AUTO RETOMAR */
if (rodando) iniciar();
atualizarTempo();

</script>

</body>
</html>
