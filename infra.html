<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NOC - Troubleshooting</title>

<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
  gap: 20px;
}

/* CARD */
.card {
  position: relative;
  padding: 25px;
  border-radius: 12px;
  text-align: center;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-6px);
}

/* TAG */
.tag {
  position: absolute;
  top: 10px;
  left: 10px;
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 6px;
  background: rgba(255,255,255,0.1);
}

/* PRIORIDADE */
.priority {
  position: absolute;
  top: 10px;
  right: 10px;
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 6px;
}

.low { background: #334155; }
.medium { background: #ca8a04; }
.high { background: #dc2626; }

/* FAVORITO */
.star {
  position: absolute;
  bottom: 10px;
  right: 10px;
  cursor: pointer;
  opacity: 0.5;
}

.star.active {
  color: gold;
  opacity: 1;
}

/* BUSCA */
.search-box {
  max-width: 400px;
  margin: 20px auto;
}

.search-box input {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: none;
}

/* FILTROS */
.filters {
  text-align: center;
  margin-bottom: 15px;
}

.filters button {
  margin: 5px;
  padding: 6px 12px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
}

.filters button.active {
  background: #38bdf8;
  color: white;
}

</style>

</head>

<body>

<button class="theme-btn" onclick="toggleTheme()">🌙</button>

<nav>
<a href="index.html">Home</a>
<a href="infra.html">Infraestrutura</a>
<a href="contato.html">Contato</a>
</nav>

<section>

<h1>🖥️ NOC - Troubleshooting</h1>

<div class="search-box">
<input type="text" id="search" placeholder="Buscar comando ou tecnologia...">
</div>

<div class="filters">
<button onclick="filter('all')" class="active">Todos</button>
<button onclick="filter('linux')">Linux</button>
<button onclick="filter('rede')">Rede</button>
<button onclick="filter('olt')">OLT</button>
<button onclick="showFavorites()">⭐ Favoritos</button>
</div>

<div class="grid" id="cards">

<!-- LINUX -->
<div class="card" data-cat="linux" data-name="linux logs cpu memoria processo">
<span class="tag">Linux</span>
<span class="priority low">Rápido</span>
<i class="fab fa-linux fa-2x"></i>
<h3>Linux</h3>
<p>Logs, CPU, memória, processos.</p>
<i class="fas fa-star star" onclick="fav(this)"></i>
</div>

<!-- REDE -->
<div class="card" data-cat="rede" data-name="vlan bgp ospf rota switch">
<span class="tag">Rede</span>
<span class="priority medium">Importante</span>
<i class="fas fa-network-wired fa-2x"></i>
<h3>Switch/Roteador</h3>
<p>VLAN, rotas, protocolos.</p>
<i class="fas fa-star star" onclick="fav(this)"></i>
</div>

<!-- OLT -->
<div class="card" data-cat="olt" data-name="gpon onu sinal potencia fibra">
<span class="tag">OLT</span>
<span class="priority high">Crítico</span>
<i class="fas fa-server fa-2x"></i>
<h3>OLT</h3>
<p>ONU, potência, diagnóstico GPON.</p>
<i class="fas fa-star star" onclick="fav(this)"></i>
</div>

</div>

</section>

<footer>
<p>© NOC - Marcos Renan</p>
</footer>

<script>

const cards = document.querySelectorAll(".card");

/* BUSCA */
document.getElementById("search").addEventListener("keyup", function() {
  const v = this.value.toLowerCase();
  cards.forEach(c => {
    c.style.display = c.dataset.name.includes(v) ? "block" : "none";
  });
});

/* FILTRO */
function filter(cat) {
  document.querySelectorAll(".filters button").forEach(b => b.classList.remove("active"));
  event.target.classList.add("active");

  cards.forEach(c => {
    c.style.display = (cat === "all" || c.dataset.cat === cat) ? "block" : "none";
  });
}

/* FAVORITOS */
function fav(el) {
  el.classList.toggle("active");
}

/* MOSTRAR FAVORITOS */
function showFavorites() {
  cards.forEach(c => {
    const star = c.querySelector(".star");
    c.style.display = star.classList.contains("active") ? "block" : "none";
  });
}

</script>

<script src="js/script.js"></script>

</body>
</html>
