<style>

/* GRID MODERNO */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  margin-top: 30px;
}

/* CARD */
.card-link {
  text-decoration: none;
  color: inherit;
}

.card {
  padding: 18px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  gap: 12px;
  transition: 0.25s;
  font-weight: 500;
}

/* HOVER */
.card:hover {
  transform: translateY(-4px);
  opacity: 0.9;
}

/* ÍCONE */
.card i {
  font-size: 18px;
}

/* CORES POR CATEGORIA (igual estilo imagem) */
.linux   { background: #2f3e46; }
.rede    { background: #1d3557; }
.olt     { background: #6b2c2c; }

/* TEXTO */
.card span {
  font-size: 15px;
}

/* HEADER */
.section-header {
  text-align: center;
  margin-top: 20px;
}

.section-header p {
  opacity: 0.7;
  font-size: 14px;
}

</style>

</head>
