<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Linux - Comandos</title>
<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
.accordion {
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
}

.accordion::after {
  content: "▼";
  font-size: 12px;
  transition: 0.3s;
}

.accordion.active::after {
  transform: rotate(180deg);
}

.panel {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease;
}

pre {
  background: rgba(0,0,0,0.2);
  padding: 10px;
  border-radius: 8px;
}
</style>
</head>

<body>

<button class="theme-btn" onclick="toggleTheme()">🌙</button>

<nav>
<a href="index.html">Home</a>
<a href="metodos.html">Métodos</a>
<a href="organizacao.html">Organização</a>
<a href="ferramentas.html">Ferramentas</a>
<a href="infra.html">Infraestrutura</a>
<a href="sobre.html">Sobre</a>
<a href="contato.html">Contato</a>
</nav>

<section>

<h1>🐧 Linux</h1>

<div class="card accordion">Monitoramento</div>
<div class="panel">
<pre>
top
htop
uptime
free -h
df -h
</pre>
</div>

<div class="card accordion">Rede</div>
<div class="panel">
<pre>
ip a
ping 8.8.8.8
ss -tulnp
traceroute google.com
</pre>
</div>

<div class="card accordion">Arquivos</div>
<div class="panel">
<pre>
ls -la
cd /var/log
du -sh *
rm -rf arquivo
</pre>
</div>

</section>

<footer>
<p>© 2026 - Marcos Renan</p>
</footer>

<script>
document.querySelectorAll(".accordion").forEach(btn => {
  btn.addEventListener("click", () => {
    btn.classList.toggle("active");
    let panel = btn.nextElementSibling;

    if (panel.style.maxHeight) {
      panel.style.maxHeight = null;
    } else {
      panel.style.maxHeight = panel.scrollHeight + "px";
    }
  });
});
</script>

</body>
</html>
