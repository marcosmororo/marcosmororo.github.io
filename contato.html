<style>

/* CENTRALIZA MELHOR */
.center-page {
  display: flex;
  align-items: center;
  justify-content: center;
}

/* CARD CONTATO */
.card.contato {
  display: flex;
  flex-direction: column;
  gap: 15px;
  margin-top: 20px;
  padding: 25px;
}

/* ITENS DE CONTATO */
.item {
  display: flex;
  align-items: center;
  gap: 15px;
  padding: 12px 15px;
  border-radius: 8px;
  text-decoration: none;
  color: inherit;
  transition: 0.3s;
}

/* ÍCONES */
.item i {
  font-size: 20px;
  width: 25px;
  text-align: center;
}

/* HOVER PROFISSIONAL */
.item:hover {
  transform: translateX(5px);
  background: rgba(255,255,255,0.05);
}

/* TEXTO */
.item span {
  font-size: 15px;
}

/* BOTÃO VOLTAR */
.btn {
  display: inline-block;
  margin-top: 20px;
  text-decoration: none;
  padding: 10px 18px;
  border-radius: 6px;
  transition: 0.3s;
}

.btn:hover {
  opacity: 0.8;
}

</style>

</head>
